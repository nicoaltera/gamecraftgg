name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: pipeline syntax
        run: node --check pipeline/run.mjs && node --check pipeline/reporter.mjs && node --check scripts/game-server.mjs && node --check scripts/verify-game.mjs
      - name: production build (twice — catches build-time state races)
        run: npm run build && rm -rf .next && npm run build
