<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sky Duel</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#20304C;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block}
</style>

<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   SKY DUEL — a free-for-all barnstormer dogfight over the clouds.
   You + 3 bot-piloted planes duel in a bounded sky. Shoot the
   others down; be the last plane flying to win the round.
   Now with a PERSISTENT HANGAR: bank Upgrade Parts from kills &
   round wins, then kit out your war-machine — engine, armor,
   guns, and a roster of insane special weapons (heat-seekers,
   an escort drone swarm, a scatter cannon, an EMP shockwave).
   Pure Canvas2D + WebAudio. One file. No assets.
   ============================================================ */

const SLUG = 'sky-duel';
const W = 960, H = 540;               // fixed virtual VIEWPORT resolution (landscape)

/* ---------- WORLD & CAMERA (a sky bigger than the screen) ----------
   The arena is now a large world you fly THROUGH; the camera chases the player
   (clamped to the world edges) so it feels open, not a single bouncing screen.
   Off-screen rivals get edge-arrows + a corner minimap so the fight is findable. */
const WORLD_W = 2560, WORLD_H = 1440;   // world is ~2.7x × 2.7x the viewport
const CAM_EASE = 5.5;                    // /s how fast the camera catches the player
const ZOOM = 0.72;                       // camera pulled back: you see MORE sky (a wide dogfight, not a close chase)
const VW = W / ZOOM, VH = H / ZOOM;      // world-space region visible on screen (~1333×750)
let camX = 0, camY = 0;
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

/* ---------- FLIGHT MODEL (momentum energy flight — the heart of it) ----------
   The plane carries a real velocity vector. THRUST pushes along the nose,
   GRAVITY always pulls down, DRAG bleeds speed, and a gentle ALIGN grips the
   momentum toward the nose so turns redirect energy (weighty, not twitchy).
   Climb with the nose up and you trade speed for height; point the nose down
   and gravity trades that height back into speed (à la Luftrausers). No thrust
   = you glide, slow, and sag. Tuned floaty-fun and controllable. Speed-tier
   upgrades scale THRUST/TURN/MAX_SPEED — the *base* feel is untouched. */
const TURN_RATE  = 2.75;   // rad/s the nose swings when you rotate (A/D · arrows)
const THRUST     = 305;    // px/s^2 forward accel while thrusting (up / W / hold)
const IDLE_PUSH  = 74;     // px/s^2 constant prop-wash so you always creep forward
const GRAV       = 172;    // px/s^2 downward pull (the honest dive/climb trade)
const DRAG       = 0.55;   // /s linear velocity damping (energy bleed)
const ALIGN      = 2.25;   // /s momentum grips toward the nose (this IS the "weight")
const MAX_SPEED  = 470;    // px/s speed cap (dive terminal)
const BULLET_SPD = 560;    // px/s muzzle speed, added to the shooter's velocity
const BULLET_LIFE= 1.05;   // s tracer lifetime
const BANK_EASE  = 8.0;    // /s how fast the visible roll follows your turn input

/* ---------- GUN HEAT (the metered resource — fire discipline) ----------
   Hold the trigger and the barrel HEATS. Peg it and the gun JAMS (overheats)
   until it cools back to the reset line — so you must burst-fire and let it
   breathe. Rewards short, aimed bursts over spraying. Gun upgrades lower the
   heat-per-shot and speed the cadence, but the jam mechanic always applies. */
const FIRE_CD    = 0.085;  // s between player shots (rat-a-tat)
const HEAT_SHOT  = 0.062;  // heat added per shot (~16 shots to peg)
const HEAT_COOL  = 0.52;   // heat/s bled while not firing
const HEAT_RESET = 0.34;   // must cool below this to un-jam after an overheat

/* ---------- COMBAT (health rebalanced — punchy but forgiving, not twitchy) ---------- */
const PLANE_R    = 15;     // hit radius
const PLAYER_HP  = 8;      // your BASE health pips (was 6 — a fresh run survives a real fight)
const BOT_HP     = 3;      // rival base health pips (scales with round + your power)
const IFRAME     = 0.82;   // s of invulnerability after a hit (was 0.55 — longer forgiveness)
const ARENA_PAD  = 40;     // soft-wall margin inside the WORLD

/* ---------- PRE-ROUND COUNTDOWN (get oriented before the guns go hot) ----------
   Every round opens with 3·2·1·ENGAGE. You (and the bots) can FLY and position
   during the count, but ALL guns/specials are locked until "ENGAGE!". */
const COUNTDOWN  = 3.0;    // s of hold-fire positioning at the top of each round

/* ---------- SPECIAL WEAPONS ---------- */
const ROCKET_LIFE= 3.2;    // s a heat-seeker chases before self-destructing
const ROCKET_TURN= 4.2;    // rad/s a seeker can swing to track its lock

/* ---------- ENEMY PROGRESSION (bots earn their own cool kit as rounds climb) ----------
   So a maxed player still gets a fight. Telegraphed, escalating, always beatable. */
const BOT_RK_LIFE = 2.8;   // s a bot seeker chases
const BOT_LOCK    = 0.85;  // s a bot telegraphs its seeker lock before launch (fair warning)

/* ---------- palette ---------- */
const SKY_TOP='#63B7F0', SKY_MID='#8FD0F6', SKY_LOW='#CFEBFB',
      CLOUD='#FFFFFF', CLOUD_WARM='#FFF3DC', CLOUD_SHADE='#D4E8F6',
      YELLOW='#F4C430', RED='#E8553A', GREEN='#3AAE6B', PURPLE='#8A6BE0',
      TEAL='#3FBEBE', ORANGE='#F0A030', SKYBLUE='#6FA8DC',
      INK='#20304C', LETTERBOX='#16223A', HUD='#20304C', SUN='#FFF6DE';
const FONT='"Fredoka","Baloo 2","Comic Neue","Chalkboard SE","Segoe Print",sans-serif';

/* ---------- canvas / dpr / letterbox ---------- */
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let dpr=1, scl=1, offX=0, offY=0;
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2.5);
  const iw = window.innerWidth, ih = window.innerHeight;
  cv.width = Math.round(iw*dpr); cv.height = Math.round(ih*dpr);
  scl = Math.min(iw/W, ih/H);
  offX = (iw - W*scl)/2; offY = (ih - H*scl)/2;
}
window.addEventListener('resize', resize); resize();

/* ---------- deterministic RNG ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let rng = mulberry32(0xC0FFEE);
function rnd(a,b){ return a + (b-a)*rng(); }

/* ---------- storage / best / challenge ---------- */
let best = 0;
try{ best = Math.max(0, parseInt(localStorage.getItem('gs_best:'+SLUG)||'0',10)||0); }catch(e){}
function persist(){ try{ localStorage.setItem('gs_best:'+SLUG, String(best)); }catch(e){} }
let challenge = 0, challengeBeaten = false;
try{ const c = parseInt(new URLSearchParams(location.search).get('c')||'0',10); if(c>0) challenge=c; }catch(e){}

/* ---------- PROGRESSION (persistent hangar — Paper-Pilot style bank-and-upgrade) ----------
   Parts (◈) are earned from kills (+1 each) and round wins (+2+round) and PERSIST in
   localStorage. Spend them on seven upgrade families, each with a long generous tail.
   The first tiers are cheap and one-more-round away; the ceiling is an aspirational
   maxed war-machine. Old / absent saves migrate safely and never crash. */
const FAMILIES = [
  { key:'speed',   name:'ENGINE',   max:7, base:4,  desc:'thrust · agility · afterburner' },
  { key:'armor',   name:'ARMOR',    max:7, base:4,  desc:'hull HP · out-of-combat regen' },
  { key:'guns',    name:'GUNS',     max:7, base:5,  desc:'fire rate · low heat · extra barrels' },
  { key:'rockets', name:'SEEKERS',  max:6, base:8,  desc:'heat-seeking rockets · locks nearest', special:'active' },
  { key:'drones',  name:'DRONES',   max:4, base:10, desc:'escort swarm · auto-fires (always on)', special:'passive' },
  { key:'scatter', name:'SCATTER',  max:5, base:8,  desc:'shotgun spread cannon · big burst', special:'active' },
  { key:'emp',     name:'EMP',      max:5, base:12, desc:'shockwave stuns nearby planes', special:'active' },
];
const ACTIVE = ['rockets','scatter','emp'];   // fired with the SPECIAL button; you arm one
function familyColor(k){ return {speed:GREEN,armor:SKYBLUE,guns:YELLOW,rockets:RED,drones:TEAL,scatter:ORANGE,emp:PURPLE}[k]||YELLOW; }
function cost(f, tier){ return Math.round(f.base * Math.pow(1.6, tier)); }

let save = loadSave();
function loadSave(){
  const d = { v:2, up:0, equip:null, tier:{} };
  for(const f of FAMILIES) d.tier[f.key]=0;
  try{
    const raw = localStorage.getItem('gs_save:'+SLUG);
    if(raw){
      const o = JSON.parse(raw);
      if(o && typeof o==='object'){
        if(Number.isFinite(o.up)) d.up = Math.max(0, o.up|0);
        if(o.tier && typeof o.tier==='object'){
          for(const f of FAMILIES){ const t=o.tier[f.key]; if(Number.isFinite(t)) d.tier[f.key]=Math.max(0, Math.min(f.max, t|0)); }
        }
        if(typeof o.equip==='string') d.equip = o.equip;
      }
    }
  }catch(e){}
  if(!validEquip(d.equip, d.tier)) d.equip = autoEquip(d.tier);
  return d;
}
function persistSave(){ try{ localStorage.setItem('gs_save:'+SLUG, JSON.stringify(save)); }catch(e){} }
function validEquip(eq, tier){ return ACTIVE.includes(eq) && tier[eq]>0; }
function autoEquip(tier){ for(const k of ACTIVE) if(tier[k]>0) return k; return null; }
function cycleEquip(){ const owned=ACTIVE.filter(k=>save.tier[k]>0); if(!owned.length){ save.equip=null; return; } const i=owned.indexOf(save.equip); save.equip=owned[(i+1)%owned.length]; persistSave(); sfxBuy(); }
function powerLevel(){ let s=0; for(const f of FAMILIES) s+=save.tier[f.key]; return s; }
function buy(key){
  const f=FAMILIES.find(x=>x.key===key); if(!f) return;
  const t=save.tier[key]; if(t>=f.max){ sfxDeny(); return; }
  const c=cost(f,t); if(save.up<c){ sfxDeny(); return; }
  save.up-=c; save.tier[key]=t+1;
  if(ACTIVE.includes(key) && !validEquip(save.equip, save.tier)) save.equip=key;
  persistSave(); sfxBuy();
}
function awardParts(n){ save.up += n; persistSave(); }

/* derived player stats from tiers — the base feel is preserved at tier 0 */
function playerStats(){
  const s=save.tier, g=s.guns;
  return {
    maxHp:   PLAYER_HP + s.armor*2,                       // 6 → 20
    turn:    TURN_RATE * (1 + s.speed*0.055),
    thrust:  THRUST    * (1 + s.speed*0.10),
    idle:    IDLE_PUSH * (1 + s.speed*0.05),
    maxSpeed:MAX_SPEED * (1 + s.speed*0.05),
    fireCd:  FIRE_CD   * (1 - Math.min(0.5,  g*0.08)),
    heatShot:HEAT_SHOT * (1 - Math.min(0.55, g*0.09)),
    barrels: 1 + Math.floor(g/2),                         // 1,1,2,2,3,3,4
    regen:   s.armor>=3 ? 0.10 + (s.armor-3)*0.05 : 0,    // hp/s out of combat, tier 3+
    iframe:  IFRAME + s.armor*0.02,
  };
}
function rocketStats(){ const t=save.tier.rockets; return { own:t>0, max:2+t, reload:Math.max(0.9,2.6-t*0.18), dmg:2+Math.floor(t/2), speed:340+t*22 }; }
function droneStats(){  const t=save.tier.drones;  return { own:t>0, count:Math.min(3,t), cd:Math.max(0.35,0.9-t*0.08) }; }
function scatterStats(){const t=save.tier.scatter; return { own:t>0, pellets:5+t, spread:0.55, cd:Math.max(0.8,1.5-t*0.12) }; }
function empStats(){    const t=save.tier.emp;     return { own:t>0, radius:120+t*28, stun:1.1+t*0.28, recharge:Math.max(4,9-t*0.9) }; }

/* ---------- bridge ---------- */
function post(m){ try{ parent.postMessage(m, '*'); }catch(e){} }

/* ---------- audio (WebAudio synth) ---------- */
let AC=null, master=null, engOsc=null, engGain=null, engFilt=null;
function audioInit(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=0.42; master.connect(AC.destination);
    engOsc = AC.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=70;
    engFilt = AC.createBiquadFilter(); engFilt.type='lowpass'; engFilt.frequency.value=520; engFilt.Q.value=6;
    engGain = AC.createGain(); engGain.gain.value=0.0;
    const sub = AC.createOscillator(); sub.type='sine'; sub.frequency.value=35;
    engOsc.connect(engFilt); sub.connect(engFilt); engFilt.connect(engGain); engGain.connect(master);
    engOsc.start(); sub.start();
  }catch(e){}
}
function env(node, t0, a, peak, d){ const g=node.gain; g.cancelScheduledValues(t0); g.setValueAtTime(0.0001,t0); g.exponentialRampToValueAtTime(peak,t0+a); g.exponentialRampToValueAtTime(0.0001,t0+a+d); }
function noiseBuf(dur){ const n=Math.floor(AC.sampleRate*dur), b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0); for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b; }
function sfxGun(pitch){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(150*pitch,t); o.frequency.exponentialRampToValueAtTime(60*pitch,t+0.05);
  const s=AC.createBufferSource(); s.buffer=noiseBuf(0.06); const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=900;
  const g=AC.createGain(); g.gain.value=0.0; env(g,t,0.004,0.16,0.05); o.connect(g); s.connect(hp); hp.connect(g); g.connect(master); o.start(t); s.start(t); o.stop(t+0.08); s.stop(t+0.08); }
function sfxHit(){ if(!AC)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=noiseBuf(0.12); const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=1.2; const g=AC.createGain(); g.gain.value=0; env(g,t,0.004,0.18,0.11); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+0.14); }
function sfxWhoosh(){ if(!AC)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=noiseBuf(0.3); const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(400,t); bp.frequency.exponentialRampToValueAtTime(1200,t+0.22); bp.Q.value=0.7; const g=AC.createGain(); g.gain.value=0; env(g,t,0.05,0.08,0.22); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+0.32); }
function sfxBoom(){ if(!AC)return; const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(38,t+0.4);
  const s=AC.createBufferSource(); s.buffer=noiseBuf(0.5); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1600,t); lp.frequency.exponentialRampToValueAtTime(200,t+0.4);
  const g=AC.createGain(); g.gain.value=0; env(g,t,0.005,0.5,0.5); o.connect(g); s.connect(lp); lp.connect(g); g.connect(master); o.start(t); s.start(t); o.stop(t+0.55); s.stop(t+0.55);
  const w=AC.createOscillator(); w.type='triangle'; w.frequency.setValueAtTime(1300,t+0.05); w.frequency.exponentialRampToValueAtTime(160,t+1.2); const wg=AC.createGain(); wg.gain.value=0; env(wg,t+0.05,0.05,0.12,1.1); w.connect(wg); wg.connect(master); w.start(t+0.05); w.stop(t+1.3); }
function sfxCheer(){ if(!AC)return; const t=AC.currentTime; const notes=[523,659,784,1046]; notes.forEach((f,i)=>{ const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f; const g=AC.createGain(); g.gain.value=0; env(g,t+i*0.09,0.02,0.16,0.22); o.connect(g); g.connect(master); o.start(t+i*0.09); o.stop(t+i*0.09+0.28); }); }
function sfxRocket(){ if(!AC)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=noiseBuf(0.32); const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(600,t); bp.frequency.exponentialRampToValueAtTime(1700,t+0.26); bp.Q.value=0.8; const g=AC.createGain(); g.gain.value=0; env(g,t,0.01,0.15,0.28); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+0.34);
  const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(90,t+0.3); const og=AC.createGain(); og.gain.value=0; env(og,t,0.01,0.1,0.3); o.connect(og); og.connect(master); o.start(t); o.stop(t+0.34); }
function sfxRocketHit(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(130,t); o.frequency.exponentialRampToValueAtTime(40,t+0.3); const s=AC.createBufferSource(); s.buffer=noiseBuf(0.3); const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1300,t); lp.frequency.exponentialRampToValueAtTime(200,t+0.3); const g=AC.createGain(); g.gain.value=0; env(g,t,0.005,0.34,0.32); o.connect(g); s.connect(lp); lp.connect(g); g.connect(master); o.start(t); s.start(t); o.stop(t+0.36); s.stop(t+0.36); }
function sfxDrone(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(880*rnd(0.9,1.12),t); o.frequency.exponentialRampToValueAtTime(520,t+0.04); const g=AC.createGain(); g.gain.value=0; env(g,t,0.003,0.05,0.04); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.07); }
function sfxScatter(){ if(!AC)return; const t=AC.currentTime; const s=AC.createBufferSource(); s.buffer=noiseBuf(0.2); const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.6; const g=AC.createGain(); g.gain.value=0; env(g,t,0.004,0.24,0.16); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+0.22);
  const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(60,t+0.12); const og=AC.createGain(); og.gain.value=0; env(og,t,0.004,0.12,0.12); o.connect(og); og.connect(master); o.start(t); o.stop(t+0.16); }
function sfxEmp(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(210,t); o.frequency.exponentialRampToValueAtTime(30,t+0.5); const g=AC.createGain(); g.gain.value=0; env(g,t,0.005,0.42,0.5); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.55);
  const z=AC.createOscillator(); z.type='sawtooth'; z.frequency.setValueAtTime(1500,t); z.frequency.exponentialRampToValueAtTime(200,t+0.36); const zf=AC.createBiquadFilter(); zf.type='bandpass'; zf.frequency.value=900; zf.Q.value=3; const zg=AC.createGain(); zg.gain.value=0; env(zg,t,0.005,0.14,0.34); z.connect(zf); zf.connect(zg); zg.connect(master); z.start(t); z.stop(t+0.4); }
function sfxBuy(){ if(!AC)return; const t=AC.currentTime; [523,784].forEach((f,i)=>{ const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f; const g=AC.createGain(); g.gain.value=0; env(g,t+i*0.07,0.01,0.14,0.16); o.connect(g); g.connect(master); o.start(t+i*0.07); o.stop(t+i*0.07+0.2); }); }
function sfxDeny(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='square'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(120,t+0.12); const g=AC.createGain(); g.gain.value=0; env(g,t,0.005,0.08,0.12); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.16); }
function sfxBeep(hi){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=hi?920:430; const g=AC.createGain(); g.gain.value=0; env(g,t,0.006,hi?0.2:0.13,hi?0.24:0.16); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.3); }
function sfxLock(){ if(!AC)return; const t=AC.currentTime; for(let i=0;i<2;i++){ const o=AC.createOscillator(); o.type='square'; o.frequency.value=1180; const g=AC.createGain(); g.gain.value=0; env(g,t+i*0.09,0.003,0.05,0.06); o.connect(g); g.connect(master); o.start(t+i*0.09); o.stop(t+i*0.09+0.1); } }
function sfxShield(){ if(!AC)return; const t=AC.currentTime; const o=AC.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(680,t); o.frequency.exponentialRampToValueAtTime(1500,t+0.09); const g=AC.createGain(); g.gain.value=0; env(g,t,0.004,0.13,0.13); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.2); }

/* ---------- input ---------- */
const keys = { left:false, right:false, thrust:false, fire:false, special:false };
const ptrRole = new Map();   // pointerId -> 'L'|'R'|'T'|'F'|'S'
let usingTouch = false;
function role(k){ for(const v of ptrRole.values()) if(v===k) return true; return false; }
function inL(){ return keys.left  || role('L'); }
function inR(){ return keys.right || role('R'); }
function inT(){ return keys.thrust|| role('T'); }
function inF(){ return keys.fire  || role('F'); }
function inS(){ return keys.special|| role('S'); }

addEventListener('keydown', (e)=>{
  const k=e.key.toLowerCase();
  audioInit();
  if(state==='hangar'){ hangarKey(e,k); return; }
  if(k==='arrowleft'||k==='a'){ keys.left=true; e.preventDefault(); }
  else if(k==='arrowright'||k==='d'){ keys.right=true; e.preventDefault(); }
  else if(k==='arrowup'||k==='w'){ keys.thrust=true; e.preventDefault(); }
  else if(k==='arrowdown'||k==='s'){ e.preventDefault(); }
  else if(k===' '||k==='spacebar'||e.code==='Space'){ keys.fire=true; e.preventDefault(); }
  else if(k==='k'||k==='j'||k==='shift'){ keys.special=true; }
  else if(k==='enter'){ keys.special=true; e.preventDefault(); }
  if(state==='title'){ if(k==='h'){ openHangar('title'); return; } startRun(); }
  else if(state==='dead' && deadT>0.5){ if(k==='h'){ openHangar('dead'); return; } startRun(); }
}, {passive:false});
addEventListener('keyup', (e)=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a') keys.left=false;
  else if(k==='arrowright'||k==='d') keys.right=false;
  else if(k==='arrowup'||k==='w') keys.thrust=false;
  else if(k===' '||e.code==='Space') keys.fire=false;
  else if(k==='k'||k==='j'||k==='shift'||k==='enter') keys.special=false;
});

// touch button geometry (virtual coords). L/R steer at bottom-left; SPECIAL, FIRE,
// THRUST at bottom-right so the special key never fights thrust/turn/gun.
const BTN = {
  L:{x:66, y:474, r:44},
  R:{x:170,y:474, r:44},
  S:{x:678,y:474, r:40},
  F:{x:790,y:474, r:46},
  T:{x:894,y:474, r:50},
};
function screenToVirt(cx,cy){ return { x:(cx-offX)/scl, y:(cy-offY)/scl }; }
function hit(v,b){ return (v.x-b.x)*(v.x-b.x)+(v.y-b.y)*(v.y-b.y) <= (b.r*1.25)*(b.r*1.25); }
function pointIn(v,r){ return v.x>=r.x && v.x<=r.x+r.w && v.y>=r.y && v.y<=r.y+r.h; }
function classify(v){
  if(hit(v,BTN.L)) return 'L';
  if(hit(v,BTN.R)) return 'R';
  if(save.equip && hit(v,BTN.S)) return 'S';
  if(hit(v,BTN.T)) return 'T';
  if(hit(v,BTN.F)) return 'F';
  // any other touch = fire (tap the sky to shoot); mouse also fires anywhere
  return 'F';
}
addEventListener('pointerdown', (e)=>{
  audioInit();
  if(e.pointerType==='touch') usingTouch=true;
  const v=screenToVirt(e.clientX, e.clientY);
  if(state==='hangar'){ hangarClick(v); return; }
  if(state==='title'){ if(pointIn(v,TITLE_HANGAR_BTN)){ openHangar('title'); return; } startRun(); return; }
  if(state==='dead'){ if(deadT>0.5){ if(pointIn(v,DEAD_HANGAR_BTN)){ openHangar('dead'); return; } startRun(); } return; }
  ptrRole.set(e.pointerId, classify(v));
}, {passive:false});
addEventListener('pointermove', (e)=>{
  if(!ptrRole.has(e.pointerId)) return;
  const v=screenToVirt(e.clientX, e.clientY);
  ptrRole.set(e.pointerId, classify(v));
});
function relPtr(e){ ptrRole.delete(e.pointerId); }
addEventListener('pointerup', relPtr);
addEventListener('pointercancel', relPtr);
addEventListener('blur', ()=>{ ptrRole.clear(); keys.left=keys.right=keys.thrust=keys.fire=keys.special=false; });

/* ---------- entities ---------- */
const PLAYER_DEF = { name:'You', color:YELLOW };
// bot roster — distinct colors so edge-arrows/minimap read at a glance. More rivals
// join as the rounds climb (enemyCount) up to the whole pool.
const MAGENTA='#E0559E', INDIGO='#5A6BE0';
const BOT_POOL = [
  { name:'Rojo', color:RED    },
  { name:'Vera', color:GREEN  },
  { name:'Byte', color:PURPLE },
  { name:'Nyx',  color:TEAL   },
  { name:'Zip',  color:ORANGE },
  { name:'Fen',  color:MAGENTA},
  { name:'Kestrel', color:INDIGO },
];
// ~3 rivals early → 5-6+ later, capped to the pool. Round 1:3, 3:4, 4:5, 6:6, 7:7
function enemyCount(){ return Math.min(BOT_POOL.length, 3 + Math.floor((round-1)*0.7)); }
function planeDef(i){ return i===0 ? PLAYER_DEF : BOT_POOL[(i-1)%BOT_POOL.length]; }

let planes=[], wrecks=[];
// pools
const bullets=[]; const BMAX=200;
for(let i=0;i<BMAX;i++) bullets.push({on:false,x:0,y:0,vx:0,vy:0,life:0,owner:0,color:'#fff',dmg:1});
const rockets=[]; const RMAX=24;
for(let i=0;i<RMAX;i++) rockets.push({on:false});
const parts=[]; const PMAX=380;
for(let i=0;i<PMAX;i++) parts.push({on:false});
let clouds=[];

function makePlane(i, x, y, ang){
  const d=planeDef(i);
  const p = {
    id:i, isPlayer:i===0, name:d.name, color:d.color,
    x, y, ang, vx:Math.cos(ang)*140, vy:Math.sin(ang)*140,
    hp:BOT_HP, maxHp:BOT_HP, alive:true,
    turn:0, thrusting:false, bank:0, prop:0,
    heat:0, jam:false, fireCd:0, stun:0,
    ai:{ target:-1, retgt:0, react:0, evade:0, jink:0, aggro:0 },
    contrail:0, hitFlash:0,
    wantFire:false, wantSpecial:false, specPrev:false,
    // enemy kit (set by assignBotKit) — dormant on the player
    kit:null, drones:null, shield:0, shieldMax:0, shieldCd:0, shieldRecharge:0,
    rkAmmo:0, rkReload:0, rkTimer:0, lockT:0, lockTarget:-1, empC:0, empTimer:0, ace:false,
  };
  if(i===0){ equipPlayer(p); } else { p.hp=botHp(); p.maxHp=p.hp; assignBotKit(p); }
  return p;
}
/* Bots earn their own arsenal as the rounds climb — telegraphed, escalating, fair.
   seeker missiles (r3+), an escort drone or two (r4+), a shield bubble (r6+),
   plus one ACE per round from r5 (extra HP + shield + seeker + sharper aim). */
function assignBotKit(p){
  const r=round;
  const k={ seeker:false, drones:0, shield:false, emp:false };
  if(r>=3 && rng()<Math.min(0.62, 0.16+r*0.06)) k.seeker=true;
  if(r>=4 && rng()<Math.min(0.55, 0.10+r*0.06)) k.drones = (r>=6 && rng()<0.5)?2:1;
  if(r>=6 && rng()<0.32) k.shield=true;
  if(r>=7 && rng()<0.22) k.emp=true;
  applyKit(p,k);
}
function applyKit(p,k){
  p.kit=k;
  if(k.seeker){ p.rkAmmo=2; p.rkReload=0; p.rkTimer=rnd(1.6,3.4); }
  if(k.drones>0){ p.drones=[]; p.droneCd=Math.max(0.55,1.0-round*0.03); for(let i=0;i<k.drones;i++) p.drones.push({ ang:(i/k.drones)*Math.PI*2, cd:rnd(0,p.droneCd), fx:p.x, fy:p.y, fire:0 }); }
  if(k.shield){ p.shieldMax=1; p.shield=1; p.shieldRecharge=Math.max(5,9-round*0.4); p.shieldCd=0; }
  if(k.emp){ p.empTimer=rnd(4,7); }
}
function makeAce(p){
  const k=p.kit||{ seeker:false, drones:0, shield:false, emp:false };
  p.ace=true; k.seeker=true; k.shield=true; if(!k.drones && round>=8) k.drones=1;
  p.hp += 3 + Math.floor(round/3); p.maxHp=p.hp;
  applyKit(p,k);
  p.shieldMax=2; p.shield=2; p.name='ACE '+p.name;
  p.aceAim=0.55; // multiplies aim error (sharper shot)
}
// (re)initialise all upgrade-derived state on the player plane from the saved tiers
function equipPlayer(p){
  p.st = playerStats();
  p.maxHp = p.st.maxHp; p.hp = p.st.maxHp;
  p.upg = save.tier; p.iframe = 0; p.regenAcc = 0;
  p.rkAmmo = rocketStats().max; p.rkReload = 0;
  p.scCd = 0; p.empC = 0; p.specPrev = false;
  buildDrones(p);
}
function buildDrones(p){
  const ds=droneStats(); p.drones=[];
  for(let i=0;i<ds.count;i++) p.drones.push({ ang:(i/Math.max(1,ds.count))*Math.PI*2, cd:rnd(0,ds.cd), fx:p.x, fy:p.y, fire:0 });
}
function botHp(){ return BOT_HP + Math.floor((round-1)*0.7) + Math.min(8, Math.floor(powerLevel()/4)); }

function spawnClouds(){
  clouds=[];
  // clouds now populate the whole WORLD (density scaled to its area) so the big sky
  // reads as full and gives a sense of speed as the camera flies through it.
  const layers=[{n:16,sp:6, s:1.7, a:0.9, y:[0.03,0.42]},{n:18,sp:12,s:1.1,a:0.85,y:[0.18,0.72]},{n:22,sp:22,s:0.7,a:0.8,y:[0.4,0.96]}];
  layers.forEach((L,li)=>{ for(let i=0;i<L.n;i++){ clouds.push({ x:rnd(-60,WORLD_W+60), y:rnd(L.y[0]*WORLD_H,L.y[1]*WORLD_H), s:L.s*rnd(0.8,1.25), sp:L.sp*rnd(0.8,1.2), a:L.a, seed:Math.floor(rnd(1,9999)), layer:li }); } });
  clouds.sort((a,b)=>a.layer-b.layer);
}

/* ---------- run / round state ---------- */
let state='title';      // title | play | roundwin | hangar | dead
let round=1, roundsWon=0, kills=0;
let winT=0, deadT=0, introT=0, titleT=0;
let countT=0, engageT=0, lastCountShown=-1;   // pre-round countdown timers
let shake=0, flashV=0, hitStop=0;
let killFeed=[]; // {txt,t,color}
let scorePulse=0;
let hangarCtx='title', hangarNext='startRun';

function difficulty(){
  // scales with rounds cleared AND with how kitted-out the player is, so a maxed
  // war-machine still meets a real fight. Kept beatable: reaction delay + aim jitter
  // keep meaningful floors.
  const r = (round-1) + Math.min(7, powerLevel()*0.28);
  return {
    turn:   2.02 + r*0.11,
    thrust: 228 + r*13,
    idle:   62 + r*3,
    range:  270 + r*24,
    lead:   Math.min(0.92, 0.40 + r*0.06),
    aimErr: Math.max(0.045, 0.245 - r*0.022),
    react:  Math.max(0.09, 0.40 - r*0.03),
    fireGap:Math.max(0.46, 1.32 - r*0.075),
    burst:  3 + Math.min(5, Math.floor(r/2)),
    aggro:  Math.min(0.5, 0.20 + r*0.03),
  };
}

function placeRing(){
  // player starts in the middle of the world; rivals ring around at a big radius so
  // you have to fly out and find the fight (edge-arrows + minimap point the way).
  const cx=WORLD_W/2, cy=WORLD_H/2, n=enemyCount();
  planes=[];
  planes[0]=makePlane(0, cx, cy, -Math.PI/2);
  const rad=Math.min(WORLD_W,WORLD_H)*0.34;
  for(let i=1;i<=n;i++){
    const a=((i-1)/n)*Math.PI*2 + Math.PI/6;
    const x=clamp(cx+Math.cos(a)*rad, ARENA_PAD+30, WORLD_W-ARENA_PAD-30);
    const y=clamp(cy+Math.sin(a)*rad*0.9, ARENA_PAD+30, WORLD_H-ARENA_PAD-30);
    const face=Math.atan2(cy-y, cx-x);
    planes[i]=makePlane(i,x,y,face);
  }
  // one ACE from round 5 (two from round 9) — the standout rival with real kit
  if(round>=5){ makeAce(planes[n]); if(round>=9 && n>=2) makeAce(planes[n-1]); }
  // snap the camera onto the player for the countdown
  camX=clamp(planes[0].x-VW/2,0,WORLD_W-VW); camY=clamp(planes[0].y-VH/2,0,WORLD_H-VH);
}
function updateCamera(dt){
  const p=planes[0]; if(!p) return;
  const tx=clamp(p.x-VW/2,0,WORLD_W-VW), ty=clamp(p.y-VH/2,0,WORLD_H-VH);
  const k=Math.min(1,CAM_EASE*dt);
  camX+=(tx-camX)*k; camY+=(ty-camY)*k;
}
function gunsLive(){ return (state==='play') && countT<=0; }

function startRun(){
  rng = mulberry32(0xC0FFEE);
  round=1; roundsWon=0; kills=0; challengeBeaten=false;
  planes=[]; wrecks.length=0; killFeed_clear();
  for(const b of bullets) b.on=false; for(const r of rockets) r.on=false; for(const p of parts) p.on=false;
  keys.left=keys.right=keys.thrust=keys.fire=keys.special=false; ptrRole.clear();
  spawnClouds(); placeRing();
  state='play'; introT=1.1; winT=0; deadT=0; shake=0; flashV=0; scorePulse=0;
  startCountdown();
  post({gs:'score', score:0});
}
function nextRound(){
  round++; roundsWon = round-1;
  wrecks.length=0; for(const b of bullets) b.on=false; for(const r of rockets) r.on=false;
  keys.left=keys.right=keys.thrust=keys.fire=keys.special=false; ptrRole.clear();
  placeRing(); introT=1.0; state='play'; startCountdown();
}
function startCountdown(){ countT=COUNTDOWN; engageT=0; lastCountShown=-1; }
function killFeed_clear(){ killFeed=[]; }

/* ---------- hangar flow ---------- */
function openHangar(cx){
  state='hangar'; hangarCtx=cx; hangarNext = (cx==='round') ? 'nextRound' : 'startRun';
  keys.left=keys.right=keys.thrust=keys.fire=keys.special=false; ptrRole.clear();
  for(const b of bullets) b.on=false; for(const r of rockets) r.on=false;
}
function closeHangar(){ state = (hangarCtx==='dead') ? 'dead' : 'title'; }
function doLaunch(){ keys.left=keys.right=keys.thrust=keys.fire=keys.special=false; if(hangarNext==='nextRound') nextRound(); else startRun(); }
function hangarKey(e,k){
  if(k>='1' && k<='7'){ const i=+k-1; if(i<FAMILIES.length) buy(FAMILIES[i].key); e.preventDefault(); return; }
  if(k==='e'){ cycleEquip(); return; }
  if(k==='enter'||k===' '||k==='spacebar'||e.code==='Space'){ doLaunch(); e.preventDefault(); return; }
  if(k==='h'||k==='escape'){ if(hangarCtx==='round') doLaunch(); else closeHangar(); }
}
function hangarLayout(){
  const x=40, w=W-80, h=44, top=104, gap=6;
  const rows=[];
  for(let i=0;i<FAMILIES.length;i++){
    const y=top+i*(h+gap);
    const r={ f:FAMILIES[i], x, y, w, h, costChip:{x:x+w-96,y:y+9,w:84,h:h-18} };
    if(ACTIVE.includes(FAMILIES[i].key)) r.eqChip={x:x+w-192,y:y+9,w:88,h:h-18};
    rows.push(r);
  }
  return { rows, launch:{x:W/2-150,y:H-44,w:300,h:32}, back:{x:40,y:H-44,w:118,h:32} };
}
function hangarClick(v){
  const L=hangarLayout();
  if(pointIn(v,L.launch)){ doLaunch(); return; }
  if(hangarCtx!=='round' && pointIn(v,L.back)){ closeHangar(); return; }
  for(const r of L.rows){
    if(pointIn(v,r)){
      if(r.eqChip && pointIn(v,r.eqChip)){ if(save.tier[r.f.key]>0){ save.equip=r.f.key; persistSave(); sfxBuy(); } return; }
      buy(r.f.key); return;
    }
  }
}

/* ---------- particles ---------- */
function spawnPart(o){ for(let i=0;i<PMAX;i++){ const p=parts[i]; if(!p.on){ Object.assign(p,o); p.on=true; return p; } } }
function puff(x,y,col,n,spd,size,life){ for(let i=0;i<n;i++){ const a=rng()*Math.PI*2, s=spd*rnd(0.3,1); spawnPart({type:'smoke',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-8,life:life*rnd(0.7,1.2),max:life,size:size*rnd(0.7,1.3),col}); } }
function explode(x,y,col){
  flashV=Math.min(1,flashV+0.7); shake=Math.min(16,shake+11); hitStop=0.06;
  for(let i=0;i<3;i++) spawnPart({type:'ring',x,y,vx:0,vy:0,life:0.5,max:0.5,size:6+i*4,col:'#fff'});
  for(let i=0;i<22;i++){ const a=rng()*Math.PI*2, s=rnd(60,320); spawnPart({type:'debris',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.5,1.1),max:1.1,size:rnd(2,5),col:i%3?col:'#3a2c1e',spin:rnd(-12,12),rot:rng()*6}); }
  for(let i=0;i<14;i++){ const a=rng()*Math.PI*2, s=rnd(20,120); spawnPart({type:'smoke',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-20,life:rnd(0.6,1.4),max:1.4,size:rnd(10,20),col:'#3a3a3a'}); }
  for(let i=0;i<10;i++){ const a=rng()*Math.PI*2, s=rnd(120,360); spawnPart({type:'spark',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.2,0.5),max:0.5,size:rnd(1.5,3),col:'#FFDf7a'}); }
}
function miniBlast(x,y,col){
  shake=Math.min(14,shake+5);
  for(let i=0;i<3;i++) spawnPart({type:'ring',x,y,vx:0,vy:0,life:0.35,max:0.35,size:4+i*3,col:'#fff'});
  for(let i=0;i<10;i++){ const a=rng()*Math.PI*2, s=rnd(60,220); spawnPart({type:'spark',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.2,0.45),max:0.45,size:rnd(1.5,3),col:'#FFB35a'}); }
  for(let i=0;i<7;i++){ const a=rng()*Math.PI*2, s=rnd(20,90); spawnPart({type:'smoke',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-15,life:rnd(0.5,1),max:1,size:rnd(8,14),col:'#5a5a5a'}); }
}

/* ---------- firing ---------- */
function fireBullet(p, spread, color, dmg){
  for(let i=0;i<BMAX;i++){ const b=bullets[i]; if(!b.on){
    const a=p.ang + (spread||0);
    const mx=p.x+Math.cos(p.ang)*18, my=p.y+Math.sin(p.ang)*18;
    b.on=true; b.x=mx; b.y=my; b.vx=p.vx+Math.cos(a)*BULLET_SPD; b.vy=p.vy+Math.sin(a)*BULLET_SPD; b.life=BULLET_LIFE; b.owner=p.id; b.color=color||p.color; b.dmg=dmg||1; return;
  }}
}
function nearestEnemyFrom(x,y,owner){ let bi=-1, bd=1e9; for(const q of planes){ if(!q.alive||q.id===owner) continue; const d=(q.x-x)**2+(q.y-y)**2; if(d<bd){ bd=d; bi=q.id; } } return bi; }

/* special weapons — each is metered (ammo / cooldown / charge) so it is rationed, not spammed */
function fireSpecial(p){
  if(!gunsLive()) return;
  const eq=save.equip; if(!eq) return;
  if(eq==='rockets'){
    const rs=rocketStats(); if(!rs.own || p.rkAmmo<=0){ sfxDeny(); return; }
    const tg=nearestEnemyFrom(p.x,p.y,p.id); if(tg<0){ sfxDeny(); return; }
    p.rkAmmo--; if(p.rkReload<=0) p.rkReload=rs.reload;
    spawnRocket(p, tg, rs); sfxRocket();
  } else if(eq==='scatter'){
    const ss=scatterStats(); if(!ss.own || p.scCd>0){ sfxDeny(); return; }
    p.scCd=ss.cd;
    for(let i=0;i<ss.pellets;i++){ const off=(ss.pellets>1?(i/(ss.pellets-1)-0.5):0)*ss.spread; fireBullet(p, off, '#FFE28a', 1); }
    sfxScatter(); shake=Math.min(12,shake+3);
  } else if(eq==='emp'){
    const es=empStats(); if(!es.own || p.empC<1){ sfxDeny(); return; }
    p.empC=0; empBurst(p, es);
  }
}
function spawnRocket(p, tgt, rs){
  for(const r of rockets){ if(!r.on){
    r.on=true; r.x=p.x+Math.cos(p.ang)*14; r.y=p.y+Math.sin(p.ang)*14; r.ang=p.ang; r.speed=rs.speed;
    r.vx=Math.cos(p.ang)*rs.speed; r.vy=Math.sin(p.ang)*rs.speed; r.life=ROCKET_LIFE; r.owner=p.id; r.target=tgt; r.dmg=rs.dmg; r.st=0; r.color=p.color; return;
  }}
}
function empBurst(p, es){
  shake=Math.min(16,shake+8); flashV=Math.min(1,flashV+0.35); sfxEmp();
  for(let i=0;i<4;i++) spawnPart({type:'ring',x:p.x,y:p.y,vx:0,vy:0,life:0.6,max:0.6,size:10+i*6,col:'#9fd0ff'});
  spawnPart({type:'emp',x:p.x,y:p.y,vx:0,vy:0,life:0.45,max:0.45,size:0,maxSize:es.radius,col:'#bfe3ff'});
  for(const q of planes){ if(!q.alive||q.id===p.id) continue;
    const d=Math.hypot(q.x-p.x,q.y-p.y);
    if(d<es.radius){ q.stun=Math.max(q.stun||0, es.stun); q.hitFlash=1; const a=Math.atan2(q.y-p.y,q.x-p.x); q.vx+=Math.cos(a)*120; q.vy+=Math.sin(a)*120; }
  }
}

/* ---------- update ---------- */
function clampArena(p, dt){
  const l=ARENA_PAD, r=WORLD_W-ARENA_PAD, t=ARENA_PAD, bo=WORLD_H-ARENA_PAD;
  const K=520;
  if(p.x<l){ p.vx+=(l-p.x)*K*dt*0.016+40*dt*10; if(p.vx<0)p.vx*=0.6; p.x+=(l-p.x)*0.12; }
  if(p.x>r){ p.vx-=(p.x-r)*K*dt*0.016+40*dt*10; if(p.vx>0)p.vx*=0.6; p.x-=(p.x-r)*0.12; }
  if(p.y<t){ p.vy+=(t-p.y)*K*dt*0.016+40*dt*10; if(p.vy<0)p.vy*=0.6; p.y+=(t-p.y)*0.12; }
  if(p.y>bo){ p.vy-=(p.y-bo)*K*dt*0.016+40*dt*10; if(p.vy>0)p.vy*=0.6; p.y-=(p.y-bo)*0.12; }
}

function updatePlane(p, dt){
  if(!p.alive) return;
  const isP=p.isPlayer, st=p.st;
  // --- rotate nose ---
  const tr   = isP ? st.turn     : difficulty().turn;
  p.ang += p.turn * tr * dt;
  // --- accel: idle push + thrust along nose, gravity down ---
  const idle = isP ? st.idle     : difficulty().idle;
  const thr  = isP ? st.thrust   : difficulty().thrust;
  const maxSp= isP ? st.maxSpeed : MAX_SPEED;
  let ax=Math.cos(p.ang)*idle, ay=Math.sin(p.ang)*idle;
  if(p.thrusting){ ax+=Math.cos(p.ang)*thr; ay+=Math.sin(p.ang)*thr; }
  ay += GRAV;
  p.vx+=ax*dt; p.vy+=ay*dt;
  // --- drag ---
  const dmp = Math.max(0, 1-DRAG*dt);
  p.vx*=dmp; p.vy*=dmp;
  // --- ALIGN: grip momentum toward the nose (redirect energy, weighty turns) ---
  const sp=Math.hypot(p.vx,p.vy);
  if(sp>1){
    const nx=Math.cos(p.ang), ny=Math.sin(p.ang);
    const g=Math.min(1, ALIGN*dt);
    p.vx += (nx*sp - p.vx)*g; p.vy += (ny*sp - p.vy)*g;
  }
  // --- speed cap ---
  const s2=Math.hypot(p.vx,p.vy);
  if(s2>maxSp){ const k=maxSp/s2; p.vx*=k; p.vy*=k; }
  // --- integrate ---
  p.x+=p.vx*dt; p.y+=p.vy*dt;
  clampArena(p, dt);
  // --- bank visual + prop ---
  p.bank += ((p.turn* -0.85) - p.bank) * Math.min(1, BANK_EASE*dt);
  p.prop += (0.3 + (p.thrusting?1:0.35))*dt*34;
  // --- gun heat ---
  const firing = p.wantFire;
  const heatShot = isP ? st.heatShot : HEAT_SHOT;
  const fireCdV  = isP ? st.fireCd   : 0.075;
  if(p.jam){ p.heat -= HEAT_COOL*0.85*dt; if(p.heat<=HEAT_RESET){ p.heat=Math.max(0,p.heat); p.jam=false; } }
  else if(firing){ p.heat = Math.max(0, p.heat - HEAT_COOL*0.15*dt); }
  else { p.heat = Math.max(0, p.heat - HEAT_COOL*dt); }
  p.fireCd -= dt;
  if(firing && !p.jam && p.fireCd<=0 && gunsLive()){
    if(isP){ const n=st.barrels; for(let i=0;i<n;i++){ const off=(n>1?(i/(n-1)-0.5):0)*0.10; fireBullet(p, off); } }
    else fireBullet(p, (rng()-0.5)*0.03);
    p.fireCd = fireCdV;
    p.heat += heatShot;
    sfxGun(isP?rnd(0.94,1.06):rnd(0.8,0.92));
    if(p.heat>=1){ p.heat=1; p.jam=true; if(isP) sfxWhoosh(); }
  }
  // --- player special systems + forgiveness ---
  if(isP){
    if(p.iframe>0) p.iframe-=dt;
    if(st.regen>0 && p.hp<p.maxHp && p.iframe<=0){ p.regenAcc += st.regen*dt; if(p.regenAcc>=1){ p.regenAcc-=1; p.hp=Math.min(p.maxHp,p.hp+1); spawnPart({type:'spark',x:p.x,y:p.y-10,vx:0,vy:-30,life:0.5,max:0.5,size:2.6,col:'#7CE0A0'}); } }
    const rs=rocketStats(); if(rs.own && p.rkAmmo<rs.max){ p.rkReload-=dt; if(p.rkReload<=0){ p.rkAmmo++; p.rkReload=rs.reload; } }
    if(p.scCd>0) p.scCd-=dt;
    const es=empStats(); if(es.own && p.empC<1) p.empC=Math.min(1, p.empC + dt/es.recharge);
    if(p.wantSpecial && !p.specPrev && gunsLive()) fireSpecial(p);
    p.specPrev = p.wantSpecial;
  }
  // --- contrail / engine smoke when thrusting hard ---
  p.contrail-=dt;
  if(p.thrusting && p.contrail<=0){ p.contrail=0.05; const bx=p.x-Math.cos(p.ang)*16, by=p.y-Math.sin(p.ang)*16;
    spawnPart({type:'trail',x:bx,y:by,vx:p.vx*0.2,vy:p.vy*0.2,life:0.55,max:0.55,size:rnd(3,5),col:'rgba(255,255,255,0.55)'}); }
  if(p.hitFlash>0) p.hitFlash-=dt*4;
}

/* ---------- bot AI ---------- */
function nearestTarget(p){
  let bi=-1, bd=1e9;
  for(const q of planes){ if(!q.alive||q.id===p.id) continue; const d=(q.x-p.x)**2+(q.y-p.y)**2; if(d<bd){bd=d;bi=q.id;} }
  return bi;
}
function beingTailed(p){
  for(const q of planes){ if(!q.alive||q.id===p.id) continue;
    const dx=p.x-q.x, dy=p.y-q.y, dist=Math.hypot(dx,dy); if(dist>260) continue;
    const toMe=Math.atan2(dy,dx); const aim=Math.abs(angdiff(toMe,q.ang)); if(aim<0.5) return q;
  }
  return null;
}
function angdiff(a,b){ let d=a-b; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return d; }
function botThink(p, dt){
  if(!p.alive) return;
  // stunned by an EMP burst — flails, cannot steer or fire
  if(p.stun>0){ p.stun-=dt; p.turn *= (1-Math.min(1,dt*3)); p.thrusting=false; p.wantFire=false; return; }
  const D=difficulty();
  const ai=p.ai;
  ai.retgt-=dt; ai.react-=dt; ai.evade-=dt; ai.jink-=dt;
  if(ai.target<0 || ai.retgt<=0 || !planes[ai.target] || !planes[ai.target].alive){
    if(rng()<D.aggro && planes[0].alive && p.id!==0) ai.target=0; else ai.target=nearestTarget(p);
    ai.retgt=rnd(1.4,2.8);
  }
  const tgt=planes[ai.target];
  if(!tgt||!tgt.alive){ p.turn=0.2; p.thrusting=true; p.wantFire=false; return; }
  const tail=beingTailed(p);
  if(tail && ai.evade<=0){ ai.evade=rnd(0.5,1.0); ai.jinkDir=(rng()<0.5?-1:1); sfxWhoosh_maybe(p); }
  if(ai.evade>0){
    p.thrusting=true;
  } else {
    const dx=tgt.x-p.x, dy=tgt.y-p.y, dist=Math.hypot(dx,dy);
    p.thrusting = dist>150 || Math.hypot(p.vx,p.vy)<130;
  }
  let desired;
  if(ai.evade>0){ desired = p.ang + (ai.jinkDir||1)*1.2; }
  else { const dx=tgt.x-p.x, dy=tgt.y-p.y, dist=Math.hypot(dx,dy); const lt=Math.min(0.8, dist/BULLET_SPD)*D.lead; const lx=tgt.x+tgt.vx*lt, ly=tgt.y+tgt.vy*lt; desired=Math.atan2(ly-p.y, lx-p.x); }
  const err=angdiff(desired, p.ang);
  const jitter=(rng()-0.5)*D.aimErr*2*(p.ace?p.aceAim:1);   // aces shoot sharper
  const steer=Math.max(-1,Math.min(1,(err+jitter)*2.2));
  p.turn += (steer - p.turn)*Math.min(1, dt* (ai.react>0? 3: 8));
  const dx=tgt.x-p.x, dy=tgt.y-p.y, dist=Math.hypot(dx,dy);
  const aimErr=Math.abs(angdiff(Math.atan2(dy,dx), p.ang));
  ai.fireTimer=(ai.fireTimer||0)-dt;
  ai.burstLeft=ai.burstLeft||0;
  const live=gunsLive();
  if(live && !p.jam && ai.evade<=0 && dist<D.range && aimErr<0.16 && ai.fireTimer<=0){ ai.burstLeft=D.burst; ai.fireTimer=D.fireGap; }
  if(live && ai.burstLeft>0 && !p.jam){ p.wantFire=true; if(p.fireCd<=0) ai.burstLeft--; }
  else p.wantFire=false;
  updateBotKit(p, dt, live);
}
// bot special weapons: seeker missiles (telegraphed lock), shield regen, rare EMP jam.
function updateBotKit(p, dt, live){
  const k=p.kit; if(!k) return;
  // shield recharges out of combat (always, even during the countdown)
  if(p.shieldMax>0 && p.shield<p.shieldMax){ p.shieldCd-=dt; if(p.shieldCd<=0){ p.shield++; p.shieldCd=p.shieldRecharge; } }
  if(!live) { p.lockT=0; return; }
  // SEEKER: reload ammo, then telegraph a lock (reticle on victim) before launch
  if(k.seeker){
    if(p.rkAmmo<2){ p.rkReload-=dt; if(p.rkReload<=0){ p.rkAmmo++; p.rkReload=rnd(3.5,5.5); } }
    if(p.lockT>0){
      p.lockT-=dt;
      const tg=planes[p.lockTarget];
      if(!tg||!tg.alive){ p.lockT=0; }
      else if(p.lockT<=0 && p.rkAmmo>0){ p.rkAmmo--; spawnBotRocket(p, p.lockTarget); sfxRocket(); if(p.rkTimer<=0) p.rkTimer=rnd(2.6,4.6); }
    } else {
      p.rkTimer-=dt;
      if(p.rkTimer<=0 && p.rkAmmo>0){
        const tg=nearestTarget(p);
        if(tg>=0){ const t=planes[tg]; const d=Math.hypot(t.x-p.x,t.y-p.y); if(d<560){ p.lockTarget=tg; p.lockT=BOT_LOCK; if(t.isPlayer) sfxLock(); } else p.rkTimer=0.5; }
        else p.rkTimer=1.0;
      }
    }
  }
  // EMP: rare, telegraphed pulse that briefly jams the player's guns if close
  if(k.emp){
    p.empTimer-=dt;
    if(p.empTimer<=0){
      const pl=planes[0]; const d=pl&&pl.alive?Math.hypot(pl.x-p.x,pl.y-p.y):1e9;
      if(d<150){ botEmpBurst(p); p.empTimer=rnd(7,11); } else p.empTimer=0.6;
    }
  }
}
function spawnBotRocket(p, tgt){
  for(const r of rockets){ if(!r.on){
    r.on=true; r.x=p.x+Math.cos(p.ang)*14; r.y=p.y+Math.sin(p.ang)*14; r.ang=p.ang; r.speed=300+round*9;
    r.vx=Math.cos(p.ang)*r.speed; r.vy=Math.sin(p.ang)*r.speed; r.life=BOT_RK_LIFE; r.owner=p.id; r.target=tgt; r.dmg=1; r.st=0; r.color=p.color; return;
  }}
}
function botEmpBurst(p){
  const pl=planes[0]; if(!pl||!pl.alive) return;
  sfxEmp(); shake=Math.min(14,shake+5);
  for(let i=0;i<3;i++) spawnPart({type:'ring',x:p.x,y:p.y,vx:0,vy:0,life:0.55,max:0.55,size:10+i*6,col:'#c9a0ff'});
  spawnPart({type:'emp',x:p.x,y:p.y,vx:0,vy:0,life:0.4,max:0.4,size:0,maxSize:150,col:'#d6b8ff'});
  if(pl.iframe<=0){ pl.jam=true; pl.heat=1; } // non-lethal: kicks your guns offline, reposition!
}
function sfxWhoosh_maybe(p){ if(Math.hypot(p.x-planes[0].x,p.y-planes[0].y)<220) sfxWhoosh(); }

/* ---------- bullets / rockets / drones ---------- */
function updateBullets(dt){
  for(let i=0;i<BMAX;i++){ const b=bullets[i]; if(!b.on) continue;
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(b.life<=0 || b.x<-20||b.x>WORLD_W+20||b.y<-20||b.y>WORLD_H+20){ b.on=false; continue; }
    for(const p of planes){ if(!p.alive||p.id===b.owner) continue;
      if((p.x-b.x)**2+(p.y-b.y)**2 < (PLANE_R+3)**2){ b.on=false; hitPlane(p, b.owner, b.x, b.y, b.dmg); break; }
    }
  }
}
function updateRockets(dt){
  if(state!=='play') return;
  for(const r of rockets){ if(!r.on) continue;
    r.life-=dt; if(r.life<=0){ miniBlast(r.x,r.y,r.color); sfxRocketHit(); r.on=false; continue; }
    let tg=planes[r.target];
    if(!tg||!tg.alive){ r.target=nearestEnemyFrom(r.x,r.y,r.owner); tg=planes[r.target]; }
    if(tg&&tg.alive){ const desired=Math.atan2(tg.y-r.y,tg.x-r.x); const d=angdiff(desired,r.ang); const mt=ROCKET_TURN*dt; r.ang += Math.max(-mt,Math.min(mt,d)); }
    r.vx=Math.cos(r.ang)*r.speed; r.vy=Math.sin(r.ang)*r.speed;
    r.x+=r.vx*dt; r.y+=r.vy*dt;
    r.st=(r.st||0)-dt; if(r.st<=0){ r.st=0.02; spawnPart({type:'smoke',x:r.x-Math.cos(r.ang)*8,y:r.y-Math.sin(r.ang)*8,vx:0,vy:-4,life:0.5,max:0.5,size:rnd(3,5),col:'rgba(220,220,220,0.75)'}); }
    let hitOne=false;
    for(const p of planes){ if(!p.alive||p.id===r.owner) continue;
      if((p.x-r.x)**2+(p.y-r.y)**2 < (PLANE_R+6)**2){ miniBlast(r.x,r.y,r.color); sfxRocketHit(); hitPlane(p, r.owner, r.x, r.y, r.dmg); r.on=false; hitOne=true; break; }
    }
    if(hitOne) continue;
    if(r.x<-30||r.x>WORLD_W+30||r.y<-30||r.y>WORLD_H+30){ r.on=false; }
  }
}
// escort drones for ANY plane that owns them (player + drone-kit bots)
function updateDrones(dt){
  for(const p of planes){
    if(!p.alive || !p.drones || !p.drones.length) continue;
    const cd = p.isPlayer ? droneStats().cd : (p.droneCd||0.8);
    const col = p.isPlayer ? '#BFefff' : shade(p.color,30);
    for(const dr of p.drones){
      dr.ang += dt*2.2;
      const orbit=34;
      const tx=p.x+Math.cos(dr.ang)*orbit, ty=p.y+Math.sin(dr.ang)*orbit*0.9;
      dr.fx += (tx-dr.fx)*Math.min(1,dt*10); dr.fy += (ty-dr.fy)*Math.min(1,dt*10);
      dr.cd-=dt; if(dr.fire>0) dr.fire-=dt;
      if(!gunsLive()) continue;
      const tg=nearestEnemyFrom(dr.fx,dr.fy,p.id);
      if(tg>=0 && dr.cd<=0){ const t=planes[tg]; const a=Math.atan2(t.y-dr.fy,t.x-dr.fx)+(rng()-0.5)*0.06; droneFire(dr,a,p.id,col); dr.cd=cd; dr.fire=0.08; }
    }
  }
}
function droneFire(dr,a,owner,color){ for(const b of bullets){ if(!b.on){ b.on=true; b.x=dr.fx; b.y=dr.fy; b.vx=Math.cos(a)*BULLET_SPD*0.92; b.vy=Math.sin(a)*BULLET_SPD*0.92; b.life=0.85; b.owner=owner; b.color=color||'#BFefff'; b.dmg=1; sfxDrone(); return; } } }

function hitPlane(p, ownerId, hx, hy, dmg){
  dmg = dmg||1;
  if(p.isPlayer){
    if(p.iframe>0) return;          // brief invulnerability window — the forgiveness
    p.iframe = p.st.iframe;
    p.regenAcc = 0;
  } else if(p.shield>0){            // bot shield bubble absorbs a hit (telegraphed, recharges)
    p.shield--; p.shieldCd=p.shieldRecharge; p.hitFlash=1;
    for(let i=0;i<2;i++) spawnPart({type:'ring',x:hx,y:hy,vx:0,vy:0,life:0.3,max:0.3,size:PLANE_R+2+i*4,col:'#cfe6ff'});
    sfxShield(); return;
  }
  p.hp -= dmg; p.hitFlash=1;
  puff(hx,hy,'#5a5a5a',5,90,7,0.5);
  for(let i=0;i<4;i++){ const a=rng()*Math.PI*2,s=rnd(40,140); spawnPart({type:'spark',x:hx,y:hy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(0.15,0.35),max:0.35,size:rnd(1,2.5),col:'#FFD86a'}); }
  sfxHit();
  shake=Math.min(10,shake+3);
  if(p.hp<=0){ downPlane(p, ownerId); }
}
function downPlane(p, ownerId){
  p.alive=false;
  explode(p.x,p.y,p.color); sfxBoom();
  wrecks.push({ x:p.x, y:p.y, vx:p.vx*0.4, vy:p.vy*0.3, ang:p.ang, spin:rnd(-8,8), color:p.color, t:0, life:2.4, para:{on:false} });
  wrecks[wrecks.length-1].para={ on:true, x:p.x, y:p.y-4, vx:rnd(-20,20), vy:-30, sway:rng()*6, t:0, color:p.color };
  if(ownerId===0 && p.id!==0){
    kills++; scorePulse=1; awardParts(1);
    killFeed.push({txt:'DOWNED '+p.name.toUpperCase()+'!', t:2.0, color:p.color});
    post({gs:'score', score:kills});
    if(challenge>0 && kills>challenge && !challengeBeaten){ challengeBeaten=true; post({gs:'challenge_beaten', score:kills}); }
  }
  else if(p.id!==0){ killFeed.push({txt:p.name+' went down', t:1.6, color:'#dfe8f2'}); }
  checkOutcome();
}
function checkOutcome(){
  const player=planes[0];
  const aliveRivals=planes.filter(q=>q.id!==0 && q.alive).length;
  if(!player.alive){
    if(state==='play'){ endRun(); }
  } else if(aliveRivals===0 && state==='play'){
    state='roundwin'; winT=2.1; sfxCheer(); flashV=Math.min(1,flashV+0.4);
    player.hp=player.maxHp; player.heat=0; player.jam=false;
    const bonus = 2 + round;
    awardParts(bonus);
    killFeed.push({txt:'+'+bonus+' PARTS', t:1.8, color:YELLOW});
    if(roundsWon+1>best){ best=roundsWon+1; persist(); }
  }
}
function endRun(){
  state='dead'; deadT=0; shake=Math.min(16,shake+8); flashV=Math.min(1,flashV+0.5);
  if(roundsWon>best){ best=roundsWon; persist(); }
  post({gs:'gameover', scores:{ rounds:roundsWon, kills:kills }});
}

/* ---------- wrecks / particles update ---------- */
function updateWrecks(dt){
  for(let i=wrecks.length-1;i>=0;i--){ const w=wrecks[i]; w.t+=dt;
    w.vy+=GRAV*0.9*dt; w.vx*=0.99; w.ang+=w.spin*dt; w.x+=w.vx*dt; w.y+=w.vy*dt;
    if((i+Math.floor(w.t*40))%2===0) spawnPart({type:'smoke',x:w.x,y:w.y,vx:rnd(-15,15),vy:rnd(-25,-5),life:rnd(0.6,1.1),max:1.1,size:rnd(7,13),col:'#4a4a4a'});
    const pa=w.para;
    if(pa&&pa.on){ pa.t+=dt; pa.vy += (pa.vy<40? 30*dt : 0); if(pa.vy>40)pa.vy=40; pa.vx += Math.sin(pa.t*1.6+pa.sway)*10*dt; pa.x+=pa.vx*dt; pa.y+=pa.vy*dt; }
    if(w.t>w.life && w.y>H+40 && (!pa.on||pa.y>H+30)) wrecks.splice(i,1);
    else if(w.t>w.life+3) wrecks.splice(i,1);
  }
}
function updateParts(dt){
  for(let i=0;i<PMAX;i++){ const p=parts[i]; if(!p.on) continue;
    p.life-=dt; if(p.life<=0){ p.on=false; continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.type==='smoke'||p.type==='trail'){ p.vx*=0.94; p.vy=p.vy*0.94-6*dt; p.size+=14*dt; }
    else if(p.type==='debris'){ p.vy+=GRAV*dt; p.vx*=0.99; p.rot+=p.spin*dt; }
    else if(p.type==='spark'){ p.vy+=GRAV*0.4*dt; p.vx*=0.9; p.vy*=0.9; }
    else if(p.type==='ring'){ p.size+=180*dt; }
    // 'emp' size handled in draw
  }
}

/* ---------- clouds ---------- */
function updateClouds(dt){ for(const c of clouds){ c.x-=c.sp*dt; if(c.x< -140){ c.x=WORLD_W+rnd(40,160); c.y=rnd(20,WORLD_H-30); } } }
function onScreen(x,y,m){ m=m||60; return x>camX-m && x<camX+VW+m && y>camY-m && y<camY+VH+m; }

/* ---------- draw helpers ---------- */
function shade(hex, amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const f=amt/100; if(f<0){ r*=1+f; g*=1+f; b*=1+f; } else { r+=(255-r)*f; g+=(255-g)*f; b+=(255-b)*f; }
  return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';
}

function drawCloud(c){
  ctx.save(); ctx.translate(c.x,c.y); ctx.scale(c.s,c.s); ctx.globalAlpha=c.a;
  const R=mulberry32(c.seed);
  ctx.fillStyle=CLOUD_SHADE;
  for(let i=0;i<5;i++){ const bx=(i-2)*26+R()*8, by=10+R()*6, br=22+R()*14; ctx.beginPath(); ctx.arc(bx,by,br,0,7); ctx.fill(); }
  ctx.fillStyle=CLOUD;
  for(let i=0;i<6;i++){ const bx=(i-2.5)*24+R()*8, by=R()*8, br=24+R()*16; ctx.beginPath(); ctx.arc(bx,by,br,0,7); ctx.fill(); }
  ctx.fillStyle=CLOUD_WARM; ctx.globalAlpha=c.a*0.6;
  for(let i=0;i<3;i++){ const bx=(i-1)*22+R()*6, by=-10+R()*4, br=16+R()*8; ctx.beginPath(); ctx.arc(bx,by,br,0,7); ctx.fill(); }
  ctx.restore();
}

function drawPlane(p){
  const s=Math.hypot(p.vx,p.vy);
  const up=p.upg; // present only on the player
  const sizeMul = (up ? 1 + Math.min(0.28, save.tier.armor*0.035) : 1) * (p.ace?1.2:1);
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.ang);
  if(sizeMul!==1) ctx.scale(sizeMul,sizeMul);
  // afterburner exhaust (ENGINE upgrade) — brighter/longer the more speed tiers
  if(up && p.thrusting && save.tier.speed>0){
    const len=8+save.tier.speed*3.5+Math.min(10,s*0.02);
    ctx.save(); ctx.globalAlpha=0.85;
    const grd=ctx.createLinearGradient(-16,0,-16-len,0); grd.addColorStop(0,'#FFF3DC'); grd.addColorStop(0.5,'#F4C430'); grd.addColorStop(1,'rgba(232,85,58,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.moveTo(-15,-4); ctx.lineTo(-16-len,0); ctx.lineTo(-15,4); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  const roll=p.bank; const wingScale=0.45+0.55*Math.cos(roll);
  ctx.save(); ctx.scale(1, wingScale);
  const col=p.color, dk=shade(col,-26), lt=shade(col,28);
  // shadow
  ctx.fillStyle='rgba(20,40,70,0.14)'; ctx.beginPath(); ctx.ellipse(0,7/wingScale,20,7,0,0,7); ctx.fill();
  // lower wing
  ctx.fillStyle=dk; ctx.beginPath();
  ctx.moveTo(-2,-19); ctx.lineTo(7,-15); ctx.lineTo(9,15); ctx.lineTo(-2,19);
  ctx.lineTo(-6,15); ctx.lineTo(-6,-15); ctx.closePath(); ctx.fill();
  // tail plane
  ctx.fillStyle=dk; ctx.beginPath(); ctx.moveTo(-16,-9); ctx.lineTo(-9,-5); ctx.lineTo(-9,5); ctx.lineTo(-16,9); ctx.closePath(); ctx.fill();

  ctx.fillStyle=shade(col,-10); ctx.beginPath(); ctx.moveTo(14,-6); ctx.lineTo(21,0); ctx.lineTo(14,6); ctx.closePath(); ctx.fill();
  // upper wing highlight
  ctx.fillStyle=lt; ctx.beginPath(); ctx.moveTo(-1,-17); ctx.lineTo(6,-14); ctx.lineTo(6,-2); ctx.lineTo(-4,-2); ctx.closePath(); ctx.fill();
  // upgrade hardware (barrels / rocket pods / armor rivets) — banks with the wings
  if(up) drawHardware(p);
  // cockpit
  ctx.fillStyle='#26364f'; ctx.beginPath(); ctx.ellipse(2,0,4.5,3.5,0,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.ellipse(3,-1,2,1.3,0,0,7); ctx.fill();
  ctx.restore();
  // spinning prop disc at the nose
  ctx.strokeStyle='rgba(40,50,70,0.5)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(20,-7*wingScale); ctx.lineTo(20,7*wingScale); ctx.stroke();
  ctx.globalAlpha=0.25; ctx.beginPath(); ctx.ellipse(20,0,2.5,7*wingScale,0,0,7); ctx.stroke(); ctx.globalAlpha=1;
  // EMP dish on the spine (weapon tell)
  if(up && save.tier.emp>0){ ctx.fillStyle=PURPLE; ctx.beginPath(); ctx.arc(-3,-9*wingScale,3.4,Math.PI,0); ctx.fill(); ctx.strokeStyle=shade(PURPLE,-30); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-3,-9*wingScale); ctx.lineTo(-3,-13*wingScale); ctx.stroke(); }
  // hit flash
  if(p.hitFlash>0){ ctx.globalAlpha=p.hitFlash*0.7; ctx.fillStyle='#fff'; roundRect(-16,-7,36,14,6); ctx.fill(); ctx.globalAlpha=1; }
  ctx.restore();

    if(p.iframe>0){ ctx.globalAlpha=0.35+0.3*Math.sin(perfNow*30); ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,0,20,0,7); ctx.stroke(); ctx.globalAlpha=1; }

}
function drawHardware(p){

      roundRect(6,y-1.3,10,2.6,1); ctx.fill(); roundRect(6,-y-1.3,10,2.6,1); ctx.fill();
      ctx.fillStyle='#2a3448'; ctx.fillRect(15,y-1.3,2,2.6); ctx.fillRect(15,-y-1.3,2,2.6); ctx.fillStyle=dk;

function drawPips(p){
  const n=p.maxHp;
  ctx.save();
  if(n>7){
    const w=46, h=5, x=p.x-w/2, y=p.y-36, frac=Math.max(0,p.hp/n);
    ctx.fillStyle='rgba(255,255,255,0.28)'; roundRect(x,y,w,h,2.5); ctx.fill();
    ctx.fillStyle=p.color; roundRect(x,y,w*frac,h,2.5); ctx.fill();
    ctx.strokeStyle='rgba(20,40,70,0.3)'; ctx.lineWidth=0.75; roundRect(x,y,w,h,2.5); ctx.stroke();
    ctx.strokeStyle='rgba(20,40,70,0.22)';
    for(let i=1;i<Math.min(n,12);i++){ const tx=x+w*(i/n); ctx.beginPath(); ctx.moveTo(tx,y); ctx.lineTo(tx,y+h); ctx.stroke(); }
  } else {
    const w=6, gap=3, tot=n*w+(n-1)*gap; ctx.translate(p.x-tot/2, p.y-34);
    for(let i=0;i<n;i++){ ctx.fillStyle = i<p.hp ? p.color : 'rgba(255,255,255,0.28)'; roundRect(i*(w+gap),0,w,4,2); ctx.fill();
      ctx.strokeStyle='rgba(20,40,70,0.25)'; ctx.lineWidth=0.75; roundRect(i*(w+gap),0,w,4,2); ctx.stroke(); }
  }
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawPart(p){
  const a=Math.max(0,p.life/p.max);
  if(p.type==='smoke'||p.type==='trail'){ ctx.globalAlpha=a*(p.type==='trail'?0.5:0.6); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
  else if(p.type==='debris'){ ctx.globalAlpha=a; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot||0); ctx.fillStyle=p.col; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); ctx.restore(); }
  else if(p.type==='spark'){ ctx.globalAlpha=a; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
  else if(p.type==='ring'){ ctx.globalAlpha=a*0.8; ctx.strokeStyle=p.col; ctx.lineWidth=3*a+0.5; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.stroke(); }
  else if(p.type==='emp'){ const t=1-a; p.size=(p.maxSize||80)*t; ctx.globalAlpha=a*0.8; ctx.strokeStyle=p.col; ctx.lineWidth=5*a+1; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.stroke();
    ctx.globalAlpha=a*0.5; ctx.lineWidth=2; for(let i=0;i<8;i++){ const ang=i/8*Math.PI*2; ctx.beginPath(); ctx.moveTo(p.x+Math.cos(ang)*p.size*0.7,p.y+Math.sin(ang)*p.size*0.7); ctx.lineTo(p.x+Math.cos(ang)*p.size,p.y+Math.sin(ang)*p.size); ctx.stroke(); } }
  ctx.globalAlpha=1;
}

    ctx.fillStyle=challengeBeaten?GREEN:'#c86a1e'; ctx.fillText(challengeBeaten?'TARGET SMASHED! '+challenge+' kills':'TARGET: '+challenge+' kills', W/2, 26); }

  const h=player?player.heat:0;
  const hc = player&&player.jam ? '#c0392b' : (h>0.75? shade(RED,10) : (h>0.45? YELLOW : GREEN));
  ctx.fillStyle=hc; roundRect(gx,gy,gw*h,gh,5); ctx.fill();
  ctx.strokeStyle='rgba(32,48,76,0.35)'; ctx.lineWidth=1.5; roundRect(gx,gy,gw,gh,5); ctx.stroke();
  ctx.fillStyle=HUD; ctx.font='700 11px '+FONT; ctx.textAlign='center';
  ctx.fillText(player&&player.jam?'GUN JAMMED — COOLING':'GUN HEAT', W/2, gy-6);

  for(let i=0;i<killFeed.length;i++){ const f=killFeed[i]; const a=Math.min(1,f.t); const big=f.txt.indexOf('DOWNED')===0;
    ctx.globalAlpha=a; ctx.font=(big?'800 26px ':'600 16px ')+FONT; ctx.fillStyle= big?f.color:'rgba(32,48,76,0.85)';
    ctx.fillText(f.txt, W/2, 120+i*26); ctx.globalAlpha=1; }

}
function drawSpecialGauge(player){
  const eq=save.equip; if(!eq||!player) return;
  const cx=W/2, gy=H-52;
  if(eq==='rockets'){
    const rs=rocketStats(); const n=rs.max, pw=13, pg=4, tot=n*(pw+pg)-pg, x0=cx-tot/2;

    ctx.fillStyle='rgba(32,48,76,0.16)'; roundRect(gx,gy,gw,gh,4); ctx.fill();

/* ---------- overlays ---------- */
/* pre-round countdown overlay: 3 · 2 · 1 · ENGAGE! (guns locked until ENGAGE) */
function drawCountdown(){
  ctx.textAlign='center';
  if(countT>0){
    const n=Math.ceil(countT);
    const f=countT-(n-1);                       // 1→0 across this second
    const alpha=clamp(f<0.2? f/0.2 : (f>0.85? (1-f)/0.15 : 1), 0, 1);
    const sc=1.15 - Math.min(0.15,(1-f)*0.15);
    ctx.save(); ctx.translate(W/2, H/2-92);   // lifted above the centered player plane
    // soft ring pulse behind the number
    ctx.globalAlpha=alpha*0.35; ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(0,-14, 46+(1-f)*40, 0, 7); ctx.stroke();
    ctx.globalAlpha=alpha; ctx.scale(sc,sc);
    ctx.fillStyle=INK; ctx.font='900 128px '+FONT; ctx.fillText(n+'', 3, 34);
    ctx.fillStyle=YELLOW; ctx.fillText(n+'', 0, 30);
    ctx.restore();
    ctx.globalAlpha=Math.min(1,countT*2);
    ctx.fillStyle=HUD; ctx.font='700 22px '+FONT;
    ctx.fillText(round===1?'SCRAMBLE! get in position…':'ROUND '+round+' — get in position…', W/2, H/2+70);
    if(round===1){ ctx.fillStyle='rgba(32,48,76,0.82)'; ctx.font='600 15px '+FONT;
      ctx.fillText(usingTouch?'hold FIRE — guns unlock on ENGAGE · steer ‹ › · THRUST':'hold fire — guns unlock on ENGAGE · A/D turn · W thrust', W/2, H/2+96); }
    ctx.globalAlpha=1;
  } else if(engageT>0){
    const a=clamp(engageT/0.6,0,1), sc=1+ (1-Math.min(1,(0.9-engageT)/0.25))*0.25;
    ctx.save(); ctx.translate(W/2, H/2-4); ctx.globalAlpha=a; ctx.scale(Math.max(1,sc),Math.max(1,sc));
    ctx.fillStyle=INK; ctx.font='900 72px '+FONT; ctx.fillText('ENGAGE!', 3, 3);
    ctx.fillStyle=GREEN; ctx.fillText('ENGAGE!', 0, 0);
    ctx.restore(); ctx.globalAlpha=1;
  }
  // "YOU — the yellow one" tag pinned to the player plane during the count-in, self-dismissing at ENGAGE
  if(planes[0] && planes[0].alive && (countT>0 || engageT>0.4)){
    const pl=planes[0];
    const psx=(pl.x-camX)*ZOOM, psy=(pl.y-camY)*ZOOM;
    const a=countT>0 ? Math.min(1,countT*2) : clamp((engageT-0.4)/0.25,0,1);
    const ty=psy-48+Math.sin(perfNow*5)*3;   // bobbing above the chevron marker
    ctx.save();
    ctx.globalAlpha=a;
    // arrow pointing down to the plane
    ctx.fillStyle=YELLOW; ctx.strokeStyle=INK; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(psx-9,ty+14); ctx.lineTo(psx+9,ty+14); ctx.lineTo(psx,ty+28); ctx.closePath(); ctx.fill(); ctx.stroke();
    // pill
    ctx.font='800 18px '+FONT;
    const label='YOU — the yellow one';
    const pw=ctx.measureText(label).width+26;
    ctx.fillStyle=YELLOW; ctx.strokeStyle=INK; ctx.lineWidth=3;
    roundRect(psx-pw/2, ty-16, pw, 32, 12); ctx.fill(); ctx.stroke();
    ctx.fillStyle=INK; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label, psx, ty+1);
    ctx.restore();
    ctx.textBaseline='alphabetic';
  }
}

const TITLE_HANGAR_BTN = rectBtn(W/2, H/2+150, 200, 34);
const DEAD_HANGAR_BTN  = rectBtn(W/2, H/2+104, 220, 34);
function drawPill(r,label,fill,txt){ ctx.fillStyle=fill; roundRect(r.x,r.y,r.w,r.h,r.h/2); ctx.fill(); ctx.fillStyle=txt; ctx.font='800 15px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label, r.x+r.w/2, r.y+r.h/2+1); ctx.textBaseline='alphabetic'; }
function drawTitle(){
  const t=titleT;
  ctx.textAlign='center';
  ctx.save(); ctx.translate(W/2, H/2-70+Math.sin(t*1.6)*4);
  ctx.fillStyle=INK; ctx.font='900 78px '+FONT;
  ctx.fillText('SKY DUEL', 2, 4);
  ctx.fillStyle=YELLOW; ctx.fillText('SKY DUEL', 0, 0);
  ctx.restore();
  ctx.fillStyle=HUD; ctx.font='600 22px '+FONT;
  ctx.fillText('dogfight a sky full of rivals — be the last one flying', W/2, H/2+2);
  ctx.font='600 16px '+FONT; ctx.fillStyle='rgba(32,48,76,0.85)';
  const hint = usingTouch ? 'steer ‹ › · THRUST · FIRE · SP special' : 'A/D turn · W thrust · SPACE fire · K special';
  ctx.fillText(hint, W/2, H/2+34);
  const pa=0.55+0.45*Math.sin(t*4);
  ctx.globalAlpha=pa; ctx.fillStyle=RED; ctx.font='800 26px '+FONT;
  ctx.fillText(usingTouch?'TAP TO SCRAMBLE':'PRESS ANY KEY TO SCRAMBLE', W/2, H/2+76); ctx.globalAlpha=1;
  ctx.fillStyle='rgba(32,48,76,0.7)'; ctx.font='600 13px '+FONT;
  ctx.fillText('best: '+best+' wins  ·  ◈ '+save.up+' parts banked', W/2, H/2+106);
  drawPill(TITLE_HANGAR_BTN, '◈ HANGAR', 'rgba(32,48,76,0.9)', '#fff');
}
function drawDead(){
  ctx.fillStyle='rgba(22,34,58,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='900 60px '+FONT; ctx.fillText('SHOT DOWN', W/2, H/2-56);
  ctx.font='700 26px '+FONT; ctx.fillStyle=YELLOW;
  ctx.fillText(roundsWon+' round'+(roundsWon===1?'':'s')+' won · '+kills+' kill'+(kills===1?'':'s'), W/2, H/2-14);
  ctx.font='600 18px '+FONT; ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('best: '+best+' wins  ·  ◈ '+save.up+' parts banked', W/2, H/2+16);
  const pa=0.55+0.45*Math.sin(perfNow*4);
  ctx.globalAlpha=Math.min(1, deadT*1.5)*pa; ctx.fillStyle=GREEN; ctx.font='800 28px '+FONT;
  ctx.fillText(usingTouch?'TAP TO SCRAMBLE AGAIN':'PRESS ANY KEY — SCRAMBLE AGAIN', W/2, H/2+62);
  ctx.globalAlpha=1;
  drawPill(DEAD_HANGAR_BTN, '◈ HANGAR — SPEND PARTS', 'rgba(244,196,48,0.95)', INK);
}
function nextAffordableHint(){
  let cheapest=null;
  for(const f of FAMILIES){ const t=save.tier[f.key]; if(t>=f.max) continue; const c=cost(f,t); if(!cheapest||c<cheapest.c) cheapest={f,c}; }
  if(!cheapest) return 'ALL SYSTEMS MAXED — you legend';
  if(save.up>=cheapest.c) return 'ready to buy: '+cheapest.f.name;
  return 'next upgrade: '+cheapest.f.name+' in ◈'+(cheapest.c-save.up);
}
function drawHangar(){
  ctx.fillStyle='rgba(22,34,58,0.40)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='900 38px '+FONT; ctx.fillText('HANGAR', 40, 64);
  ctx.textAlign='right'; ctx.fillStyle=YELLOW; ctx.font='800 30px '+FONT; ctx.fillText('◈ '+save.up, W-40, 60);
  ctx.font='600 12px '+FONT; ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fillText('UPGRADE PARTS', W-40, 78);
  const L=hangarLayout();
  for(const r of L.rows){
    const f=r.f, t=save.tier[f.key], maxed=t>=f.max, c=maxed?0:cost(f,t), afford=!maxed&&save.up>=c;
    ctx.fillStyle= afford ? 'rgba(255,255,255,0.17)' : 'rgba(255,255,255,0.08)'; roundRect(r.x,r.y,r.w,r.h,10); ctx.fill();
    if(save.equip===f.key){ ctx.strokeStyle=YELLOW; ctx.lineWidth=2; roundRect(r.x,r.y,r.w,r.h,10); ctx.stroke(); }
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='800 18px '+FONT; ctx.fillText(f.name, r.x+16, r.y+21);
    ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.font='600 11px '+FONT; ctx.fillText(f.desc, r.x+16, r.y+37);
    const pw=12, pg=4, px=r.x+250, py=r.y+r.h/2-4;
    for(let i=0;i<f.max;i++){ ctx.fillStyle= i<t ? familyColor(f.key) : 'rgba(255,255,255,0.22)'; roundRect(px+i*(pw+pg),py,pw,8,3); ctx.fill(); }
    if(r.eqChip){ const owned=t>0, eq=save.equip===f.key; ctx.globalAlpha=owned?1:0.35;
      ctx.fillStyle= eq?YELLOW:'rgba(255,255,255,0.2)'; roundRect(r.eqChip.x,r.eqChip.y,r.eqChip.w,r.eqChip.h,8); ctx.fill();
      ctx.fillStyle= eq?INK:'#fff'; ctx.font='800 11px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(eq?'ARMED':'ARM', r.eqChip.x+r.eqChip.w/2, r.eqChip.y+r.eqChip.h/2+1); ctx.textBaseline='alphabetic'; ctx.globalAlpha=1; }
    const cc=r.costChip;
    ctx.fillStyle= maxed ? 'rgba(58,174,107,0.55)' : (afford ? GREEN : 'rgba(255,255,255,0.14)');
    roundRect(cc.x,cc.y,cc.w,cc.h,8); ctx.fill();
    ctx.fillStyle= (maxed||afford) ? '#fff' : 'rgba(255,255,255,0.55)'; ctx.font='800 13px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(maxed?'MAX':('◈ '+c), cc.x+cc.w/2, cc.y+cc.h/2+1); ctx.textBaseline='alphabetic';
  }
  const lt = hangarNext==='nextRound' ? ('LAUNCH ROUND '+(round+1)) : (hangarCtx==='dead'?'SCRAMBLE AGAIN':'SCRAMBLE');
  drawPill(L.launch, lt, GREEN, '#fff');
  if(hangarCtx!=='round') drawPill(L.back, '◂ BACK', 'rgba(255,255,255,0.18)', '#fff');
  ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.font='600 12px '+FONT;
  ctx.fillText(usingTouch?'tap a row to upgrade · tap ARM to equip a special':'1–7 buy · E arm special · ENTER launch', W/2, H-58);
  const na=nextAffordableHint(); if(na){ ctx.textAlign='left'; ctx.fillStyle=YELLOW; ctx.font='600 12px '+FONT; ctx.fillText(na, 40, H-58); }
}

/* ---------- master render ---------- */
let perfNow=0;
const inWorld = (state)=> state==='play'||state==='roundwin'||state==='dead';
function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle=LETTERBOX; ctx.fillRect(0,0,cv.width,cv.height);
  let sx=0,sy=0; if(shake>0){ sx=(rng()-0.5)*shake; sy=(rng()-0.5)*shake; }
  ctx.setTransform(dpr*scl,0,0,dpr*scl, dpr*(offX+sx), dpr*(offY+sy));
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  // --- sky backdrop (screen-fixed) ---
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,SKY_TOP); g.addColorStop(0.55,SKY_MID); g.addColorStop(1,SKY_LOW);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const sg=ctx.createRadialGradient(W-140,90,10,W-140,90,220); sg.addColorStop(0,'rgba(255,246,222,0.9)'); sg.addColorStop(1,'rgba(255,246,222,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  const worldView = inWorld(state);
  if(worldView){
    // === WORLD SPACE (camera follows the player) ===
    ctx.save(); ctx.scale(ZOOM,ZOOM); ctx.translate(-camX,-camY);
    for(const c of clouds){ if(c.x-camX>-160 && c.x-camX<VW+160 && c.y-camY>-160 && c.y-camY<VH+160) drawCloud(c); }
    for(let i=0;i<PMAX;i++){ const p=parts[i]; if(p.on&&(p.type==='smoke'||p.type==='trail')&&onScreen(p.x,p.y,40)) drawPart(p); }
    for(const w of wrecks){ if(onScreen(w.x,w.y,60)) drawWreck(w); }
    for(let i=0;i<BMAX;i++){ const b=bullets[i]; if(!b.on||!onScreen(b.x,b.y,20)) continue;
      ctx.strokeStyle=b.color; ctx.globalAlpha=0.9; ctx.lineWidth=2.6;
      ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-b.vx*0.016, b.y-b.vy*0.016); ctx.stroke();
      ctx.globalAlpha=1; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,1.8,0,7); ctx.fill();
    }
    for(const r of rockets){ if(r.on&&onScreen(r.x,r.y,30)) drawRocket(r); }
    // shields under planes, then planes, crowns, drones
    for(const p of planes){ if(p.alive&&p.shield>0&&onScreen(p.x,p.y,40)) drawShield(p); }
    for(const p of planes){ if(p.alive&&onScreen(p.x,p.y,50)) drawPlane(p); }
    for(const p of planes){ if(p.alive&&p.ace&&onScreen(p.x,p.y,50)) drawAceCrown(p); }
    for(const p of planes){ if(p.alive&&p.drones){ for(const dr of p.drones) if(onScreen(dr.fx,dr.fy,30)) drawDrone(dr, p.isPlayer?TEAL:shade(p.color,-10)); } }
    // enemy seeker-lock telegraphs
    for(const p of planes){ if(p.alive&&p.lockT>0) drawBotLock(p); }
    // your own seeker lock reticle
    if(gunsLive() && save.equip==='rockets' && rocketStats().own && planes[0]&&planes[0].alive){
      const tg=nearestEnemyFrom(planes[0].x,planes[0].y,0);
      if(tg>=0){ const t=planes[tg]; ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(perfNow*2);
        ctx.strokeStyle= planes[0].rkAmmo>0 ? 'rgba(232,85,58,0.9)' : 'rgba(255,255,255,0.4)'; ctx.lineWidth=2;
        for(let i=0;i<4;i++){ ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.arc(0,0,20,-0.4,0.4); ctx.stroke(); }
        ctx.restore(); }
    }
    for(let i=0;i<PMAX;i++){ const p=parts[i]; if(p.on&&p.type!=='smoke'&&p.type!=='trail'&&onScreen(p.x,p.y,60)) drawPart(p); }
    ctx.restore(); // === end WORLD SPACE ===
  }
  // atmospheric bottom haze (screen-fixed)
  const fg=ctx.createLinearGradient(0,H-70,0,H); fg.addColorStop(0,'rgba(207,235,251,0)'); fg.addColorStop(1,'rgba(255,243,220,0.45)');
  ctx.fillStyle=fg; ctx.fillRect(0,H-70,W,70);
  if(flashV>0){ ctx.globalAlpha=flashV*0.5; ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  if(state==='play'||state==='roundwin'){ drawEdgeArrows(); drawMinimap(); drawHUD(); drawCountdown(); if(state==='roundwin') drawWinBanner(); }
  else if(state==='title'){ drawTitle(); if(usingTouch) drawTouch(); }
  else if(state==='hangar'){ drawHangar(); }
  else if(state==='dead'){ drawMinimap(); drawHUD(); drawDead(); }

  ctx.restore();
}
/* off-screen rival indicators — arrows pinned to the screen edge, pointing at the fight */
function drawEdgeArrows(){
  const px=planes[0]?planes[0].x:camX+VW/2, py=planes[0]?planes[0].y:camY+VH/2;
  const m=26;
  for(const q of planes){ if(q.id===0||!q.alive) continue;
    const sxp=(q.x-camX)*ZOOM, syp=(q.y-camY)*ZOOM;   // world → screen (zoomed)
    if(sxp>=-10 && sxp<=W+10 && syp>=-10 && syp<=H+10) continue; // on-screen, skip
    // clamp the target point to the screen frame along the line from player
    let ax=clamp(sxp,m,W-m), ay=clamp(syp,m,H-m);
    const ang=Math.atan2(q.y-py, q.x-px);
    // distance-based size so far rivals read as smaller/dimmer
    const d=Math.hypot(q.x-px,q.y-py); const sc=clamp(1.15-d/2600,0.6,1.1);
    ctx.save(); ctx.translate(ax,ay); ctx.rotate(ang); ctx.scale(sc,sc);
    ctx.globalAlpha=0.9; ctx.fillStyle=q.color; ctx.strokeStyle='rgba(20,40,70,0.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(13,0); ctx.lineTo(-6,-8); ctx.lineTo(-2,0); ctx.lineTo(-6,8); ctx.closePath(); ctx.fill(); ctx.stroke();
    if(q.ace){ ctx.fillStyle=YELLOW; ctx.beginPath(); ctx.arc(-9,0,2.4,0,7); ctx.fill(); }   // ace pip
    ctx.restore(); ctx.globalAlpha=1;
  }
}
/* corner minimap — the whole world at a glance: you (yellow) + rivals */
function drawMinimap(){
  const mw=132, mh=Math.round(mw*WORLD_H/WORLD_W), mx=W-mw-14, my=92;
  ctx.save();
  ctx.globalAlpha=0.82; ctx.fillStyle='rgba(22,34,58,0.55)'; roundRect(mx-4,my-4,mw+8,mh+8,8); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.4; roundRect(mx-4,my-4,mw+8,mh+8,8); ctx.stroke();
  ctx.globalAlpha=1;
  const kx=mw/WORLD_W, ky=mh/WORLD_H;
  // camera viewport rectangle
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
  ctx.strokeRect(mx+camX*kx, my+camY*ky, VW*kx, VH*ky);
  for(const q of planes){ if(!q.alive) continue;
    const dx=mx+q.x*kx, dy=my+q.y*ky;
    if(q.id===0){ ctx.fillStyle=YELLOW; ctx.beginPath(); ctx.arc(dx,dy,3.4,0,7); ctx.fill(); ctx.strokeStyle=INK; ctx.lineWidth=1; ctx.stroke(); }
    else { ctx.fillStyle=q.color; ctx.beginPath(); ctx.arc(dx,dy, q.ace?3.4:2.4,0,7); ctx.fill(); if(q.ace){ ctx.strokeStyle=YELLOW; ctx.lineWidth=1; ctx.stroke(); } }
  }
  ctx.restore();
}

/* ---------- main loop ---------- */
let last=performance.now(), acc=0; const STEP=1/120;
function frame(now){
  perfNow=now/1000;
  let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1;
  titleT+=dt;
  shake=Math.max(0, shake-dt*36); flashV=Math.max(0, flashV-dt*2.2); scorePulse=Math.max(0,scorePulse-dt*2.5);
  if(introT>0) introT-=dt;
  for(let i=killFeed.length-1;i>=0;i--){ killFeed[i].t-=dt; if(killFeed[i].t<=0) killFeed.splice(i,1); }

  if(state==='play'){
    // pre-round countdown (real-time): everyone can fly, all guns held until ENGAGE
    if(countT>0){
      countT-=dt;
      const cn=Math.max(0,Math.ceil(countT));
      if(cn!==lastCountShown){ lastCountShown=cn; if(cn>0) sfxBeep(false); }
      if(countT<=0){ countT=0; engageT=0.9; sfxBeep(true); }
    } else if(engageT>0){ engageT-=dt; }
    const player=planes[0];
    if(player&&player.alive){ player.turn=(inR()?1:0)-(inL()?1:0); player.thrusting=inT(); player.wantFire=inF(); player.wantSpecial=inS(); }
    acc+=dt; let guard=0;
    while(acc>=STEP && guard<8){ stepSim(STEP); acc-=STEP; guard++; }
    if(guard>=8) acc=0;
    updateBullets(dt); updateRockets(dt); updateDrones(dt); updateWrecks(dt); updateParts(dt); updateClouds(dt);
    updateCamera(dt); updateEngine(player);
  } else {
    updateWrecks(dt); updateParts(dt); updateClouds(dt);
    if(state==='roundwin'){ winT-=dt; if(winT<=0){ openHangar('round'); } }
    if(state==='dead'){ deadT+=dt; }
    if(engGain) engGain.gain.value += (0 - engGain.gain.value)*Math.min(1,dt*4);
  }
  render();
  requestAnimationFrame(frame);
}
function stepSim(dt){
  for(const p of planes){ if(p.isPlayer) updatePlane(p,dt); else { botThink(p,dt); updatePlane(p,dt); } }
}
function updateEngine(player){
  if(!engGain||!player) return;
  const sp=Math.hypot(player.vx,player.vy)/MAX_SPEED;
  const targetG = player.alive ? (0.05+ (player.thrusting?0.11:0.03)) : 0;
  engGain.gain.value += (targetG - engGain.gain.value)*Math.min(1, 0.12);
  const f = 60 + sp*90 + (player.thrusting?40:0);
  engOsc.frequency.value += (f - engOsc.frequency.value)*0.15;
  engFilt.frequency.value = 420 + sp*700 + (player.thrusting?300:0);
}

/* ---------- boot ---------- */
requestAnimationFrame(frame);
post({gs:'ready'});
</script>
</body>
