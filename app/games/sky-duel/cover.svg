<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63B7F0"/>
      <stop offset="0.55" stop-color="#8FD0F6"/>
      <stop offset="1" stop-color="#CFEBFB"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.82" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#FFF6DE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFF6DE" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#sky)"/>
  <rect width="640" height="400" fill="url(#sun)"/>

  <!-- clouds -->
  <g fill="#FFFFFF">
    <g opacity="0.95"><circle cx="90" cy="300" r="34"/><circle cx="130" cy="292" r="42"/><circle cx="176" cy="302" r="34"/><circle cx="150" cy="318" r="30"/></g>
    <g opacity="0.9"><circle cx="470" cy="110" r="26"/><circle cx="500" cy="102" r="34"/><circle cx="534" cy="112" r="26"/></g>
    <g opacity="0.85"><circle cx="300" cy="70" r="22"/><circle cx="326" cy="64" r="28"/><circle cx="352" cy="72" r="22"/></g>
    <g opacity="0.9"><circle cx="560" cy="320" r="30"/><circle cx="596" cy="312" r="38"/><circle cx="628" cy="322" r="30"/></g>
  </g>
  <g fill="#FFF3DC" opacity="0.5">
    <circle cx="120" cy="278" r="20"/><circle cx="500" cy="88" r="16"/>
  </g>

  <!-- tracers -->
  <g stroke-linecap="round">
    <line x1="150" y1="180" x2="290" y2="150" stroke="#F4C430" stroke-width="4" opacity="0.9"/>
    <line x1="300" y1="146" x2="330" y2="140" stroke="#FFFFFF" stroke-width="4"/>
    <line x1="470" y1="250" x2="360" y2="210" stroke="#8A6BE0" stroke-width="4" opacity="0.9"/>
    <line x1="250" y1="300" x2="200" y2="250" stroke="#3AAE6B" stroke-width="4" opacity="0.85"/>
  </g>

  <!-- player plane (yellow) banking, nose upper-right -->
  <g transform="translate(150,180) rotate(-14)">
    <ellipse cx="0" cy="10" rx="22" ry="7" fill="#20304C" opacity="0.14"/>
    <polygon points="-2,-20 8,-15 10,16 -2,20 -7,16 -7,-15" fill="#c99a1f"/>
    <polygon points="-18,-9 -10,-5 -10,5 -18,9" fill="#c99a1f"/>
    <rect x="-17" y="-6" width="36" height="12" rx="6" fill="#F4C430"/>
    <polygon points="15,-6 23,0 15,6" fill="#d9ab26"/>
    <ellipse cx="3" cy="0" rx="5" ry="4" fill="#26364f"/>
    <line x1="22" y1="-8" x2="22" y2="8" stroke="#28324a" stroke-width="1.6" opacity="0.5"/>
  </g>
  <!-- player chevron marker -->
  <polyline points="140,146 150,154 160,146" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- rival red plane, pursued -->
  <g transform="translate(325,140) rotate(8)">
    <polygon points="-2,-18 8,-14 9,14 -2,18 -7,14 -7,-14" fill="#b8412c"/>
    <rect x="-16" y="-6" width="34" height="12" rx="6" fill="#E8553A"/>
    <polygon points="14,-6 21,0 14,6" fill="#c9472f"/>
    <ellipse cx="2" cy="0" rx="4.5" ry="3.5" fill="#26364f"/>
  </g>

  <!-- rival purple plane -->
  <g transform="translate(470,250) rotate(150)">
    <polygon points="-2,-17 8,-13 9,13 -2,17 -7,13 -7,-13" fill="#6e52c4"/>
    <rect x="-15" y="-6" width="32" height="12" rx="6" fill="#8A6BE0"/>
    <polygon points="13,-6 20,0 13,6" fill="#7a5ad0"/>
    <ellipse cx="2" cy="0" rx="4.5" ry="3.5" fill="#26364f"/>
  </g>

  <!-- smoking green plane spiraling down -->
  <g transform="translate(470,300)">
    <g fill="#4a4a4a" opacity="0.55" filter="url(#soft)">
      <circle cx="20" cy="-40" r="12"/><circle cx="34" cy="-66" r="15"/><circle cx="50" cy="-92" r="17"/><circle cx="70" cy="-118" r="19"/>
    </g>
    <g transform="rotate(140)">
      <rect x="-14" y="-5" width="26" height="10" rx="5" fill="#2f7f4e"/>
      <polygon points="-2,-16 6,16 -4,12" fill="#3AAE6B"/>
    </g>
    <g fill="#FFDf7a">
      <circle cx="6" cy="-6" r="3"/><circle cx="-8" cy="4" r="2.5"/><circle cx="12" cy="8" r="2"/>
    </g>
  </g>

  <!-- parachute (comedy) -->
  <g transform="translate(540,180)">
    <path d="M -20 0 A 20 20 0 0 1 20 0 L 14 0 L 0 4 L -14 0 Z" fill="#8fc7a0"/>
    <path d="M -14 0 L -3 16 M 14 0 L 3 16 M 0 0 L 0 16" stroke="#3a4a66" stroke-width="1" fill="none"/>
    <circle cx="0" cy="18" r="3" fill="#e9c58a"/>
    <rect x="-3" y="20" width="6" height="7" rx="2" fill="#3a4a66"/>
  </g>

  <!-- title -->
  <g font-family="'Fredoka','Baloo 2','Comic Sans MS',sans-serif" text-anchor="middle">
    <text x="322" y="360" font-size="70" font-weight="900" fill="#20304C">SKY DUEL</text>
    <text x="320" y="358" font-size="70" font-weight="900" fill="#F4C430">SKY DUEL</text>
    <text x="320" y="386" font-size="20" font-weight="700" fill="#20304C">last plane flying wins</text>
  </g>
</svg>
