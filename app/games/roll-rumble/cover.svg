<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FD4EE"/><stop offset="1" stop-color="#FCE6BE"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF7D6"/><stop offset="1" stop-color="#FFF7D6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D89C50"/><stop offset="1" stop-color="#C6893F"/>
    </linearGradient>
    <style>
      .t{font-family:'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;font-weight:900;}
    </style>
  </defs>

  <rect width="640" height="400" fill="url(#sky)"/>
  <circle cx="548" cy="60" r="120" fill="url(#sun)"/>
  <circle cx="548" cy="60" r="30" fill="#FFF3C6"/>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.92">
    <g transform="translate(120,70)"><circle r="22"/><circle cx="26" cy="-8" r="27"/><circle cx="54" cy="0" r="22"/><circle cx="26" cy="10" r="20"/></g>
    <g transform="translate(430,44) scale(0.8)"><circle r="22"/><circle cx="26" cy="-8" r="27"/><circle cx="54" cy="0" r="22"/></g>
  </g>

  <!-- bunting -->
  <path d="M-10 26 Q320 60 650 26" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"/>
  <g>
    <polygon points="40,32 58,32 49,50" fill="#E5533D"/><polygon points="110,38 128,38 119,56" fill="#F2B84B"/>
    <polygon points="185,42 203,42 194,60" fill="#5AB07A"/><polygon points="265,44 283,44 274,62" fill="#5B8DEF"/>
    <polygon points="350,44 368,44 359,62" fill="#FF8FB2"/><polygon points="435,42 453,42 444,60" fill="#E5533D"/>
    <polygon points="515,38 533,38 524,56" fill="#F2B84B"/><polygon points="590,32 608,32 599,50" fill="#5AB07A"/>
  </g>

  <!-- green field -->
  <path d="M0 340 Q160 312 320 336 Q480 360 640 328 L640 400 L0 400 Z" fill="#8FCB7A"/>

  <!-- tilting platform -->
  <g transform="translate(320,290) rotate(-6)">
    <ellipse cx="0" cy="70" rx="300" ry="34" fill="#3A2A2E" opacity="0.20"/>
    <path d="M-292 0 A292 84 0 0 0 292 0 L292 40 A292 84 0 0 1 -292 40 Z" fill="#9C6528"/>
    <ellipse cx="0" cy="0" rx="292" ry="84" fill="url(#wood)"/>
    <ellipse cx="0" cy="-4" rx="286" ry="79" fill="#D89C50"/>
    <g stroke="#9C6528" stroke-opacity="0.4" stroke-width="2" fill="none">
      <path d="M-286 -30 Q0 -38 286 -30"/><path d="M-286 0 Q0 8 286 0"/><path d="M-286 28 Q0 36 286 28"/>
    </g>
    <ellipse cx="0" cy="-4" rx="286" ry="79" fill="none" stroke="#E0A85C" stroke-width="3"/>
  </g>

  <!-- characters on balls (drawn upright-ish over the tilt) -->
  <!-- helper look: ball + egg body + face -->
  <g transform="translate(150,238)">
    <ellipse cx="0" cy="34" rx="26" ry="9" fill="#3A2A2E" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="#F2B84B"/><circle cx="0" cy="0" r="30" fill="none" stroke="#D69A2C" stroke-width="3"/>
    <ellipse cx="-10" cy="-11" rx="8" ry="5" fill="#fff" opacity="0.6"/>
    <g transform="translate(0,-38) rotate(8)">
      <ellipse cx="0" cy="-18" rx="16" ry="22" fill="#F2B84B" stroke="#D69A2C" stroke-width="2.5"/>
      <circle cx="-6" cy="-26" r="5" fill="#fff"/><circle cx="6" cy="-26" r="5" fill="#fff"/>
      <circle cx="-5" cy="-26" r="2.6" fill="#3A2A2E"/><circle cx="7" cy="-26" r="2.6" fill="#3A2A2E"/>
      <path d="M-5 -16 Q0 -12 5 -16" fill="none" stroke="#3A2A2E" stroke-width="2.4"/>
      <path d="M-13 -18 L-24 -30" stroke="#D69A2C" stroke-width="6" stroke-linecap="round"/>
      <path d="M13 -18 L24 -30" stroke="#D69A2C" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- PLAYER (crown) center-left, bigger -->
  <g transform="translate(270,224)">
    <ellipse cx="0" cy="36" rx="28" ry="10" fill="#3A2A2E" opacity="0.22"/>
    <circle cx="0" cy="0" r="33" fill="#E5533D"/><circle cx="0" cy="0" r="33" fill="none" stroke="#C43C29" stroke-width="3"/>
    <ellipse cx="-11" cy="-12" rx="9" ry="6" fill="#fff" opacity="0.6"/>
    <g transform="translate(0,-42) rotate(-6)">
      <ellipse cx="0" cy="-20" rx="18" ry="25" fill="#E5533D" stroke="#C43C29" stroke-width="2.5"/>
      <polygon points="-12,-42 -12,-52 -5,-46 0,-56 5,-46 12,-52 12,-42" fill="#F7C948" stroke="#C99A17" stroke-width="1.6"/>
      <circle cx="-7" cy="-30" r="5.5" fill="#fff"/><circle cx="7" cy="-30" r="5.5" fill="#fff"/>
      <circle cx="-6" cy="-30" r="2.8" fill="#3A2A2E"/><circle cx="8" cy="-30" r="2.8" fill="#3A2A2E"/>
      <path d="M-6 -19 Q0 -14 6 -19" fill="none" stroke="#3A2A2E" stroke-width="2.6"/>
      <path d="M-15 -22 L-27 -30" stroke="#C43C29" stroke-width="6.5" stroke-linecap="round"/>
      <path d="M15 -22 L27 -30" stroke="#C43C29" stroke-width="6.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- green rival -->
  <g transform="translate(400,250)">
    <ellipse cx="0" cy="34" rx="26" ry="9" fill="#3A2A2E" opacity="0.2"/>
    <circle cx="0" cy="0" r="30" fill="#5AB07A"/><circle cx="0" cy="0" r="30" fill="none" stroke="#3E8E5C" stroke-width="3"/>
    <ellipse cx="-10" cy="-11" rx="8" ry="5" fill="#fff" opacity="0.6"/>
    <g transform="translate(0,-38) rotate(-4)">
      <ellipse cx="0" cy="-18" rx="16" ry="22" fill="#5AB07A" stroke="#3E8E5C" stroke-width="2.5"/>
      <circle cx="-6" cy="-26" r="5" fill="#fff"/><circle cx="6" cy="-26" r="5" fill="#fff"/>
      <circle cx="-6" cy="-26" r="2.6" fill="#3A2A2E"/><circle cx="6" cy="-26" r="2.6" fill="#3A2A2E"/>
      <path d="M-5 -16 Q0 -12 5 -16" fill="none" stroke="#3A2A2E" stroke-width="2.4"/>
      <path d="M-13 -18 L-23 -28" stroke="#3E8E5C" stroke-width="6" stroke-linecap="round"/>
      <path d="M13 -18 L23 -28" stroke="#3E8E5C" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- BLUE rival TUMBLING off the low edge -->
  <g transform="translate(516,300) rotate(38)">
    <circle cx="0" cy="14" r="26" fill="#5B8DEF"/><circle cx="0" cy="14" r="26" fill="none" stroke="#3F6ED0" stroke-width="3"/>
    <ellipse cx="0" cy="-20" rx="16" ry="22" fill="#5B8DEF" stroke="#3F6ED0" stroke-width="2.5"/>
    <g stroke="#3A2A2E" stroke-width="2.4">
      <path d="M-9 -30 L-3 -24 M-3 -30 L-9 -24"/><path d="M3 -30 L9 -24 M9 -30 L3 -24"/>
    </g>
    <path d="M-13 -20 L-26 -30" stroke="#3F6ED0" stroke-width="6" stroke-linecap="round"/>
    <path d="M13 -20 L26 -12" stroke="#3F6ED0" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g fill="#F3E7C8" opacity="0.8"><circle cx="500" cy="300" r="6"/><circle cx="490" cy="288" r="5"/><circle cx="508" cy="286" r="4"/></g>

  <!-- title -->
  <g text-anchor="middle">
    <text class="t" x="322" y="112" font-size="72" fill="#ffffff" stroke="#3A2A2E" stroke-width="9" paint-order="stroke">ROLL</text>
    <text class="t" x="320" y="110" font-size="72" fill="#E5533D">ROLL</text>
    <text class="t" x="322" y="176" font-size="62" fill="#ffffff" stroke="#3A2A2E" stroke-width="8" paint-order="stroke">RUMBLE</text>
    <text class="t" x="320" y="174" font-size="62" fill="#5B8DEF">RUMBLE</text>
  </g>
</svg>
