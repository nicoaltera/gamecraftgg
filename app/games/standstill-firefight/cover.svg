    <circle cx="514" cy="344" r="5"/><circle cx="532" cy="332" r="4"/>
  </g>
  <!-- fallen enemy ragdoll -->
  <g stroke="#E23B45" stroke-width="4" stroke-linecap="round" fill="none">
    <circle cx="470" cy="336" r="8"/><line x1="478" y1="334" x2="502" y2="328"/>
    <line x1="502" y1="328" x2="524" y2="336"/><line x1="502" y1="328" x2="510" y2="312"/>
    <line x1="524" y1="336" x2="544" y2="330"/><line x1="524" y1="336" x2="538" y2="346"/>
  </g>
  <!-- enemy with laser -->
  <g stroke="#E23B45" stroke-width="4" stroke-linecap="round" fill="none">
