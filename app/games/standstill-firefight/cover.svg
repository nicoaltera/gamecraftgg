<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1B1B22"/>
  <polygon fill="#F6F1E7" points="18,22 60,17 120,23 200,18 300,24 400,17 500,23 580,18 622,24 618,80 623,160 617,240 622,320 617,382 540,377 440,383 340,377 240,383 140,377 60,383 22,378 24,300 18,220 24,140 19,60"/>
  <g stroke="#1B1B22" stroke-opacity="0.05" stroke-width="1">
    <line x1="80" y1="90" x2="140" y2="96"/><line x1="300" y1="330" x2="360" y2="324"/>
    <line x1="480" y1="120" x2="540" y2="128"/><line x1="150" y1="250" x2="210" y2="246"/>
  </g>
  <!-- red ink splat -->
  <g fill="#E23B45" opacity="0.85">
