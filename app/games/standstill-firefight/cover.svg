    <line x1="540" y1="178" x2="528" y2="200"/><line x1="540" y1="178" x2="552" y2="199"/>
    <line x1="540" y1="158" x2="518" y2="166"/><line x1="540" y1="158" x2="516" y2="152"/>
  </g>
  <rect x="504" y="148" width="16" height="6" fill="#E23B45"/>
  <line x1="504" y1="152" x2="230" y2="192" stroke="#E23B45" stroke-width="1.6" stroke-opacity="0.55"/>
  <!-- frozen bullets with future paths -->
  <g stroke="#E23B45" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="5 7">
    <line x1="298" y1="176" x2="196" y2="190"/>
    <line x1="330" y1="230" x2="180" y2="238"/>
    <line x1="360" y1="130" x2="212" y2="158"/>
  </g>
  <g stroke="#F5A623" stroke-width="3" stroke-linecap="round" stroke-opacity="0.6">
    <line x1="352" y1="169" x2="298" y2="176"/><line x1="390" y1="227" x2="330" y2="230"/>
    <line x1="420" y1="119" x2="360" y2="130"/>
  </g>
  <g fill="#F5A623" stroke="#E23B45" stroke-width="1.5">
    <circle cx="298" cy="176" r="4.5"/><circle cx="330" cy="230" r="4.5"/><circle cx="360" cy="130" r="4.5"/>
  </g>
  <!-- the player, mid-dodge, frozen -->
  <g stroke="#1B1B22" stroke-width="5" stroke-linecap="round" fill="none">
    <circle cx="150" cy="170" r="11"/>
    <line x1="152" y1="181" x2="160" y2="216"/>
    <line x1="160" y1="216" x2="142" y2="248"/>
    <line x1="160" y1="216" x2="184" y2="244"/>
    <line x1="154" y1="190" x2="184" y2="182"/>
    <line x1="154" y1="190" x2="130" y2="206"/>
  </g>
  <rect x="184" y="177" width="22" height="7" fill="#1B1B22"/>
  <rect x="187" y="184" width="7" height="10" fill="#1B1B22"/>
  <g transform="translate(150,140)" text-anchor="middle" font-family="'Archivo Black','Arial Black',sans-serif">
    <text font-size="15" font-weight="900" fill="#2EC4B6">YOU</text>
  </g>
  <circle cx="152" cy="196" r="34" fill="none" stroke="#2EC4B6" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- title stamp -->
  <g transform="translate(320,64) rotate(-2)" text-anchor="middle" font-family="'Archivo Black','Arial Black',sans-serif">
    <text font-size="52" font-weight="900" fill="#1B1B22" letter-spacing="4">STANDSTILL</text>
  </g>
  <g transform="translate(320,352) rotate(-2)" text-anchor="middle" font-family="'Archivo Black','Arial Black',sans-serif">
    <text font-size="18" font-weight="900" fill="#E23B45" letter-spacing="3">TIME MOVES WHEN YOU MOVE</text>
  </g>
  <!-- time meter -->
  <rect x="250" y="298" width="140" height="7" fill="#1B1B22" fill-opacity="0.12"/>
  <rect x="250" y="298" width="18" height="7" fill="#2EC4B6"/>
</svg>