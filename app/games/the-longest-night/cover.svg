<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14152B"/>
      <stop offset="1" stop-color="#232A57"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#FFF6E0"/>
      <stop offset="0.7" stop-color="#F4ECD8"/>
      <stop offset="1" stop-color="#D8C79A"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="ds" x="-40%" y="-40%" width="200%" height="200%">
      <feDropShadow dx="14" dy="20" stdDeviation="12" flood-color="#06040E" flood-opacity="0.5"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.95 0 0 0 0 0.92 0 0 0 0 0.85 0 0 0 0.05 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#F4ECD8">
    <circle cx="70" cy="60" r="1.6" opacity="0.8"/><circle cx="150" cy="40" r="1.2" opacity="0.6"/>
    <circle cx="500" cy="70" r="1.6" opacity="0.9"/><circle cx="590" cy="120" r="1.3" opacity="0.7"/>
    <circle cx="430" cy="40" r="1.2" opacity="0.6"/><circle cx="300" cy="55" r="1.4" opacity="0.7"/>
    <circle cx="610" cy="230" r="1.4" opacity="0.6"/><circle cx="40" cy="150" r="1.2" opacity="0.5"/>
  </g>
  <circle cx="520" cy="150" r="120" fill="#3B4E8C" opacity="0.5" filter="url(#soft)"/>
  <!-- moon -->
  <circle cx="520" cy="150" r="92" fill="url(#moon)"/>
  <g fill="#B4A26E" opacity="0.4">
    <circle cx="500" cy="130" r="16"/><circle cx="548" cy="168" r="11"/><circle cx="510" cy="180" r="8"/>
  </g>

  <!-- long-shadowed couch (cut-paper, slightly 3D) -->
  <g filter="url(#ds)">
    <polygon points="46,300 300,300 300,360 46,360" fill="#5B2A6E"/>
    <polygon points="32,290 60,290 60,360 32,360" fill="#4A2159"/>
    <polygon points="46,290 300,290 286,278 60,278" fill="#6E357F"/>
  </g>
  <rect x="80" y="272" width="120" height="24" rx="12" fill="#F4ECD8"/>

  <!-- title -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" text-anchor="start">
    <text x="40" y="118" font-size="46" fill="#FF5A5F" letter-spacing="1">THE</text>
    <text x="40" y="176" font-size="72" fill="#F4ECD8" letter-spacing="-1">LONGEST</text>
    <text x="40" y="242" font-size="72" fill="#FFC24B" letter-spacing="-1">NIGHT</text>
    <rect x="43" y="256" width="150" height="6" fill="#2FB3A8"/>
    <text x="44" y="284" font-size="12" fill="#F4ECD8" opacity="0.85">IT IS 3:33 AM. IT HAS BEEN, FOR ELEVEN YEARS.</text>
  </g>

  <!-- a choice card, dimensional -->
  <g filter="url(#ds)" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900">
    <rect x="330" y="322" width="278" height="46" rx="10" fill="#F4ECD8"/>
    <rect x="338" y="333" width="26" height="26" rx="7" fill="#2FB3A8"/>
    <text x="351" y="351" font-size="15" fill="#14152B" text-anchor="middle">1</text>
    <text x="374" y="350" font-size="14" fill="#14152B">Take the moon's hand ›</text>
  </g>

  <rect width="640" height="400" fill="#000" opacity="0" filter="url(#grain)"/>
</svg>
