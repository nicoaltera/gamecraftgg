const BODY=s=>`${s}px Georgia,"Times New Roman",serif`;         // serif prose w/ character

let scale=1,offX=0,offY=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,3); const iw=innerWidth, ih=innerHeight;
  cv.width=iw*DPR; cv.height=ih*DPR; cv.style.width=iw+'px'; cv.style.height=ih+'px';

}
addEventListener('resize',resize); resize();
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hx(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]}
function mix(a,b,t){const A=hx(a),B=hx(b);return`rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`}
const TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints>0);

/* ============================ AUDIO ============================ */
let AC=null,master,padGain,padA,padB,padFilt,droneOsc,droneGain;
function initAudio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=.55; master.connect(AC.destination);
    padGain=AC.createGain(); padGain.gain.value=0;
    padFilt=AC.createBiquadFilter(); padFilt.type='lowpass'; padFilt.frequency.value=700; padFilt.Q.value=4;
    padGain.connect(padFilt); padFilt.connect(master);
    padA=AC.createOscillator(); padA.type='sawtooth'; padA.frequency.value=110;
    padB=AC.createOscillator(); padB.type='sawtooth'; padB.frequency.value=164; padB.detune.value=6;
    padA.connect(padGain); padB.connect(padGain); padA.start(); padB.start();
    droneGain=AC.createGain(); droneGain.gain.value=0;
    droneOsc=AC.createOscillator(); droneOsc.type='sine'; droneOsc.frequency.value=55;
    droneOsc.connect(droneGain); droneGain.connect(master); droneOsc.start();
  }catch(e){AC=null}
}
const pv=f=>f*(0.94+Math.random()*0.12);
function tone(f,dur,type,vol,slide,dl){
  if(!AC)return; const t=AC.currentTime+(dl||0), o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(pv(f),t);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t+dur);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.012);
  g.gain.exponentialRampToValueAtTime(.0008,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.03);
}
function noise(dur,f,vol,type){
  if(!AC)return; const t=AC.currentTime,len=Math.max(1,AC.sampleRate*dur|0),
  b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=b;
  const fl=AC.createBiquadFilter(); fl.type=type||'bandpass'; fl.frequency.value=pv(f);
  const g=AC.createGain(); g.gain.value=vol; s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
}
const sClick=()=>{tone(560,.09,'triangle',.16,120);noise(.03,1600,.06)};
const sConfirm=()=>{tone(440,.1,'triangle',.16,180);tone(660,.14,'sine',.12,0,.05)};
const sBack=()=>tone(300,.1,'sine',.13,-60);
const sHover=()=>tone(720,.04,'sine',.05);
const sPick=()=>{tone(330,.12,'triangle',.14);tone(494,.14,'sine',.1,0,.04)};
function sTwist(){[740,540,420,300].forEach((f,i)=>tone(f,.5,'sawtooth',.12,-40,i*.05));noise(.4,300,.12,'lowpass')}
function sDeath(){tone(140,.8,'sawtooth',.22,-70);noise(.6,180,.16,'lowpass');tone(90,1.1,'sine',.18,-30,.1)}
function sEscape(){[523,659,784,1047].forEach((f,i)=>tone(f,.4,'triangle',.16,0,i*.09))}
function sFanfare(){[392,523,659,784,1047,1319].forEach((f,i)=>tone(f,.5,'triangle',.15,0,i*.1));[196,262].forEach((f,i)=>tone(f,1.2,'sine',.1,0,i*.15))}
let curPad=null;
function setMood(m){
  if(!AC)return;
  const chords={ spooky:[110,146,220], tense:[98,131,155], absurd:[130,164,196],
    silly:[147,185,220], heartfelt:[131,165,196], dark:[73,98,110], gold:[131,196,262] };
  const c=chords[m]||chords.spooky;
  const t=AC.currentTime;
  padA.frequency.setTargetAtTime(c[0],t,.4); padB.frequency.setTargetAtTime(c[1],t,.4);
  padGain.gain.setTargetAtTime(.05,t,.6);
  padFilt.frequency.setTargetAtTime(m==='gold'?1600:m==='dark'?420:700,t,.8);
  const dr=(m==='tense'||m==='dark')?.12:(m==='spooky'?.05:0);
  droneGain.gain.setTargetAtTime(dr,t,.7);
  curPad=m;
}

/* ============================ GRAPH VERIFY (dev) ============================ */
function verifyGraph(){
  const ids=Object.keys(NODES); let issues=[];
  const endIds=new Set();
  for(const id of ids){const n=NODES[id];
    if(n.end){endIds.add(id); if(n.choices&&n.choices.length)issues.push(id+': ending has choices');}
    else{ if(!n.choices||!n.choices.length)issues.push(id+': non-ending has no choices');
      for(const c of (n.choices||[])) if(!NODES[c.to]) issues.push(id+' -> missing node "'+c.to+'"');}
  }
  // reachability from start (ignore item gates)
  const seen=new Set(['start']),q=['start'];
  while(q.length){const n=NODES[q.shift()]; for(const c of (n.choices||[])) if(NODES[c.to]&&!seen.has(c.to)){seen.add(c.to);q.push(c.to);}}
  for(const id of ids) if(!seen.has(id)) issues.push('unreachable: '+id);
  // termination: every node can reach an ending (backward BFS)
  const canEnd=new Set([...endIds]); let changed=true;
  while(changed){changed=false; for(const id of ids){ if(canEnd.has(id))continue;
    for(const c of (NODES[id].choices||[])) if(canEnd.has(c.to)){canEnd.add(id);changed=true;break;}}}
  for(const id of ids) if(!canEnd.has(id)) issues.push('cannot reach an ending: '+id);
  // each ending in registry exists as a node ending
  const nodeEndIds=new Set([...endIds].map(i=>NODES[i].end.id));
  for(const e of ENDINGS) if(!nodeEndIds.has(e.id)) issues.push('registry ending missing node: '+e.id);
  const report={nodes:ids.length,endings:endIds.size,reachable:seen.size,issues};
  if(issues.length) console.log('[graph] ISSUES',report); else console.log('[graph] OK — '+ids.length+' nodes, '+endIds.size+' endings, all reachable & terminating');
  return report;
}

/* ============================ DRAWING HELPERS ============================ */
function rr(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function poly(g,pts){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();}
function shadowOn(g,dx,dy,bl,al){g.shadowColor='rgba(6,4,14,'+(al==null?.45:al)+')';g.shadowBlur=bl==null?22:bl;g.shadowOffsetX=dx==null?16:dx;g.shadowOffsetY=dy==null?24:dy;}
function shadowOff(g){g.shadowColor='transparent';g.shadowBlur=0;g.shadowOffsetX=0;g.shadowOffsetY=0;}
/* extruded "cut-paper" block: side face then top face */
function block(g,pts,dx,dy,top,side){
  poly(g,pts.map(p=>[p[0]+dx,p[1]+dy])); g.fillStyle=side; g.fill();
  // connect near+far silhouette roughly by filling the shifted + connecting quads
  for(let i=0;i<pts.length;i++){const a=pts[i],b=pts[(i+1)%pts.length];
    poly(g,[[a[0],a[1]],[b[0],b[1]],[b[0]+dx,b[1]+dy],[a[0]+dx,a[1]+dy]]); g.fillStyle=side; g.fill();}
  poly(g,pts); g.fillStyle=top; g.fill();
}
function wrap(g,text,x,y,maxW,lh){
  const paras=text.split('\n'); let cy=y;
  for(const para of paras){
    const words=para.split(' '); let line='';
    for(const w of words){ const t=line?line+' '+w:w;
      if(g.measureText(t).width>maxW&&line){ g.fillText(line,x,cy); line=w; cy+=lh; } else line=t; }
    if(line){ g.fillText(line,x,cy); cy+=lh; }
    cy+=lh*.35;
  }
  return cy;
}
function measureWrap(g,text,maxW,lh){
  const paras=text.split('\n'); let n=0;
  for(const para of paras){ const words=para.split(' '); let line='',lines=1;
    for(const w of words){ const t=line?line+' '+w:w;
      if(g.measureText(t).width>maxW&&line){ lines++; line=w; } else line=t; }
    n+=lines; }
  return n;
}

function kindTag(k){return k==='escape'?'ESCAPE':k==='death'?'DEMISE':'TWIST'}

function drawPlay(){
  const g=ctx; btns.length=0;
  const pal=moodPal(node.mood);
  const e=ease(clamp(trans,0,1));
  // ---- full-bleed backdrop ----
  const bg=g.createLinearGradient(0,0,0,H); bg.addColorStop(0,pal.a); bg.addColorStop(1,mix(pal.b,'#000',.25));
  g.fillStyle=bg; g.fillRect(0,0,W,H);
  // ambient dust
  for(const d of DUST){ d.ph+=d.s*.02; const y=(d.y+Math.sin(now*.4+d.ph)*8); g.globalAlpha=.10+.10*Math.sin(now+d.ph); g.fillStyle=CREAM; g.beginPath(); g.arc(d.x,y,d.r,0,6.28); g.fill(); }
  g.globalAlpha=1;
  // ---- right tableau (parallax slide in) ----
  g.save();
  g.beginPath(); g.rect(500,0,460,H); g.clip();
  g.translate((1-e)*60,0);
  scene(node.art,pal);
  g.restore();
  // ---- left field with angled seam ----
  g.save();
  poly(g,[[0,0],[540,0],[500,H],[0,H]]);
  const lf=g.createLinearGradient(0,0,540,H); lf.addColorStop(0,mix(pal.a,'#000',.15)); lf.addColorStop(1,mix(pal.a,'#000',.42));
  g.fillStyle=lf; g.fill();
  // coral seam stripe
  poly(g,[[540,0],[548,0],[508,H],[500,H]]); g.fillStyle=pal.ac; g.fill();
  g.restore();
  // content slides in from left
  g.save(); g.translate(-40*(1-e),0); g.globalAlpha=e;
  const LX=44, MAXW=452;
  // location label
  g.fillStyle=pal.ac; g.font=DISP(11); g.textAlign='left'; g.fillText('3:33 AM  ·  THE LONGEST NIGHT',LX,40);
  g.fillStyle=CREAM; g.font=DISP(30);
  // label may be long; scale down if needed
  let ls=30; while(g.measureText(node.loc).width>MAXW&&ls>18){ls-=1;g.font=DISP(ls);}
  g.fillText(node.loc,LX,74);
  g.fillStyle=pal.ac; g.fillRect(LX,86,54,4);
  // prose
  const vc=visibleChoices(node);
  const cardH=Math.min(46,Math.max(38,(232)/vc.length - 8)); const gap=8;
  const choicesH=vc.length*cardH+(vc.length-1)*gap;
  const choicesTop=524-choicesH;
  g.fillStyle='rgba(244,236,216,.94)'; g.font=BODY(16.5);
  g.textBaseline='alphabetic';
  wrap(g,node.text,LX,120,MAXW,24);
  g.restore();
  // ---- choice cards (fade/slide staggered) ----
  g.font=DISP(15);
  for(let i=0;i<vc.length;i++){
    const c=vc[i]; const y=choicesTop+i*(cardH+gap);
    const st=ease(clamp((trans-.15-i*.06)/.5,0,1));
    if(st<=0) continue;
    const x=44 - (1-st)*30; const w=470; const al=st;
    const hov=(hoverBtn>=0&&btns[hoverBtn]&&btns[hoverBtn].ci===i);
    g.globalAlpha=al;
    shadowOn(g,hov?4:8,hov?6:11,hov?8:14,.4);
    rr(g,x,y,w,cardH,10); g.fillStyle=hov?CREAM:'rgba(244,236,216,.92)'; g.fill();
    shadowOff(g);
    if(hov){ g.strokeStyle=pal.ac; g.lineWidth=3; rr(g,x,y,w,cardH,10); g.stroke(); }
    // number badge
    g.fillStyle=pal.ac; rr(g,x+8,y+cardH/2-14,28,28,7); g.fill();
    g.fillStyle=INK; g.font=DISP(15); g.textAlign='center'; g.textBaseline='middle'; g.fillText(String(i+1),x+22,y+cardH/2+1);
    // label
    g.fillStyle=INK; g.font=DISP(cardH<42?13:14.5); g.textAlign='left';
    let lbl=c.label; while(g.measureText(lbl).width>w-58&&lbl.length>6){lbl=lbl.slice(0,-2);} if(lbl!==c.label)lbl=lbl.slice(0,-1)+'…';
    g.fillText(lbl,x+46,y+cardH/2+1);
    if(hov){ g.fillStyle=pal.ac; g.fillText('›',x+w-20,y+cardH/2+1); }
    g.textBaseline='alphabetic';

    if(st>.5) btns.push({x:44,y,w:470,h:cardH,ci:i,fn:()=>chooseChoice(c)});

    g.fillStyle=chalBeat?TEAL:AMBER;

    g.textAlign='left';
  }
  // first-time controls hint
  g.font=BODY(12.5); g.fillStyle='rgba(244,236,216,.7)'; g.textAlign='left';
  g.fillText(TOUCH?'Tap a choice · click your way out, find every ending':'Click a choice · or press 1–'+Math.min(9,vc.length)+' · find every way out',44,536);
}

function drawEnding(){
  const g=ctx; btns.length=0;
  const e=curEnd; endReveal=Math.min(1,endReveal+ .02);
  const isDeath=e.kind==='death';
  const pal=moodPal(isDeath?'dark':'gold');
  // dramatic bg
  const bg=g.createLinearGradient(0,0,0,H); bg.addColorStop(0,pal.a); bg.addColorStop(1,mix(pal.b,'#000',.2));
  g.fillStyle=bg; g.fillRect(0,0,W,H);
  // tableau behind (dim)
  g.save(); g.globalAlpha=.5; g.beginPath(); g.rect(0,0,W,H); g.clip(); scene(NODES[cur].art,moodPal(NODES[cur].mood)); g.restore();
  g.fillStyle=isDeath?'rgba(10,8,18,.72)':'rgba(20,10,4,.64)'; g.fillRect(0,0,W,H);
  const cx=W/2;
  // celebrate: confetti drifting down (not over the title)
  if(celebrate>0){ celebrate=Math.max(0,celebrate-1/60);
    const prog=1.4-celebrate;
    for(let i=0;i<44;i++){ const cxp=(i*97)%W; const yy=(((i*53)%H)+prog*440)%(H+40)-20;
      g.globalAlpha=Math.min(1,celebrate*.9); g.fillStyle=[CORAL,AMBER,TEAL,ROSE,CREAM][i%5];
      g.save(); g.translate(cxp,yy); g.rotate(now*4+i); g.fillRect(-3,-3,6,6); g.restore(); }
    g.globalAlpha=1;
  }
  g.textAlign='center';
  // NEW ENDING banner
  if(endNew){ const p=.7+.3*Math.sin(now*5); g.globalAlpha=Math.min(1,endReveal*2)*p; g.fillStyle=AMBER; g.font=DISP(22); g.fillText('★ NEW ENDING DISCOVERED ★',cx,84); g.globalAlpha=1; }
  // kind tag
  g.globalAlpha=Math.min(1,endReveal*2);
  g.fillStyle=kindCol(e.kind); g.font=DISP(15);
  g.fillText((e.secret?'SECRET ':'')+kindTag(e.kind)+(e.kind==='escape'?' — YOU GOT OUT':e.kind==='death'?' — YOU DID NOT':' — WELL, THEN'),cx,120);
  // ending name (big, may wrap)
  let ns=54; g.font=DISP(ns); while(g.measureText(e.name).width>W-120&&ns>26){ns-=2;g.font=DISP(ns);}
  g.fillStyle='rgba(0,0,0,.6)'; g.fillText(e.name,cx+3,179);
  g.fillStyle=CREAM; g.fillText(e.name,cx,176);
  g.fillStyle=kindCol(e.kind); g.fillRect(cx-70,192,140,5);
  g.globalAlpha=1;
  // ending prose (capped; long endings fade behind the bottom band)
  g.fillStyle='rgba(244,236,216,.96)'; g.font=BODY(15.5); g.textAlign='center';
  const lines=[]; NODES[cur].text.split('\n').forEach(p=>{ let line=''; p.split(' ').forEach(w=>{const t=line?line+' '+w:w; if(g.measureText(t).width>780&&line){lines.push(line);line=w;}else line=t;}); lines.push(line); lines.push(''); });
  let ly=224; const shown=Math.floor(endReveal*lines.length*1.4);
  for(let i=0;i<lines.length&&i<shown;i++){ if(ly>426)break; g.fillText(lines[i],cx,ly); ly+=lines[i]?22:9; }
  // bottom band so long prose fades out cleanly behind the stats + buttons
  const band=g.createLinearGradient(0,418,0,H); band.addColorStop(0,'rgba(0,0,0,0)'); band.addColorStop(.28,isDeath?'rgba(10,8,18,.94)':'rgba(20,10,4,.94)'); band.addColorStop(1,mix(pal.b,'#000',.42));
  g.fillStyle=band; g.fillRect(0,418,W,H-418);
  // stats
  g.font=DISP(15); g.fillStyle=AMBER; g.textAlign='center';
  g.fillText('ENDINGS FOUND   '+foundCount()+' / '+N_ENDINGS,cx,456);
  g.font=BODY(13.5); g.fillStyle='rgba(244,236,216,.82)';
  let sub='reached in '+endClicks+' click'+(endClicks===1?'':'s');
  if(e.kind==='escape'&&save.bestClicks) sub+='   ·   fastest escape: '+save.bestClicks+' clicks';
  g.fillText(sub,cx,475);
  if(cTarget&&chalBeat){ g.fillStyle=TEAL; g.font=DISP(11.5); g.fillText('DARE MET — ESCAPED IN ≤ '+cTarget+' CLICKS',cx,491); }
  // buttons
  const bw=228,bh=38,y2=498;
  drawButton(g,cx-bw-8,y2,bw,bh,'EXPLORE AGAIN  ⏎',CORAL,()=>{restart();sConfirm();},pal);
  drawButton(g,cx+8,y2,bw,bh,'ENDINGS  '+foundCount()+'/'+N_ENDINGS+'  ⇥',NAVY,()=>{mode='collection';sClick();},pal);
  g.textAlign='left';
}
function drawButton(g,x,y,w,h,label,col,fn,pal){
  const hov=(hoverBtn>=0&&btns[hoverBtn]&&btns[hoverBtn].bx===x&&btns[hoverBtn].by===y);
  shadowOn(g,hov?3:6,hov?5:9,hov?7:12,.45); rr(g,x,y,w,h,10); g.fillStyle=hov?mix(col,'#fff',.12):col; g.fill(); shadowOff(g);
  g.fillStyle=CREAM; g.font=DISP(15); g.textAlign='center'; g.textBaseline='middle'; g.fillText(label,x+w/2,y+h/2+1); g.textBaseline='alphabetic'; g.textAlign='left';
  btns.push({x,y,w,h,bx:x,by:y,fn});
}

function drawCollection(){
  const g=ctx; btns.length=0;
  const bg=g.createLinearGradient(0,0,0,H); bg.addColorStop(0,INK); bg.addColorStop(1,NAVY);
  g.fillStyle=bg; g.fillRect(0,0,W,H);
  stars(g,moodPal('spooky'),40,3);
  g.textAlign='center';
  g.fillStyle=CREAM; g.font=DISP(34); g.fillText('WAYS OUT OF THE LONGEST NIGHT',W/2,58);
  g.fillStyle=AMBER; g.font=DISP(18); g.fillText(foundCount()+' / '+N_ENDINGS+' DISCOVERED',W/2,86);
  const cols=2, cw=430, ch=64, gx=(W-cols*cw-30)/2, gy=110;
  for(let i=0;i<ENDINGS.length;i++){
    const e=ENDINGS[i]; const got=save.found[e.id];
    const x=gx+(i%cols)*(cw+30), y=gy+Math.floor(i/cols)*(ch+12);
    shadowOn(g,5,7,10,.4); rr(g,x,y,cw,ch,10); g.fillStyle=got?'rgba(244,236,216,.94)':'rgba(244,236,216,.08)'; g.fill(); shadowOff(g);
    if(got){
      g.fillStyle=kindCol(e.kind); rr(g,x,y,8,ch,4); g.fill();
      g.textAlign='left'; g.fillStyle=INK; g.font=DISP(18); g.fillText(e.name,x+22,y+30);
      g.fillStyle=kindCol(e.kind); g.font=DISP(11); g.fillText((e.secret?'★ SECRET  ·  ':'')+kindTag(e.kind),x+22,y+50);
    }else{
      g.textAlign='left'; g.fillStyle='rgba(244,236,216,.5)'; g.font=DISP(18);
      g.fillText(e.secret?'??? — a secret way':'??? — undiscovered',x+22,y+30);
      g.fillStyle='rgba(244,236,216,.3)'; g.font=DISP(11); g.fillText('keep exploring',x+22,y+50);
    }
  }
  g.textAlign='center';
  drawButton(g,W/2-115,H-52,230,40,'BACK  ⇥ / ESC',CORAL,()=>{mode='ending';sClick();},moodPal('spooky'));
  g.textAlign='left';
}

/* ============================ LOOP ============================ */
let last=0;
function frame(ts){
  const dt=Math.min(.033,(ts-last)/1000||.016); last=ts; now+=dt;
  if(trans<1) trans=Math.min(1,trans+dt*2.4);
  const g=ctx;
  g.save();
  g.fillStyle=INK; g.fillRect(0,0,innerWidth,innerHeight);
  g.translate(offX,offY); g.scale(scale,scale);
  g.beginPath(); g.rect(0,0,W,H); g.clip();
  if(mode==='splash') drawSplash();
  else if(mode==='play') drawPlay();
  else if(mode==='ending') drawEnding();
  else if(mode==='collection') drawCollection();
  g.restore();
  requestAnimationFrame(frame);
}
verifyGraph();
requestAnimationFrame(frame);
parent.postMessage({gs:'ready'},'*');
</script>
