<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
  html,body{margin:0;padding:0;height:100%;background:#3A2E47;overflow:hidden}
  canvas{display:block;touch-action:none;-webkit-user-select:none;user-select:none}

<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============ BEST IN SHOW — GameSight ============ */
const SLUG='best-in-show', W=960, H=540;
/* palette */
const LB='#3A2E47', SKY='#FFE1C4', GRASS='#8FD98A', CREAM='#FFF3E0', COAT='#F6E4C6',
      TAN='#E4B884', PINK='#FF8FB0', ROSE='#FF5C6C', GOLD='#FFC94D', INK='#5B4A6A', BLUE='#8AD0EA',
      GRASSD='#79C776', SKY2='#FFD0A8';
const FONT=s=>`900 ${s}px "Chalkboard SE","Comic Neue","Segoe Print","Marker Felt",sans-serif`;
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let scale=1,offX=0,offY=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,3), iw=innerWidth, ih=innerHeight;
  cv.width=Math.max(1,iw*dpr); cv.height=Math.max(1,ih*dpr); cv.style.width=iw+'px'; cv.style.height=ih+'px';
  scale=Math.min(iw/W,ih/H); offX=(iw-W*scale)/2; offY=(ih-H*scale)/2;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize',resize); resize();
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hx(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]}
function lc(a,b,t){const A=hx(a),B=hx(b);return`rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`}
const TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
/* ---------- audio ---------- */
let AC=null,master;
function initAudio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=.5; master.connect(AC.destination);
  }catch(e){AC=null}
}
const pv=f=>f*(0.94+Math.random()*0.12);
function tone(f,dur,type,vol,slide,dly){
  if(!AC)return; const t=AC.currentTime+(dly||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(pv(f),t);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.03);
}
function noiseB(dur,f,vol,type){
  if(!AC)return; const t=AC.currentTime,len=Math.max(1,AC.sampleRate*dur|0),
  b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=b;
  const fl=AC.createBiquadFilter(); fl.type=type||'bandpass'; fl.frequency.value=pv(f); fl.Q.value=.7;
  const g=AC.createGain(); g.gain.value=vol;
  s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
}
const sYip=()=>{tone(680,.09,'square',.14,420);setTimeout(()=>tone(900,.07,'square',.1,260),55)};
const sTick=()=>tone(1500,.03,'sine',.09);
const sPop=()=>tone(1000,.09,'triangle',.13,500);
function sGood(n){tone([523,659,784][n%3],.16,'triangle',.2,60)}
function sPerfect(){[784,1047,1319].forEach((f,i)=>tone(f,.2,'triangle',.2,0,i*.05))}
function sShow(){[659,880,1047,1319,1568].forEach((f,i)=>tone(f,.24,'triangle',.22,0,i*.06));noiseB(.3,3000,.12,'highpass')}
function sFlop(){[300,240,180,150].forEach((f,i)=>tone(f,.22,'sawtooth',.14,0,i*.11))}
function sBrush(){noiseB(.07,2400,.09,'highpass')}
function sOoh(){tone(440,.4,'sine',.12,120);tone(660,.4,'sine',.08,120)}
function sCoin(){tone(988,.09,'square',.16);setTimeout(()=>tone(1319,.14,'square',.14),70)}
function sJingle(){[784,988,1319,1568,1319,1568].forEach((f,i)=>tone(f,.22,'triangle',.2,0,i*.09))}
function sApplause(dur){
  if(!AC)return; const t=AC.currentTime,len=Math.max(1,AC.sampleRate*dur|0),
  b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++){const env=Math.min(1,i/(len*.15))*(1-i/len);d[i]=(Math.random()*2-1)*env}
  const s=AC.createBufferSource(); s.buffer=b;
  const fl=AC.createBiquadFilter(); fl.type='bandpass'; fl.frequency.value=1800; fl.Q.value=.5;
  const g=AC.createGain(); g.gain.value=.5;
  s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
}
/* ---------- save ---------- */
let save={coins:0,own:{},best:0,shows:0,tier:0};
try{const s=localStorage.getItem('gs_save:'+SLUG); if(s)save=Object.assign(save,JSON.parse(s))}catch(e){}
function persist(){try{localStorage.setItem('gs_save:'+SLUG,JSON.stringify(save));localStorage.setItem('gs_best:'+SLUG,String(Math.round(save.best)))}catch(e){}}
addEventListener('message',e=>{if(e.data&&e.data.gs==='reset'){try{localStorage.removeItem('gs_save:'+SLUG);localStorage.removeItem('gs_best:'+SLUG)}catch(_){} location.reload()}});
/* ---------- shop ---------- */
const SHOP=[
 // id, name, cost, cat, desc
 ['jump','Learn: JUMP',15,'trick','A new trick! JUMP cues join your routines · big points'],
 ['bow_red','Cherry Bow',20,'acc','A cute ear bow · +5% judge charm'],
 ['brush2','Pro Grooming Brush',30,'groom','Brush 45% faster — GROOM cues are a breeze'],
 ['hat_sun','Sun Hat',45,'acc','Sweet straw hat · +12% wider timing windows'],
 ['fluff','Fluff & Puff',55,'groom','A fluffier coat · +6% base charm'],
 ['bow','Learn: TAKE A BOW',60,'trick','Fancy trick cue · worth 35% more points'],
 ['bowtie','Dapper Bow Tie',70,'acc','So distinguished · +8% all points'],
 ['steady','Steady Paws',80,'groom','Trained balance · much wider POSE window'],
 ['glasses','Cool Shades',90,'acc','Effortlessly cool · flubs cost half the points'],
 ['shine','Shampoo Shine',100,'groom','A glossy coat · +8% judge charm'],
 ['crown_flower','Flower Crown',110,'acc','Blooming adorable · +10% showstopper points'],
 ['metronome','Metronome Collar',130,'groom','Feel the beat · wider trick timing windows'],
 ['dance','Learn: DANCE',140,'trick','Showstopper trick — the highest-value cue'],
 ['harness','Showstopper Harness',150,'acc','Bold! Showstoppers +50%, but safe tricks −10%'],
 ['collar_gem','Sparkle Collar',180,'acc','Dazzling · showstoppers wow ALL three judges'],
 ['cape','Champion Cape',320,'acc','Regal finale flair · +15% to every point'],
];
function owns(id){return !!save.own[id]}
function stats(){const o=save.own;return{
  winMul:(o.hat_sun?1.12:1)*(o.metronome?1.16:1),
  poseWide:o.steady?0.16:0,
  brushRate:1*(o.brush2?1.45:1),
  charm:1+(o.bow_red?0.05:0)+(o.fluff?0.06:0)+(o.shine?0.08:0),
  ptMul:(o.bowtie?1.08:1)*(o.cape?1.15:1),
  showMul:2.5*(o.crown_flower?1.1:1)*(o.harness?1.5:1),
  safeMul:o.harness?0.9:1,
  flopMul:o.glasses?0.5:1,
  gemAll:!!o.collar_gem
}}
/* ---------- tiers ---------- */
const TIERS=[
 {name:'PUPPY FAIR',   sub:'your very first show',   mult:1.00, approach:1.42, winMul:1.15, sky0:'#FFE9CF',sky1:'#FFC9B0',ring:'#9BE096'},
 {name:'TOWN SHOW',    sub:'the local crowd',        mult:1.30, approach:1.22, winMul:1.05, sky0:'#FFE1C4',sky1:'#FFBE9E',ring:'#8FD98A'},
 {name:'REGIONAL',     sub:'pickier judges',         mult:1.65, approach:1.06, winMul:0.98, sky0:'#FFDDC8',sky1:'#F7A7C0',ring:'#86D48E'},
 {name:'NATIONAL',     sub:'the big leagues',        mult:2.05, approach:0.94, winMul:0.90, sky0:'#E9D6FF',sky1:'#FFB3C8',ring:'#7FCE97'},
 {name:'BEST IN SHOW', sub:'the grand championship', mult:2.55, approach:0.84, winMul:0.84, sky0:'#FFE7B8',sky1:'#FFB0C8',ring:'#8EDBA0'},
];
const JUDGES=[
 {name:'Beatrix', col:'#F7A8C4', hat:'#E86A98', kind:'glasses'},
 {name:'Percival',col:'#A8D8B0', hat:'#5FAE73', kind:'monocle'},
 {name:'Duchess', col:'#A9C7F0', hat:'#5B7FD6', kind:'tophat'},
];
/* ---------- tricks ---------- */
const TRICK={
 sit:{name:'SIT',val:1.00,key:'1'},
 spin:{name:'SPIN',val:1.10,key:'2'},
 jump:{name:'JUMP',val:1.22,key:'3'},
 bow:{name:'BOW',val:1.42,key:'4'},
 dance:{name:'DANCE',val:1.65,key:'5'},
};
function tricksAvail(){const a=['sit','spin'];if(owns('jump'))a.push('jump');if(owns('bow'))a.push('bow');if(owns('dance'))a.push('dance');return a}
/* ---------- challenge ---------- */
const cParam=parseInt(new URLSearchParams(location.search).get('c'),10);
const cTarget=(isFinite(cParam)&&cParam>0)?cParam:0;
let cBeat=false;
/* ---------- state ---------- */
let phase='title'; // title | walkin | cue | react | result | shop
let now=0, shake=0, hitstop=0, flash=0, flashCol='#fff';
let curTier=clamp(save.tier,0,TIERS.length-1);
let routine=[], ci=0, activeCue=null, reactT=0, walkT=0, finT=0, resultT=0, shopScroll=0;
let score=0, dispScore=0, jd=[8,8,8], combo=0, bestCombo=0, perfects=0, showstops=0, flubs=0;
let advanced=false, coinsEarned=0, rosette=0, targetScore=0;
let lastScorePost=0, inputLock=0, buyFlash=0, buyMsg='';
let pupX=W/2, pupY=386, pupPose='idle', pupPT=0, pupSq=1, pupWag=0, pupBlink=0, pupMood=0;
let spaceHeld=false, hints={};
let btns=[];
const PUPX0=W/2, PUPY0=386;
/* particles / hearts / floaters (pooled-ish) */
let parts=[], floats=[];
function part(x,y,vx,vy,life,r,col,g,shape){if(parts.length<300)parts.push({x,y,vx,vy,life,tl:life,r,col,g:g||0,shape:shape||'circle',rot:Math.random()*6.28,vr:(Math.random()-.5)*8})}
function floater(x,y,txt,col,big){floats.push({x,y,txt,col,t:0,big:!!big})}
function burst(x,y,n,cols,shape){for(let i=0;i<n;i++){const a=Math.random()*6.28,sp=80+Math.random()*220;part(x,y,Math.cos(a)*sp,Math.sin(a)*sp-60,.6+Math.random()*.5,4+Math.random()*5,cols[i%cols.length],380,shape)}}
function hearts(x,y,n){for(let i=0;i<n;i++)part(x+(Math.random()*30-15),y,(Math.random()*80-40),-70-Math.random()*90,.9+Math.random()*.5,7+Math.random()*5,i%2?PINK:ROSE,-40,'heart')}
function sparkles(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,sp=60+Math.random()*180;part(x,y,Math.cos(a)*sp,Math.sin(a)*sp,.5+Math.random()*.5,4+Math.random()*4,i%2?GOLD:'#FFF',0,'star')}}
/* ---------- routine generation ---------- */
function genRoutine(){
  const t=curTier, T=TIERS[t], rng=mulberry32(((save.shows+1)*2654435761 ^ (t+1)*40503)>>>0);
  const tr=tricksAvail();
  const n=4+t; // 4..8
  const types=new Array(n).fill('trick');
  // place a pose
  types[1+((rng()*(n-1))|0)]='pose';
  // place groom from town show up
  if(t>=1){let gi;do{gi=(rng()*n)|0}while(types[gi]!=='trick');types[gi]='groom';}
  if(t>=3){let pi;do{pi=(rng()*n)|0}while(types[pi]!=='trick');types[pi]='pose';}
  const seq=[]; let lastTrick='';
  for(let i=0;i<n;i++){
    const ramp=1-0.06*(i/Math.max(1,n-1)); // subtle in-run speed ramp (M4)
    const ap=T.approach*ramp*(0.96+rng()*0.08);
    if(types[i]==='trick'){
      let tk; let guard=0;
      do{tk=tr[(rng()*tr.length)|0];guard++}while(tk===lastTrick&&tr.length>1&&guard<8);
      lastTrick=tk;
      const focus=(rng()<0.5)?(rng()*3|0):-1;
      seq.push({type:'trick',trick:tk,approach:ap,focus,val:TRICK[tk].val,showEligible:true});
    }else if(types[i]==='pose'){
      seq.push({type:'pose',approach:Math.max(1.0,ap+0.15),focus:(rng()*3|0)});
      lastTrick='';
    }else{
      seq.push({type:'groom',approach:Math.max(1.1,ap+0.3),focus:(rng()*3|0)});
      lastTrick='';
    }
  }
  return seq;
}
/* ---------- show flow ---------- */
function startShow(tier){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  curTier=clamp(tier,0,TIERS.length-1);
  routine=genRoutine();
  score=0; dispScore=0; combo=0; bestCombo=0; perfects=0; showstops=0; flubs=0;
  jd=[8,8,8]; advanced=false; cBeat=false;
  const T=TIERS[curTier];
  targetScore=Math.round((4+curTier)*50*T.mult);
  ci=0; activeCue=null; phase='walkin'; walkT=0;
  pupX=-60; pupY=PUPY0; pupPose='trot'; pupPT=0; pupSq=1; pupMood=0;
  sJingle();
}
function beginCues(){ci=0; setupCue(0); phase='cue';}
function setupCue(i){
  activeCue=routine[i];
  const c=activeCue;
  c.start=now; c.beat=now+c.approach; c.resolved=false; c.armed=false;
  c.holding=false; c.started=false; c.fill=0; c.q=null;
  if(c.type==='pose'||c.type==='groom')c.deadline=c.start+c.approach+1.4;
  else c.deadline=c.beat+0.30*stats().winMul+0.06;
  pupPose='alert'; pupPT=0;
  if(c.type==='trick')sTick();
}
function nextCue(){
  ci++;
  if(ci>=routine.length){doFinale();return;}
  setupCue(ci); phase='cue';
}
function addScore(pts){
  score=Math.max(0,score+pts);
  const nm=now;
  if(nm-lastScorePost>0.25){lastScorePost=nm;parent.postMessage({gs:'score',score:Math.round(score)},'*');}
  if(cTarget&&!cBeat&&score>=cTarget){cBeat=true;parent.postMessage({gs:'challenge_beaten',score:Math.round(score)},'*');
    floater(W/2,150,'TARGET SMASHED!',GOLD,true);burst(W/2,180,26,[GOLD,ROSE,PINK],'star');sJingle();}
}
function delight(c,base){
  const st=stats(); base*=st.charm;
  for(let j=0;j<3;j++){
    let add=base;
    if(c.gemShow)add=base; // full to all
    else if(j===c.focus)add=base*1.6; else add=base*0.7;
    jd[j]=Math.min(100,jd[j]+add);
  }
}
function resolveCue(c,q,pts,kind){
  if(c.resolved)return; c.resolved=true; c.q=q;
  const st=stats();
  addScore(Math.round(pts));
  const good=(q!=='flop');
  const jx=W/2, jy=110;
  if(q==='show'){
    showstops++; combo++; c.gemShow=st.gemAll; delight(c,30);
    pupPose=c.trick||'pose'; pupPT=0; pupMood=2;
    hitstop=.07; shake=Math.min(10,shake+7); flash=.4; flashCol='#FFF7DE';
    burst(pupX,pupY-40,34,[GOLD,'#FFF',ROSE,PINK],'star'); hearts(jx,jy,8); sparkles(pupX,pupY-30,14);
    floater(pupX,pupY-120,'SHOWSTOPPER!',GOLD,true);
    sShow(); sApplause(.9);
  }else if(good){
    combo++;
    if(q==='perfect'){perfects++; delight(c,20); sPerfect(); floater(pupX,pupY-115,'PERFECT!','#FFF',true);
      burst(pupX,pupY-40,16,[GOLD,'#FFF',BLUE],'star'); hearts(jx,jy,5); flash=.2; flashCol='#FFFDEE';}
    else if(q==='good'){delight(c,14); sGood(combo); floater(pupX,pupY-110,'NICE!',BLUE); hearts(jx,jy,3); burst(pupX,pupY-40,8,[BLUE,'#FFF'],'star');}
    else if(q==='clean'){delight(c,16); sPerfect(); floater(pupX,pupY-110,'ALL CLEAN!','#FFF'); hearts(jx,jy,4); sparkles(pupX,pupY-30,10);}
    else{delight(c,8); sGood(combo); floater(pupX,pupY-110,'OK!',INK); hearts(jx,jy,2);}
    if(c.type==='trick'){pupPose=c.trick;}
    else if(c.type==='pose'){pupPose='pose';}
    else{pupPose='wag';}
    pupPT=0; pupMood=1; shake=Math.min(6,shake+2.5);
  }else{
    flubs++; combo=0;
    pupPose='flop'; pupPT=0; pupMood=-1;
    hitstop=.05; shake=Math.min(8,shake+4);
    burst(pupX,pupY-10,10,['#C9B8A0','#E4D3B8'],'circle');
    part(pupX,pupY-90,0,-40,1.2,20,'#FFF',0,'star'); // dizzy pop
    floater(pupX,pupY-110,['OOPS!','WHOOPS!','SILLY PUP!','A LEAF?!'][flubs%4],ROSE);
    sFlop();
  }
  if(combo>bestCombo)bestCombo=combo;
  reactT=(good?0.72:0.85)-curTier*0.02; phase='react';
}
/* quality point helpers */
function qPts(c,q){const st=stats();const base={perfect:100,good:66,ok:40,clean:88}[q];
  return base*(c.val||1)*st.ptMul*TIERS[curTier].mult*st.charm*((c.type==='trick')?st.safeMul:1)}
function showPts(c){const st=stats();return 100*(c.val||1)*st.showMul*st.ptMul*TIERS[curTier].mult*st.charm}
function flopPts(){const st=stats();return -16*st.flopMul}
/* ---------- inputs on cues ---------- */
function attemptTrick(tid){
  if(phase!=='cue'||!activeCue||activeCue.type!=='trick'||activeCue.resolved)return;
  const c=activeCue, st=stats(), wm=st.winMul, e=Math.abs(now-c.beat);
  hints.trick=true;
  if(tid!==c.trick){ resolveCue(c,'flop',flopPts(),'wrong'); return; }
  if(c.armed){
    const w=0.12*wm;
    if(e<=w) resolveCue(c,'show',showPts(c),'show');
    else resolveCue(c,'flop',flopPts(),'showmiss');
  }else{
    const pf=0.075*wm, gd=0.17*wm, ok=0.30*wm;
    if(e<=pf) resolveCue(c,'perfect',qPts(c,'perfect'),'trick');
    else if(e<=gd) resolveCue(c,'good',qPts(c,'good'),'trick');
    else if(e<=ok) resolveCue(c,'ok',qPts(c,'ok'),'trick');
    else resolveCue(c,'flop',flopPts(),'mistime');
  }
}
function armShow(){
  if(phase!=='cue'||!activeCue||activeCue.type!=='trick'||activeCue.resolved||activeCue.armed)return;
  if(now>activeCue.beat-0.03)return; // must commit before the beat
  activeCue.armed=true; hints.show=true; sYip();
  sparkles(pupX,pupY-30,8);
}
function ctxDown(){
  if(phase!=='cue'||!activeCue)return;
  const c=activeCue;
  if(c.type==='pose'){c.holding=true;c.started=true;hints.pose=true;}
  else if(c.type==='groom'){c.holding=true;c.started=true;hints.groom=true;}
}
function ctxUp(){
  if(phase!=='cue'||!activeCue)return;
  const c=activeCue;
  if(c.type==='pose'&&c.holding&&!c.resolved){releasePose(c);}
  else if(c.type==='groom'){c.holding=false;}
}
function releasePose(c){
  c.holding=false;
  const st=stats(); const g0=0.70-st.poseWide, g1=0.90+st.poseWide, f=c.fill;
  if(f>=g0&&f<=g1) resolveCue(c,'perfect',qPts(c,'perfect'),'pose');
  else if(f>=g0-0.16&&f<g0) resolveCue(c,'good',qPts(c,'good'),'pose');
  else if(f>g1) resolveCue(c,'good',qPts(c,'good'),'pose');
  else if(f>=0.32) resolveCue(c,'ok',qPts(c,'ok'),'pose');
  else resolveCue(c,'flop',flopPts(),'poseEarly');
}
/* ---------- finale ---------- */
function doFinale(){
  const bonus=perfects*14+showstops*28+bestCombo*4;
  score+=bonus;
  const ratio=score/Math.max(1,targetScore);
  advanced=ratio>=1.0 && curTier<TIERS.length-1;
  rosette = ratio>=2.2?4 : ratio>=1.5?3 : ratio>=1.0?2 : ratio>=0.6?1 : 0;
  coinsEarned=Math.max(3, Math.round(score/10)+(ratio>=1?10:0)+rosette*3);
  save.coins+=coinsEarned;
  save.best=Math.max(save.best,Math.round(score));
  save.shows++;
  if(advanced)save.tier=Math.min(TIERS.length-1,Math.max(save.tier,curTier+1));
  persist();
  parent.postMessage({gs:'gameover',score:Math.round(score)},'*');
  phase='result'; resultT=0; pupPose='wag'; pupPT=0; inputLock=0.35;
  sApplause(1.6); setTimeout(sJingle,300);
  if(rosette>=2){for(let i=0;i<40;i++)part(Math.random()*W,-10,Math.random()*40-20,60+Math.random()*120,2+Math.random()*1.5,4+Math.random()*5,[ROSE,GOLD,PINK,BLUE,'#FFF'][i%5],120,i%3?'circle':'star');}

/* ---------- update ---------- */
function update(dt){
  now+=dt;
  if(inputLock>0)inputLock-=dt;
  shake=Math.max(0,shake-dt*26); flash=Math.max(0,flash-dt*2.2); buyFlash=Math.max(0,buyFlash-dt);
  pupPT+=dt; pupWag+=dt*(pupMood>0?14:8); pupBlink-=dt; if(pupBlink<-0.05)pupBlink=1.8+Math.random()*2;
  pupSq+=(1-pupSq)*Math.min(1,10*dt);
  if(pupMood!==0&&pupPT>1.1)pupMood= (phase==='result')?1:0;
  dispScore+=(score-dispScore)*Math.min(1,12*dt);
  // particles
  for(let i=parts.length-1;i>=0;i--){const q=parts[i];q.life-=dt;if(q.life<=0){parts[i]=parts[parts.length-1];parts.pop();continue}q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=q.g*dt;q.vx*=0.99;q.rot+=q.vr*dt}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.t+=dt;f.y-=dt*36;if(f.t>1.2)floats.splice(i,1)}
  // judge meters settle a touch
  if(phase==='cue'||phase==='react'){for(let j=0;j<3;j++)jd[j]=Math.max(0,jd[j]-dt*1.2)}
  if(phase==='walkin'){
    walkT+=dt; pupX=lerp(-60,PUPX0,clamp(walkT/1.1,0,1)); pupPose='trot';
    if(walkT>1.5){pupX=PUPX0;beginCues();}
  }else if(phase==='cue'){
    pupX+=(PUPX0-pupX)*Math.min(1,8*dt); pupY+=(PUPY0-pupY)*Math.min(1,8*dt);
    const c=activeCue, st=stats();
    if(c.type==='trick'){
      if(!c.resolved && now>c.deadline){ resolveCue(c,'flop',flopPts(),'noinput'); }
    }else if(c.type==='pose'){
      if(c.holding){c.fill+=dt/1.35; if(c.fill>=1.0){ resolveCue(c,'flop',flopPts(),'topple'); }}
      else if(!c.started && now>c.deadline){ resolveCue(c,'flop',flopPts(),'noPose'); }
      else if(c.started && !c.holding && now>c.deadline){ resolveCue(c,'flop',flopPts(),'noPose'); }
      // gentle wobble while holding
      if(c.holding)pupPose='poseHold';
    }else if(c.type==='groom'){
      if(c.holding){c.fill+=dt*st.brushRate/1.05; if((now*40|0)%3===0)sBrush(); part(pupX-24+Math.random()*48,pupY-70,0,-30,.4,3,'#EFE0C0',0,'circle');
        if(c.fill>=1.0){ resolveCue(c,'clean',qPts(c,'clean'),'groom'); }}
      if(now>c.deadline&&!c.resolved){
        if(c.fill>=0.6)resolveCue(c,'ok',qPts(c,'ok'),'groom');
        else resolveCue(c,'flop',flopPts(),'leaf');
      }
      pupPose= c.holding?'sit':'alert';
    }
  }else if(phase==='react'){
    pupX+=(PUPX0-pupX)*Math.min(1,6*dt);
    reactT-=dt; if(reactT<=0)nextCue();
  }else if(phase==='result'){
    resultT+=dt;
    for(let j=0;j<3;j++)jd[j]=Math.min(100, jd[j] + (rosette>=2?dt*18:dt*4));
  }else if(phase==='title'){
    pupPose='idle';
  }
}

function roundRect(g,x,y,w,h,r){r=Math.min(r,w/2,h/2);g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath()}
function drawHeart(g,x,y,s,col){g.fillStyle=col;g.beginPath();g.moveTo(x,y+s*.35);g.bezierCurveTo(x,y-s*.15,x-s,y-s*.15,x-s,y+s*.28);g.bezierCurveTo(x-s,y+s*.7,x,y+s*.95,x,y+s*1.15);g.bezierCurveTo(x,y+s*.95,x+s,y+s*.7,x+s,y+s*.28);g.bezierCurveTo(x+s,y-s*.15,x,y-s*.15,x,y+s*.35);g.fill()}
function drawStar(g,x,y,r,col,rot){g.fillStyle=col;g.save();g.translate(x,y);g.rotate(rot||0);g.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;g.lineTo(Math.cos(a)*r,Math.sin(a)*r);const b=a+Math.PI/5;g.lineTo(Math.cos(b)*r*.45,Math.sin(b)*r*.45)}g.closePath();g.fill();g.restore()}
function drawRosette(g,x,y,r,tier){
  const cols=[['#EFE9DC','#CFC6B4'],[GOLD,'#E7A93B'],[ROSE,'#D23A4E'],[BLUE,'#4E86D8'],['#FFD86B','#F0A62E']][tier];
  // tails
  g.fillStyle=cols[1];
  g.beginPath();g.moveTo(x-r*.4,y+r*.5);g.lineTo(x-r*.8,y+r*1.9);g.lineTo(x-r*.1,y+r*1.4);g.closePath();g.fill();
  g.beginPath();g.moveTo(x+r*.4,y+r*.5);g.lineTo(x+r*.8,y+r*1.9);g.lineTo(x+r*.1,y+r*1.4);g.closePath();g.fill();
  // pleats
  g.fillStyle=cols[0];
  for(let i=0;i<14;i++){const a=i/14*6.28;g.beginPath();g.moveTo(x,y);g.arc(x,y,r*1.28,a-.28,a+.28);g.closePath();g.fill()}
  g.fillStyle=cols[1];g.beginPath();g.arc(x,y,r*.92,0,6.28);g.fill();
  g.fillStyle=cols[0];g.beginPath();g.arc(x,y,r*.62,0,6.28);g.fill();
  g.fillStyle=cols[1];g.font=FONT(r*.72);g.textAlign='center';g.textBaseline='middle';
  g.fillText(tier>=4?'★':(tier>=1?'1':'•'),x,y+r*.04);g.textBaseline='alphabetic';
}

/* ---- control layout ---- */
function padLayout(){
  const tr=tricksAvail(), n=tr.length, pw=Math.min(150,(W-60)/n)-12, gap=12;
  const total=n*pw+(n-1)*gap, x0=(W-total)/2, y=H-92, h=76;
  const r=[];for(let i=0;i<n;i++)r.push({x:x0+i*(pw+gap),y,w:pw,h,trick:tr[i],idx:i});return r;
}

  save.coins-=s[2]; save.own[s[0]]=1; persist();
  sCoin();setTimeout(sJingle,120); buyFlash=1.1; buyMsg='✦ '+s[1]+'! ✦';
  burst(W-96,150,16,[GOLD,PINK,ROSE,'#FFF'],'star'); pupMood=1; pupPT=0;
}
/* ---- main draw ---- */
function draw(){
  btns.length=0;
  const g=ctx;
  g.save();
  g.fillStyle=LB;g.fillRect(0,0,innerWidth,innerHeight);
  g.translate(offX,offY);g.scale(scale,scale);
  g.beginPath();g.rect(0,0,W,H);g.clip();
  const shx=shake?(Math.random()*2-1)*shake:0, shy=shake?(Math.random()*2-1)*shake:0;
  g.save();g.translate(shx,shy);
  drawBackground(g);
  // pup shadow
  g.fillStyle='rgba(91,74,106,.18)';g.beginPath();g.ellipse(pupX,PUPY0+52,44,12,0,0,6.28);g.fill();
  drawPup(g,pupPose,pupPT);
  if(phase==='cue'||phase==='react')drawCueUI(g);
  // particles
  for(const q of parts){g.globalAlpha=clamp(q.life/q.tl,0,1);
    if(q.shape==='heart')drawHeart(g,q.x,q.y,q.r,q.col);
    else if(q.shape==='star')drawStar(g,q.x,q.y,q.r,q.col,q.rot);
    else{g.fillStyle=q.col;g.beginPath();g.arc(q.x,q.y,q.r,0,6.28);g.fill()}
  }
  g.globalAlpha=1;
  // floaters
  for(const f of floats){const a=clamp(1-(f.t-0.7)/0.5,0,1)*clamp(f.t*5,0,1);g.globalAlpha=a;
    g.textAlign='center';g.font=FONT(f.big?30:20);g.fillStyle='rgba(91,74,106,.5)';g.fillText(f.txt,f.x+2,f.y+2);
    g.fillStyle=f.col;g.fillText(f.txt,f.x,f.y);g.globalAlpha=1}
  g.restore(); // shake
  // HUD + controls
  if(phase==='cue'||phase==='react'){drawTrickPads(g);drawContextButton(g);drawCueUI2Focus(g);}
  if(phase!=='title')drawHUD(g);
  if(phase==='cue')drawFirstTimeHint(g);
  if(phase==='walkin'){g.textAlign='center';const a=clamp(walkT*3,0,1)*clamp((1.5-walkT)*3,0,1);g.globalAlpha=a;
    g.fillStyle='rgba(91,74,106,.85)';roundRect(g,W/2-190,H/2-56,380,96,18);g.fill();
    g.fillStyle='#FFF';g.font=FONT(34);g.fillText(TIERS[curTier].name,W/2,H/2-8);
    g.fillStyle=GOLD;g.font=FONT(16);g.fillText(TIERS[curTier].sub,W/2,H/2+20);g.globalAlpha=1}
  // flash
  if(flash>0){g.globalAlpha=flash;g.fillStyle=flashCol;g.fillRect(0,0,W,H);g.globalAlpha=1}
  if(phase==='title')drawTitle(g);
  if(phase==='result')drawResult(g);
  if(phase==='shop'){drawShop(g);
    // preview pup with accessories inside shop box
    g.save();g.translate(W-96,205);g.scale(1.15,1.15);
    const sx=pupX,sy=pupY;pupX=0;pupY=0;const sp=pupPose;pupPose='idle';
    // draw locally
    drawPupAt(g,0,-6);
    pupPose=sp;pupX=sx;pupY=sy;g.restore();
  }
  g.restore();
}
function drawCueUI2Focus(){} // placeholder (focus handled in judge draw)
// helper to draw pup at local origin for previews
function drawPupAt(g,lx,ly){
  const sx=pupX,sy=pupY;pupX=lx;pupY=ly;
  drawPup(g,pupPose,pupPT);
  pupX=sx;pupY=sy;
}
/* ---------- input ---------- */
function toGame(e){return{x:(e.clientX-offX)/scale,y:(e.clientY-offY)/scale}}
function hitBtn(p){for(let i=btns.length-1;i>=0;i--){const b=btns[i];if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){if(b.tag==='ctx'){ctxDown();ctxActive=true;return true}if(b.fn){b.fn();return true}return true}}return false}
let ctxActive=false;
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();initAudio();if(AC&&AC.state==='suspended')AC.resume();window.focus();
  const p=toGame(e);
  if(phase==='title'){startShow(curTier);return}
  if(inputLock>0&&(phase==='result'))return;
  hitBtn(p);
});
function pUp(e){ if(ctxActive){ctxUp();ctxActive=false} }
cv.addEventListener('pointerup',e=>{e.preventDefault();pUp(e)});
cv.addEventListener('pointercancel',pUp);
const KEYS=['1','2','3','4','5',' ','Enter','f','F','n','N','s','S','b','B'];
addEventListener('keydown',e=>{
  if(KEYS.includes(e.key))e.preventDefault();
  if(e.repeat){if(e.key===' '&&!spaceHeld){/*noop*/}return}
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if(phase==='title'){startShow(curTier);return}
  if(phase==='cue'){
    if(e.key>='1'&&e.key<='5'){const tr=tricksAvail(),idx=+e.key-1;if(tr[idx])attemptTrick(tr[idx]);return}
    if(e.key==='f'||e.key==='F'){armShow();return}
    if(e.key===' '){if(!spaceHeld){spaceHeld=true;ctxDown()}return}
    return;
  }
  if(phase==='result'){
    if(inputLock>0)return;
    if(e.key===' '||e.key==='Enter'){startShow(curTier);return}
    if(e.key==='n'||e.key==='N'){if(save.tier>curTier)startShow(curTier+1);return}
    if(e.key==='s'||e.key==='S'){phase='shop';shopScroll=0;return}
  }
  if(phase==='shop'){
    if(e.key===' '||e.key==='Enter'||e.key==='b'||e.key==='B'||e.key==='Escape'){phase='result';return}
  }
});
addEventListener('keyup',e=>{
  if(e.key===' '){spaceHeld=false;ctxUp()}
});
addEventListener('blur',()=>{spaceHeld=false;if(ctxActive){ctxUp();ctxActive=false}
  if(phase==='cue'&&activeCue&&activeCue.holding&&activeCue.type==='groom')activeCue.holding=false;});
/* ---------- loop ---------- */
let last=0;
function frame(ts){
  const dt=Math.min(.033,(ts-last)/1000||.016);last=ts;
  update(dt);draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
parent.postMessage({gs:'ready'},'*');
</script>
</body>
