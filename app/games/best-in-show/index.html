const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function hx(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]}
function lc(a,b,t){const A=hx(a),B=hx(b);return`rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`}

/* ---------- audio ---------- */
let AC=null,master;
function initAudio(){ if(AC)return;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=.5;master.connect(AC.destination);}catch(e){AC=null}
}
const pv=f=>f*(0.94+Math.random()*0.12);
function tone(f,dur,type,vol,slide,dly){
  if(!AC)return; const t=AC.currentTime+(dly||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(pv(f),t);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+.03);
}
function noiseB(dur,f,vol,type){
  if(!AC)return; const t=AC.currentTime,len=Math.max(1,AC.sampleRate*dur|0),
  b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=b;
  const fl=AC.createBiquadFilter(); fl.type=type||'bandpass'; fl.frequency.value=pv(f); fl.Q.value=.7;
  const g=AC.createGain(); g.gain.value=vol;
  s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
}
function applause(dur,vol){
  if(!AC)return; const t=AC.currentTime,len=Math.max(1,AC.sampleRate*dur|0),
  b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++){const env=Math.min(1,i/(len*.15))*(1-i/len);d[i]=(Math.random()*2-1)*env}
  const s=AC.createBufferSource(); s.buffer=b;
  const fl=AC.createBiquadFilter(); fl.type='bandpass'; fl.frequency.value=1800; fl.Q.value=.5;
  const g=AC.createGain(); g.gain.value=vol||.5;
  s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
}

function tricksAvail(){const a=['sit'];if(owns('spin'))a.push('spin');if(owns('jump'))a.push('jump');if(owns('bow'))a.push('bow');if(owns('dance'))a.push('dance');return a}
/* ---------- save ---------- */
let save={dog:null,coins:0,xp:0,level:1,champ:0,shows:0,bestShow:0,

function persist(){try{save.lastT=Date.now();localStorage.setItem('gs_save:'+SLUG,JSON.stringify(save));localStorage.setItem('gs_best:'+SLUG,String(Math.round(save.champ)))}catch(e){}}
addEventListener('message',e=>{if(e.data&&e.data.gs==='reset'){try{localStorage.removeItem('gs_save:'+SLUG);localStorage.removeItem('gs_best:'+SLUG)}catch(_){}location.reload()}});

(function(){if(save.dog){const el=clamp((Date.now()-(save.lastT||Date.now()))/1000,0,900);const d=el*0.05;save.m.happy=clamp(save.m.happy-d*1.1,25,100);save.m.energy=clamp(save.m.energy-d*0.9,25,100);save.m.clean=clamp(save.m.clean-d*0.8,25,100);}})();

/* level thresholds */
function xpForLevel(l){return 24+ (l-1)*18 + Math.floor((l-1)*(l-1)*3);}
function addXP(n){ if(!save.dog)return; save.xp+=n; let up=false;
  while(save.xp>=xpForLevel(save.level)){save.xp-=xpForLevel(save.level);save.level++;up=true;}
  if(up){levelUpFX();}
}
/* ---------- breed traits ---------- */
function trait(){const t=save.dog?BREEDS.find(b=>b.id===save.dog).trait:'';return{
  happyDecay:t==='happy'?0.72:1, energyDecay:t==='energy'?0.66:1, cleanDecay:t==='groom'?0.66:1,
  charm:t==='charm'?1.10:1, playBonus:t==='energy'?1.2:1
}}

function charm(){const o=save.own;let c=trait().charm;
  if(o.bow_red)c+=.06; if(o.bandana)c+=.08; if(o.hat_sun)c+=.10; if(o.bowtie)c+=.12;
  if(o.crown_flower)c+=.15; if(o.collar_gem)c+=.18; if(o.cape)c+=.22; return c;}
function winMul(){return save.own.collar_gem?1.15:1;}
function flopMul(){return save.own.glasses?0.5:1;}
function brushRate(){let r=1*(save.own.brush2?2:1);if(trait().cleanDecay<1)r*=1.15;return r;}
function playBonus(){let b=trait().playBonus;if(save.own.frisbee)b*=1.6;else if(save.own.ball)b*=1.3;return b;}

let parts=[], floats=[];
function part(x,y,vx,vy,life,r,col,g,shape){if(parts.length<340)parts.push({x,y,vx,vy,life,tl:life,r,col,g:g||0,shape:shape||'circle',rot:Math.random()*6.28,vr:(Math.random()-.5)*8})}

function burst(x,y,n,cols,shape){for(let i=0;i<n;i++){const a=Math.random()*6.28,sp=80+Math.random()*220;part(x,y,Math.cos(a)*sp,Math.sin(a)*sp-60,.6+Math.random()*.5,4+Math.random()*5,cols[i%cols.length],380,shape)}}
function hearts(x,y,n){for(let i=0;i<n;i++)part(x+(Math.random()*30-15),y,(Math.random()*80-40),-70-Math.random()*90,.9+Math.random()*.5,7+Math.random()*5,i%2?PINK:ROSE,-40,'heart')}
function sparkles(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,sp=60+Math.random()*180;part(x,y,Math.cos(a)*sp,Math.sin(a)*sp,.5+Math.random()*.5,4+Math.random()*4,i%2?GOLD:'#FFF',0,'star')}}
function bubbles(x,y,n){for(let i=0;i<n;i++)part(x+(Math.random()*50-25),y+(Math.random()*30-15),(Math.random()*40-20),-40-Math.random()*60,.7+Math.random()*.5,4+Math.random()*6,'rgba(190,235,255,.9)',-30,'bubble')}

function refreshSmudges(){

function feed(treat){
  let cost, hp, en, name;
  if(treat==='meal'){cost=5;hp=6;en=30;name='Meal';}
  else{const t=TREATS.find(x=>x[0]===treat); if(!t)return;
    if((save.stock[treat]||0)<=0)return; save.stock[treat]--; cost=0; hp=t[3]; en=t[4]; name=t[1];}
  if(cost){ if(save.coins<cost){overlay('Not enough coins for a meal — win a show!',1.6);sFlop();return;} save.coins-=cost; }
  save.m.energy=clamp(save.m.energy+en,0,100); save.m.happy=clamp(save.m.happy+hp,0,100);
  save.m.clean=clamp(save.m.clean-3,0,100);

}

/* ---------- show ---------- */
let showTier=0, sRoutine=[], sIdx=0, sCue=null, sScore=0, sDisp=0, sReact=0, sWalk=0, sPhase='';

let lastScorePost=0, resInput=0, ribbon=0, coinsWon=0, champWon=0, sTargetLocal=0;
function canEnter(t){return titleIdx(save.champ)>=SHOWS[t].req;}
function startShow(t){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  const S=SHOWS[t];
  if(save.coins<S.fee){overlay('Entry fee is '+S.fee+' coins — win a smaller show first!',1.8);sFlop();return;}
  save.coins-=S.fee;
  showTier=t; sTargetLocal=S.target;
  const avg=(save.m.happy+save.m.energy+save.m.clean)/3;
  careMult=clamp(0.7+0.7*(avg/100),0.7,1.4);
  const rng=mulberry32(((save.shows+1)*2654435761 ^ (t+1)*40503)>>>0);
  const tr=tricksAvail();
  const struts=4+t; sRoutine=[];
  for(let i=0;i<struts;i++)sRoutine.push({type:'strut',approach:1.28-t*0.06});
  // splice in a pose ~middle and a trick finale
  sRoutine.splice(2+((rng()*2)|0),0,{type:'pose',approach:1.2});
  sRoutine.push({type:'trick',trick:tr[(rng()*tr.length)|0],approach:1.2-t*0.05,showElig:true});
  sScore=0; sDisp=0; sIdx=0; sCue=null; sPerf=0; sShowstop=0; sFlub=0; sCombo=0; sBestCombo=0; cBeat=false;
  sPhase='walkin'; sWalk=0; dgX=-60; dgY=HOMEY; pose='trot'; pt=0; mood=1; phase='show';
  sJingle();
}
function beginShowCues(){sIdx=0; setupCue(0); sPhase='cue';}
function setupCue(i){
  sCue=sRoutine[i]; const c=sCue;
  c.start=now; c.beat=now+c.approach; c.resolved=false; c.armed=false; c.holding=false; c.started=false; c.fill=0; c.q=null;
  if(c.type==='pose')c.deadline=c.start+c.approach+1.6;
  else c.deadline=c.beat+0.32*winMul()+0.06;
  pose='alert'; pt=0; if(c.type!=='pose')sTick();
}
function nextCue(){sIdx++; if(sIdx>=sRoutine.length){finishShow();return;} setupCue(sIdx); sPhase='cue';}
function addShowScore(p){ sScore=Math.max(0,sScore+p);
  const nm=now; if(nm-lastScorePost>0.25){lastScorePost=nm;parent.postMessage({gs:'score',score:Math.round(sScore*careMult)},'*');}
  const shown=Math.round(sScore*careMult);

function qStrut(q){const b={perfect:60,great:40,ok:24}[q];return b*charm();}

function tapTrick(tid){

  else{ if(e<=0.08*w)resolveCue(c,'perfect',qPts(c,'perfect'));
    else if(e<=0.18*w)resolveCue(c,'great',qPts(c,'great'));

function finishShow(){

  champWon=Math.round(S.cham*clamp(ratio,0.25,2.2));
  coinsWon=Math.max(4,Math.round(finalShow/9)+ribbon*4);
  save.coins+=coinsWon; save.champ+=champWon; save.shows++;

  save.m.happy=clamp(save.m.happy+ (ribbon>=2?10:2),0,100);
  addXP(10+ribbon*6);
  const newTitle=titleIdx(save.champ);
  const oldTitle=titleIdx(save.champ-champWon);

  parent.postMessage({gs:'gameover',scores:{champ:Math.round(save.champ),show:finalShow}},'*');

  else{phase='result';resultT=0;}

/* ---------- update ---------- */
function update(dt){
  now+=dt;
  shake=Math.max(0,shake-dt*26); flash=Math.max(0,flash-dt*2.2);
  xpFlash=Math.max(0,xpFlash-dt); overlayT=Math.max(0,overlayT-dt); welcomeT=Math.max(0,welcomeT-dt);
  if(resInput>0)resInput-=dt;
  pt+=dt; wag+=dt*(mood>0?14:8); blink-=dt; if(blink<-0.05)blink=1.8+Math.random()*2.6;
  sq+=(1-sq)*Math.min(1,10*dt);
  if(mood!==0&&pt>1.2&&phase!=='result')mood= (save.dog&&save.m.happy<35)?-1:0;
  // particles
  for(let i=parts.length-1;i>=0;i--){const q=parts[i];q.life-=dt;if(q.life<=0){parts[i]=parts[parts.length-1];parts.pop();continue}q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=q.g*dt;q.vx*=0.99;q.rot+=q.vr*dt}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.t+=dt;f.y-=dt*34;if(f.t>1.2)floats.splice(i,1)}
  if(phase==='home'){
    // gentle decay
    const tr=trait();
    save.m.happy=clamp(save.m.happy-dt*0.55*tr.happyDecay,0,100);
    save.m.energy=clamp(save.m.energy-dt*0.42*tr.energyDecay,0,100);
    save.m.clean=clamp(save.m.clean-dt*0.34*tr.cleanDecay*(save.own.shampoo?0.6:1),0,100);
    refreshSmudges();
    // happiness dividend — constant small gains
    const avg=(save.m.happy+save.m.energy+save.m.clean)/3;
    if(avg>52){coinAcc+=dt*0.11*(avg/100)*(1+save.level*0.05);
      if(coinAcc>=1){const g=Math.floor(coinAcc);coinAcc-=g;save.coins+=g;floater(dgX+30,dgY-70,'+'+g,GOLD);sCoin();}}
    // dog mood from meters
    if(save.m.happy<32)mood=-1; else if(mood<0)mood=0;
    // resting pose
    if(!playAnim && pose!=='munch'){ pose = save.m.happy<32?'sad':(save.m.energy<24?'sleep':'idle'); }
    // play animation
    if(playAnim){const p=playAnim;p.t+=dt;
      // ball arcs out then dog fetches
      if(p.phase===0){ p.bx=lerp(dgX,dgX+180,clamp(p.t/0.5,0,1)); p.by=dgY-20-Math.sin(clamp(p.t/0.5,0,1)*Math.PI)*90; pose='trot'; dgX+=(HOMEX-dgX)*Math.min(1,6*dt);
        if(p.t>0.5){p.phase=1;p.t=0;} }
      else if(p.phase===1){ dgX=lerp(HOMEX,HOMEX+150,clamp(p.t/0.6,0,1)); pose='trot'; hearts(dgX,dgY-30,Math.random()<0.3?1:0);
        if(p.t>0.6){p.phase=2;p.t=0;} }
      else if(p.phase===2){ dgX=lerp(HOMEX+150,HOMEX,clamp(p.t/0.7,0,1)); pose='wag'; p.bx=dgX; p.by=dgY-4;
        if(p.t>0.7){playAnim=null;dgX=HOMEX;pose='wag';pt=0;mood=2;hearts(dgX,dgY-40,4);floater(dgX,dgY-100,'woof!',ROSE);} }
    } else dgX+=(HOMEX-dgX)*Math.min(1,6*dt);
  }else if(phase==='show'){
    if(sPhase==='walkin'){sWalk+=dt;dgX=lerp(-60,HOMEX,clamp(sWalk/1.1,0,1));pose='trot';if(sWalk>1.4){dgX=HOMEX;beginShowCues();}}
    else if(sPhase==='cue'){
      dgX+=(HOMEX-dgX)*Math.min(1,8*dt);
      const c=sCue;
      if(c.type==='strut'){ if(!c.resolved&&now>c.deadline)resolveCue(c,'flop',flopPts()); pose= now>c.beat-0.15?'trot':'alert'; }
      else if(c.type==='trick'){ if(!c.resolved&&now>c.deadline)resolveCue(c,'flop',flopPts()); }
      else if(c.type==='pose'){
        if(c.holding){c.fill+=dt/1.5;pose='poseHold';if(c.fill>=1.02)resolveCue(c,'flop',flopPts());}

      }
    }else if(sPhase==='react'){ dgX+=(HOMEX-dgX)*Math.min(1,6*dt); sReact-=dt; if(sReact<=0)nextCue(); }

  }else if(phase==='result'){ resultT+=dt; pose='wag'; }
  else if(phase==='title'){ celT+=dt; }
  else if(phase==='pick'){ pose='idle'; }
}

    g.textAlign='center';g.fillStyle=INK;g.font=FONT(22);g.fillText(b.name,x+cw/2,y+192);
    const tags={happy:'Cheerful',groom:'Glossy Coat',charm:'Show Charmer',energy:'Boundless'};
    g.fillStyle=ROSE;g.font=FONT(13);g.fillText('★ '+tags[b.trait],x+cw/2,y+212);
    g.fillStyle=INKL;g.font=FONT(11);wrap(g,b.blurb,x+cw/2,y+230,cw-24,14);
    g.restore();
    btns.push({x,y,w:cw,h:ch,fn:(k=>()=>pickDog(k))(i),tag:'pick'});
  }
  g.fillStyle=INKL;g.font=FONT(13);g.textAlign='center';g.fillText('Feed · brush · play · then compete at dog shows to climb from Novice to Supreme Legend.',W/2,H-24);
}
function wrap(g,txt,cx,y,maxw,lh){const words=txt.split(' ');let line='',yy=y;for(const w of words){const t=line+w+' ';if(g.measureText(t).width>maxw&&line){g.fillText(line.trim(),cx,yy);line=w+' ';yy+=lh;}else line=t;}g.fillText(line.trim(),cx,yy);}
function pickDog(i){const b=BREEDS[i];save.dog=b.id;CO=b;save.coins=25;save.m={happy:75,energy:75,clean:70};save.own={};save.stock={};save.level=1;save.xp=0;save.champ=0;save.shows=0;save.bestShow=0;
  persist();phase='home';mode='pet';welcomeT=6;dgX=HOMEX;pose='wag';pt=0;mood=2;hearts(HOMEX,dgY-40,6);sJingle();initAudio();if(AC&&AC.state==='suspended')AC.resume();}
/* ---- shared particle/floater draw ---- */
function drawParticles(g){for(const q of parts){g.globalAlpha=clamp(q.life/q.tl,0,1);
  if(q.shape==='heart')drawHeart(g,q.x,q.y,q.r,q.col);
  else if(q.shape==='star')drawStar(g,q.x,q.y,q.r,q.col,q.rot);
  else if(q.shape==='bubble'){g.strokeStyle=q.col;g.lineWidth=1.5;g.beginPath();g.arc(q.x,q.y,q.r,0,6.28);g.stroke();g.fillStyle='rgba(255,255,255,.5)';g.beginPath();g.arc(q.x-q.r*.3,q.y-q.r*.3,q.r*.3,0,6.28);g.fill();}
  else if(q.shape==='square'){g.save();g.translate(q.x,q.y);g.rotate(q.rot);g.fillStyle=q.col;g.fillRect(-q.r,-q.r*.6,q.r*2,q.r*1.2);g.restore();}
  else{g.fillStyle=q.col;g.beginPath();g.arc(q.x,q.y,q.r,0,6.28);g.fill();}}
  g.globalAlpha=1;}
function drawFloaters(g){for(const f of floats){const a=clamp(1-(f.t-0.7)/0.5,0,1)*clamp(f.t*5,0,1);g.globalAlpha=a;
  g.textAlign='center';g.font=FONT(f.big?28:19);g.fillStyle='rgba(107,88,118,.4)';g.fillText(f.txt,f.x+2,f.y+2);g.fillStyle=f.col;g.fillText(f.txt,f.x,f.y);}g.globalAlpha=1;}
function drawOverlayMsg(g){if(overlayT<=0)return;const a=clamp(overlayT,0,1);g.globalAlpha=a;g.fillStyle='rgba(107,88,118,.92)';g.font=FONT(14);g.textAlign='center';const wd=Math.min(720,g.measureText(overlayMsg).width+34);roundRect(g,W/2-wd/2,H-118,wd,36,12);g.fill();g.fillStyle='#FFF';g.fillText(overlayMsg,W/2,H-95);g.globalAlpha=1;}
/* ---- growth from level ---- */
function computeGrow(){gGrow=0.86+Math.min(save.level,14)*0.024; drawGrow=gGrow;}
/* ---- main draw ---- */
function draw(){
  btns.length=0; const g=ctx;
  g.save();g.fillStyle=LB;g.fillRect(0,0,innerWidth,innerHeight);
  g.translate(offX,offY);g.scale(scale,scale);g.beginPath();g.rect(0,0,W,H);g.clip();
  const shx=shake?(Math.random()*2-1)*shake:0,shy=shake?(Math.random()*2-1)*shake:0;
  g.save();g.translate(shx,shy);
  if(save.dog)computeGrow();
  if(phase==='pick')drawPick(g);
  else if(phase==='home')drawHome(g);
  else if(phase==='shop')drawShop(g);
  else if(phase==='showsel')drawShowSel(g);
  else if(phase==='show')drawShowUI(g);
  else if(phase==='result')drawResult(g);
  else if(phase==='title')drawTitleCeleb(g);
  g.restore();
  g.restore();
}
/* ---------- input ---------- */
function toGame(e){return{x:(e.clientX-offX)/scale,y:(e.clientY-offY)/scale}}
function onDogArea(p){return Math.hypot(p.x-dgX,p.y-(dgY-20))<80*drawGrow;}
function hitBtn(p){for(let i=btns.length-1;i>=0;i--){const b=btns[i];if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
  if(b.tag==='pose'){poseDown();poseActive=true;return true}
  if(b.tag==='strut'){tapBeat();return true}
  if(b.fn){b.fn();return true}return true}}return false}
let poseActive=false;
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();initAudio();if(AC&&AC.state==='suspended')AC.resume();window.focus();
  const p=toGame(e);ptrDown=true;ptrX=p.x;ptrY=p.y;
  if(phase==='title'){finishCeleb();return;}
  if(phase==='home'){
    // feed tray click-away
    if(feedOpen){ if(!hitBtn(p)){feedOpen=false;} return; }
    if(hitBtn(p))return;
    if(onDogArea(p)){ if(mode==='brush')brushAt(p.x,p.y); else petAt(p.x,p.y); return; }
    return;
  }
  hitBtn(p);
});
cv.addEventListener('pointermove',e=>{
  if(!ptrDown)return; const p=toGame(e);ptrX=p.x;ptrY=p.y;
  if(phase==='home'&&onDogArea(p)){ if(mode==='brush')brushAt(p.x,p.y); else petAt(p.x,p.y); }
});
function pUp(e){ptrDown=false; if(poseActive){poseUp();poseActive=false;}}
cv.addEventListener('pointerup',e=>{e.preventDefault();pUp(e)});
cv.addEventListener('pointercancel',pUp);
const KEYS=['1','2','3','4','5',' ','Enter','f','F','h','H','s','S','b','B','Escape','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
let spaceHeld=false;
addEventListener('keydown',e=>{
  if(KEYS.includes(e.key))e.preventDefault();
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if(e.repeat)return;
  if(phase==='title'){finishCeleb();return;}
  if(phase==='show'){
    const c=sCue;
    if(sPhase==='cue'&&c){
      if(c.type==='strut'){if(e.key===' '||e.key==='Enter'){tapBeat();return;}}
      if(c.type==='trick'){if(e.key>='1'&&e.key<='5'){const tr=tricksAvail(),idx=+e.key-1;if(tr[idx])tapTrick(tr[idx]);return;}if(e.key==='f'||e.key==='F'){armShow();return;}}
      if(c.type==='pose'){if(e.key===' '&&!spaceHeld){spaceHeld=true;poseDown();return;}}
    }
    return;
  }
  if(phase==='result'){ if(e.key===' '||e.key==='Enter'){if(resInput<=0)phase='showsel';return;} if(e.key==='h'||e.key==='H'){phase='home';return;} if(e.key==='s'||e.key==='S'){phase='shop';return;} }
  else if(phase==='shop'||phase==='showsel'){ if(e.key==='Escape'||e.key===' '||e.key==='b'||e.key==='B'){phase='home';return;} }
});
addEventListener('keyup',e=>{ if(e.key===' '){spaceHeld=false;if(poseActive){poseUp();poseActive=false;}} });
addEventListener('blur',()=>{spaceHeld=false;if(poseActive){poseUp();poseActive=false;}ptrDown=false;});
function finishCeleb(){ if(celT<0.7)return; phase='result'; resultT=0; resInput=0.35; }
/* ---------- loop ---------- */
let last=0;
function frame(ts){
  const dt=Math.min(.033,(ts-last)/1000||.016);last=ts;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
parent.postMessage({gs:'ready'},'*');
</script>
</body>
</html>
