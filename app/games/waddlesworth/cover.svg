<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FD2E5"/>
      <stop offset="0.72" stop-color="#A5E3EF"/>
      <stop offset="1" stop-color="#FFD9A0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#sky)"/>
  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="470" cy="70" r="26"/><circle cx="498" cy="76" r="20"/><circle cx="444" cy="78" r="18"/>
    <circle cx="150" cy="52" r="20"/><circle cx="172" cy="58" r="15"/>
  </g>
  <!-- sea -->
  <rect y="300" width="640" height="100" fill="#0E3A4C"/>
  <path d="M0 300 Q20 294 40 300 T80 300 T120 300 T160 300 T200 300 T240 300 T280 300 T320 300 T360 300 T400 300 T440 300 T480 300 T520 300 T560 300 T600 300 T640 300 V310 H0 Z" fill="#1D6E86"/>
  <!-- whale + spout -->
  <path d="M470 322 Q520 268 570 322 Z" fill="#1E4A5E"/>
  <path d="M512 276 Q504 220 510 190 L534 190 Q540 220 532 276 Z" fill="#E4F6FA" opacity="0.9"/>
  <ellipse cx="522" cy="184" rx="34" ry="14" fill="#E4F6FA" opacity="0.9"/>
  <!-- cliff -->
  <path d="M0 150 L150 178 Q168 240 152 310 L0 310 Z" fill="#F7FBFD"/>
  <path d="M150 178 Q168 240 152 310 L108 310 Q128 244 122 182 Z" fill="#D2EEF5"/>
  <!-- colony watchers -->
  <g>
    <ellipse cx="46" cy="158" rx="11" ry="15" fill="#26343E"/><ellipse cx="46" cy="162" rx="7" ry="10" fill="#F7FBFD"/><path d="M43 148 L50 151 L43 154 Z" fill="#F49B33"/>
    <ellipse cx="82" cy="164" rx="11" ry="15" fill="#26343E"/><ellipse cx="82" cy="168" rx="7" ry="10" fill="#F7FBFD"/><path d="M79 154 L86 157 L79 160 Z" fill="#F49B33"/>
  </g>
  <!-- judge with card -->
  <g>
    <rect x="30" y="330" width="52" height="54" rx="8" fill="#FFFFFF" stroke="#FF6B57" stroke-width="4"/>
    <text x="56" y="366" font-family="Chalkboard SE, Comic Neue, Segoe Print, sans-serif" font-size="26" font-weight="900" fill="#FF6B57" text-anchor="middle">9.8</text>
  </g>
  <!-- gold fish arc -->
  <g fill="#FFC94D">
    <ellipse cx="330" cy="262" rx="12" ry="7"/><path d="M318 262 L308 256 L308 268 Z"/>
    <ellipse cx="368" cy="240" rx="12" ry="7"/><path d="M356 240 L346 234 L346 246 Z"/>
    <ellipse cx="406" cy="256" rx="12" ry="7"/><path d="M394 256 L384 250 L384 262 Z"/>
  </g>
  <!-- Waddlesworth -->
  <g transform="translate(268,170) rotate(-14)">
    <ellipse cx="14" cy="-8" rx="34" ry="14" transform="rotate(38 14 -8)" fill="#B08D55"/>
    <ellipse cx="0" cy="0" rx="40" ry="54" fill="#26343E"/>
    <ellipse cx="8" cy="8" rx="26" ry="38" fill="#F7FBFD"/>
    <ellipse cx="-22" cy="-10" rx="36" ry="15" transform="rotate(-32 -22 -10)" fill="#C8A46B"/>
    <path d="M32 -28 L64 -20 L32 -12 Z" fill="#F49B33"/>
    <circle cx="20" cy="-30" r="10" fill="#FFFFFF"/><circle cx="23" cy="-30" r="4.6" fill="#26343E"/>
  </g>
  <!-- motion lines -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.7">
    <line x1="180" y1="150" x2="228" y2="156"/><line x1="170" y1="178" x2="222" y2="182"/><line x1="186" y1="206" x2="230" y2="206"/>
  </g>
  <!-- title -->
  <g font-family="Chalkboard SE, Comic Neue, Segoe Print, sans-serif" font-weight="900" text-anchor="middle">
    <text x="322" y="62" font-size="46" fill="#0E3A4C" opacity="0.35">WADDLESWORTH</text>
    <text x="320" y="58" font-size="46" fill="#FFFFFF">WADDLESWORTH</text>
    <text x="321" y="102" font-size="34" fill="#FF6B57">WILL FLY</text>
  </g>
</svg>