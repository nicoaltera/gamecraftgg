<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B132B"/>
      <stop offset="1" stop-color="#1C2541"/>
    </linearGradient>
    <radialGradient id="bubble" cx="35%" cy="30%" r="75%">
      <stop offset="0" stop-color="#BFEFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#4CC9F0" stop-opacity="0.95"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="640" height="48" fill="#FF4D4D" opacity="0.08"/>

  <!-- background scatter bubbles -->
  <g opacity="0.35">
    <circle cx="70" cy="330" r="20" fill="url(#bubble)"/>
    <circle cx="150" cy="80" r="14" fill="url(#bubble)"/>
    <circle cx="560" cy="300" r="26" fill="url(#bubble)"/>
    <circle cx="480" cy="70" r="16" fill="url(#bubble)"/>
    <circle cx="600" cy="140" r="10" fill="url(#bubble)"/>
  </g>

  <!-- large bubble (about to split) -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="245" r="52" fill="url(#bubble)"/>
    <ellipse cx="182" cy="222" rx="15" ry="8" fill="#FFFFFF" opacity="0.7" transform="rotate(-25 182 222)"/>
  </g>

  <!-- two medium split children scattering outward -->
  <g filter="url(#shadow)">
    <circle cx="330" cy="200" r="33" fill="url(#bubble)"/>
    <ellipse cx="318" cy="185" rx="10" ry="5.5" fill="#FFFFFF" opacity="0.7" transform="rotate(-25 318 185)"/>
  </g>
  <g filter="url(#shadow)">
    <circle cx="300" cy="310" r="33" fill="url(#bubble)"/>
    <ellipse cx="288" cy="295" rx="10" ry="5.5" fill="#FFFFFF" opacity="0.7" transform="rotate(-25 288 295)"/>
  </g>

  <!-- small bubble, bright -->
  <g filter="url(#shadow)">
    <circle cx="430" cy="150" r="17" fill="url(#bubble)"/>
    <ellipse cx="424" cy="144" rx="5.5" ry="3" fill="#FFFFFF" opacity="0.8" transform="rotate(-25 424 144)"/>
  </g>

  <!-- title -->
  <text x="320" y="360" text-anchor="middle" font-family="'Segoe UI Rounded', ui-rounded, sans-serif" font-size="46" font-weight="800" fill="#0B132B" stroke="#0B132B" stroke-width="0">BUBBLE BREACH</text>
  <text x="320" y="360" text-anchor="middle" font-family="'Segoe UI Rounded', ui-rounded, sans-serif" font-size="46" font-weight="800" fill="#F5F5F5">BUBBLE BREACH</text>

  <text x="320" y="392" text-anchor="middle" font-family="'Segoe UI Rounded', ui-rounded, sans-serif" font-size="15" font-weight="600" fill="#9AD1FF">tap bubbles before they breach</text>
</svg>
