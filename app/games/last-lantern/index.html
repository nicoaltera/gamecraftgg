<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Last Lantern</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #04050B; overflow: hidden; }
  canvas { display: block; touch-action: none; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   LAST LANTERN — a lone lantern-keeper in a dark field at night.
   Sweep your beam to burn back the shambling horde; oil runs dry.
   Pure Canvas2D + WebAudio. 960x540 virtual, letterboxed, dpr-crisp.
   ============================================================ */
const W = 960, H = 540;
const SLUG = 'last-lantern';
const HANDFONT = '"Chalkboard SE","Comic Neue","Segoe Print","Bradley Hand",cursive';
const TAU = Math.PI * 2;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let dpr = 1, scale = 1, ox = 0, oy = 0, cw = 0, chh = 0;
function resize() {
  dpr = Math.min(2.5, window.devicePixelRatio || 1);
  cw = window.innerWidth; chh = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(chh * dpr);
  canvas.style.width = cw + 'px';
  canvas.style.height = chh + 'px';
  scale = Math.min(cw / W, chh / H);
  ox = (cw - W * scale) / 2;
  oy = (chh - H * scale) / 2;
}
window.addEventListener('resize', resize);
resize();

// ---------- math ----------
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hash32(n) {
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  n ^= n >>> 16;
  return (n >>> 0) / 4294967296;
}
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
function smooth(a, b, x) { let t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); }
function angdiff(a, b) { let d = (a - b) % TAU; if (d > Math.PI) d -= TAU; if (d < -Math.PI) d += TAU; return d; }

// ---------- feel constants ----------
const PR = 12;                 // player radius
const P_ACCEL = 1350;          // movement acceleration (inertia character)
const P_MAXSPD = 205;          // max move speed px/s
const P_FRICT = 8.5;           // velocity damping
const AMB_R = 96;              // always-on safety glow radius
const AMB_STR = 0.62;          // ambient light strength (lit-ness)
const BEAM_LEN = 336;          // lantern beam reach
const BEAM_HALF = 0.40;        // beam cone half-angle (~23 deg)
const OIL_DRAIN = 0.155;       // oil / sec while beam on
const OIL_REFILL = 0.082;      // oil / sec while beam off
const OIL_MIN = 0.06;          // need this much oil to (re)ignite
const BURN_RATE = 1.55;        // burn dealt per sec at full light
const RECOIL = 118;            // beam push-back speed on lit zombies
const WAVE_LEN = 16;           // seconds per wave
const MAXZ = 96;               // zombie pool cap (phone perf)
const FLARE_START = 2, FLARE_MAX = 4;
const FLARE_R = 150;           // flare shockwave radius

// ---------- state ----------
let state = 'ready';           // ready | run | dead
let runIndex = 0;
let rng = mulberry32(1);
let px = W / 2, py = H / 2, pvx = 0, pvy = 0;
let aim = -Math.PI / 2;        // lantern aim angle
let oil = 1, oilLow = 0, sputter = 0;
let beamHeld = false, beamActive = false, beamPower = 0, beamIgnite = 0;
let flares = FLARE_START, flareFlash = 0;
let survT = 0, wave = 1, lastWave = 1, kills = 0;
let spawnTimer = 1.2;
let now = 0, deadT = 0, shake = 0, flash = 0, hitFlash = 0, darkOut = 0;
let goFade = 0, scorePulse = 0, wavePulse = 0, lastScorePost = 0;
let moveVec = { x: 0, y: 0 };
let stepTimer = 0;
let hintFade = 1, titleFade = 1, everMoved = false, everBeamed = false;

let best = 0;
try { best = parseInt(localStorage.getItem('gs_best:' + SLUG) || '0', 10) || 0; } catch (e) {}
let newBest = false;

let target = 0, targetBeaten = false, targetFlash = 0;
try { const c = parseInt(new URLSearchParams(location.search).get('c') || '', 10); if (c > 0) target = c; } catch (e) {}

// ---------- pools ----------
const Z = [];
for (let i = 0; i < MAXZ; i++) Z.push({ alive: false, x: 0, y: 0, kx: 0, ky: 0, hp: 1, burn: 0, r: 12, speed: 40, type: 0, gait: 0, sway: 0, stagger: 0, _li: 0, spawnT: 0 });
let zAlive = 0;

const NP = 320;
const P = [];
for (let i = 0; i < NP; i++) P.push({ life: 0, age: 0, x: 0, y: 0, vx: 0, vy: 0, size: 1, kind: 0, r: 255, g: 200, b: 120 });
function spawnP(x, y, vx, vy, life, size, kind, r, g, b) {
  for (let i = 0; i < NP; i++) { const p = P[i]; if (p.life <= 0 || p.age >= p.life) { p.x = x; p.y = y; p.vx = vx; p.vy = vy; p.life = life; p.age = 0; p.size = size; p.kind = kind; p.r = r; p.g = g; p.b = b; return; } }
}

const flareObj = [];
for (let i = 0; i < 4; i++) flareObj.push({ st: 0, x: 0, y: 0, vx: 0, vy: 0, t: 0, r: 0, power: 0 });

const pickups = [];
for (let i = 0; i < 10; i++) pickups.push({ alive: false, x: 0, y: 0, kind: 0, ph: 0, born: 0 });

const pings = [];
for (let i = 0; i < 8; i++) pings.push({ age: 9, x: 0, y: 0, txt: '', big: false });
function addPing(x, y, txt, big) { let p = pings[0]; for (const q of pings) if (q.age > p.age) p = q; p.x = x; p.y = y; p.age = 0; p.txt = txt; p.big = !!big; }

// ---------- pre-rendered field (dark, static) ----------
const field = document.createElement('canvas'); field.width = W; field.height = H;
(function buildField() {
  const f = field.getContext('2d');
  // vertical night gradient — deep-blue horizon sliver up top
  const g = f.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0.00, '#12203f');
  g.addColorStop(0.09, '#0d1730');
  g.addColorStop(0.30, '#080d1c');
  g.addColorStop(1.00, '#04050b');
  f.fillStyle = g; f.fillRect(0, 0, W, H);
  // moon — pale cool disc, top right
  const mg = f.createRadialGradient(792, 66, 4, 792, 66, 120);
  mg.addColorStop(0, 'rgba(212,226,255,0.85)');
  mg.addColorStop(0.13, 'rgba(150,178,232,0.35)');
  mg.addColorStop(1, 'rgba(120,150,210,0)');
  f.fillStyle = mg; f.fillRect(660, -40, 300, 250);
  f.fillStyle = 'rgba(226,236,255,0.95)';
  f.beginPath(); f.arc(792, 64, 20, 0, TAU); f.fill();
  f.fillStyle = 'rgba(120,150,210,0.18)';
  f.beginPath(); f.arc(786, 58, 5, 0, TAU); f.arc(799, 70, 3.4, 0, TAU); f.arc(795, 55, 2.6, 0, TAU); f.fill();
  // distant treeline silhouette along the horizon
  const tr = mulberry32(42);
  f.fillStyle = '#060b18';
  f.beginPath(); f.moveTo(0, 46);
  for (let x = 0; x <= W; x += 12) {
    const h = 18 + tr() * 26 + Math.sin(x * 0.05) * 6;
    f.lineTo(x, 46 - h * 0.5 + (tr() - 0.5) * 8);
  }
  f.lineTo(W, 60); f.lineTo(0, 60); f.closePath(); f.fill();
  // faint grass tufts (revealed by the lantern)
  const gr = mulberry32(7);
  for (let i = 0; i < 620; i++) {
    const x = gr() * W, y = 64 + gr() * (H - 64);
    const depth = (y - 64) / (H - 64);
    const a = 0.03 + depth * 0.05;
    f.strokeStyle = 'rgba(120,138,120,' + a.toFixed(3) + ')';
    f.lineWidth = 0.8 + depth * 0.7;
    const bl = 3 + gr() * 6 + depth * 5;
    const lean = (gr() - 0.5) * 4;
    f.beginPath(); f.moveTo(x, y); f.quadraticCurveTo(x + lean, y - bl * 0.6, x + lean * 1.6, y - bl); f.stroke();
  }
  // vignette — push edges into the void
  const vg = f.createRadialGradient(W / 2, H / 2 + 30, 120, W / 2, H / 2 + 30, 640);
  vg.addColorStop(0, 'rgba(4,5,11,0)');
  vg.addColorStop(0.62, 'rgba(4,5,11,0.15)');
  vg.addColorStop(1, 'rgba(3,4,9,0.92)');
  f.fillStyle = vg; f.fillRect(0, 0, W, H);
})();

// ---------- audio (WebAudio synth) ----------
let AC = null, master = null, noiseBuf = null;
let beamGain = null, beamOsc = null, padGain = null, padFilter = null, padOscA = null, padOscB = null;
let audioOK = false;
function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.62; master.connect(AC.destination);
    noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    // beam roar: looping noise + low osc, gated by beamGain
    beamGain = AC.createGain(); beamGain.gain.value = 0;
    const bsrc = AC.createBufferSource(); bsrc.buffer = noiseBuf; bsrc.loop = true;
    const bbp = AC.createBiquadFilter(); bbp.type = 'bandpass'; bbp.frequency.value = 720; bbp.Q.value = 0.7;
    bsrc.connect(bbp); bbp.connect(beamGain);
    beamOsc = AC.createOscillator(); beamOsc.type = 'sawtooth'; beamOsc.frequency.value = 58;
    const bog = AC.createGain(); bog.gain.value = 0.5; beamOsc.connect(bog); bog.connect(beamGain);
    beamGain.connect(master);
    bsrc.start(); beamOsc.start();
    // tension pad drone, rises with wave
    padGain = AC.createGain(); padGain.gain.value = 0;
    padFilter = AC.createBiquadFilter(); padFilter.type = 'lowpass'; padFilter.frequency.value = 300;
    padOscA = AC.createOscillator(); padOscA.type = 'sine'; padOscA.frequency.value = 55;
    padOscB = AC.createOscillator(); padOscB.type = 'triangle'; padOscB.frequency.value = 82.4;
    padOscA.connect(padFilter); padOscB.connect(padFilter); padFilter.connect(padGain); padGain.connect(master);
    padOscA.start(); padOscB.start();
    audioOK = true;
  } catch (e) { AC = null; }
}
function setBeamRoar(on) { if (!AC) return; beamGain.gain.setTargetAtTime(on ? 0.09 : 0.0, AC.currentTime, 0.05); }
function setPad(level) { // level ~ wave
  if (!AC) return;
  const g = Math.min(0.11, 0.03 + level * 0.012);
  padGain.gain.setTargetAtTime(state === 'run' ? g : 0.0, AC.currentTime, 0.4);
  padFilter.frequency.setTargetAtTime(260 + level * 90, AC.currentTime, 0.6);
  padOscA.frequency.setTargetAtTime(52 + level * 3, AC.currentTime, 0.6);
}
function sIgnite() {
  if (!AC) return; const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.setValueAtTime(400, t); bp.frequency.exponentialRampToValueAtTime(1400, t + 0.22); bp.Q.value = 0.8;
  const g = AC.createGain(); g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.16, t + 0.04); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.34);
  src.connect(bp); bp.connect(g); g.connect(master); src.start(t); src.stop(t + 0.36);
}
function sStep() {
  if (!AC) return; const t = AC.currentTime, vr = 0.85 + Math.random() * 0.3;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 240 * vr;
  const g = AC.createGain(); g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
  src.connect(lp); lp.connect(g); g.connect(master); src.start(t); src.stop(t + 0.1);
}
function sGroan() {
  if (!AC) return; const t = AC.currentTime, vr = 0.75 + Math.random() * 0.55;
  const o = AC.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(90 * vr, t); o.frequency.linearRampToValueAtTime(66 * vr, t + 0.5);
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 340;
  const g = AC.createGain(); g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.05, t + 0.12); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
  o.connect(lp); lp.connect(g); g.connect(master); o.start(t); o.stop(t + 0.66);
}
function sBurn() {
  if (!AC) return; const t = AC.currentTime, vr = 0.9 + Math.random() * 0.3;
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(520 * vr, t); o.frequency.exponentialRampToValueAtTime(180 * vr, t + 0.18);
  const g = AC.createGain(); g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.22);
}
function sFlare() {
  if (!AC) return; const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.setValueAtTime(1600, t); bp.frequency.exponentialRampToValueAtTime(300, t + 0.4); bp.Q.value = 0.6;
  const g = AC.createGain(); g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
  src.connect(bp); bp.connect(g); g.connect(master);
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(220, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.4);
  const og = AC.createGain(); og.gain.setValueAtTime(0.16, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
  o.connect(og); og.connect(master);
  src.start(t); src.stop(t + 0.52); o.start(t); o.stop(t + 0.44);
}
function sPickup(kind) {
  if (!AC) return; const t = AC.currentTime, vr = 0.94 + Math.random() * 0.12;
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime((kind ? 540 : 660) * vr, t); o.frequency.linearRampToValueAtTime((kind ? 820 : 990) * vr, t + 0.12);
  const g = AC.createGain(); g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.1, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.32);
}
function sShatter() {
  if (!AC) return; const t = AC.currentTime;
  // low thud
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(38, t + 0.4);
  const g = AC.createGain(); g.gain.setValueAtTime(0.34, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.52);
  // glass shatter shimmer
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2600;
  const ng = AC.createGain(); ng.gain.setValueAtTime(0.16, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
  src.connect(hp); hp.connect(ng); ng.connect(master); src.start(t); src.stop(t + 0.72);
  // shards — a few high pings
  for (let i = 0; i < 5; i++) {
    const tt = t + 0.01 + Math.random() * 0.12;
    const os = AC.createOscillator(); os.type = 'triangle'; os.frequency.value = 1400 + Math.random() * 1800;
    const gs = AC.createGain(); gs.gain.setValueAtTime(0.05, tt); gs.gain.exponentialRampToValueAtTime(0.0001, tt + 0.22);
    os.connect(gs); gs.connect(master); os.start(tt); os.stop(tt + 0.24);
  }
}

function post(m) { try { parent.postMessage(m, '*'); } catch (e) {} }

// ---------- run control ----------
function resetRun() {
  runIndex++;
  rng = mulberry32(0x7A11 ^ (runIndex * 0x9E3779B9 + 17));
  px = W / 2; py = H / 2; pvx = 0; pvy = 0; aim = -Math.PI / 2;
  oil = 1; oilLow = 0; sputter = 0; beamHeld = false; beamActive = false; beamPower = 0; beamIgnite = 0;
  flares = FLARE_START; flareFlash = 0;
  survT = 0; wave = 1; lastWave = 1; kills = 0; spawnTimer = 1.2;
  deadT = 0; shake = 0; flash = 0; hitFlash = 0; darkOut = 0; goFade = 0; scorePulse = 0; wavePulse = 0;
  newBest = false; targetBeaten = false; targetFlash = 0;
  moveVec.x = 0; moveVec.y = 0; stepTimer = 0;
  for (const z of Z) z.alive = false; zAlive = 0;
  for (const p of P) p.life = 0;
  for (const f of flareObj) f.st = 0;
  for (const pk of pickups) pk.alive = false;
  for (const pg of pings) pg.age = 9;
  // a few lurkers at the edges for the opening beat
  for (let i = 0; i < 5; i++) spawnZombie(true);
}

function spawnZombie(lurk) {
  if (zAlive >= Math.min(MAXZ, 8 + survT * 0.72)) return;
  let z = null;
  for (const q of Z) if (!q.alive) { z = q; break; }
  if (!z) return;
  // pick an edge just outside the arena
  const side = (rng() * 4) | 0;
  const m = 46;
  if (side === 0) { z.x = rng() * W; z.y = -m; }
  else if (side === 1) { z.x = W + m; z.y = rng() * H; }
  else if (side === 2) { z.x = rng() * W; z.y = H + m; }
  else { z.x = -m; z.y = rng() * H; }
  // type: shambler by default; runners from wave 2, brutes from wave 3
  let t = 0; const rr = rng();
  if (wave >= 3 && rr < 0.10 + wave * 0.012) t = 2;
  else if (wave >= 2 && rr < 0.20 + wave * 0.02) t = 1;
  const base = 33 + survT * 0.34;
  if (t === 0) { z.hp = 1.0; z.r = 12; z.speed = Math.min(78, base); }
  else if (t === 1) { z.hp = 0.62; z.r = 10; z.speed = Math.min(128, base * 1.7); }   // runner
  else { z.hp = 4.4; z.r = 20; z.speed = Math.min(52, base * 0.62); }                  // brute
  z.type = t; z.burn = 0; z.kx = 0; z.ky = 0; z.gait = rng() * TAU; z.sway = 0; z.stagger = 0;
  z.spawnT = 0; z.alive = true; zAlive++;
}

function killZombie(z, byLight) {
  z.alive = false; zAlive--; kills++;
  const cx = z.x, cy = z.y;
  const n = z.type === 2 ? 20 : 11;
  for (let i = 0; i < n; i++) {
    const a = rng() * TAU, sp = 40 + rng() * (z.type === 2 ? 240 : 170);
    spawnP(cx, cy, Math.cos(a) * sp, Math.sin(a) * sp - 30, 0.5 + rng() * 0.8, 1.4 + rng() * 2.4, 0, 255, 150 + (rng() * 70 | 0), 60);
  }
  if (rng() < 0.25) sBurn();
  if (rng() < 0.12) sGroan();
  // pickup drop — in the spot where it fell (risk/reward)
  const dr = rng();
  const dropChance = 0.13 + (z.type === 2 ? 0.35 : 0) + (z.type === 1 ? 0.05 : 0);
  if (dr < dropChance) {
    let pk = null; for (const q of pickups) if (!q.alive) { pk = q; break; }
    if (pk) { pk.alive = true; pk.x = clamp(cx, 20, W - 20); pk.y = clamp(cy, 74, H - 20); pk.kind = (rng() < 0.34 && flares < FLARE_MAX) ? 1 : 0; pk.ph = rng() * TAU; pk.born = now; }
  }
}

function throwFlare() {
  if (state !== 'run' || flares <= 0) return;
  let f = null; for (const q of flareObj) if (q.st === 0) { f = q; break; }
  if (!f) return;
  flares--; flareFlash = 1;
  f.st = 1; f.x = px; f.y = py; f.t = 0;
  const spd = 460; f.vx = Math.cos(aim) * spd; f.vy = Math.sin(aim) * spd; f.r = 0; f.power = 0;
  sFlare();
}
function detonateFlare(f) {
  f.st = 2; f.t = 0; f.power = 1;
  shake = Math.max(shake, 0.7); flash = Math.max(flash, 0.4);
  for (const z of Z) {
    if (!z.alive) continue;
    const dx = z.x - f.x, dy = z.y - f.y, d = Math.hypot(dx, dy) || 0.001;
    if (d < FLARE_R + 30) {
      const k = (1 - d / (FLARE_R + 30));
      z.kx += (dx / d) * 460 * k; z.ky += (dy / d) * 460 * k;
      z.burn += 1.6 * k; z.stagger = 1;
    }
  }
  for (let i = 0; i < 26; i++) {
    const a = rng() * TAU, sp = 80 + rng() * 300;
    spawnP(f.x, f.y, Math.cos(a) * sp, Math.sin(a) * sp, 0.4 + rng() * 0.7, 2 + rng() * 3, 0, 255, 210, 130);
  }
}

// ---------- light query: heat = damaging light (beam + flares only, NOT the
// passive ambient glow — so surviving demands active oil management, not camping) ----------
function heatAt(x, y) {
  let b = 0;
  const dx = x - px, dy = y - py, d = Math.hypot(dx, dy) || 0.001;
  if (beamActive && d < BEAM_LEN) {
    const ang = Math.atan2(dy, dx);
    const da = Math.abs(angdiff(ang, aim));
    if (da < BEAM_HALF) {
      const af = 1 - da / BEAM_HALF;
      const df = 1 - d / BEAM_LEN;
      const v = beamPower * (af * af * 0.7 + af * 0.3) * (0.4 + 0.6 * df);
      if (v > b) b = v;
    }
  }
  for (const f of flareObj) {
    if (f.st !== 2) continue;
    const fd = Math.hypot(x - f.x, y - f.y);

  for (const f of flareObj) {
    if (f.st === 1) { const fg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, 40); fg.addColorStop(0, 'rgba(255,235,180,0.9)'); fg.addColorStop(1, 'rgba(255,180,90,0)'); ctx.fillStyle = fg; ctx.fillRect(f.x - 40, f.y - 40, 80, 80); }
    else if (f.st === 2) { const r = Math.max(20, f.r); const fg = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r); fg.addColorStop(0, 'rgba(255,240,190,' + (0.8 * f.power) + ')'); fg.addColorStop(0.6, 'rgba(255,180,90,' + (0.4 * f.power) + ')'); fg.addColorStop(1, 'rgba(255,150,60,0)'); ctx.fillStyle = fg; ctx.fillRect(f.x - r, f.y - r, r * 2, r * 2); }
  }
  // pickup glimmers
  for (const pk of pickups) { if (!pk.alive) continue; const pu = 0.5 + 0.5 * Math.sin(now * 4 + pk.ph); const r = 26 + pu * 8; const col = pk.kind ? '150,190,255' : '255,190,110'; const pg = ctx.createRadialGradient(pk.x, pk.y, 0, pk.x, pk.y, r); pg.addColorStop(0, 'rgba(' + col + ',' + (0.5 + pu * 0.3) + ')'); pg.addColorStop(1, 'rgba(' + col + ',0)'); ctx.fillStyle = pg; ctx.fillRect(pk.x - r, pk.y - r, r * 2, r * 2); }
  // ember particles glow
  for (const p of P) { if (p.life <= 0 || p.age >= p.life || p.kind !== 0) continue; const a = (1 - p.age / p.life); const r = p.size * (1.6 + a); ctx.globalAlpha = a; const pg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.2); pg.addColorStop(0, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',0.9)'); pg.addColorStop(1, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',0)'); ctx.fillStyle = pg; ctx.fillRect(p.x - r * 2.2, p.y - r * 2.2, r * 4.4, r * 4.4); }
  ctx.globalAlpha = 1;
  ctx.restore();

  // ---- zombies (silhouettes over the lit ground) ----
  const dimAll = state === 'dead' ? (1 - darkOut * 0.5) : 1;
  for (const z of Z) if (z.alive) drawZombie(z, dimAll);

  // ---- dust particles ----
  for (const p of P) { if (p.life <= 0 || p.age >= p.life || p.kind !== 1) continue; const a = (1 - p.age / p.life) * 0.5; ctx.globalAlpha = a; ctx.fillStyle = '#7d8a7d'; ctx.fillRect(p.x - p.size * 0.5, p.y - p.size * 0.5, p.size, p.size); }
  ctx.globalAlpha = 1;

  // ---- pickup icon ----
  for (const pk of pickups) {
    if (!pk.alive) continue;
    const bob = Math.sin(now * 3 + pk.ph) * 2;
    ctx.save(); ctx.translate(pk.x, pk.y + bob);
    if (pk.kind === 1) { // flare cartridge
      ctx.fillStyle = '#101a2e'; ctx.strokeStyle = '#9fc0ff'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-4, -8, 8, 16, 2) : ctx.rect(-4, -8, 8, 16); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#cfe0ff'; ctx.beginPath(); ctx.arc(0, -8, 3, 0, TAU); ctx.fill();
    } else { // oil can
      ctx.fillStyle = '#1a130a'; ctx.strokeStyle = '#ffc878'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-6, -6, 12, 13, 2) : ctx.rect(-6, -6, 12, 13); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, -4); ctx.lineTo(11, -9); ctx.stroke(); // spout
      ctx.fillStyle = '#ffd98f'; ctx.font = 'bold 8px ' + HANDFONT; ctx.textAlign = 'center'; ctx.fillText('OIL', 0, 3);
    }
    ctx.restore();
  }

  // ---- the keeper ----
  drawKeeper();

  // ---- flash overlay ----
  if (flash > 0) { ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = 'rgba(255,214,150,' + (flash * 0.5) + ')'; ctx.fillRect(0, 0, W, H); ctx.restore(); }
  if (state === 'dead') { ctx.fillStyle = 'rgba(3,4,10,' + (darkOut * 0.82) + ')'; ctx.fillRect(0, 0, W, H); }

  // floating pings
  for (const pg of pings) {
    if (pg.age >= 1) continue;
    const a = 1 - pg.age; const yy = pg.y - pg.age * 26;
    ctx.save(); ctx.globalAlpha = a; ctx.textAlign = 'center';
    ctx.font = (pg.big ? 'bold 20px ' : '15px ') + HANDFONT;
    ctx.fillStyle = '#ffe3aa'; ctx.shadowColor = '#ff9a3c'; ctx.shadowBlur = 10;
    ctx.fillText(pg.txt, pg.x, yy); ctx.restore();
  }
}

function drawKeeper() {
  const lantOn = state !== 'dead' || deadT < 0.4;
  ctx.save(); ctx.translate(px, py);
  // little cloak
  const wobble = Math.sin(now * 8) * (Math.hypot(pvx, pvy) > 20 ? 1 : 0.2);
  ctx.rotate(Math.sin(now * 3) * 0.03);
  ctx.fillStyle = '#090b14';
  ctx.beginPath();
  ctx.moveTo(0, -13);
  ctx.quadraticCurveTo(11, -6, 9 + wobble, 12);
  ctx.quadraticCurveTo(0, 16, -9 + wobble, 12);
  ctx.quadraticCurveTo(-11, -6, 0, -13);
  ctx.closePath(); ctx.fill();
  // hood rim (cool)
  ctx.strokeStyle = 'rgba(150,180,238,0.5)'; ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.moveTo(-9, 6); ctx.quadraticCurveTo(-11, -6, 0, -13); ctx.quadraticCurveTo(11, -6, 9, 6); ctx.stroke();
  ctx.restore();
  // lantern orb — held toward aim, bright warm source
  if (lantOn) {
    const lx = px + Math.cos(aim) * 12, ly = py + Math.sin(aim) * 12;
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const fl = 0.85 + 0.15 * Math.sin(now * 22) + beamIgnite * 0.4;
    const r = 16 * fl;
    const og = ctx.createRadialGradient(lx, ly, 0, lx, ly, r);
    og.addColorStop(0, 'rgba(255,244,210,0.98)');
    og.addColorStop(0.4, 'rgba(255,206,130,0.8)');
    og.addColorStop(1, 'rgba(255,170,80,0)');
    ctx.fillStyle = og; ctx.fillRect(lx - r, ly - r, r * 2, r * 2);
    ctx.restore();
    // lantern frame
    ctx.save(); ctx.translate(lx, ly);
    ctx.strokeStyle = 'rgba(60,40,20,0.9)'; ctx.lineWidth = 1.4;
    ctx.strokeRect(-3.5, -4, 7, 8);
    ctx.fillStyle = 'rgba(255,236,180,0.95)'; ctx.fillRect(-2.5, -3, 5, 6);
    ctx.beginPath(); ctx.moveTo(-3.5, -4); ctx.quadraticCurveTo(0, -9, 3.5, -4); ctx.stroke();
    ctx.restore();
  }
}

// ---------- HUD ----------
function drawHUD() {
  // score — seconds survived, top center
  const sc = state === 'ready' ? 0 : Math.floor(survT);
  const sp = 1 + scorePulse * 0.14;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = '13px ' + HANDFONT; ctx.fillStyle = 'rgba(255,220,160,0.6)';
  ctx.fillText('SURVIVED', W / 2, 34);
  const dw = drawDigits(String(sc), W / 2, 42, 22 * sp, 0.5, '#ffe6ac', 1, 14 + scorePulse * 14);
  ctx.font = 'italic 18px ' + HANDFONT; ctx.fillStyle = '#ffcf85';
  ctx.fillText('s', W / 2 + dw / 2 + 14, 66);
  ctx.restore();

  // best top-left
  ctx.save(); ctx.textAlign = 'left'; ctx.font = '14px ' + HANDFONT;
  ctx.fillStyle = 'rgba(180,200,240,0.7)';
  ctx.fillText('BEST  ' + best + ' s', 20, 32);
  ctx.restore();

  // wave top-right
  ctx.save(); ctx.textAlign = 'right';
  ctx.font = '13px ' + HANDFONT; ctx.fillStyle = 'rgba(255,180,150,0.7)';
  ctx.fillText('WAVE', W - 20, 26);
  ctx.font = 'bold ' + (24 + wavePulse * 10) + 'px ' + HANDFONT;
  ctx.fillStyle = '#ff9c72'; ctx.shadowColor = '#ff5a2a'; ctx.shadowBlur = 8 + wavePulse * 16;
  ctx.fillText(String(wave), W - 22, 50);
  ctx.restore();

  // challenge target
  if (target) {
    ctx.save(); ctx.textAlign = 'center'; ctx.font = 'bold 14px ' + HANDFONT;
    const beaten = targetBeaten;
    ctx.fillStyle = beaten ? '#9bff9b' : '#ffd27a';
    ctx.shadowColor = beaten ? '#3aff6a' : '#ff9a3c'; ctx.shadowBlur = 6 + targetFlash * 10;
    ctx.fillText(beaten ? '✓ TARGET ' + target + ' s BEATEN' : 'TARGET  ' + target + ' s', W / 2, 88);
    ctx.restore();
  }

  // oil meter — bottom center
  const mw = 300, mh = 15, mx = W / 2 - mw / 2, my = H - 34;
  ctx.save();
  ctx.fillStyle = 'rgba(10,12,20,0.72)';
  rr(mx - 4, my - 4, mw + 8, mh + 8, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(120,100,60,0.6)'; ctx.lineWidth = 1.4; rr(mx, my, mw, mh, 6); ctx.stroke();
  const lowPulse = oilLow ? (0.5 + 0.5 * Math.sin(now * 12)) : 0;
  const fillW = Math.max(0, mw * oil);
  if (fillW > 2) {
    const og = ctx.createLinearGradient(mx, 0, mx + mw, 0);
    if (oilLow) { og.addColorStop(0, '#ff5a2a'); og.addColorStop(1, '#ffb14a'); }
    else { og.addColorStop(0, '#ffb14a'); og.addColorStop(1, '#ffe6a2'); }
    ctx.fillStyle = og; ctx.shadowColor = oilLow ? 'rgba(255,90,40,' + (0.5 + lowPulse * 0.5) + ')' : 'rgba(255,180,90,0.7)'; ctx.shadowBlur = 12;
    rr(mx, my, fillW, mh, 6); ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'left'; ctx.font = 'bold 11px ' + HANDFONT; ctx.fillStyle = 'rgba(255,225,175,0.9)';
  ctx.fillText('LANTERN OIL', mx + 2, my - 8);
  // flare pips (right of meter)
  for (let i = 0; i < FLARE_MAX; i++) {
    const fx = mx + mw + 20 + i * 18, fy = my + mh / 2;
    ctx.beginPath(); ctx.arc(fx, fy, 6, 0, TAU);
    if (i < flares) { ctx.fillStyle = '#ffd98f'; ctx.shadowColor = '#ff9a3c'; ctx.shadowBlur = 6 + flareFlash * 8; ctx.fill(); ctx.shadowBlur = 0; }
    else { ctx.strokeStyle = 'rgba(150,130,90,0.5)'; ctx.lineWidth = 1.2; ctx.stroke(); }
  }
  ctx.textAlign = 'left'; ctx.font = '10px ' + HANDFONT; ctx.fillStyle = 'rgba(255,210,150,0.7)';
  ctx.fillText('FLARES', mx + mw + 14, my - 8);
  ctx.restore();

  // touch stick visuals
  if (isTouch && state === 'run') {
    if (leftStickId >= 0 && touches[leftStickId]) drawStick(touches[leftStickId], '#8fb2e8');
    if (rightStickId >= 0 && touches[rightStickId]) drawStick(touches[rightStickId], '#ffc24b');
    // flare button
    ctx.save(); ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(FLARE_BTN.x, FLARE_BTN.y, FLARE_BTN.r, 0, TAU);
    ctx.fillStyle = 'rgba(30,20,10,0.5)'; ctx.fill();
    ctx.strokeStyle = flares > 0 ? 'rgba(255,190,110,0.8)' : 'rgba(120,100,70,0.5)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = flares > 0 ? '#ffd98f' : 'rgba(150,130,90,0.5)'; ctx.textAlign = 'center'; ctx.font = '22px ' + HANDFONT;
    ctx.fillText('✦', FLARE_BTN.x, FLARE_BTN.y + 7);
    ctx.restore();
  }
}
function drawStick(t, col) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.14)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(t.sx, t.sy, 48, 0, TAU); ctx.stroke();
  let dx = t.x - t.sx, dy = t.y - t.sy, dl = Math.hypot(dx, dy);
  if (dl > 48) { dx = dx / dl * 48; dy = dy / dl * 48; }
  ctx.fillStyle = col; ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.arc(t.sx + dx, t.sy + dy, 20, 0, TAU); ctx.fill();
  ctx.restore();
}
function rr(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

// ---------- overlays: ready + gameover ----------
function drawReady() {
  ctx.save(); ctx.globalAlpha = titleFade;
  ctx.textAlign = 'center';
  // title
  ctx.font = 'bold 62px ' + HANDFONT; ctx.fillStyle = '#ffe0a0';
  ctx.shadowColor = 'rgba(255,150,50,0.8)'; ctx.shadowBlur = 26;
  ctx.save(); ctx.translate(W / 2, 176); ctx.rotate(-0.02); ctx.fillText('LAST LANTERN', 0, 0); ctx.restore();
  ctx.shadowBlur = 0;
  ctx.font = 'italic 20px ' + HANDFONT; ctx.fillStyle = 'rgba(180,200,240,0.85)';
  ctx.fillText('hold the horde back till the oil runs dry', W / 2, 214);
  // prompt
  const pulse = 0.55 + 0.35 * Math.sin(now * 3);
  ctx.globalAlpha = titleFade * pulse;
  ctx.font = 'bold 22px ' + HANDFONT; ctx.fillStyle = '#ffd27a';
  ctx.fillText(isTouch ? 'tap to light the lantern' : 'press any key or click to light the lantern', W / 2, 380);
  ctx.globalAlpha = titleFade;
  ctx.font = '15px ' + HANDFONT; ctx.fillStyle = 'rgba(255,220,160,0.7)';
  ctx.fillText(isTouch ? 'left thumb: move   ·   right thumb: aim lantern   ·   ✦ button: flare'
                        : 'WASD / arrows: move   ·   mouse: aim   ·   hold: burn light   ·   F / right-click: flare', W / 2, 412);
  ctx.restore();
}
function drawGameOver() {
  ctx.save(); ctx.globalAlpha = goFade; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(3,4,10,0.5)'; ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 40px ' + HANDFONT; ctx.fillStyle = '#c9d6f0';
  ctx.shadowColor = 'rgba(120,150,220,0.6)'; ctx.shadowBlur = 16;
  ctx.fillText('THE LANTERN WENT OUT', W / 2, 176); ctx.shadowBlur = 0;
  const sc = Math.floor(survT);
  ctx.font = '16px ' + HANDFONT; ctx.fillStyle = 'rgba(255,220,160,0.7)';
  ctx.fillText('you survived', W / 2, 224);
  const dw = drawDigits(String(sc), W / 2, 236, 40, 0.5, '#ffe6ac', goFade, 20);
  ctx.font = 'italic 26px ' + HANDFONT; ctx.fillStyle = '#ffcf85';
  ctx.fillText('s', W / 2 + dw / 2 + 22, 292);
  ctx.font = '16px ' + HANDFONT;
  ctx.fillStyle = newBest ? '#9bff9b' : 'rgba(180,200,240,0.8)';
  ctx.fillText(newBest ? '★ NEW BEST!  ' + best + ' s' : 'best  ' + best + ' s   ·   ' + kills + ' downed', W / 2, 336);
  const pulse = 0.55 + 0.35 * Math.sin(now * 3.2);
  ctx.globalAlpha = goFade * pulse; ctx.font = 'bold 22px ' + HANDFONT; ctx.fillStyle = '#ffd27a';
  ctx.fillText(isTouch ? 'tap to light it again' : 'press any key to light it again', W / 2, 400);
  ctx.restore();
}

// ---------- main loop ----------
window.__lldebug = function () { return { state, survT, wave, oil, zAlive, flares, px, py }; };
let last = performance.now(), postedReady = false, fpsT = 0, fpsN = 0, fps = 60;
function frame(t) {
  const rdt = Math.min(0.034, (t - last) / 1000); last = t;
  update(rdt);
  fpsT += rdt; fpsN++; if (fpsT >= 0.5) { fps = fpsN / fpsT; fpsT = 0; fpsN = 0; }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#03040a'; ctx.fillRect(0, 0, cw, chh);   // letterbox
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * ox, dpr * oy);
  ctx.save(); ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();

  const shx = shake > 0 ? (hash32((t | 0) * 7) - 0.5) * 12 * shake : 0;
  const shy = shake > 0 ? (hash32((t | 0) * 13) - 0.5) * 12 * shake : 0;
  ctx.translate(shx, shy);
  drawScene();
  ctx.translate(-shx, -shy);
  drawHUD();
  if (state === 'ready') drawReady();
  if (state === 'dead') drawGameOver();
  ctx.restore();

  if (!postedReady) { postedReady = true; post({ gs: 'ready' }); }
  requestAnimationFrame(frame);
}
resetRun(); state = 'ready'; runIndex = 0;
requestAnimationFrame(frame);
</script>
</body>
