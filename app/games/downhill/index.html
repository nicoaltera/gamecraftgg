// -------- PHYSICS TUNING (floaty-fun, forgiving, reads great on screen) -----
var GRAVITY     = 1420;   // px/s^2  downward pull — brisk but a touch floaty
// FRICTION is applied PER SUBSTEP whenever the sled is pressing into ground, so
// the effective loss is ~fr*540/sec. The old 0.0007 (~31%/sec) bled so much
// momentum the sled couldn't climb ramps, exit the half-pipe, or hold speed
// across bridges — levels were literally unwinnable. These lower values make it
// glide and CONSERVE momentum (climbs, U-turns, and elevated flags now reachable)
// while gravity on any real slope still refills speed satisfyingly.
var FRICTION    = 0.00022;// snow tangential loss PER SUBSTEP (~11%/sec — glidey, still snowy)
var ICE_FR      = 0.00008;// icy surfaces: near-frictionless, keeps speed (theme distinction)
var STICKY_FR   = 0.020;  // sticky/candy patches: grippy, bleed speed (reserved; unused today)
var RESTITUTION = 0.07;   // bounciness on landings: LOW so the sled hugs curves
                          // (half-pipe/valleys) without chattering off and bleeding
                          // energy, and so normal landings barely bounce (forgiving)
var AIR_DRAG    = 0.0005; // gentle velocity damping per substep while airborne
var SLED_R      = 9.0;    // sled collision radius (px) — generous, forgiving
var SUBSTEPS    = 13;     // physics substeps per frame: anti-tunnel at speed AND
                          // fine enough that the sled follows concave curves
                          // (half-pipe/valleys) without slamming the corner and
                          // dumping momentum. Higher = smoother, conserves energy.
var MAX_SPEED   = 2050;   // clamp so it never explodes into NaN/offscreen

// ================================================================ canvas / fit
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var dpr = 1, scale = 1, offX = 0, offY = 0, cssW = 0, cssH = 0;
function resize(){
  cssW = window.innerWidth; cssH = window.innerHeight;
  dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
  scale = Math.min(cssW / VW, cssH / VH);
  offX = (cssW - VW * scale) / 2;
  offY = (cssH - VH * scale) / 2;
}
window.addEventListener('resize', resize); resize();

// ================================================================ rng
function mulberry32(a){return function(){a|=0;a=(a+0x6D2B79F5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}

// ================================================================ audio (WebAudio synth)
var AC = null, master = null, audioOn = true;
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.9; master.connect(AC.destination);
  }catch(e){ audioOn = false; }
}
function now(){ return AC ? AC.currentTime : 0; }
function tone(freq, dur, type, vol, glideTo){
  if(!AC||!audioOn) return;
  var o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq, now());
  if(glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,glideTo), now()+dur);
  g.gain.setValueAtTime(0.0001, now());
  g.gain.exponentialRampToValueAtTime(vol||0.2, now()+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, now()+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(now()+dur+0.02);
}
function noiseBurst(dur, vol, lp, hp){
  if(!AC||!audioOn) return;
  var n=Math.floor(AC.sampleRate*dur);
  var buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  var s=AC.createBufferSource(); s.buffer=buf;
  var g=AC.createGain(); g.gain.value=vol||0.2;
  var f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp||1600;
  s.connect(f);
  if(hp){ var f2=AC.createBiquadFilter(); f2.type='highpass'; f2.frequency.value=hp; f.connect(f2); f2.connect(g); }
  else f.connect(g);
  g.connect(master); s.start(); s.stop(now()+dur+0.02);
}
var lastScratch=0;
function sfxScratch(){
  var t=performance.now(); if(t-lastScratch<42) return; lastScratch=t;
  noiseBurst(0.05, 0.05+Math.random()*0.03, 2600+Math.random()*1400, 1400);
}
var lastScrape=0;
function sfxScrape(v){ // sliding-on-snow hiss, rate-limited, volume by speed
  var t=performance.now(); if(t-lastScrape<70) return; lastScrape=t;
  noiseBurst(0.09, Math.min(0.09,0.02+v*0.00006), 1100+v*0.4, 300);
}
var whooshGain=null, whooshSrc=null;
function startWhoosh(){
  if(!AC||!audioOn||whooshSrc) return;
  var n=Math.floor(AC.sampleRate*1.2), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<n;i++) d[i]=Math.random()*2-1;
  whooshSrc=AC.createBufferSource(); whooshSrc.buffer=buf; whooshSrc.loop=true;
  var f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=520; f.Q.value=0.7;
  whooshGain=AC.createGain(); whooshGain.gain.value=0.0001;
  whooshSrc.connect(f); f.connect(whooshGain); whooshGain.connect(master); whooshSrc.start();
}
function setWhoosh(v){ if(whooshGain&&AC) whooshGain.gain.setTargetAtTime(v, now(), 0.05); }
function stopWhoosh(){ if(whooshSrc){ try{whooshSrc.stop();}catch(e){} whooshSrc=null; whooshGain=null; } }
function sfxBump(impact){
  var v=Math.min(0.5, 0.06+impact*0.0006);
  var p=Math.max(0.02,Math.min(0.1,0.03+impact*0.00004));
  noiseBurst(p, v, 900+impact*0.5, 120);
  tone(90+impact*0.08, p+0.02, 'triangle', v*0.6, 60);
}
function sfxBoing(){ tone(240,0.16,'sine',0.28,720); tone(480,0.14,'triangle',0.14,900); noiseBurst(0.05,0.06,1400,400); }
function sfxStar(){ tone(880,0.09,'triangle',0.22); tone(1320,0.12,'sine',0.20,1760); tone(1760,0.16,'sine',0.16,2200); }
function sfxGoal(){
  var seq=[523,659,784,1047,1319];
  for(var i=0;i<seq.length;i++){ (function(f,i){ setTimeout(function(){ tone(f,0.5,'sine',0.26); tone(f*2,0.5,'triangle',0.08); },i*85); })(seq[i],i); }
  // sleigh bell shimmer
  for(var b=0;b<7;b++){ (function(b){ setTimeout(function(){ tone(1600+Math.random()*700,0.18,'triangle',0.07); },120+b*70); })(b); }
}
function sfxPerfect(){ setTimeout(function(){ tone(1047,0.5,'sine',0.22,2093); tone(1568,0.5,'triangle',0.10); },320); }
function sfxWhump(){ noiseBurst(0.28,0.4,600,60); tone(150,0.3,'sine',0.25,60); tone(90,0.35,'triangle',0.2,50); }
function sfxOof(){ tone(300,0.14,'sine',0.2,150); noiseBurst(0.14,0.18,700,120); tone(200,0.2,'triangle',0.14,120); }
function sfxClick(){ tone(560,0.05,'square',0.12,700); }

  var r=mulberry32(7);
  for(var layer=0; layer<2; layer++){
    var pts=[]; var y0 = layer===0?230:270; var amp=layer===0?70:100; var step=layer===0?120:150;
    for(var x=-40;x<=VW+60;x+=step){ pts.push([x, y0 - Math.abs(Math.sin(x*0.7+layer)+r()*0.6)*amp*(0.5+r()*0.6)]); }
    mtns.push({pts:pts, base: layer===0?300:340});
  }
})();

// ================================================================ level setup
function seededJitter(seed){ var r=mulberry32(seed); return function(a){ return (r()*2-1)*a; }; }

function loadLevel(i){
  var lv = LEVELS[i];
  TH = THEMES[lv.theme] || THEMES.morning;
  terrainSegs.length = 0; terrainDraw.length = 0;
  var jit = seededJitter(1000+i*97);
  for(var p=0;p<lv.terrain.length;p++){
    var raw = lv.terrain[p];
    var poly = raw.pts ? raw.pts : raw;
    var kind = raw.kind || 'snow';
    var fr = kind==='ice' ? ICE_FR : (kind==='sticky' ? STICKY_FR : FRICTION);
    for(var s=0;s<poly.length-1;s++){
      terrainSegs.push({ax:poly[s][0],ay:poly[s][1],bx:poly[s+1][0],by:poly[s+1][1],fr:fr});
    }
    var dpts=[];
    for(var q=0;q<poly.length;q++){ dpts.push([poly[q][0]+jit(1.4), poly[q][1]+jit(1.8)]); }
    terrainDraw.push({pts:dpts, kind:kind});
  }
  spikes = (lv.spikes||[]).slice();
  pads = (lv.pads||[]).map(function(p){ return {x:p.x,y:p.y,pow:p.pow||PAD_POW,squash:0,cool:0}; });
  movers = (lv.movers||[]).map(function(m,mi){ return {ax:m.ax,ay:m.ay,bx:m.bx,by:m.by,
    period:m.period||2,r:m.r||16,kind:m.kind||'bump',phase:mi*1.7,cx:m.ax,cy:m.ay}; });
  starPos = lv.star ? {x:lv.star[0],y:lv.star[1]} : null;
  starGot = false;
  goalPos = {x:lv.goal[0], y:lv.goal[1]};
  startPos = {x:lv.start[0], y:lv.start[1]};
  strokes.length = 0; curStroke = null;
  inkMax = lv.ink; inkUsed = 0;
  resetSledToStart();
  levelBanner = 1.8;
  updateMovers(0);
}
function resetSledToStart(){
  sled.x = startPos.x; sled.y = startPos.y;
  sled.vx = 0; sled.vy = 0; sled.angle = 0.15; sled.spin = 0; sled.lean = 0;
  sled.onGround = false; sled.sinceGround = 0; sled.restTime = 0; sled.contactImpulse = 0;
  sled.trail.length = 0;
  rideTime = 0; hadHardBump = false;
}
function updateMovers(clock){
  for(var i=0;i<movers.length;i++){
    var m=movers[i];
    var t=(Math.sin(clock*TAU/m.period + m.phase)*0.5+0.5);
    m.cx = m.ax+(m.bx-m.ax)*t; m.cy = m.ay+(m.by-m.ay)*t;
  }
}

// ================================================================ geometry / physics
function collideSeg(ax,ay,bx,by,fr){
  var abx=bx-ax, aby=by-ay;
  var ab2=abx*abx+aby*aby; if(ab2<1e-6) return;
  var t=((sled.x-ax)*abx+(sled.y-ay)*aby)/ab2;
  var atEnd = (t<=0 || t>=1);
  if(t<0)t=0; else if(t>1)t=1;
  var cx=ax+abx*t, cy=ay+aby*t;
  var dx=sled.x-cx, dy=sled.y-cy;
  var d=Math.sqrt(dx*dx+dy*dy);
  if(d>=SLED_R) return;
  var nx,ny;
  if(d>1e-4){ nx=dx/d; ny=dy/d; }
  else { var L2=Math.sqrt(ab2); nx=aby/L2; ny=-abx/L2; if(ny>0){nx=-nx;ny=-ny;} }
  // Floor-only contact for near-horizontal surfaces: the sled rides on TOP of
  // ground / ink. A downward-facing normal (ceiling) is ignored — UNLESS the
  // surface is steep (a wall/pillar), where side contact must still block.
  var steep = Math.abs(abx) < Math.abs(aby)*0.6; // near-vertical => a wall
  if(ny > 0.3 && !steep) return;
  // Skip phantom side-walls at a flat segment terminus (an exposed line end
  // poking up in front of the sled) — but keep real wall endpoints solid.
  if(atEnd && Math.abs(ny) < 0.55 && !steep) return;
  var pen=SLED_R-d;
  sled.x += nx*pen; sled.y += ny*pen;
  var vn = sled.vx*nx + sled.vy*ny;
  if(vn<0){
    var vtx = sled.vx - vn*nx, vty = sled.vy - vn*ny; // tangential
    sled.vx = vtx*(1-fr) - nx*vn*RESTITUTION;
    sled.vy = vty*(1-fr) - ny*vn*RESTITUTION;
    var imp=-vn;
    if(imp>sled.contactImpulse) sled.contactImpulse=imp;
  }
  sled.onGround = true; sled.sinceGround = 0;
}
function checkPads(){
  for(var i=0;i<pads.length;i++){
    var p=pads[i];
    var dx=sled.x-p.x, dy=sled.y-(p.y-SLED_R);
    if(Math.abs(dx)<26 && dy>-14 && dy<16 && sled.vy>-40 && p.cool<=0){
      sled.vy = -p.pow; sled.y = p.y - SLED_R - 12;
      sled.onGround=false; p.squash=1; p.cool=0.3;
      sfxBoing(); spawnSparkle(p.x,p.y,10,'#FFFFFF'); camShake=Math.max(camShake,4);
    }
  }
}

function physicsStep(dt){
  sled.vy += GRAVITY*dt;
  if(!sled.onGround){ sled.vx *= (1 - AIR_DRAG); sled.vy *= (1 - AIR_DRAG); }
  var sp=Math.sqrt(sled.vx*sled.vx+sled.vy*sled.vy);
  if(sp>MAX_SPEED){ var k=MAX_SPEED/sp; sled.vx*=k; sled.vy*=k; }
  sled.x += sled.vx*dt; sled.y += sled.vy*dt;
  sled.onGround=false; sled.contactImpulse=0;
  var i;
  for(i=0;i<terrainSegs.length;i++){ var s=terrainSegs[i]; collideSeg(s.ax,s.ay,s.bx,s.by,s.fr); }
  for(i=0;i<strokes.length;i++){
    var pts=strokes[i].pts;
    for(var j=0;j<pts.length-1;j++){ collideSeg(pts[j][0],pts[j][1],pts[j+1][0],pts[j+1][1],FRICTION); }
  }
  checkPads();
  if(!sled.onGround) sled.sinceGround += dt;
}

// ================================================================ ride update
function updateRide(dt){
  rideTime += dt;
  updateMovers(rideTime);
  for(var i=0;i<pads.length;i++){ if(pads[i].cool>0) pads[i].cool-=dt; if(pads[i].squash>0) pads[i].squash=Math.max(0,pads[i].squash-dt*4); }
  var sub = dt/SUBSTEPS;
  var maxImpact=0;
  for(var k=0;k<SUBSTEPS;k++){
    physicsStep(sub);
    if(sled.contactImpulse>maxImpact) maxImpact=sled.contactImpulse;
  }
  var sp=Math.sqrt(sled.vx*sled.vx+sled.vy*sled.vy);
  // orient sled: face velocity when moving; self-right (level out) while grounded
  if(sp>40){
    var target=Math.atan2(sled.vy,sled.vx);
    var da=target-sled.angle;
    while(da>Math.PI)da-=TAU; while(da<-Math.PI)da+=TAU;
    var rate = sled.onGround ? SELF_RIGHT : 9;
    sled.angle += da*Math.min(1,dt*rate);
    sled.lean += (Math.max(-0.5,Math.min(0.5,da*3)) - sled.lean)*Math.min(1,dt*8);
  } else { sled.lean += (0-sled.lean)*Math.min(1,dt*8); }
  // trail
  sled.trail.push([sled.x,sled.y]); if(sled.trail.length>18) sled.trail.shift();
  // whoosh volume scales with speed
  setWhoosh(Math.min(0.16, sp/MAX_SPEED*0.22));
  // ground scrape + snow spray at speed
  if(sled.onGround && sp>SPRAY_SPEED){
    sfxScrape(sp);
    if(Math.random()<0.8) spawnSpray(sled.x-Math.cos(sled.angle)*10, sled.y-Math.sin(sled.angle)*10+6, sled.vx>=0?1:-1);
  }
  // landing bump feedback (survivable — only cosmetic + a little shake)
  if(maxImpact>140){ sfxBump(maxImpact); camShake=Math.min(9,maxImpact*0.010); spawnSpray(sled.x,sled.y+6,sled.vx>=0?1:-1); }
  if(maxImpact>HARD_IMPACT) hadHardBump=true;
  // star pickup
  if(starPos && !starGot){
    var ddx=sled.x-starPos.x, ddy=sled.y-starPos.y;
    if(ddx*ddx+ddy*ddy < 28*28){ starGot=true; sfxStar(); flash=0.5; camShake=Math.max(camShake,4); spawnSparkle(starPos.x,starPos.y,16,GOLD); }
  }
  // rest / stuck detection
  if(sled.onGround && sp<REST_SPEED){ sled.restTime+=dt; } else { sled.restTime=0; }

  // moving obstacles
  for(i=0;i<movers.length;i++){
    var m=movers[i], mdx=sled.x-m.cx, mdy=sled.y-m.cy, md=Math.sqrt(mdx*mdx+mdy*mdy), rr=m.r+SLED_R;
    if(md<rr){
      if(m.kind==='haz'){ failRun('hazard'); return; }
      // bumper: shove the sled away, keep it alive & bouncy
      var mnx=md>1e-3?mdx/md:0, mny=md>1e-3?mdy/md:-1;
      var pen=rr-md; sled.x+=mnx*pen; sled.y+=mny*pen;
      var vnb=sled.vx*mnx+sled.vy*mny;
      if(vnb<0){ sled.vx-=(1+BUMP_REST)*vnb*mnx; sled.vy-=(1+BUMP_REST)*vnb*mny; }
      sfxBoing(); camShake=Math.max(camShake,4); spawnSparkle(m.cx,m.cy,6,'#FFFFFF');
    }
  }

  // reached goal?
  var gdx=sled.x-goalPos.x, gdy=sled.y-goalPos.y;
  if(gdx*gdx+gdy*gdy < 32*32){ winLevel(); return; }

  // FAIL conditions (all cheap + return to drawing with your lines kept):
  if(sled.y > VH+70 || sled.x < -70 || sled.x > VW+90){ failRun('fall'); return; }   // fell in / off
  for(var s=0;s<spikes.length;s++){ var pdx=sled.x-spikes[s][0], pdy=sled.y-spikes[s][1]; if(pdx*pdx+pdy*pdy<22*22){ failRun('hazard'); return; } }
  if(rideTime>RIDE_TIMEOUT){ failRun('soft'); return; }        // gentle: ran long
  if(sled.restTime>STUCK_TIME){ failRun('soft'); return; }      // gentle: came to a stop
}

function winLevel(){
  state = STATE.WIN; winTimer = 0;
  levelsCleared = Math.max(levelsCleared, levelIdx+1);
  wasPerfect = starGot && !hadHardBump;
  if(starGot){ totalStars++; postScore(); }
  stopWhoosh(); sfxGoal(); flash=0.7; camShake=6;
  spawnConfetti(goalPos.x, goalPos.y-30, 46);
  spawnConfetti(VW*0.5, 120, 30);
  if(wasPerfect) sfxPerfect();
  if(challengeTarget!=null && !challengeBeaten && totalStars>challengeTarget){
    challengeBeaten=true; try{parent.postMessage({gs:'challenge_beaten',score:totalStars},'*');}catch(e){}
  }
}
function failRun(kind){
  state = STATE.FAIL; failTimer = 0; failKind = kind;
  stopWhoosh();
  if(kind==='hazard'||kind==='fall'){
    sled.spin = (sled.vx>=0?1:-1)*(7+Math.random()*5);
    sfxWhump(); camShake=8;
  } else {
    sled.spin = (sled.vx>=0?1:-1)*2.0; // gentle wobble
    sfxOof(); camShake=3;
  }
}
function postScore(){
  try{ parent.postMessage({gs:'score',score:totalStars},'*'); }catch(e){}
  if(totalStars>best){ best=totalStars; try{localStorage.setItem('gs_best:'+SLUG,String(best));}catch(e){} }
}
function endRun(){
  state = STATE.RESULTS;
  stopWhoosh();
  if(totalStars>best){ best=totalStars; try{localStorage.setItem('gs_best:'+SLUG,String(best));}catch(e){} }
  try{ parent.postMessage({gs:'gameover',score:totalStars},'*'); }catch(e){}
}

// ================================================================ actions
function startGame(){ levelIdx=startLevel; totalStars=0; levelsCleared=0; challengeBeaten=false; loadLevel(startLevel); state=STATE.DRAW; }
function goRide(){
  if(state!==STATE.DRAW) return;
  resetSledToStart(); state=STATE.RIDE; startWhoosh(); sfxClick();
}
function redraw(){ // explicit "start fresh": clear your lines, back to drawing SAME level
  strokes.length=0; curStroke=null; inkUsed=0; resetSledToStart(); state=STATE.DRAW; stopWhoosh(); sfxClick();
}
function eraseLast(){ if(strokes.length){ var s=strokes.pop(); inkUsed=Math.max(0,inkUsed-s.len); sfxClick(); } }
function clearAll(){ if(strokes.length){ strokes.length=0; inkUsed=0; sfxClick(); } }
function nextLevel(){
  if(levelIdx+1 >= LEVELS.length){ endRun(); return; }
  levelIdx++; loadLevel(levelIdx); state=STATE.DRAW;
}

// ================================================================ buttons (virtual coords, hit-tested)
function buttons(){
  var b=[];
  if(state===STATE.DRAW){
    b.push({id:'undo', x:16,  y:486, w:104, h:40, label:'Undo'});
    b.push({id:'clear',x:128, y:486, w:104, h:40, label:'Clear'});
    b.push({id:'go',   x:788, y:476, w:156, h:50, label:'GO ▶', big:true});
  } else if(state===STATE.RIDE){
    b.push({id:'redraw',x:788,y:476, w:156, h:50, label:'Redraw ↺'});
  }
  return b;
}
function hitButton(x,y){
  var bs=buttons();
  for(var i=0;i<bs.length;i++){ var b=bs[i]; if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return b; }
  return null;
}
function doButton(b){
  if(b.id==='go') goRide();
  else if(b.id==='undo') eraseLast();
  else if(b.id==='clear') clearAll();
  else if(b.id==='redraw') redraw();
}

// ================================================================ input
function toVirtual(clientX,clientY){ return { x:(clientX-offX)/scale, y:(clientY-offY)/scale }; }
var drawing=false;
function onDown(clientX,clientY){
  initAudio(); if(AC && AC.state==='suspended') AC.resume();
  try{ window.focus(); }catch(e){}
  var p=toVirtual(clientX,clientY);
  if(state===STATE.SPLASH){ startGame(); return; }
  if(state===STATE.RESULTS){ startGame(); return; }
  if(state===STATE.WIN){ nextLevel(); return; }
  if(state===STATE.FAIL){ return; } // auto-returns to draw; ignore taps mid-tumble
  var b=hitButton(p.x,p.y);
  if(b){ doButton(b); return; }
  if(state===STATE.DRAW){
    if(inkUsed>=inkMax) return;
    drawing=true;
    curStroke={pts:[[p.x,p.y]], len:0};
    strokes.push(curStroke);
  }
}
function onMove(clientX,clientY){
  if(!drawing||state!==STATE.DRAW||!curStroke) return;
  var p=toVirtual(clientX,clientY);
  var pts=curStroke.pts, last=pts[pts.length-1];
  var dx=p.x-last[0], dy=p.y-last[1], d=Math.sqrt(dx*dx+dy*dy);
  if(d<5) return;
  if(inkUsed+d>inkMax){
    var rem=inkMax-inkUsed; if(rem<=0){ drawing=false; return; }
    var k=rem/d; p.x=last[0]+dx*k; p.y=last[1]+dy*k; d=rem;
  }
  pts.push([p.x,p.y]); curStroke.len+=d; inkUsed+=d; sfxScratch();
  if(inkUsed>=inkMax) drawing=false;
}
function onUp(){ drawing=false; if(curStroke&&curStroke.pts.length<2){ strokes.pop(); } curStroke=null; }

canvas.addEventListener('pointerdown',function(e){ e.preventDefault(); canvas.setPointerCapture&&canvas.setPointerCapture(e.pointerId); onDown(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointermove',function(e){ e.preventDefault(); onMove(e.clientX,e.clientY); },{passive:false});
canvas.addEventListener('pointerup',function(e){ e.preventDefault(); onUp(); },{passive:false});
canvas.addEventListener('pointercancel',function(e){ onUp(); });

window.addEventListener('keydown',function(e){
  var k=e.key;
  if(k===' '||k==='Spacebar'||k==='Enter'){
    e.preventDefault(); initAudio(); if(AC&&AC.state==='suspended')AC.resume();
    if(state===STATE.SPLASH) startGame();
    else if(state===STATE.DRAW) goRide();
    else if(state===STATE.WIN) nextLevel();
    else if(state===STATE.RESULTS) startGame();
    else if(state===STATE.RIDE) {} // watch the show
  } else if(k==='r'||k==='R'){ e.preventDefault(); if(state===STATE.RIDE||state===STATE.DRAW) redraw(); }
  else if(k==='z'||k==='Z'){ e.preventDefault(); if(state===STATE.DRAW) eraseLast(); }
  else if(k==='c'||k==='C'){ e.preventDefault(); if(state===STATE.DRAW) clearAll(); }
  else if(k==='Escape'){ e.preventDefault(); if(state===STATE.DRAW||state===STATE.RIDE) endRun(); }
},{passive:false});

// ================================================================ drawing helpers
function inkPath(pts, color, width){
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.strokeStyle=color; ctx.lineWidth=width;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ================================================================ render loop
var tPrev=0;
function frame(t){
  var dt=Math.min(0.033,(t-tPrev)/1000||0.016); tPrev=t;
  // ---- update ----
  if(levelBanner>0) levelBanner-=dt;
  if(camShake>0) camShake=Math.max(0,camShake-dt*24);
  if(flash>0) flash=Math.max(0,flash-dt*2);
  // snow drift
  for(var i=0;i<snow.length;i++){ var f=snow[i]; f.ph+=dt*(0.6+f.z*0.3); f.y+=(18+f.z*22)*dt; f.x+=Math.sin(f.ph)*8*dt + (state===STATE.RIDE?sled.vx*0.0002:0); if(f.y>VH+6){f.y=-6;f.x=Math.random()*VW;} if(f.x>VW+6)f.x=-6; if(f.x<-6)f.x=VW+6; }
  // movers gently animate even during DRAW (telegraphs their motion)
  if(state!==STATE.RIDE) updateMovers(performance.now()/1000);
  // fx
  for(i=fx.length-1;i>=0;i--){ var e=fx[i]; e.life-=dt; if(e.life<=0){ fx.splice(i,1); continue; }
    if(e.kind==='confetti'){ e.vy+=900*dt; e.rot+=e.vr*dt; } else if(e.kind==='spray'){ e.vy+=520*dt; }
    else { e.vy+=180*dt; }
    e.x+=e.vx*dt; e.y+=e.vy*dt;
  }

  if(state===STATE.RIDE) updateRide(dt);
  else if(state===STATE.WIN){ winTimer+=dt; }
  else if(state===STATE.FAIL){ failTimer+=dt; // tumble the sled a moment for comedy
    sled.vy+=GRAVITY*dt; sled.x+=sled.vx*dt; sled.y+=sled.vy*dt; sled.angle+=sled.spin*dt;
    var dur = (failKind==='hazard'||failKind==='fall') ? 0.9 : 0.6;
    if(failTimer>dur){ resetSledToStart(); state=STATE.DRAW; } // back to DRAW — lines KEPT
  }

  // ---- render ----
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=LETTERBOX; ctx.fillRect(0,0,cssW,cssH);
  var shx=(Math.random()*2-1)*camShake, shy=(Math.random()*2-1)*camShake;
  ctx.setTransform(scale*dpr,0,0,scale*dpr, (offX+shx)*dpr, (offY+shy)*dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,VW,VH); ctx.clip();

  drawScene();
  drawHUD();
  drawOverlays();

  ctx.restore();
  requestAnimationFrame(frame);
}

// ================================================================ scene
function drawScene(){
  // sky gradient (theme)
  var g=ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,TH.skyTop); g.addColorStop(0.6,TH.skyMid); g.addColorStop(1,TH.skyBot);
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  // paper grain lines
  ctx.strokeStyle= TH.dark? 'rgba(220,235,255,0.04)' : 'rgba(140,120,80,0.05)'; ctx.lineWidth=1;
  for(var y=40;y<VH;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(VW,y); ctx.stroke(); }
  // stars (night themes)
  if(TH.stars){
    for(var si=0;si<stars.length;si++){ var st=stars[si]; var tw=0.5+0.5*Math.sin(performance.now()*0.002+st.ph);
      ctx.fillStyle='rgba(255,255,255,'+(0.3+tw*0.6)+')';
      ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,TAU); ctx.fill(); }
  }
  if(TH.aurora) drawAurora();
  drawOrb();
  // mountains (parallax), recolored per theme
  for(var m=0;m<mtns.length;m++){
    var M=mtns[m], pts=M.pts;
    ctx.fillStyle= m===0?TH.mtnFar:TH.mtnNear;
    ctx.beginPath(); ctx.moveTo(pts[0][0],M.base);
    for(var i=0;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.lineTo(pts[pts.length-1][0],M.base); ctx.closePath(); ctx.fill();
    ctx.strokeStyle= TH.dark?'rgba(200,225,255,0.22)':'rgba(34,48,74,0.24)'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.stroke();
  }

  drawSnow(0.4,1.0);
  drawTerrain();
  drawPads();
  drawSpikes();
  drawMovers();
  if(starPos && !starGot) drawStar(starPos.x,starPos.y);
  drawFlag(goalPos.x,goalPos.y);
  drawStrokes();
  drawFx(false);
  drawSled();
  drawFx(true);
  drawSnow(1.0,1.8);
}
function drawAurora(){
  var t=performance.now()*0.0004;
  for(var b=0;b<3;b++){
    ctx.beginPath();
    for(var x=-20;x<=VW+20;x+=24){ var yy=70+b*34 + Math.sin(x*0.012+t*3+b)*18 + Math.sin(x*0.03+t*5)*8; if(x<0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy); }
    ctx.lineWidth=26; ctx.lineCap='round';
    ctx.strokeStyle= b===0?'rgba(120,240,190,0.10)': b===1?'rgba(140,200,255,0.09)':'rgba(200,150,255,0.08)';
    ctx.stroke();
  }
}
function drawOrb(){
  var o=TH.orb; if(!o) return;
  ctx.save();
  var sg=ctx.createRadialGradient(o.x,o.y,4,o.x,o.y,o.r*3);
  sg.addColorStop(0,o.glow); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(o.x,o.y,o.r*3,0,TAU); ctx.fill();
  ctx.fillStyle=o.fill; ctx.strokeStyle=o.ring; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,TAU); ctx.fill(); ctx.stroke();
  if(o.kind==='moon'){ // crescent shadow
    ctx.fillStyle= TH.skyTop; ctx.beginPath(); ctx.arc(o.x+o.r*0.42,o.y-o.r*0.18,o.r*0.92,0,TAU); ctx.fill();
  }
  ctx.restore();
}
function drawTerrain(){
  for(var p=0;p<terrainDraw.length;p++){
    var entry=terrainDraw[p], poly=entry.pts, kind=entry.kind;
    var isWall = poly.length===2 && Math.abs(poly[1][0]-poly[0][0]) < Math.abs(poly[1][1]-poly[0][1])*0.6;
    // fill body down to bottom
    ctx.beginPath();
    ctx.moveTo(poly[0][0],poly[0][1]);
    for(var i=1;i<poly.length;i++) ctx.lineTo(poly[i][0],poly[i][1]);
    ctx.lineTo(poly[poly.length-1][0],VH+40);
    ctx.lineTo(poly[0][0],VH+40); ctx.closePath();
    var gg=ctx.createLinearGradient(0,poly[0][1]-10,0,VH);
    gg.addColorStop(0,TH.snowLit); gg.addColorStop(0.25,TH.snowFill); gg.addColorStop(1,TH.snowDeep);
    ctx.fillStyle=gg; ctx.fill();
    // ice sheen / sticky speckle accents
    if(kind==='ice'){ ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(poly[0][0],poly[0][1]-1.5); for(i=1;i<poly.length;i++) ctx.lineTo(poly[i][0],poly[i][1]-1.5); ctx.stroke(); }
    // soft underside shade line
    ctx.strokeStyle=TH.shade; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(poly[0][0],poly[0][1]+7);
    for(i=1;i<poly.length;i++) ctx.lineTo(poly[i][0],poly[i][1]+7); ctx.stroke();
    // crisp ink crest
    ctx.strokeStyle=TH.crest; ctx.lineWidth=3.2; ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(poly[0][0],poly[0][1]);
    for(i=1;i<poly.length;i++) ctx.lineTo(poly[i][0],poly[i][1]); ctx.stroke();
    // end caps for cliff edges (skip for walls)
    if(!isWall){ ctx.fillStyle=TH.crest;
      ctx.beginPath(); ctx.arc(poly[poly.length-1][0],poly[poly.length-1][1],2.6,0,TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(poly[0][0],poly[0][1],2.6,0,TAU); ctx.fill(); }
  }
}
function drawPads(){
  for(var i=0;i<pads.length;i++){
    var p=pads[i], sq=p.squash, w=30+sq*8, h=10-sq*5;
    ctx.save(); ctx.translate(p.x,p.y);
    // springs
    ctx.strokeStyle=TH.crest; ctx.lineWidth=2; ctx.lineCap='round';
    for(var s=-1;s<=1;s+=2){ ctx.beginPath(); ctx.moveTo(s*10,14); ctx.lineTo(s*10,h*0.4+2); ctx.stroke(); }
    // bouncy top
    ctx.fillStyle=RED; ctx.strokeStyle='#B5343A'; ctx.lineWidth=2;
    roundRect(-w/2, -h, w, h+6, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)'; roundRect(-w/2+4,-h+2,w-8,3,2); ctx.fill();
    ctx.restore();
  }
}
function drawSpikes(){
  for(var i=0;i<spikes.length;i++){
    var s=spikes[i];
    ctx.fillStyle= TH.dark?'#7E93AB':'#B9C4D2'; ctx.strokeStyle=TH.crest; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(s[0]-14,s[1]+20); ctx.lineTo(s[0],s[1]-22); ctx.lineTo(s[0]+14,s[1]+20); ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
}
function drawMovers(){
  for(var i=0;i<movers.length;i++){
    var m=movers[i];
    ctx.save(); ctx.translate(m.cx,m.cy);
    if(m.kind==='haz'){ // rolling snowball with a grumpy face
      var roll=performance.now()*0.006*(m.bx>m.ax?1:1);
      ctx.fillStyle='#F2F6FC'; ctx.strokeStyle=TH.crest; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU); ctx.fill(); ctx.stroke();
      ctx.save(); ctx.rotate(roll);
      ctx.strokeStyle='rgba(120,150,190,0.5)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(0,0,m.r*0.6,0.4,2.2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,m.r*0.35,3.4,5.0); ctx.stroke();
      ctx.restore();
      ctx.fillStyle=TH.crest;
      ctx.beginPath(); ctx.arc(-4,-3,1.7,0,TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(5,-3,1.7,0,TAU); ctx.fill();
      ctx.strokeStyle=TH.crest; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(1,6,4,3.5,5.9); ctx.stroke();
    } else { // bumper: a springy padded ball
      ctx.fillStyle=GOLD; ctx.strokeStyle='#B9791C'; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU); ctx.fill(); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(-3,-3,m.r*0.4,3.5,5.5); ctx.stroke();
    }
    ctx.restore();
  }
}
function drawStar(x,y){
  var pulse=1+Math.sin(performance.now()*0.005)*0.08;
  ctx.save(); ctx.translate(x,y); ctx.rotate(Math.sin(performance.now()*0.001)*0.2); ctx.scale(pulse,pulse);
  var gg=ctx.createRadialGradient(0,0,2,0,0,26); gg.addColorStop(0,'rgba(242,180,65,0.5)'); gg.addColorStop(1,'rgba(242,180,65,0)');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,26,0,TAU); ctx.fill();
  ctx.fillStyle=GOLD; ctx.strokeStyle='#B9791C'; ctx.lineWidth=1.8;
  ctx.beginPath();
  for(var i=0;i<5;i++){ var a=-1.5708+i*1.2566; var r1=13; ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1); var a2=a+0.6283; var r2=5.6; ctx.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2); }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawFlag(x,y){
  var t=performance.now()*0.006;
  ctx.strokeStyle=TH.crest; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y+4); ctx.lineTo(x,y-46); ctx.stroke();
  ctx.fillStyle=TH.snowLit; ctx.strokeStyle=TH.crest; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(x,y+5,13,5,0,0,TAU); ctx.fill();
  ctx.fillStyle=RED; ctx.strokeStyle='#B5343A'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(x,y-46);
  ctx.quadraticCurveTo(x+18,y-42+Math.sin(t)*2, x+30,y-38+Math.sin(t+1)*2);
  ctx.quadraticCurveTo(x+22,y-33, x+30,y-28+Math.sin(t)*2);
  ctx.quadraticCurveTo(x+14,y-30, x,y-26); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=GOLD; ctx.beginPath(); ctx.arc(x,y-46,3.4,0,TAU); ctx.fill();
}
function drawStrokes(){
  for(var i=0;i<strokes.length;i++){
    var pts=strokes[i].pts; if(pts.length<1) continue;
    if(pts.length<2){ ctx.fillStyle=BIRO; ctx.beginPath(); ctx.arc(pts[0][0],pts[0][1],2.5,0,TAU); ctx.fill(); continue; }
    inkPath(pts,'rgba(36,71,214,0.16)',8);
    inkPath(pts,BIRO2,5.4);
    inkPath(pts,BIRO,3.2);
  }
}
function drawSled(){
  var x=sled.x, y=sled.y, a=sled.angle;
  var sp=Math.sqrt(sled.vx*sled.vx+sled.vy*sled.vy);
  var airborne = state===STATE.RIDE && sled.sinceGround>0.28;
  var face='happy';
  if(state===STATE.WIN) face='cheer';
  else if(state===STATE.FAIL) face='oops';
  else if(airborne && sp>430) face='wheee';
  // speed lines behind the sled when fast
  if(state===STATE.RIDE && sp>720){
    ctx.strokeStyle='rgba(36,71,214,0.16)'; ctx.lineWidth=2; ctx.lineCap='round';
    var ux=-sled.vx/sp, uy=-sled.vy/sp;
    for(var L=0;L<4;L++){ var ox=(Math.random()-0.5)*16, oy=(Math.random()-0.5)*16;
      ctx.beginPath(); ctx.moveTo(x+ux*10+ox,y+uy*10+oy); ctx.lineTo(x+ux*(26+Math.random()*18)+ox,y+uy*(26+Math.random()*18)+oy); ctx.stroke(); }
  }
  ctx.save(); ctx.translate(x,y); ctx.rotate(a);
  // sled runner
  ctx.strokeStyle=INK; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-13,9); ctx.quadraticCurveTo(-17,9,-19,4); ctx.moveTo(-13,9); ctx.lineTo(13,9);
  ctx.quadraticCurveTo(17,9,18,5); ctx.stroke();
  // deck
  ctx.strokeStyle=INK; ctx.lineWidth=2.2; ctx.beginPath(); ctx.moveTo(-12,6); ctx.lineTo(12,6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8,6); ctx.lineTo(-8,9); ctx.moveTo(8,6); ctx.lineTo(8,9); ctx.stroke();
  // rider (leans into turns)
  ctx.save(); ctx.rotate(sled.lean*0.5);
  ctx.strokeStyle=INK; ctx.lineWidth=2.6; ctx.lineCap='round';
  var lean = face==='wheee'||face==='cheer' ? -6 : -3; // torso lean
  ctx.beginPath(); ctx.moveTo(-2,5); ctx.lineTo(2,lean); ctx.stroke(); // torso
  // arms: raised for wheee/cheer, forward otherwise
  if(face==='wheee'||face==='cheer'){
    ctx.beginPath(); ctx.moveTo(1,lean+2); ctx.lineTo(7,lean-7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,lean+2); ctx.lineTo(-6,lean-7); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(2,lean+2); ctx.lineTo(9,lean+5); ctx.stroke();
  }
  // head
  ctx.fillStyle=PAPER; ctx.beginPath(); ctx.arc(3,lean-5,5,0,TAU); ctx.fill(); ctx.lineWidth=2.2; ctx.strokeStyle=INK; ctx.stroke();
  // face
  ctx.fillStyle=INK;
  ctx.beginPath(); ctx.arc(4.6,lean-6,0.9,0,TAU); ctx.fill(); // eye
  ctx.strokeStyle=INK; ctx.lineWidth=1.2; ctx.lineCap='round';
  if(face==='wheee'||face==='oops'){ ctx.beginPath(); ctx.arc(4.5,lean-3.4,1.5,0,TAU); ctx.stroke(); } // open mouth
  else { ctx.beginPath(); ctx.arc(4.5,lean-4.2,2.1,0.15,Math.PI-0.15); ctx.stroke(); } // grin
  // hat (red)
  ctx.fillStyle=RED; ctx.strokeStyle='#B5343A'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(-1,lean-8); ctx.quadraticCurveTo(3,lean-14,9,lean-10); ctx.quadraticCurveTo(6,lean-7,-1,lean-6); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=TH.snowLit; ctx.beginPath(); ctx.arc(9,lean-10,2,0,TAU); ctx.fill();
  ctx.restore();
  // scarf flutter (trailing back)
  var fl=Math.min(1,sp/900);
  var t=performance.now()*0.02;
  ctx.strokeStyle=RED; ctx.lineWidth=3.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-1,-4);
  ctx.quadraticCurveTo(-8,-5+Math.sin(t)*2*fl, -14-fl*8,-2+Math.sin(t+1)*3*fl);
  ctx.stroke();
  ctx.restore();
  // motion trail
  if(state===STATE.RIDE && sled.trail.length>2){
    ctx.strokeStyle='rgba(36,71,214,0.10)'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(sled.trail[0][0],sled.trail[0][1]);
    for(var i=1;i<sled.trail.length;i++) ctx.lineTo(sled.trail[i][0],sled.trail[i][1]); ctx.stroke();
  }
  // fail speech bubble
  if(state===STATE.FAIL && failTimer<0.7){
    var msg = (failKind==='hazard'||failKind==='fall') ? 'oops!' : 'so close!';
    ctx.font='800 20px '+FONT; ctx.textAlign='center';
    var tw=ctx.measureText(msg).width+16;
    ctx.fillStyle='rgba(252,249,240,0.92)'; roundRect(x-tw/2,y-46,tw,26,8); ctx.fill();
    ctx.strokeStyle=INK; ctx.lineWidth=1.6; roundRect(x-tw/2,y-46,tw,26,8); ctx.stroke();
    ctx.fillStyle=RED; ctx.fillText(msg,x,y-27); ctx.textAlign='left';
  }
}
function drawSnow(zmin,zmax){
  for(var i=0;i<snow.length;i++){ var f=snow[i]; if(f.z<zmin||f.z>=zmax) continue;
    ctx.fillStyle='rgba(255,255,255,'+(0.5+f.z*0.22)+')';
    ctx.beginPath(); ctx.arc(f.x,f.y,f.z*1.5,0,TAU); ctx.fill();
  }
}
function drawFx(front){
  for(var i=0;i<fx.length;i++){ var e=fx[i];
    var isFront = e.kind==='confetti';
    if(isFront!==front) continue;
    var al=Math.max(0,Math.min(1,e.life/e.max));
    if(e.kind==='confetti'){
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.rot); ctx.globalAlpha=al;
      ctx.fillStyle=e.col; ctx.fillRect(-e.r,-e.r*0.5,e.r*2,e.r); ctx.restore(); ctx.globalAlpha=1;
    } else if(e.kind==='spray'){
      ctx.globalAlpha=al*0.9; ctx.fillStyle=e.col;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,TAU); ctx.fill(); ctx.globalAlpha=1;
    } else { // sparkle
      ctx.globalAlpha=al; ctx.strokeStyle=e.col; ctx.lineWidth=1.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(e.x-e.r,e.y); ctx.lineTo(e.x+e.r,e.y); ctx.moveTo(e.x,e.y-e.r); ctx.lineTo(e.x,e.y+e.r); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
}

// ================================================================ HUD
function drawHUD(){
  ctx.textBaseline='alphabetic';
  ctx.font='700 22px '+FONT;
  drawPill(16,16, 'Level '+(levelIdx+1)+'/'+LEVELS.length, INK, PAPER);
  drawPill(16,54, '★ '+totalStars, '#8a5a10', '#FFF3D4');
  if(state===STATE.DRAW || state===STATE.RIDE){
    var mw=150, mx=VW-16-mw, my=20, mh=16;
    ctx.fillStyle='rgba(255,255,255,0.7)'; roundRect(mx,my,mw,mh,8); ctx.fill();
    var frac=Math.max(0,1-inkUsed/inkMax);
    ctx.fillStyle=inkUsed>=inkMax?RED:BIRO; roundRect(mx+2,my+2,(mw-4)*frac,mh-4,6); ctx.fill();
    ctx.strokeStyle=INK; ctx.lineWidth=1.6; roundRect(mx,my,mw,mh,8); ctx.stroke();
    ctx.fillStyle=INK; ctx.font='700 14px '+FONT; ctx.textAlign='right';
    ctx.fillText('ink', mx-8, my+13); ctx.textAlign='left';
  }
  if(challengeTarget!=null){
    ctx.font='700 18px '+FONT; ctx.textAlign='center';
    var ct='TARGET ★ '+challengeTarget;
    var w=ctx.measureText(ct).width+24;
    ctx.fillStyle=challengeBeaten?'#2f8f4e':RED; roundRect(VW/2-w/2,14,w,30,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillText(challengeBeaten?'BEATEN! ★ '+totalStars:ct, VW/2, 35);
    ctx.textAlign='left';
  }
  if(state===STATE.DRAW){
    var lv=LEVELS[levelIdx];
    ctx.font='600 17px '+FONT; ctx.textAlign='center';
    var hw=ctx.measureText(lv.hint).width+28;
    ctx.fillStyle='rgba(252,249,240,0.85)'; roundRect(VW/2-hw/2, 92, hw, 30, 10); ctx.fill();
    ctx.strokeStyle='rgba(34,48,74,0.25)'; ctx.lineWidth=1.4; roundRect(VW/2-hw/2,92,hw,30,10); ctx.stroke();
    ctx.fillStyle=INK; ctx.fillText(lv.hint, VW/2, 113);
    ctx.textAlign='left';
  }
  var bs=buttons();
  for(var i=0;i<bs.length;i++) drawButton(bs[i]);
  // level banner: title + theme name (journey feel)
  if(levelBanner>0){
    var al=Math.min(1,levelBanner*1.6);
    var pop=Math.min(1,(1.8-levelBanner)*3.2);
    ctx.save(); ctx.globalAlpha=al; ctx.textAlign='center';
    ctx.translate(VW/2,196); ctx.scale(0.7+pop*0.3,0.7+pop*0.3);
    ctx.font='800 46px '+FONT; ctx.fillStyle=TH.dark?'#EAF2FF':INK;
    ctx.strokeStyle=TH.dark?'rgba(10,20,40,0.5)':PAPER; ctx.lineWidth=6;
    ctx.strokeText(LEVELS[levelIdx].name,0,0); ctx.fillText(LEVELS[levelIdx].name,0,0);
    ctx.font='600 20px '+FONT; ctx.fillStyle=TH.dark?'#B9CBEA':'rgba(34,48,74,0.7)';
    ctx.fillText('Level '+(levelIdx+1)+'  ·  '+TH.name, 0, 30);
    ctx.restore(); ctx.textAlign='left';
  }
}
function drawPill(x,y,txt,fg,bg){
  ctx.font='700 22px '+FONT; ctx.textAlign='left';
  var w=ctx.measureText(txt).width+22, h=30;
  ctx.fillStyle=bg; roundRect(x,y,w,h,10); ctx.fill();
  ctx.strokeStyle='rgba(34,48,74,0.5)'; ctx.lineWidth=1.6; roundRect(x,y,w,h,10); ctx.stroke();
  ctx.fillStyle=fg; ctx.fillText(txt, x+11, y+22);
}
function drawButton(b){
  var big=b.big;
  ctx.fillStyle=big?BIRO:'rgba(252,249,240,0.94)';
  roundRect(b.x,b.y,b.w,b.h,12); ctx.fill();
  ctx.strokeStyle=big?BIRO2:INK; ctx.lineWidth=big?2.6:2; roundRect(b.x,b.y,b.w,b.h,12); ctx.stroke();
  ctx.fillStyle=big?'#fff':INK; ctx.font=(big?'800 26px ':'700 20px ')+FONT;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2+1);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ================================================================ overlays
function drawOverlays(){
  if(state===STATE.SPLASH) drawSplash();
  else if(state===STATE.WIN) drawWin();
  else if(state===STATE.RESULTS) drawResults();
  if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.5)+')'; ctx.fillRect(0,0,VW,VH); }
}
function drawSplash(){
  ctx.fillStyle='rgba(252,249,240,0.5)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.save(); ctx.translate(VW/2,190); ctx.rotate(-0.03);
  ctx.font='900 92px '+FONT;
  ctx.lineWidth=8; ctx.strokeStyle=PAPER; ctx.strokeText('Downhill',0,0);
  ctx.fillStyle=INK; ctx.fillText('Downhill',0,0);
  ctx.strokeStyle=BIRO; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-170,34); ctx.quadraticCurveTo(0,58,180,26); ctx.stroke();
  ctx.restore();
  ctx.font='600 25px '+FONT; ctx.fillStyle=INK;
  ctx.fillText('Draw a path down the hill — let gravity ride the sled to the flag', VW/2, 296);
  ctx.font='600 19px '+FONT; ctx.fillStyle='rgba(34,48,74,0.75)';
  ctx.fillText('8 hills, springs, ice, snowballs & big air. Wipe out? Just tweak your line.', VW/2, 326);
  var pulse=0.6+0.4*Math.sin(performance.now()*0.005);
  ctx.globalAlpha=pulse; ctx.font='800 30px '+FONT; ctx.fillStyle=RED;
  ctx.fillText('Click or press Space to start', VW/2, 384);
  ctx.globalAlpha=1; ctx.textAlign='left';
}
function drawWin(){
  var pop=Math.min(1,winTimer*3);
  ctx.textAlign='center';
  ctx.save(); ctx.globalAlpha=Math.min(1,winTimer*2);
  ctx.fillStyle='rgba(252,249,240,0.42)'; ctx.fillRect(0,0,VW,VH);
  ctx.translate(VW/2,150); ctx.scale(pop,pop);
  var title = wasPerfect ? 'PERFECT!' : 'Nice run!';
  ctx.font='900 62px '+FONT; ctx.strokeStyle=PAPER; ctx.lineWidth=8; ctx.strokeText(title,0,0);
  ctx.fillStyle= wasPerfect?'#E0902A':'#2f8f4e'; ctx.fillText(title,0,0);
  ctx.restore();
  ctx.font='600 24px '+FONT; ctx.fillStyle=INK;
  ctx.fillText(starGot?'★ Star collected!':'Reached the flag', VW/2, 200);
  if(winTimer>0.5){
    var pulse=0.6+0.4*Math.sin(performance.now()*0.006);
    ctx.globalAlpha=pulse; ctx.font='800 26px '+FONT; ctx.fillStyle=RED;
    ctx.fillText(levelIdx+1>=LEVELS.length?'Tap / Space for results':'Tap / Space for the next hill', VW/2, 250);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}
function drawResults(){
  ctx.fillStyle='rgba(252,249,240,0.72)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  ctx.save(); ctx.translate(VW/2,140); ctx.rotate(-0.02);
  ctx.font='900 62px '+FONT; ctx.strokeStyle=PAPER; ctx.lineWidth=8; ctx.strokeText('Run complete',0,0);
  ctx.fillStyle=INK; ctx.fillText('Run complete',0,0); ctx.restore();
  ctx.font='900 78px '+FONT; ctx.fillStyle=GOLD; ctx.strokeStyle='#B9791C'; ctx.lineWidth=3;
  ctx.strokeText('★ '+totalStars, VW/2, 262); ctx.fillText('★ '+totalStars, VW/2, 262);
  ctx.font='600 24px '+FONT; ctx.fillStyle=INK;
  ctx.fillText('stars collected · '+levelsCleared+'/'+LEVELS.length+' hills cleared', VW/2, 300);
  ctx.fillText('best  ★ '+best, VW/2, 334);
  if(challengeBeaten){ ctx.fillStyle='#2f8f4e'; ctx.font='800 26px '+FONT; ctx.fillText('Target beaten! ★', VW/2, 372); }
  var pulse=0.6+0.4*Math.sin(performance.now()*0.005);
  ctx.globalAlpha=pulse; ctx.font='800 30px '+FONT; ctx.fillStyle=RED;
  ctx.fillText('Tap / Space to draw it again', VW/2, 412);
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ================================================================ boot
loadLevel(0);              // render the first hill behind the splash
levelBanner = 0;
requestAnimationFrame(frame);
// read-only test probe (no effect on play): lets the verification drive inspect
// state and convert virtual->client coords so it can draw real pointer strokes.
try{ parent.postMessage({gs:'ready'},'*'); }catch(e){}
})();
</script>
