<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF3FB"/>
      <stop offset="0.6" stop-color="#FCF9F0"/>
      <stop offset="1" stop-color="#FBF8EE"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="0.3" stop-color="#EAF1F8"/>
      <stop offset="1" stop-color="#DCE6F1"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F2B441" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F2B441" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ink{fill:none;stroke:#22304A;stroke-linecap:round;stroke-linejoin:round;}
      .biro{fill:none;stroke:#2447D6;stroke-linecap:round;stroke-linejoin:round;}
      .t{font-family:'Comic Sans MS','Chalkboard SE','Segoe Print',cursive;font-weight:800;}
    </style>
  </defs>

  <rect width="640" height="400" fill="url(#sky)"/>
  <g opacity="0.06" stroke="#8C7850">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/><line x1="0" y1="360" x2="640" y2="360"/>
  </g>

  <!-- sun -->
  <circle cx="540" cy="72" r="95" fill="url(#sun)"/>
  <circle cx="540" cy="72" r="30" fill="#FBE1A6" stroke="#E7B048" stroke-width="2.5"/>

  <!-- mountains -->
  <path d="M-20 210 L80 150 L170 205 L270 130 L360 200 L470 140 L560 205 L660 165 L660 300 L-20 300 Z" fill="#D7E4F2"/>
  <path d="M-20 250 L110 190 L220 250 L330 200 L450 255 L560 205 L660 250 L660 340 L-20 340 Z" fill="#C3D6EC"/>
  <path class="ink" d="M-20 250 L110 190 L220 250 L330 200 L450 255 L560 205 L660 250" stroke-width="1.6" opacity="0.3"/>

  <!-- snowy hill terrain -->
  <path d="M-20 250 C 60 260 120 300 200 330 C 280 360 340 300 420 320 C 500 340 560 360 660 350 L660 400 L-20 400 Z" fill="url(#snow)"/>
  <path class="ink" d="M-20 250 C 60 260 120 300 200 330 C 280 360 340 300 420 320 C 500 340 560 360 660 350" stroke-width="3.2"/>

  <!-- drawn biro track: a ramp curving down then kicking up into a launch -->
  <path class="biro" d="M70 120 C 140 150 190 210 250 250 C 300 282 330 300 375 288 C 405 280 420 258 440 236" stroke-width="3.4"/>
  <path class="biro" d="M70 120 C 140 150 190 210 250 250 C 300 282 330 300 375 288 C 405 280 420 258 440 236" stroke-width="7" opacity="0.16"/>

  <!-- star on the high arc -->
  <g transform="translate(300,150)">
    <circle r="20" fill="#F2B441" opacity="0.35"/>
    <path d="M0,-13 L3.8,-4 L13,-4 L5.6,2 L8.6,11 L0,5.6 L-8.6,11 L-5.6,2 L-13,-4 L-3.8,-4 Z" fill="#F2B441" stroke="#B9791C" stroke-width="1.5"/>
  </g>

  <!-- sledder mid-launch off the ramp -->
  <g transform="translate(470,208) rotate(-24)">
    <!-- sled -->
    <path class="ink" d="M-15 10 Q-20 10 -22 4 M-15 10 L15 10 Q20 10 21 5" stroke-width="3.2"/>
    <path class="ink" d="M-13 6 L13 6 M-9 6 L-9 10 M9 6 L9 10" stroke-width="2.2"/>
    <!-- body -->
    <path class="ink" d="M-2 5 L3 -4 M3 -1 L11 2" stroke-width="2.8"/>
    <circle cx="4" cy="-9" r="5.5" fill="#FCF9F0" stroke="#22304A" stroke-width="2.2"/>
    <path d="M-1 -12 Q4 -19 11 -14 Q7 -11 -1 -10 Z" fill="#E5484D" stroke="#B5343A" stroke-width="1.3"/>
    <circle cx="11" cy="-14" r="2.3" fill="#FBFDFF"/>
    <!-- scarf -->
    <path d="M-1 -4 Q-10 -6 -20 -1" fill="none" stroke="#E5484D" stroke-width="3.4" stroke-linecap="round"/>
  </g>
  <!-- launch spray -->
  <g fill="#FBFDFF" stroke="#B9C4D2" stroke-width="1">
    <circle cx="448" cy="230" r="4"/><circle cx="436" cy="242" r="3"/><circle cx="458" cy="242" r="2.5"/>
  </g>

  <!-- red flag goal -->
  <g transform="translate(560,340)">
    <ellipse cx="0" cy="5" rx="14" ry="5" fill="#FBFDFF" stroke="#22304A" stroke-width="1.5"/>
    <path class="ink" d="M0 4 L0 -48" stroke-width="3"/>
    <path d="M0 -48 Q20 -44 32 -40 Q24 -35 32 -30 Q16 -32 0 -28 Z" fill="#E5484D" stroke="#B5343A" stroke-width="1.6"/>
    <circle cx="0" cy="-48" r="3.4" fill="#F2B441"/>
  </g>

  <!-- snow particles -->
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="120" cy="90" r="3"/><circle cx="220" cy="60" r="2"/><circle cx="360" cy="110" r="2.5"/>
    <circle cx="90" cy="200" r="2.5"/><circle cx="500" cy="150" r="2"/><circle cx="600" cy="220" r="3"/>
    <circle cx="270" cy="220" r="2"/><circle cx="160" cy="300" r="2.5"/><circle cx="420" cy="120" r="2"/>
  </g>

  <!-- hand-drawn title -->
  <g transform="translate(70,66) rotate(-3)">
    <text class="t" x="0" y="0" font-size="66" fill="#FCF9F0" stroke="#FCF9F0" stroke-width="8" paint-order="stroke">Downhill</text>
    <text class="t" x="0" y="0" font-size="66" fill="#22304A">Downhill</text>
    <path class="biro" d="M-6 18 Q120 40 250 10" stroke-width="5"/>
  </g>
  <text class="t" x="72" y="104" font-size="20" fill="#2447D6" transform="rotate(-2 72 104)">draw the path · ride the hill</text>
</svg>
