<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   PAPER PILOT — throw a paper airplane across a doodled town
   until it reaches your pen pal's mailbox at 3000m — then chase
   a maxed-out plane toward a ~10,000m horizon.
   Pure Canvas2D + WebAudio. No assets. One file.
   ============================================================ */

// ---------- TUNING CONSTANTS (physics) ----------
// World scale: 5 px = 1 meter. Ground is a notebook-paper street.
const SLUG   = 'paper-pilot';
const W = 960, H = 540;          // fixed virtual resolution (landscape)
const PXM    = 5;                // pixels per meter
const GROUND = 460;              // ground line y (world coords)
const LAUNCH = { x: 70, y: 208 };// classroom window ledge
const GRAV   = 285;              // gravity px/s^2 (low = floaty paper)
const GLIDE  = 6;                // how fast fall speed relaxes to terminal (per s)
// ---- 7-TIER PROGRESSION TUNING (the long chase to ~10,000m) ----
// Every lever now runs 0..7 (tier 0 = the bare paper dart). Early tiers are cheap
// and each one visibly changes the craft; the tail keeps escalating so a FULLY-maxed
// plane, flown well (rationed boost + dive-slams), can push toward a ~10k horizon
// while the 3000m mailbox is reachable long before then. Numbers below are the retune:
// each Airframe/Launcher/Thruster tier compounds glide + speed + boost so distance
// climbs super-linearly with total investment (that's what makes the chase long).
const DRAG_BASE = 0.16, DRAG_STEP = 0.0172; // air drag /s; Airframe T7 -> 0.040 (long, but still settles)
const TERM_BASE = 132,  TERM_STEP = 10.5;   // terminal fall px/s; Airframe T7 -> 58.5 (floaty, lands in ~25-35s)
const POW_BASE  = 375,  POW_STEP  = 178;    // launch speed px/s; Launcher T0 375 -> T7 1621 (front-loaded speed)
const REST_BASE = 0.5;                      // ground bounce restitution (fixed; no upgrade)
const SLIDE  = 1.15;             // ground slide friction /s (skid after last bounce)
const BOUNCE_KEEP = 0.985;       // vx kept per ground bounce
// ---- HELD BOOST (thruster device + fuel tank) — both now 7 tiers ----
// Boost is HELD, not tapped: hold to fire continuous forward+up thrust; it DRAINS gas.
// Tradeoff you must ration: stronger devices push harder AND burn gas faster.
//   Thruster tier -> thrust power & burn RATE.   Fuel Tank tier -> gas CAPACITY.
// Gas is set at launch and never refills mid-run — timing the boost is the real skill.
const THR_BASE  = 300, THR_STEP  = 55;     // forward thrust accel px/s^2; T1 PocketFan 300 -> T7 Fusion 630
const THR_LIFT  = 0.5;                       // fraction of thrust re-applied as lift (climb)
const BURN_BASE = 1.0, BURN_STEP = 0.14;   // gas burn/sec; T1 1.0 -> T7 1.84 (stronger devices drink more)
const GAS_BASE  = 1.15, GAS_STEP = 0.77;   // gas capacity (sec@rate1); Fuel T0 1.15s -> T7 6.54s
const DEVICE = ['(none)','Pocket Fan','Propeller','Drone','Rocket','Ion Thruster','Plasma Jet','Fusion Core']; // Thruster tiers 0..7
// ---- LASER (Nose Gun tiers 4..7) — a rationed mid-flight weapon (see fireLaser) ----
const LASER_TIER   = 4;      // nose tier where the fireable laser unlocks (Laser Pointer)
const LASER_DRAIN  = 0.5;    // beam energy drained /s while firing (metered like the gas tank)
const LASER_CHARGE = 0.34;   // energy recharged /s when not firing
const LASER_MIN    = 0.06;   // need at least this much charge to (re)start firing
const LASER_ZAP    = 5;      // style points per pigeon vapourised
// drive-verified curve (see scripts/drive-paper-pilot.mjs): naive T0 ~190m (~40 stickers,
// affords a run-1 buy), T3 ~1.5k, T5 ~4-5k, and a FULLY-maxed plane flown well ~9-11k —
// the 3000m mailbox falls around T4-T5, then the long tail chases the ~10k horizon.
const DEFAULT_POW = 0.8, DEFAULT_ANG = -0.66; // quick-throw (space/tap): 80% power, ~38 deg up

// ---- MID-FLIGHT PITCH & ENERGY (the active-glide skill) ----
// Pitch input (↑/W = nose up, ↓/S = nose down; on touch: drag ▲▼ in the left zone)
// LEANS the nose, and the velocity vector BANKS toward that nose over time — a turn
// RATE, not an instant snap — so steering feels weighty, like weighting a real paper
// plane. Energy trades naturally: climbing sheds forward speed for height, diving
// trades height back into speed (gravity does the honest work; ENERGY_EXCH adds a
// little arcade juice on top). A gentle PITCH_DRAG means hauling on the nose hard
// bleeds a touch of energy, so smooth flying beats yanking. Tuned floaty, never twitchy.
const PITCH_EASE   = 3.6;    // how fast the pitch COMMAND eases toward the raw input (/s)
const PITCH_MAX    = 0.92;   // max bank of the velocity off the flight path (rad ≈ 53°)
const TURN_RATE    = 2.3;    // how fast velocity chases the nose (/s) — this IS the "weight"
const ENERGY_EXCH  = 200;    // px/s of speed SHED per unit climb (nose up trades speed for height)
const DIVE_EXCH    = 460;    // px/s of speed GAINED per unit dive (nose down trades height for speed — diving is the recover maneuver, so it pays off noticeably)
const PITCH_DRAG   = 0.15;   // energy bled while hauling the nose UP hard (/s * pitch); dives don't pay this
const NOSE_LEAD    = 0.34;   // extra visible nose tilt beyond the flight path (rad) for readability
const DIVE_TERM_BONUS = 2.4; // diving raises the terminal fall-cap so committed dives feel fast

// ---- AERODYNAMIC STALL (the skill gate on the climb — closes "hold ↑ = fly forever") ----
// A wing only makes lift with airspeed. Climbing already bleeds speed (the energy model
// above does the honest work); once airspeed falls below STALL_SPD *while the nose is held
// steeply UP*, the wing STALLS: lift dies, the nose drops on its own, and the plane noses
// over into a RECOVERABLE dive that rebuilds speed (dive → regain airspeed → fly out at
// STALL_RECOVER). Level off or dive before the speed meter bottoms out and you never stall —
// only OVER-holding the climb does. Gentle climbs, level flight and dives (pitch below
// STALL_PITCH, or airspeed above the threshold) are untouched, so normal flying is unchanged.
// Boosting adds airspeed, so a live thruster staves off a stall — but only while gas lasts.
const STALL_SPD     = 150;   // px/s airspeed under which a steeply nose-up wing stalls (~30 on the m/s meter)
const STALL_RECOVER = 250;   // px/s airspeed that flies you out of a stall (hysteresis, > STALL_SPD)
const STALL_WARN    = 95;    // px/s band above STALL_SPD where the telegraph (meter flash + "STALL!") begins
const STALL_PITCH   = 0.7;   // only a firmly-held nose-up command can stall (~330ms+ hold); brief taps stay safe
const STALL_HANG    = 0.4;   // s of floaty "hang" at the apex before the nose drops (readable, not a brick)
const STALL_NOSE    = -0.9;  // the pitch the stalled wing forces itself to (a firm, recoverable nose-over)
const STALL_DROP    = 2.6;   // how fast the nose falls over once the hang ends (/s toward STALL_NOSE)

// ---------- TUNING CONSTANTS (economy) ----------
// Stickers = dist_m*PAY_DIST + airtime_s*PAY_AIR + trick bonuses. Never < 1 (bank every run).
// First throw pays ~28; cheapest tier-1 prices below = a buy on run 1, then next always ~1-3 runs out.
// Curve stays gentle late (x2.1/tier, not x2.5) so maxing feels earned, not walled.
const PAY_DIST = 0.14, PAY_AIR = 2.0;
// 5 levers × 7 tiers. Prices: cheap opener (a buy on run 1), then ~1.9-2.1×/tier so the
// FIRST 3 buys land inside ~5 runs while the steep tail keeps meaningful buys coming for
// hundreds of throws. Distance pays for itself: a 5000m run banks ~700+ stickers, so the
// four-figure top tiers are earned by the very long throws they unlock.
const SHOP = [
  { key:'folds', name:'Airframe',   blurb:'glides farther',        prices:[25, 55,110,210,380, 680,1150] },
  { key:'band',  name:'Launcher',   blurb:'throws harder',         prices:[35, 75,150,290,520, 900,1500] },
  { key:'clip',  name:'Nose Gun',   blurb:'smash stuff · laser@T4',prices:[55,120,240,440,780,1300,2100] },
  { key:'thr',   name:'Thruster',   blurb:'hold to boost mid-air', prices:[40, 95,200,380,680,1150,1900] },
  { key:'fuel',  name:'Fuel Tank',  blurb:'more boost gas',        prices:[30, 70,145,275,500, 860,1400] },
];
const MAXTIER = 7;
// Evocative per-tier names (index 0 = the bare starting craft). Shown on the shop cards.
const LAUNCH_N = ['(hand throw)','Rubber Band','Slingshot','Spring Cannon','Coil Launcher','Torsion Catapult','Rail Kicker','Gauss Rail'];
const NOSE_N   = ['(bare nose)','Paperclip','Drill Nose','Spark Tip','Laser Pointer','Cutting Laser','Plasma Lance','Photon Cannon'];
const FUEL_N   = ['Flask','Canteen','Jerry Can','Reserve Tank','Twin Tanks','Drop Tanks','Bladder Cell','Endurance Cell'];
const TRICK = { bus:3, awning:3, closeCall:2, smash:4, leafPunch:2, pageTurn:5 };

// ---------- world layout ----------
const MAILBOX_X = LAUNCH.x + 3000*PXM;   // pen pal's mailbox: 3000 m
const PAGE_LEN  = 4800;                  // a red margin line every 960 m ("next page")
const CHUNK = 420;

// ---------- palette ----------
const PAPER='#FCF9F0', PAPER_DK='#F5EEDC', INK='#2447D6', INK_SOFT='rgba(36,71,214,0.45)',
      RED='#D9482B', WHITE='#FFFFFF', PENCIL='#8A93A8', GUM_PINK='#E8849E',
      LETTERBOX='#16255C', RULE='rgba(36,71,214,0.10)';
const FONT='"Comic Neue","Chalkboard SE","Comic Sans MS","Segoe Print",cursive';

// Airframe (was "Sharper Folds") is a VISIBLE craft transformation: shape (sweep) +
// material (fill/outline/sheen) both change per tier — from a scrappy notebook page,
// through waxed & cardstock gliders and metal jets, to an iridescent nanofoil ace and
// a near-translucent aerogel phantom. 8 entries = tiers 0..7.
const FOLD_MAT = [
  { name:'Notebook Scrap',    fill:'#FCF9F0', fill2:'#EFE9DA', line:'#2447D6', sheen:0.00, sweep:0 },
  { name:'Crisp Dart',        fill:'#FFFFFF', fill2:'#ECE6D4', line:'#2447D6', sheen:0.08, sweep:1 },
  { name:'Waxed Glider',      fill:'#FFFDF0', fill2:'#EDE3C2', line:'#2340C4', sheen:0.24, sweep:2 },
  { name:'Cardstock Cruiser', fill:'#E9F0FF', fill2:'#C4D3F4', line:'#1B37B0', sheen:0.32, sweep:3 },
  { name:'Foil Jet',          fill:'#DCE1EB', fill2:'#A6AEC0', line:'#3A4256', sheen:0.64, sweep:4 },
  { name:'Carbon Dart',       fill:'#3B4150', fill2:'#20242E', line:'#10131A', sheen:0.42, sweep:5 },
  { name:'Nanofoil Ace',      fill:'#CFE4FF', fill2:'#8FB6E8', line:'#2A57C8', sheen:0.98, sweep:6 },
  { name:'Aerogel Phantom',   fill:'#EAF3FF', fill2:'#BBD6F2', line:'#5FE9FF', sheen:1.00, sweep:7 },
];

// ---------- boilerplate: canvas, letterbox, dpr ----------
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let dpr=1, scl=1, offX=0, offY=0;
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2.5);
  const iw = window.innerWidth, ih = window.innerHeight;
  cv.width = Math.round(iw*dpr); cv.height = Math.round(ih*dpr);
  scl = Math.min(iw/W, ih/H);
  offX = (iw - W*scl)/2; offY = (ih - H*scl)/2;
}
window.addEventListener('resize', resize); resize();

// ---------- deterministic RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const worldRng = mulberry32(120726);           // fixed world: same town every run (skill is honest)
function hash1(n){const s=Math.sin(n*127.1)*43758.5453;return s-Math.floor(s);}    // static hash
let boil=0;                                     // hand-drawn "boil" phase (updates ~8/s)
function jit(n){const s=Math.sin(n*127.1+boil*311.7)*43758.5453;return (s-Math.floor(s))-0.5;}

// ---------- save / best ----------
let save = { st:0, up:{folds:0,band:0,clip:0,thr:0,fuel:0}, throws:0, delivered:false, delThrows:0, coachDone:{aim:false,pitch:false,boost:false,laser:false} };
let best = 0;
try{
  const s = localStorage.getItem('gs_save:'+SLUG);
  if(s){
    const j = JSON.parse(s);
    if(j){
      // migrate old save shape safely (never crash): fan->thruster, gum->fuel; clamp 0..5
      if(typeof j.st==='number' && isFinite(j.st)) save.st=Math.max(0,j.st);
      if(typeof j.throws==='number' && isFinite(j.throws)) save.throws=Math.max(0,j.throws);
      if(j.delivered) save.delivered=true;
      if(typeof j.delThrows==='number') save.delThrows=j.delThrows;
      // first-time coaching "seen it" flags (persist so returning players aren't nagged)
      if(j.coachDone && typeof j.coachDone==='object'){ for(const k in save.coachDone){ if(j.coachDone[k]) save.coachDone[k]=true; } }
      // clamp 0..7 (tracks are now 7 tiers deep). Old <=5 saves stay valid.
      const o=j.up||{}, cl=n=>Math.max(0,Math.min(MAXTIER,(typeof n==='number'&&isFinite(n))?Math.floor(n):0));
      save.up.folds=cl(o.folds); save.up.band=cl(o.band); save.up.clip=cl(o.clip);
      save.up.thr = cl(typeof o.thr ==='number'? o.thr : o.fan);  // old Pocket Fan track -> Thruster
      save.up.fuel= cl(typeof o.fuel==='number'? o.fuel: o.gum);  // old Gum track -> Fuel Tank
    }
  }
  // a player who's already reached the mailbox has clearly learned the basics — skip the intro coaching
  if(save.delivered){ save.coachDone.aim=save.coachDone.pitch=save.coachDone.boost=true; }
  best = Math.max(0, parseInt(localStorage.getItem('gs_best:'+SLUG)||'0',10)||0);
}catch(e){}
function persist(){ try{ localStorage.setItem('gs_save:'+SLUG, JSON.stringify(save)); localStorage.setItem('gs_best:'+SLUG, String(best)); }catch(e){} }
// mark a first-time coaching callout as seen (once the player uses that control) so it never nags again
function markCoach(k){ if(save.coachDone && !save.coachDone[k]){ save.coachDone[k]=true; persist(); } }

// ---------- challenge param ----------
let challenge = 0, challengeBeaten = false;
try{ const c = parseInt(new URLSearchParams(location.search).get('c')||'0',10); if(c>0) challenge=c; }catch(e){}

// ---------- bridge ----------
function post(m){ try{ parent.postMessage(m, '*'); }catch(e){} }

// ---------- audio ----------
let AC=null, master=null, whooshGain=null, whooshFilt=null, flutGain=null, boostGain=null, boostFilt=null;
function audioInit(){
  if(AC) { if(AC.state==='suspended') AC.resume(); return; }
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=0.5; master.connect(AC.destination);
    // looping noise bed for whoosh + flutter
    const len = AC.sampleRate*1.2, buf = AC.createBuffer(1,len,AC.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer=buf; src.loop=true;
    whooshFilt = AC.createBiquadFilter(); whooshFilt.type='bandpass'; whooshFilt.frequency.value=500; whooshFilt.Q.value=0.8;
    whooshGain = AC.createGain(); whooshGain.gain.value=0;
    src.connect(whooshFilt); whooshFilt.connect(whooshGain); whooshGain.connect(master);
    const src2 = AC.createBufferSource(); src2.buffer=buf; src2.loop=true;
    const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2600;
    flutGain = AC.createGain(); flutGain.gain.value=0;
    src2.connect(hp); hp.connect(flutGain); flutGain.connect(master);
    // held-boost drone (gated in the frame loop while boosting)
    const src3 = AC.createBufferSource(); src3.buffer=buf; src3.loop=true;
    boostFilt = AC.createBiquadFilter(); boostFilt.type='bandpass'; boostFilt.frequency.value=260; boostFilt.Q.value=1.3;
    boostGain = AC.createGain(); boostGain.gain.value=0;
    src3.connect(boostFilt); boostFilt.connect(boostGain); boostGain.connect(master);
    src.start(); src2.start(); src3.start();
  }catch(e){ AC=null; }
}
function vary(f){ return f*(0.9+Math.random()*0.2); }  // ±10% pitch (cosmetic — ok to be unseeded)
function tone(freq,dur,type,gain,slideTo){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain(), t=AC.currentTime;
  o.type=type||'triangle'; o.frequency.setValueAtTime(vary(freq),t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30,vary(slideTo)), t+dur);
  g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
}
function noiseBurst(dur,gain,freq){
  if(!AC) return;
  const len=Math.max(64, AC.sampleRate*dur|0), b=AC.createBuffer(1,len,AC.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=b;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq||900; f.Q.value=0.7;
  const g=AC.createGain(); g.gain.value=gain;
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
const sfx = {
  throwWhoosh(p){ noiseBurst(0.32, 0.20+0.18*p, 700+500*p); },
  boing(i){ tone(150+90*i, 0.22, 'triangle', 0.16+0.1*i, 340+160*i); },
  bonk(){ tone(95,0.12,'square',0.2,60); noiseBurst(0.08,0.14,500); },
  thud(){ tone(70,0.16,'sine',0.24,45); noiseBurst(0.1,0.12,300); },
  sticky(){ noiseBurst(0.22,0.14,320); tone(220,0.2,'sine',0.08,110); },
  smash(){ noiseBurst(0.14,0.2,1400); tone(500,0.1,'square',0.1,700); },
  ching(i){ tone(760+i*36, 0.07, 'square', 0.07, 900+i*40); },
  chaChing(){ tone(880,0.09,'square',0.12); setTimeout(()=>tone(1320,0.16,'square',0.12),70); },
  fan(){ noiseBurst(0.4,0.16,1000); tone(130,0.4,'sawtooth',0.07,240); },
  fanfare(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.14),i*110)); },
  bigFanfare(){ [523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.26,'triangle',0.15),i*130)); },
  deny(){ tone(160,0.12,'square',0.08,120); },
  buy(){ tone(660,0.08,'square',0.1); setTimeout(()=>tone(990,0.12,'square',0.1),60); },
  nearMiss(){ tone(1200,0.08,'sine',0.08,1500); },
  pop(){ tone(vary(300),0.06,'square',0.08,500); },
  laser(){ tone(1500,0.12,'sawtooth',0.09,420); },                 // beam fire-up "pew"
  zap(){ tone(1900,0.09,'square',0.1,600); noiseBurst(0.06,0.09,2600); }, // pigeon vapourised
  stall(){ tone(300,0.22,'sawtooth',0.10,120); noiseBurst(0.22,0.10,420); }, // wing buffet: falling wobble as lift dies
};

// ---------- game state ----------
let state='aim';            // aim | fly | settle | result
let charging=false, chargeT=0;   // keyboard charge-and-release throw
let boosting=false;              // held-boost input state (pointer down / Space held during flight)
let laserHeld=false;             // keyboard laser-fire input (F held during flight)
let laserWasOn=false;            // edge-detect for the fire-start sfx
let plane={x:LAUNCH.x,y:LAUNCH.y,vx:0,vy:0,rot:-0.5};
let cam={x:-170,y:0,zoom:1,shake:0};
let run={dist:0,air:0,tricks:0,trickN:0,gas:0,boostOn:false,pitch:0,stickers:0,dPts:0,aPts:0,tPts:0,newBest:false,justDelivered:false,pageAt:0,laserOn:false,laserE:1,stalling:false,stallHang:0,stallWarn:0,usedPitch:false,usedBoost:false,usedLaser:false};
let settleT=0, tallyT=0, sel=-1, lastScorePost=0, cardShake=0, cardShakeI=-1;
let dragging=false, dragStart={x:0,y:0}, dragCur={x:0,y:0};
// mid-flight pitch input: keyboard flags + touch (left-zone drag). Read only while flying.
let pitchHeld={up:false,down:false};
const pointers=new Map();        // active flight pointers -> {role:'pitch'|'boost', sy}
let touchPitch=0, touchPitchActive=false, isTouch=false;
const touchCapable = (('ontouchstart' in window) || (navigator.maxTouchPoints||0) > 0);
function pitchInput(){
  let v=0;
  if(pitchHeld.up)   v+=1;       // +1 = nose UP (climb)
  if(pitchHeld.down) v-=1;       // -1 = nose DOWN (dive)
  if(v===0 && touchPitchActive) v=touchPitch;
  return Math.max(-1,Math.min(1,v));
}
let banner=null, bannerT=0;             // {text, sub, col}
let timeScale=1, slowT=0;
let penpalWave=0;                        // >0: pen pal waving
let hudStickerPulse=0, fanChipPulse=0, laserChipPulse=0, distShown=0;
let T=0;                                 // global clock (s)
let trail=[]; for(let i=0;i<26;i++) trail.push({x:0,y:0,on:false});
let trailI=0, trailAcc=0;

// ---------- upgrade-derived physics ----------
function drag(){ return DRAG_BASE - DRAG_STEP*save.up.folds; }
function term(){ return TERM_BASE - TERM_STEP*save.up.folds; }
function power(){ return POW_BASE + POW_STEP*save.up.band; }
function thrThrust(){ const t=save.up.thr; return t>0? THR_BASE+THR_STEP*(t-1) : 0; } // thrust accel
function thrBurn(){   const t=save.up.thr; return t>0? BURN_BASE+BURN_STEP*(t-1) : 0; } // gas/sec
function gasMax(){ return GAS_BASE + GAS_STEP*save.up.fuel; }                          // capacity
function speedKeepHit(){ return save.up.clip>=4 ? 0.97 : 1; } // T4+: keep speed through hits
function hasLaser(){ return save.up.clip>=LASER_TIER; }                                 // Laser Pointer (T4)+
function laserRange(){ return hasLaser()? 130 + (save.up.clip-LASER_TIER)*130 : 0; }    // T4 130px .. T7 520px
function laserColor(){ const t=save.up.clip; return t>=7?'#6FE9FF': t>=6?'#3B7BFF': t>=5?'#FF7A1A':'#FF3B2F'; }

// ---------- world generation (fixed seed; lazy chunks) ----------
// types: bus (trampoline roof), awn (awning bounce), tree (sticky), pigeon (bonk)
const obs=[]; let genX=0;
function genTo(x){
  while(genX < x){
    const i = Math.floor(genX/CHUNK); genX += CHUNK;
    const cx = i*CHUNK;
    if(cx < 800) continue;                              // clear runway out the window
    if(Math.abs(cx - MAILBOX_X) < 420) continue;        // keep the mailbox photo-clean
    const r = mulberry32(120726 + i*7919);
    // hand-placed openers so the first throw always meets the town
    if(i===2){ obs.push({t:'awn', x:1000, hit:0}); continue; }
    if(i===3){ obs.push({t:'bus', x:1480, hit:0}); continue; }
    if(i===5){ obs.push({t:'tree',x:2240, hit:0, inT:0}); obs.push({t:'pigeon',x:2050,y:250,ph:r()*7,done:false,dead:false,minD:1e9,dr:0,dvx:0,dvy:0}); continue; }
    const far = Math.min(1, cx/9000);
    const roll = r();
    if(roll < 0.16)      obs.push({t:'bus', x:cx+60+r()*200, hit:0});
    else if(roll < 0.32) obs.push({t:'awn', x:cx+60+r()*200, hit:0});
    else if(roll < 0.50) obs.push({t:'tree',x:cx+60+r()*200, hit:0, inT:0});
    // pigeons get denser further out (escalation you can see)
    const pn = (r() < 0.25+0.45*far) ? 1 + (r()<0.3*far?1:0) : 0;
    for(let p=0;p<pn;p++) obs.push({t:'pigeon', x:cx+40+r()*340, y:110+r()*250 - far*r()*300, ph:r()*7, done:false, dead:false, minD:1e9, dr:0, dvx:0, dvy:0});
  }
}
genTo(6000);
function resetObs(){
  for(const o of obs){ o.hit=0; if(o.t==='pigeon'){o.done=false;o.dead=false;o.minD=1e9;o.dr=0;} if(o.t==='tree')o.inT=0; }
}

// ---------- particles / floating text ----------
const parts=[]; for(let i=0;i<260;i++) parts.push({on:false,x:0,y:0,vx:0,vy:0,life:0,dur:1,t:'',s:1,rot:0,vr:0});
function spawn(t,x,y,vx,vy,dur,s){
  for(const p of parts) if(!p.on){ p.on=true;p.t=t;p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.life=0;p.dur=dur;p.s=s||1;p.rot=Math.random()*6.3;p.vr=(Math.random()-0.5)*8; return p; }
}
function puff(x,y,n,sp){ for(let i=0;i<n;i++){ const a=Math.random()*6.3; spawn('puff',x,y,Math.cos(a)*sp*(0.4+Math.random()*0.6),Math.sin(a)*sp*(0.4+Math.random()*0.6)-30,0.5+Math.random()*0.3,2+Math.random()*3);} }
function leaves(x,y,n){ for(let i=0;i<n;i++) spawn('leaf',x,y,(Math.random()-0.3)*160,-Math.random()*120,0.9+Math.random()*0.6,1); }
function feathers(x,y,n){ for(let i=0;i<n;i++) spawn('feather',x,y,(Math.random()-0.5)*200,-Math.random()*160,0.9+Math.random()*0.7,1); }
function confetti(x,y,n){ for(let i=0;i<n;i++) spawn(Math.random()<0.5?'heart':'star',x,y,(Math.random()-0.5)*260,-60-Math.random()*220,1.2+Math.random()*0.8,1); }
const floats=[]; for(let i=0;i<24;i++) floats.push({on:false,x:0,y:0,life:0,str:'',col:INK,size:18});
function floatTxt(str,x,y,col,size){
  for(const f of floats) if(!f.on){ f.on=true;f.x=x;f.y=y;f.life=0;f.str=str;f.col=col||INK;f.size=size||18; return; }
}

// ---------- run flow ----------
function beginThrow(pow, ang){
  state='fly';
  plane.x=LAUNCH.x; plane.y=LAUNCH.y;
  plane.vx=Math.cos(ang)*pow; plane.vy=Math.sin(ang)*pow;
  plane.rot=ang;
  run={dist:0,air:0,tricks:0,trickN:0,gas:gasMax(),boostOn:false,pitch:0,stickers:0,dPts:0,aPts:0,tPts:0,newBest:false,justDelivered:false,pageAt:0,laserOn:false,laserE:1,stalling:false,stallHang:0,stallWarn:0,usedPitch:false,usedBoost:false,usedLaser:false};
  boosting=false;                     // never carry a held-boost into a fresh throw
  laserHeld=false; laserWasOn=false;  // never carry a held laser into a fresh throw
  pointers.clear(); touchPitchActive=false; touchPitch=0;  // never carry a touch pitch/boost/fire into a fresh throw
  save.throws++; persist();
  resetObs(); for(const f of floats) f.on=false;
  for(const tr of trail) tr.on=false; trailAcc=0;
  distShown=0; challengeShownBeaten=false;
  sfx.throwWhoosh(pow/700);
  puff(LAUNCH.x+6, LAUNCH.y+4, 6, 60);
}
function defaultThrow(){ beginThrow(power()*DEFAULT_POW, DEFAULT_ANG); }
function toAim(){ state='aim'; plane.x=LAUNCH.x; plane.y=LAUNCH.y; plane.vx=0; plane.vy=0; plane.rot=-0.5; }
let challengeShownBeaten=false;

function settleNow(){ state='settle'; settleT=0; puff(plane.x, GROUND-6, 10, 90); sfx.thud(); }

function finishRun(){
  const dm = Math.max(0, Math.round((plane.x - LAUNCH.x)/PXM));
  run.dist = dm;
  run.dPts = Math.round(dm*PAY_DIST);
  run.aPts = Math.round(run.air*PAY_AIR);
  run.tPts = run.tricks;
  run.stickers = Math.max(1, run.dPts + run.aPts + run.tPts);  // bank EVERY attempt
  save.st += run.stickers;
  if(dm > best){ best = dm; run.newBest = true; }
  persist();
  // Two leaderboards: 'distance' every run (endless chase + dare), and
  // 'delivery' = throws taken to reach the mailbox, posted on the delivering run
  // (the meaningful "reach the pen pal efficiently" ranking — fewer is better).
  const scores = { distance: dm };
  if(run.justDelivered) scores.delivery = save.delThrows;
  post({gs:'gameover', scores});
  state='result'; tallyT=0; sel=-1; chingCount=0;
  if(run.newBest && dm > 60) sfx.fanfare();
}
let chingCount=0;

// held boost: start firing the thruster (called on pointerdown / Space-down during flight).
function startBoost(){
  if(state!=='fly') return;
  boosting=true;
  if(save.up.thr>0 && run.gas>0){ sfx.fan(); fanChipPulse=1; }
}

// ---- laser fire (Nose Gun T4+): distinct input so it never fights boost/pitch ----
function anyFirePointer(){ for(const v of pointers.values()) if(v.role==='fire') return true; return false; }
function startLaser(){                // called on the fire key / fire-button press
  if(state!=='fly' || !hasLaser()) return;
  laserChipPulse=1;
}
// cast a forward beam from the nose along the plane's heading; vapourise pigeons and
// burn straight through tree canopies in the path. Style points + delightful puffs.
function fireLaser(dt){
  const p=plane, rng=laserRange();
  const dx=Math.cos(p.rot), dy=Math.sin(p.rot);
  const mx=p.x+dx*40, my=p.y+dy*40;           // muzzle just ahead of the nose
  for(const o of obs){
    if(o.x < p.x-40 || o.x > p.x+rng+120) continue;
    if(o.t==='pigeon' && !o.done){
      const py=o.y+Math.sin(o.ph+T*2.2)*9;
      const rx=o.x-mx, ry=py-my, along=rx*dx+ry*dy, perp=Math.abs(rx*-dy+ry*dx);
      if(along>=0 && along<=rng && perp<22) zapPigeon(o,py);
    } else if(o.t==='tree' && o.hit===0){
      const cy=GROUND-118, rx=o.x-mx, ry=cy-my, along=rx*dx+ry*dy, perp=Math.abs(rx*-dy+ry*dx);
      if(along>0 && along<rng && perp<58){
        o.hit++; run.tricks+=TRICK.leafPunch; run.trickN++;
        floatTxt('+'+TRICK.leafPunch+' BURNED THROUGH!', o.x, cy-72, RED, 17);
        sfx.zap(); leaves(o.x,cy,10);
      }
    }
  }
  // beam sparkle along its length (readability + sizzle)
  if(Math.random()<0.7){ const d=Math.random()*rng; spawn('star', mx+dx*d, my+dy*d, (Math.random()-0.5)*90, (Math.random()-0.5)*90, 0.22, 0.8); }
}
function zapPigeon(o,py){
  o.done=true; o.dead=true;
  run.tricks+=LASER_ZAP; run.trickN++;
  if(save.up.clip>=6) run.tricks+=2;                 // higher-tier cannons score a touch more
  floatTxt('ZAP! +'+LASER_ZAP, o.x, py-26, RED, 21);
  sfx.zap(); feathers(o.x,py,11);
  const rr=Math.random();
  o.dvx=150+rr*180; o.dvy=-170-rr*160; o.dr=(rr<0.5?-1:1)*13;
  for(let s=0;s<6;s++) spawn('star', o.x, py, (Math.random()-0.2)*240, -Math.random()*220, 0.7, 1);
}

function buy(i){
  const it = SHOP[i], tier = save.up[it.key];
  if(tier>=MAXTIER){ sfx.deny(); return; }
  const price = it.prices[tier];
  if(save.st < price){ sfx.deny(); cardShake=1; cardShakeI=i; return; }
  save.st -= price; save.up[it.key]++; persist();
  sfx.buy(); hudStickerPulse=1;
  floatTxt(it.name+' T'+save.up[it.key]+'!', plane.x, plane.y-40, RED, 20);
}

// ---------- physics ----------
function stepFly(dt){
  const p=plane;
  p.vy += GRAV*dt;
  // ---- HELD BOOST: continuous forward+up thrust while held, drains gas, no refill ----
  run.boostOn=false;
  if(boosting && save.up.thr>0 && run.gas>0){
    run.boostOn=true;
    const thr=thrThrust();
    p.vx += thr*dt;                 // forward push
    p.vy -= thr*THR_LIFT*dt;        // lift (climb / counter gravity)
    run.gas=Math.max(0, run.gas - thrBurn()*dt);
    // exhaust plume behind the plane
    if(Math.random()<0.7) spawn('puff', p.x-16-Math.random()*8, p.y+3+(Math.random()-0.5)*8, -150-Math.random()*90, (Math.random()-0.5)*40, 0.28, 2+Math.random()*2);
    spawn('speed', p.x-22, p.y+(Math.random()-0.5)*10, -170, 0, 0.18, 1);
  }
  if(run.boostOn && !run.usedBoost){ run.usedBoost=true; markCoach('boost'); } // learned the boost verb → stop coaching it
  // ---- LASER (Nose Gun T4+): a rationed forward beam. Metered charge (run.laserE)
  //      drains while firing, recharges while idle — the "ration it" gauge, like gas. ----
  run.laserOn=false;
  const wantFire = (laserHeld || anyFirePointer()) && hasLaser();
  const canStart = laserWasOn ? run.laserE>0.001 : run.laserE>=LASER_MIN;
  if(wantFire && canStart){
    run.laserOn=true;
    run.laserE=Math.max(0, run.laserE - LASER_DRAIN*dt);
    if(!laserWasOn) sfx.laser();       // edge-triggered fire "pew"
    fireLaser(dt);                     // zap pigeons / burn through trees in the beam
  } else {
    run.laserE=Math.min(1, run.laserE + LASER_CHARGE*dt);
  }
  laserWasOn = run.laserOn;
  if(run.laserOn && !run.usedLaser){ run.usedLaser=true; markCoach('laser'); } // fired the laser → stop coaching it
  // ---- PITCH & ENERGY: active glide. Lean the nose, bank the velocity toward it over
  //      time, trade height<->speed. This is the skill layer over the ballistic arc. ----
  const pin = pitchInput();                                  // -1..1  (+1 nose up / climb)
  if(pin!==0 && !run.usedPitch){ run.usedPitch=true; markCoach('pitch'); } // tilted the nose → stop coaching it
  // ---- AERODYNAMIC STALL: a wing needs airspeed. If the nose is held steeply UP while
  //      airspeed decays below STALL_SPD, lift dies and the plane noses over (recoverable). ----
  const airspeed = Math.hypot(p.vx, p.vy);
  const aloft = p.y < GROUND-8;
  const noseHeldUp = run.pitch > STALL_PITCH;                // committed to a real climb (gentle climbs stay safe)
  // telegraph 0..1: how close a climbing wing is to the stall (drives the speed-meter flash + "STALL?")
  run.stallWarn = run.stalling ? 1
    : (aloft && noseHeldUp ? Math.max(0, Math.min(1, (STALL_SPD + STALL_WARN - airspeed)/STALL_WARN)) : 0);
  if(run.stalling){
    if(airspeed > STALL_RECOVER || !aloft){ run.stalling=false; run.stallHang=0; }  // dived back to speed → fly out
  } else if(aloft && noseHeldUp && airspeed < STALL_SPD){
    run.stalling=true; run.stallHang=STALL_HANG;             // STALL! brief hang at the apex, then a nose-over
    floatTxt('STALL!', p.x, p.y-34, RED, 22); sfx.stall();
  }
  // drive the pitch COMMAND: normal easing — but a stalled wing overrides the player and drops its nose.
  if(run.stalling){
    if(run.stallHang>0){ run.stallHang-=dt; run.pitch += (0 - run.pitch)*Math.min(1, PITCH_EASE*dt); } // hang: lift gone, climb stops
    else { run.pitch += (STALL_NOSE - run.pitch)*Math.min(1, STALL_DROP*dt); }                          // nose-over into the dive
  } else {
    run.pitch += (pin - run.pitch)*Math.min(1, PITCH_EASE*dt); // eased command (weighty, no snap)
  }
  if(p.y < GROUND-8){                                         // steering only matters aloft; never fights the ground slide/settle
    let spd = Math.hypot(p.vx, p.vy);
    if(spd > 1){
      let dir = Math.atan2(p.vy, p.vx);                      // current flight-path angle
      const desired = dir - run.pitch*PITCH_MAX;             // bank the path toward the nose (up = -)
      dir += (desired - dir)*Math.min(1, TURN_RATE*dt);      // finite turn rate = the "weight"
      dir = Math.max(-1.3, Math.min(1.3, dir));              // never over-rotate past ~77° — stays graceful & forward
      // energy juice ONLY while actively pitching: climb (pitch>0, sin<0) sheds speed for height;
      // dive (pitch<0, sin>0) trades height back into speed — and pays MORE so diving to build
      // speed feels rewarding. Hands-off flight keeps the original ballistic glide untouched.
      const exch = run.pitch < 0 ? DIVE_EXCH : ENERGY_EXCH;
      spd += Math.sin(dir)*exch*Math.abs(run.pitch)*dt;
      if(run.pitch > 0) spd -= spd*PITCH_DRAG*run.pitch*dt;  // only hard CLIMBS bleed; a dive is never penalized
      spd = Math.max(36, spd);
      p.vx = Math.cos(dir)*spd; p.vy = Math.sin(dir)*spd;
    }
  }
  const dr=drag();
  p.vx -= p.vx*dr*dt;
  p.vy -= p.vy*dr*dt*0.5;
  const tv=term()*(run.pitch<0 ? 1 + (-run.pitch)*DIVE_TERM_BONUS : 1); // diving lifts the fall cap
  if(p.vy > tv) p.vy += (tv-p.vy)*Math.min(1, GLIDE*dt);
  p.x += p.vx*dt; p.y += p.vy*dt;
  const spd = Math.hypot(p.vx,p.vy);
  // attitude follows velocity (banked, damped), leaned extra by the pitch command for readability
  const target = Math.atan2(p.vy, Math.max(60,p.vx*1.15)) - run.pitch*NOSE_LEAD;
  p.rot += (target-p.rot)*Math.min(1, 8*dt);
  if(p.y < GROUND-10) run.air += dt;

  // ink-dot trail
  trailAcc += spd*dt;
  if(trailAcc > 46){ trailAcc=0; const tr=trail[trailI]; tr.x=p.x; tr.y=p.y; tr.on=true; trailI=(trailI+1)%trail.length; }
  if(spd>650 && Math.random()<0.3) spawn('speed',p.x-18,p.y+(Math.random()-0.5)*16,-120,0,0.25,1);

  // ---- ground ----
  if(p.y > GROUND-6){
    p.y = GROUND-6;
    if(p.vy > 34){
      const R = REST_BASE;
      const impact = p.vy;
      p.vy = -p.vy*R;
      p.vx *= BOUNCE_KEEP;
      if(p.vy > -42) p.vy = 0;
      puff(p.x, GROUND-4, Math.min(10, 3+impact/60), 40+impact*0.25);
      sfx.boing(Math.min(1, impact/400));
      if(impact>260) cam.shake = Math.min(7, impact/70);
    }else{
      p.vy = 0;
      p.vx -= p.vx*SLIDE*dt;
      if(Math.random()<0.25 && Math.abs(p.vx)>60) spawn('puff',p.x-8,GROUND-6,-30,-20,0.3,2);
      if(Math.abs(p.vx) < 16){ p.vx=0; settleNow(); return; }
    }
  }
  // ---- obstacles ----
  genTo(p.x + 2400);
  for(const o of obs){
    if(o.x < p.x-260 || o.x > p.x+260) continue;
    if(o.t==='bus'){
      const bx=o.x, bw=176, top=GROUND-66;
      if(p.x>bx-10 && p.x<bx+bw+10 && p.y>top-8){
        if(p.y < top+18 && p.vy > 0){                        // roof = trampoline
          const diving = run.pitch < -0.3 && p.vy > 170;     // slam it mid-dive = a huge launch
          p.y=top-8; p.vy = -Math.max(Math.abs(p.vy)*(diving?1.6:1.22), diving?480:300); p.vx*= (0.98*(speedKeepHit()));
          if(o.hit===0){
            run.tricks+=TRICK.bus; run.trickN++;
            if(diving){ run.tricks+=TRICK.bus; run.trickN++; floatTxt('DIVE SLAM! +'+(TRICK.bus*2), p.x, top-38, RED, 23); }
            else floatTxt('+'+TRICK.bus+' BUS BOING!', p.x, top-34, RED, 20);
          }
          o.hit++; sfx.boing(1);
          if(diving){ sfx.smash(); for(let s=0;s<6;s++) spawn('star',p.x,top,(Math.random()-0.5)*220,-Math.random()*200,0.8,1); }
          puff(p.x,top,diving?11:8,diving?120:90); cam.shake=Math.max(cam.shake,diving?6:4);
        } else if(p.y > top+18 && !o.hit){
          o.hit++;
          if(p.vx > 420){                                     // fast = smash straight through the windows
            p.vx *= (save.up.clip>=3 ? 0.92 : 0.8);
            run.tricks+=TRICK.bus; run.trickN++;
            floatTxt('+'+TRICK.bus+' THROUGH THE BUS!', p.x, top-20, RED, 20);
            sfx.smash(); cam.shake=6; puff(p.x,p.y,10,110);
            for(let s=0;s<6;s++) spawn('star',p.x+10,p.y,(Math.random()-0.2)*220,-Math.random()*180,0.8,1);
          } else {                                            // slow = comedy thud
            p.vx*=0.3; p.vy=-140; sfx.bonk(); cam.shake=4; floatTxt('THUD', p.x, p.y-24, PENCIL, 17); puff(p.x,p.y,6,60);
          }
        }
      }
    } else if(o.t==='awn'){
      const ax=o.x, aw=112, top=GROUND-96;
      if(p.x>ax-6 && p.x<ax+aw+6 && p.y>top-10 && p.y<top+16 && p.vy>0){
        const diving = run.pitch < -0.3 && p.vy > 150;       // dive into the canopy = a bigger pop
        p.y=top-10; p.vy = -(Math.abs(p.vy)*(diving?1.4:1.12) + (diving?210:130)); p.vx *= 0.96*speedKeepHit();
        if(o.hit===0){
          run.tricks+=TRICK.awning; run.trickN++;
          if(diving){ run.tricks+=TRICK.awning; run.trickN++; floatTxt('DIVE POP! +'+(TRICK.awning*2), p.x, top-30, RED, 22); }
          else floatTxt('+'+TRICK.awning+' AWNING POP!', p.x, top-30, RED, 20);
        }
        o.hit++; sfx.boing(diving?0.9:0.7); puff(p.x,top,diving?9:7,diving?95:80);
      }
    } else if(o.t==='tree'){
      const cxr=o.x, cy=GROUND-118, r=58;
      const d=Math.hypot(p.x-cxr, p.y-cy);
      if(d < r+6){
        o.inT += dt;
        const clip = save.up.clip>=1;
        const k = clip ? 1.4 : 6.5;                           // sticky vs punch-through
        p.vx -= p.vx*k*dt; p.vy -= p.vy*k*dt*0.8;
        if(Math.random()<0.4) leaves(p.x,p.y,1);
        if(o.hit===0){
          o.hit++;
          if(clip){ run.tricks+=TRICK.leafPunch; run.trickN++; floatTxt('+'+TRICK.leafPunch+' LEAF PUNCH!', p.x, cy-r-14, RED, 19); sfx.smash(); leaves(p.x,p.y,8); }
          else { floatTxt('sticky...', p.x, cy-r-14, INK, 17); sfx.sticky(); leaves(p.x,p.y,5); }
        }
        if(!clip && Math.hypot(p.vx,p.vy)<50){ p.vy=Math.max(p.vy,70); }  // drop out of the canopy
      }
    } else if(o.t==='pigeon' && !o.done){
      const py = o.y + Math.sin(o.ph + T*2.2)*9;
      const d = Math.hypot(p.x-o.x, p.y-py);
      if(d < o.minD) o.minD = d;
      if(d < 24){
        o.done=true; o.dead=true;
        const rr = mulberry32((save.throws*131+Math.round(o.x))|0);
        if(save.up.clip>=2){                                   // punch through!
          p.vx *= 0.95*speedKeepHit(); run.tricks+=TRICK.smash; run.trickN++;
          if(save.up.clip>=5) run.tricks+=2;
          floatTxt('+'+TRICK.smash+' SMASH!', p.x, py-26, RED, 21);
          sfx.smash(); feathers(o.x,py,9);
          o.dvx = 120+rr()*120; o.dvy = -180-rr()*120; o.dr = 9;
        } else {                                               // BONK — knocked sideways
          p.vx *= 0.55; p.vy = p.vy*0.4 + (rr()-0.35)*220;
          floatTxt('BONK!', p.x, py-26, RED, 23);
          sfx.bonk(); feathers(o.x,py,6); cam.shake=Math.max(cam.shake,5);
          o.dvx = -60-rr()*80; o.dvy = -120-rr()*140; o.dr = (rr()<0.5?-1:1)*11;
        }
      } else if(p.x > o.x + 64){
        o.done=true;
        if(o.minD < 48){ run.tricks+=TRICK.closeCall; run.trickN++; floatTxt('+'+TRICK.closeCall+' close call!', o.x, py-24, INK, 17); sfx.nearMiss(); }
      }
    }
  }
  // ---- page-turn bonus (red margin line every 960 m) ----
  const page = Math.floor((p.x - LAUNCH.x)/PAGE_LEN);
  if(page > run.pageAt){ run.pageAt=page; if(page>0){ run.tricks+=TRICK.pageTurn; run.trickN++; floatTxt('+'+TRICK.pageTurn+' PAGE '+(page+1)+'!', p.x, p.y-40, RED, 21); sfx.pop(); } }

  // ---- mailbox / delivery ----
  if(p.x >= MAILBOX_X-40 && p.x < MAILBOX_X+400) penpalWave = 1.6;
  if(p.x >= MAILBOX_X && !save.delivered){
    save.delivered=true; save.delThrows=save.throws; persist();
    run.justDelivered=true;
    timeScale=0.32; slowT=1.5;
    banner={text:'DELIVERED!', sub:'the letter reached your pen pal!', col:RED}; bannerT=3.2;
    sfx.bigFanfare(); confetti(MAILBOX_X, GROUND-120, 40); penpalWave=4;
    cam.shake=5;
  }
  // ---- challenge ----
  const dm = Math.round((p.x-LAUNCH.x)/PXM);
  if(challenge>0 && !challengeBeaten && dm>=challenge){
    challengeBeaten=true; challengeShownBeaten=true;
    post({gs:'challenge_beaten', score:dm});
    banner={text:'TARGET BEATEN!', sub:challenge+'m — take that!', col:INK}; bannerT=2.4;
    sfx.fanfare(); confetti(p.x,p.y,20);
  }
  // live score (throttled)
  if(T-lastScorePost > 0.25){ lastScorePost=T; post({gs:'score', score:dm}); }
}

// ---------- camera ----------
function stepCam(dt){
  let tx, ty, tz;
  if(state==='aim'){ tx=-170; ty=0; tz=1; }
  else{
    const spd=Math.hypot(plane.vx,plane.vy);
    tx = plane.x - 300 + Math.min(180, plane.vx*0.14);
    ty = Math.min(0, plane.y - 265);
    tz = Math.max(0.76, Math.min(1, 1-(spd-350)/1500*0.3));
    if(state==='result'||state==='settle'){ tz=1; ty=Math.min(0,plane.y-300); }
  }
  const k=Math.min(1, 5*dt);
  cam.x += (tx-cam.x)*k; cam.y += (ty-cam.y)*k; cam.zoom += (tz-cam.zoom)*Math.min(1,3*dt);
  cam.shake = Math.max(0, cam.shake - 18*dt);
}

// ---------- particles update ----------
function stepFx(dt){
  for(const p of parts){
    if(!p.on) continue;
    p.life+=dt; if(p.life>p.dur){p.on=false;continue;}
    if(p.t==='leaf'||p.t==='feather'||p.t==='heart'||p.t==='star'){ p.vy+=260*dt; p.vx-=p.vx*1.2*dt; }
    else if(p.t==='puff'){ p.vx-=p.vx*3*dt; p.vy-=p.vy*3*dt; }
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vr*dt;
  }
  for(const f of floats){ if(f.on){ f.life+=dt; f.y-=28*dt; if(f.life>1.2) f.on=false; } }
  for(const o of obs){ if(o.t==='pigeon'&&o.dead){ o.dvy+=300*dt; o.x+=o.dvx*dt; o.y+=o.dvy*dt; o.ph+=o.dr*dt; } }
  if(hudStickerPulse>0) hudStickerPulse-=dt*2.4;
  if(fanChipPulse>0) fanChipPulse-=dt*2;
  if(laserChipPulse>0) laserChipPulse-=dt*2.4;
  if(cardShake>0) cardShake-=dt*4;
  if(penpalWave>0) penpalWave-=dt;
  if(bannerT>0) bannerT-=dt;
  if(slowT>0){ slowT-=dt; if(slowT<=0) timeScale=1; }
}

// ---------- main loop (fixed timestep) ----------
let last=performance.now(), acc=0;
const STEP=1/120;
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000; last=now;
  if(dt>0.1) dt=0.1;
  acc+=dt;
  while(acc>=STEP){
    acc-=STEP;
    T+=STEP;
    boil=Math.floor(T*8);
    const sdt=STEP*timeScale;
    if(charging && state==='aim') chargeT=Math.min(1, chargeT+STEP/0.9);  // hold Space to charge power
    if(state==='fly') stepFly(sdt);
    else if(state==='settle'){ settleT+=STEP; if(settleT>0.65) finishRun(); }
    else if(state==='result'){ const pv=tallyT; tallyT+=STEP; if(pv<1.35&&tallyT>=1.35&&run.stickers>2) sfx.chaChing(); }
    stepCam(STEP); stepFx(STEP);
  }
  // engine hum tied to speed
  if(AC && whooshGain){
    const flying = state==='fly';
    const spd = flying?Math.hypot(plane.vx,plane.vy):0;
    whooshGain.gain.value = flying?Math.min(0.22, spd/2600):0;
    whooshFilt.frequency.value = 300+spd*0.9;
    flutGain.gain.value = (flying && plane.y<GROUND-14) ? Math.min(0.05, spd/9000)*(0.7+0.3*Math.sin(T*34)) : 0;
    if(boostGain){
      const on = flying && run.boostOn;
      boostGain.gain.value = on ? 0.15 : 0;
      boostFilt.frequency.value = 190 + save.up.thr*120;   // pitch rises with device tier
    }
  }
  render();
}
requestAnimationFrame(frame);
post({gs:'ready'});

// ---------- input ----------
function toGame(e){ return { x:(e.clientX-offX)/scl, y:(e.clientY-offY)/scl }; }
// dedicated touch FIRE button (only when the laser is owned) — a small circle tested
// BEFORE the pitch/boost thumb-zones so it never fights them.
function fireBtnPos(){ return {x:W*0.5, y:H-58, r:31}; }
function inFireBtn(g){ if(!hasLaser()) return false; const b=fireBtnPos(); return Math.hypot(g.x-b.x,g.y-b.y)<=b.r+4; }
window.addEventListener('pointerdown', (e)=>{
  e.preventDefault(); audioInit();
  if(e.pointerType==='touch') isTouch=true;
  const g=toGame(e);
  if(state==='fly'){
    // FIRE button first (own hit-test), then two thumb zones: LEFT = pitch, RIGHT = boost.
    if(inFireBtn(g)){ pointers.set(e.pointerId,{role:'fire'}); startLaser(); return; }
    if(g.x < W*0.46){ pointers.set(e.pointerId,{role:'pitch',sy:g.y}); touchPitchActive=true; touchPitch=0; }
    else { pointers.set(e.pointerId,{role:'boost'}); startBoost(); }  // hold to fire the thruster
    return;
  }
  if(state==='aim'){ dragging=true; dragStart=g; dragCur=g; }
  else if(state==='settle'){ /* let it land */ }
  else if(state==='result'){
    const hit = resultHit(g);
    if(hit>=0){ buy(hit); }
    else { toAim(); dragging=true; dragStart=g; dragCur=g; }   // one gesture: tap-drag straight into next throw
  }
},{passive:false});
window.addEventListener('pointermove',(e)=>{
  if(dragging) dragCur=toGame(e);
  const pr=pointers.get(e.pointerId);
  if(pr && pr.role==='pitch'){ const g=toGame(e); touchPitch=Math.max(-1,Math.min(1,(pr.sy-g.y)/70)); } // drag up = nose up
},{passive:false});
function endPointer(e){
  const pr=pointers.get(e.pointerId);
  if(pr){                          // a flight pointer lifted: recompute boost/pitch state
    pointers.delete(e.pointerId);
    let boostAny=false, pitchAny=false;
    for(const v of pointers.values()){ if(v.role==='boost') boostAny=true; if(v.role==='pitch') pitchAny=true; }
    if(!boostAny) boosting=false;                 // release always stops the held boost
    if(!pitchAny){ touchPitchActive=false; touchPitch=0; }
    return;
  }
  boosting=false;                  // safety: any stray release stops boost
  if(!dragging) return;
  dragging=false;
  const dx=dragStart.x-dragCur.x, dy=dragStart.y-dragCur.y;
  const len=Math.hypot(dx,dy);
  // a too-short pull is NOT a throw — you stay in aim and must pull to launch.
  // (Retry never auto-throws; the player performs the mechanic every time.)
  if(len<14){ return; }
  let ang=Math.atan2(dy,dx);
  ang=Math.max(-1.45, Math.min(0.5, ang));                  // must go rightish
  const pw=Math.min(1, len/190)*power();
  if(state==='aim') beginThrow(Math.max(pw, power()*0.2), ang);
}
window.addEventListener('pointerup', endPointer, {passive:false});
window.addEventListener('pointercancel', endPointer, {passive:false});
function releaseCharge(){
  if(state==='aim' && charging){
    const f=Math.min(1, chargeT);
    beginThrow(power()*(0.4+0.6*f), DEFAULT_ANG);            // keyboard throw = charged power, held-Space skill
  }
  charging=false; chargeT=0;
}
window.addEventListener('keydown',(e)=>{
  if(e.repeat) return;
  audioInit();
  const k=e.key;
  if(k===' '||k==='Spacebar'){ e.preventDefault();
    if(state==='aim'){ charging=true; chargeT=0; }            // hold to charge, release to throw
    else if(state==='fly') startBoost();                     // hold to fire the thruster
    else if(state==='result'){ if(sel>=0) buy(sel); else toAim(); }  // back to aim — you throw it yourself
  } else if(k==='Enter'){
    if(state==='result'){ if(sel>=0) buy(sel); else toAim(); }
  } else if(k==='ArrowUp'||k==='w'||k==='W'){ e.preventDefault(); pitchHeld.up=true; }    // mid-flight: nose UP
  else if(k==='ArrowDown'||k==='s'||k==='S'){ e.preventDefault(); pitchHeld.down=true; }   // mid-flight: nose DOWN
  else if(k==='f'||k==='F'){ if(state==='fly'){ laserHeld=true; startLaser(); } }          // mid-flight: FIRE laser (Nose Gun T4+)
  else if(k==='ArrowRight'||k==='d'){ if(state==='result'){ sel=(sel+1)%SHOP.length; sfx.pop(); } }
  else if(k==='ArrowLeft'||k==='a'){ if(state==='result'){ sel=sel<=0?SHOP.length-1:sel-1; sfx.pop(); } }
  else if(k>='1'&&k<='5'){ if(state==='result') buy(+k-1); }
});
window.addEventListener('keyup',(e)=>{
  const k=e.key;
  if(k===' '||k==='Spacebar'){ e.preventDefault(); releaseCharge(); boosting=false; }
  else if(k==='ArrowUp'||k==='w'||k==='W') pitchHeld.up=false;
  else if(k==='ArrowDown'||k==='s'||k==='S') pitchHeld.down=false;
  else if(k==='f'||k==='F') laserHeld=false;
});

// ============================================================
//  RENDERING — everything is wobbly biro ink on notebook paper
// ============================================================
function wline(x1,y1,x2,y2,amp,id){
  amp=amp==null?1.6:amp; id=id||0;
  const d=Math.hypot(x2-x1,y2-y1), n=Math.max(1,Math.min(8,Math.ceil(d/26)));
  ctx.moveTo(x1+jit(id)*amp, y1+jit(id+31)*amp);
  for(let i=1;i<=n;i++){
    const t=i/n;
    ctx.lineTo(x1+(x2-x1)*t + jit(id+i)*amp*2, y1+(y2-y1)*t + jit(id+i+53)*amp*2);
  }
}
function wrect(x,y,w,h,amp,id){
  wline(x,y,x+w,y,amp,id); wline(x+w,y,x+w,y+h,amp,id+7); wline(x+w,y+h,x,y+h,amp,id+13); wline(x,y+h,x,y,amp,id+19);
}
function wcircle(x,y,r,id){
  const n=14;
  ctx.moveTo(x+r+jit(id)*2, y);
  for(let i=1;i<=n;i++){
    const a=i/n*6.2832;
    const rr=r+jit(id+i)*r*0.09;
    ctx.lineTo(x+Math.cos(a)*rr, y+Math.sin(a)*rr);
  }
}
function txt(s,x,y,size,col,align,alpha,rot,weight){
  ctx.save();
  ctx.globalAlpha=alpha==null?1:alpha;
  ctx.fillStyle=col; ctx.textAlign=align||'left'; ctx.textBaseline='middle';
  ctx.font=(weight||'700')+' '+size+'px '+FONT;
  if(rot){ ctx.translate(x,y); ctx.rotate(rot); ctx.fillText(s,0,0); }
  else ctx.fillText(s,x,y);
  ctx.restore();
}

function render(){
  // letterbox
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=LETTERBOX;
  ctx.fillRect(0,0,cv.width/dpr,cv.height/dpr);
  ctx.save();
  ctx.translate(offX,offY); ctx.scale(scl,scl);
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  // paper
  ctx.fillStyle=PAPER; ctx.fillRect(0,0,W,H);

  const shx = cam.shake? jit(boil*3+1)*cam.shake : 0;
  const shy = cam.shake? jit(boil*3+9)*cam.shake : 0;

  drawRuledLines();
  drawSun();

  // world transform (zoom around view center)
  ctx.save();
  ctx.translate(W/2, H/2); ctx.scale(cam.zoom,cam.zoom); ctx.translate(-(cam.x+W/2)+shx, -(cam.y+H/2)+shy);

  drawParallax();
  drawGround();
  drawSchool();
  drawObstacles();
  drawMailbox();
  drawTrail();
  if(dragging && state==='aim') drawAimPreview();
  if(state==='aim' && !dragging && save.throws===0) drawAimGesture();   // first-timer: animated pull-back demo
  drawPlane();
  drawLaser();
  drawParts();
  drawFloats();
  ctx.restore();

  drawHUD();
  if(state==='result') drawResult();
  if(bannerT>0) drawBanner();
  ctx.restore();
}

// --- sky furniture ---
function drawRuledLines(){
  ctx.strokeStyle=RULE; ctx.lineWidth=1;
  ctx.beginPath();
  const off = (cam.y*0.15)%44;
  for(let y=-off; y<H; y+=44){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
}
function drawSun(){
  ctx.save(); ctx.translate(300,88); ctx.rotate(T*0.05);
  ctx.strokeStyle=RED; ctx.lineWidth=2.4; ctx.globalAlpha=0.75;
  ctx.beginPath();
  for(let a=0;a<24;a+=0.35){ const r=2+a*1.55; const px=Math.cos(a)*r, py=Math.sin(a)*r; a===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
  ctx.stroke();
  ctx.beginPath();
  for(let i=0;i<8;i++){ const a=i/8*6.283+0.3; wline(Math.cos(a)*46,Math.sin(a)*46,Math.cos(a)*60,Math.sin(a)*60,1.5,i*3+700); }
  ctx.stroke();
  ctx.restore();
}
function drawParallax(){
  // clouds (0.35 parallax) — draw in world space with adjusted x
  ctx.save();
  ctx.strokeStyle=INK; ctx.lineWidth=2;
  const cx0=cam.x*0.65;   // world pos minus parallax offset
  ctx.globalAlpha=0.3;
  ctx.globalAlpha=0.24;
  const ci0=Math.floor((cam.x*0.35-200)/430);
  const CR=[12,17,20,16,11], CY=[2,-6,-10,-5,3];
  for(let i=ci0;i<ci0+6;i++){
    const px=i*430 + hash1(i*3.7)*200 + cx0, py=118+hash1(i*9.1)*110 + cam.y*0.75;
    ctx.beginPath();
    for(let s=0;s<5;s++){ wcircle(px+s*24-48, py+CY[s], CR[s]+hash1(i+s)*4, i*31+s); }
    ctx.stroke();
  }
  // far skyline (0.45)
  ctx.globalAlpha=0.22; ctx.lineWidth=2;
  const fx0=cam.x*0.55;
  const fi0=Math.floor((cam.x*0.45-100)/230);
  ctx.beginPath();
  for(let i=fi0;i<fi0+7;i++){
    const bw=150+hash1(i*1.3)*80, bh=90+hash1(i*2.9)*140;
    const bx=i*230+fx0, by=428-bh;
    wrect(bx,by,bw,bh,1.4,i*17);
    if(hash1(i*5.2)>0.5) wline(bx+bw*0.2,by,bx+bw*0.5,by-24,1.4,i*23), wline(bx+bw*0.5,by-24,bx+bw*0.8,by,1.4,i*29);
  }
  ctx.stroke();
  // mid buildings (0.78) with windows
  ctx.globalAlpha=0.5; ctx.lineWidth=2.2;
  const mx0=cam.x*0.22;
  const mi0=Math.floor((cam.x*0.78-150)/300);
  for(let i=mi0;i<mi0+6;i++){
    const bw=170+hash1(i*4.1)*90, bh=120+hash1(i*6.3)*160;
    const bx=i*300+mx0+hash1(i*8.8)*60, by=452-bh;
    ctx.beginPath();
    wrect(bx,by,bw,bh,1.8,i*37);
    // roofline doodads
    if(hash1(i*2.2)>0.6) wrect(bx+bw*0.35,by-18,26,18,1.5,i*41);
    // windows
    const rows=Math.floor(bh/52), cols=Math.floor(bw/56);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(hash1(i*100+r*10+c)>0.25) wrect(bx+16+c*56, by+16+r*52, 24,24,1.2, i*100+r*10+c);
    }
    ctx.stroke();
    if(hash1(i*7.7)>0.72){ ctx.save(); ctx.strokeStyle=RED; ctx.beginPath(); wline(bx+bw+2,by+10,bx+bw+2,by+bh-10,1.5,i*61); ctx.stroke(); ctx.restore(); }
  }
  ctx.restore();
}
function drawGround(){
  const x0=cam.x+W/2-(W/2)/cam.zoom-80, x1=cam.x+W/2+(W/2)/cam.zoom+80;

}

function drawAimPreview(){
  // dotted hand-drawn trajectory hint
  const dx=dragStart.x-dragCur.x, dy=dragStart.y-dragCur.y;
  const len=Math.hypot(dx,dy); if(len<8) return;
  let ang=Math.atan2(dy,dx); ang=Math.max(-1.45,Math.min(0.5,ang));
  const pw=Math.min(1,len/190)*power();
  let sx=LAUNCH.x, sy=LAUNCH.y, svx=Math.cos(ang)*pw, svy=Math.sin(ang)*pw;
  ctx.fillStyle=INK;
  const dr=drag(), tv=term(), sim=1/30;
  for(let i=0;i<52;i++){
    svy+=GRAV*sim; svx-=svx*dr*sim; svy-=svy*dr*sim*0.5;
    if(svy>tv) svy+=(tv-svy)*Math.min(1,GLIDE*sim);
    sx+=svx*sim; sy+=svy*sim;
    if(sy>GROUND-6) break;
    if(i%3===0){ ctx.globalAlpha=Math.max(0,0.7-i*0.012); ctx.beginPath(); ctx.arc(sx+jit(i)*2,sy+jit(i+9)*2, 3,0,7); ctx.fill(); }
  }
  ctx.globalAlpha=1;

  ctx.beginPath(); ctx.arc(LAUNCH.x, LAUNCH.y, 30, -Math.PI/2, -Math.PI/2+pct*5.5); ctx.stroke();

// first-timer only: a little hand grabs the plane, pulls back (down-left) and releases,
// on a gentle loop — plus a pulsing arrow showing where the throw goes. Demonstrates the verb.
function drawAimGesture(){
  const px=LAUNCH.x, py=LAUNCH.y;
  const loop=(T*0.42)%1;                        // ~2.4s cycle
  const backX=px-40, backY=py+30;               // pulled-back anchor (down & left)
  let hx=px, hy=py, pull=0, released=false;
  if(loop<0.60){ const k=loop/0.60, e=k*k*(3-2*k); hx=px+(backX-px)*e; hy=py+(backY-py)*e; pull=e; }
  else if(loop<0.72){ const k=(loop-0.60)/0.12; hx=backX+(px-backX)*k; hy=backY+(py-backY)*k; pull=1-k; released=k>0.5; }
  ctx.save();
  // the taut "pull" line from plane to hand
  if(pull>0.03){
    ctx.strokeStyle=RED; ctx.globalAlpha=0.35+0.4*pull; ctx.lineWidth=2;
    ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(px+2,py+2); ctx.lineTo(hx,hy); ctx.stroke(); ctx.setLineDash([]);
  }
  // forward flight-direction arrow (up & right), gently pulsing — "it'll fly this way"
  ctx.globalAlpha=0.45+0.3*Math.abs(Math.sin(T*3));
  ctx.strokeStyle=INK; ctx.lineWidth=2;
  const ax=px+14, ay=py-6;
  ctx.beginPath(); ctx.moveTo(ax,ay); ctx.quadraticCurveTo(ax+46,ay-40, ax+92,ay-46); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax+92,ay-46); ctx.lineTo(ax+81,ay-51); ctx.moveTo(ax+92,ay-46); ctx.lineTo(ax+84,ay-37); ctx.stroke();
  // the hand (a little biro fist with a thumb toward the plane)
  ctx.globalAlpha=0.95;
  ctx.save(); ctx.translate(hx,hy);
  ctx.strokeStyle=INK; ctx.fillStyle=PAPER; ctx.lineWidth=2;
  ctx.beginPath(); wcircle(0,4,6,7401); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-1); ctx.lineTo(7,-6); ctx.stroke();
  ctx.restore();
  // release sparkle at the plane
  if(released){ ctx.globalAlpha=0.7; ctx.fillStyle=RED; for(let s=0;s<3;s++){ ctx.beginPath(); ctx.arc(px+8+s*7, py-4-s*3, 2,0,7); ctx.fill(); } }
  ctx.restore();
}
function drawPlane(){
  const p=plane;

  const mat=FOLD_MAT[foldT];
  const noseLen = 20 + foldT*1.4;      // sharper craft = longer nose
  const wingBack = -16 - foldT*1.1;    // wing sweeps back with tier
  const wingUp   = -9  - foldT*0.6;    // taller profile
  // shadow on ground
  if(p.y<GROUND-12){
    ctx.save(); ctx.globalAlpha=Math.max(0.04, 0.22-(GROUND-p.y)/1600);
    ctx.fillStyle=INK; ctx.beginPath(); ctx.ellipse(p.x,GROUND-2, 16,3.5,0,0,7); ctx.fill(); ctx.restore();
  }
  ctx.save();
  ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.scale(1.4,1.4);
  // exhaust flame (behind the craft) while boosting
  if(run.boostOn && save.up.thr>0) drawFlame(save.up.thr);
  // lower fin (shaded, matches material)
  ctx.fillStyle=mat.fill2; ctx.strokeStyle=mat.line; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(noseLen,0); ctx.lineTo(wingBack+2,10); ctx.lineTo(-9,1); ctx.closePath(); ctx.fill(); ctx.stroke();
  // upper wing — metallic gradient at high tiers, flat fill low

    const g=ctx.createLinearGradient(noseLen,-2, wingBack,wingUp);
    g.addColorStop(0, mat.fill); g.addColorStop(0.5,'#FFFFFF'); g.addColorStop(1, mat.fill2);

  } else ctx.fillStyle=mat.fill;

  // sheen streak (glint grows with material tier)

    ctx.save(); ctx.globalAlpha=mat.sheen*0.75; ctx.strokeStyle='#FFFFFF'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(noseLen-4,-1.5); ctx.lineTo(wingBack+5, wingUp+3); ctx.stroke(); ctx.restore();
  }
  // upswept winglet on the high-tier jets
  if(foldT>=4){ ctx.strokeStyle=mat.line; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(wingBack,wingUp); ctx.lineTo(wingBack-3,wingUp-4); ctx.stroke(); }

  ctx.strokeStyle='rgba(36,71,214,0.32)'; ctx.lineWidth=0.9;
  ctx.beginPath();
  ctx.moveTo(noseLen,0); ctx.lineTo(-9,1);
  for(let f=0;f<foldT;f++){ ctx.moveTo(noseLen-6-f*5,-1.2); ctx.lineTo(-11+f*2,-5.5+f*0.8); }
  ctx.stroke();
  // launcher residue wrapped on fuselage — more wraps the beefier the launcher (kept minimal)
  if(save.up.band>0){
    ctx.strokeStyle=RED; ctx.lineWidth=1.3;
    ctx.beginPath();
    ctx.ellipse(-1,-0.5, 1.8,4.6, 0.12,0,7);
    if(save.up.band>=3) ctx.ellipse(3.5,-1, 1.8,4.0, 0.12,0,7);
    if(save.up.band>=6) ctx.ellipse(-5,-0.2, 1.8,4.0, 0.12,0,7);
    ctx.stroke();
  }
  // fuel tank strapped to the belly — grows visibly with the Fuel Tank track
  if(save.up.fuel>0){
    const fl=2.5+save.up.fuel*1.4;             // capsule length grows with capacity
    ctx.save(); ctx.strokeStyle=INK; ctx.lineWidth=1.2; ctx.fillStyle='rgba(217,72,43,0.20)';
    ctx.beginPath(); ctx.ellipse(-2, 6.5, fl*0.5, 2.3, 0, 0, 7); ctx.fill(); ctx.stroke();
    if(save.up.fuel>=4){ ctx.beginPath(); ctx.ellipse(-2, 9, fl*0.42, 1.9, 0, 0, 7); ctx.fill(); ctx.stroke(); } // twin tanks
    ctx.restore();
  }
  // NOSE GUN hardware — smash noses (T1-3) or laser emitter (T4+)
  if(save.up.clip>0) drawNose(save.up.clip, noseLen);

  if(save.up.thr>0) drawDevice(save.up.thr, noseLen);
  ctx.restore();

// Nose Gun hardware in plane-local space. T1-3 = escalating smash noses; T4+ = laser muzzle.
function drawNose(tier, noseLen){

    ctx.strokeStyle=PENCIL; ctx.lineWidth=1.7;
    ctx.beginPath();
    ctx.moveTo(noseLen-9,-2.4); ctx.lineTo(noseLen+1,-2.4); ctx.arc(noseLen+1,0,2.4,-Math.PI/2,Math.PI/2);
    ctx.lineTo(noseLen-7,2.4); ctx.arc(noseLen-7,0.6,1.8,Math.PI/2,-Math.PI/2,true);
    ctx.lineTo(noseLen-1,-1.2);
    ctx.stroke();

      ctx.strokeStyle=INK; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(noseLen+1,0); ctx.lineTo(noseLen+7,0);

  }
  ctx.restore();

function drawParts(){
  for(const p of parts){
    if(!p.on) continue;
    const k=1-p.life/p.dur;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=Math.min(1,k*1.6);
    if(p.t==='puff'){ ctx.strokeStyle=PENCIL; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(0,0,p.s*(1+p.life*2.4),0,7); ctx.stroke(); }
    else if(p.t==='leaf'){ ctx.fillStyle='rgba(36,71,214,0.5)'; ctx.beginPath(); ctx.ellipse(0,0,4,2,0,0,7); ctx.fill(); }
    else if(p.t==='feather'){ ctx.strokeStyle=INK; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(-3,0); ctx.quadraticCurveTo(0,-4,4,0); ctx.stroke(); }
    else if(p.t==='heart'){ ctx.fillStyle=RED; ctx.font='12px sans-serif'; ctx.beginPath(); ctx.arc(-1.6,0,2.2,0,7); ctx.arc(1.6,0,2.2,0,7); ctx.moveTo(-3.6,1); ctx.lineTo(0,5.4); ctx.lineTo(3.6,1); ctx.fill(); }
    else if(p.t==='star'){ ctx.strokeStyle=INK; ctx.lineWidth=1.5; ctx.beginPath(); for(let i=0;i<5;i++){const a=i*2.513-1.57; ctx.lineTo(Math.cos(a)*4.5,Math.sin(a)*4.5); ctx.lineTo(Math.cos(a+1.256)*2,Math.sin(a+1.256)*2);} ctx.closePath(); ctx.stroke(); }
    else if(p.t==='speed'){ ctx.strokeStyle=INK_SOFT; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14,0); ctx.stroke(); }
    ctx.restore();
  }
}
function drawFloats(){
  for(const f of floats){

  if(state==='fly' && !save.coachDone.pitch && !run.usedPitch && run.air<8 && plane.y<GROUND-30){

  // aim-state coaching + next-goal
  if(state==='aim'){
    const first = save.throws===0;

// altitude (vertical ink altimeter on the left edge) + speed (readout+bar) under the distance.
// These make the pitch tradeoff legible: watch speed drop as you climb, rise as you dive.
function drawFlightMeters(){
  const alt = Math.max(0,(GROUND-6 - plane.y)/PXM);     // metres above the street
  const spd = Math.hypot(plane.vx,plane.vy)/PXM;         // current speed (m/s in world scale)
  // ---- SPEED: small labelled readout + bar under "best", matches distance ink style ----
  // Doubles as the STALL telegraph: as a climbing wing nears the stall the readout flashes
  // red + wobbles and shouts "STALL?" (then "STALL!" while stalled) — the tradeoff made loud.
  const sbx=28, sby=118, sbw=132;
  const SPD_REF=190, sf=Math.max(0,Math.min(1,spd/SPD_REF));
  const warn = (state==='fly') ? (run.stallWarn||0) : 0;         // 0 normal .. 1 stalling
  const flash = warn>0 ? (0.45+0.55*Math.abs(Math.sin(T*22))) : 1; // fast flash as we near the stall
  const spdCol = warn>0 ? RED : INK;
  const wob = warn>0 ? Math.sin(T*30)*warn*1.6 : 0;              // little buffet wobble on the readout
  txt('spd', sbx, 100, 13, INK_SOFT, 'left', 0.9);
  txt(Math.round(spd)+'', sbx+34, 100+wob, 22, spdCol, 'left', flash, -0.01);
  txt('m/s', sbx+34+String(Math.round(spd)).length*13+4, 104, 12, INK_SOFT, 'left', 0.85);
  ctx.save();
  ctx.strokeStyle= warn>0? RED : INK; ctx.lineWidth=1.8; ctx.fillStyle='rgba(252,249,240,0.85)';
  ctx.beginPath(); wrect(sbx,sby,sbw,8,1.1,6100); ctx.fill(); ctx.stroke();
  ctx.fillStyle= warn>0? RED : (sf>0.82? RED : INK_SOFT);
  ctx.globalAlpha= warn>0? flash : 1;
  ctx.fillRect(sbx+2, sby+2, (sbw-4)*Math.max(sf, warn>0?0.08:0), 4); // keep a visible sliver so the flash reads even when slow
  ctx.restore();
  if(warn>0){
    txt(run.stalling?'STALL!':'STALL?', sbx+sbw+16+wob, 100, 16, RED, 'left', Math.min(1,flash+0.25), Math.sin(T*24)*0.06);
  }
  // ---- ALTITUDE: vertical altimeter tape on the far-left edge, fills from the ground up ----
  const gx=18, gTop=150, gBot=H-108, gh=gBot-gTop, gw=13;
  const ALT_REF=150, af=Math.max(0,Math.min(1,alt/ALT_REF));
  ctx.save();
  ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.fillStyle='rgba(252,249,240,0.85)';
  ctx.beginPath(); wrect(gx,gTop,gw,gh,1.3,6001); ctx.fill(); ctx.stroke();
  ctx.fillStyle=INK_SOFT;
  ctx.fillRect(gx+3, gBot-3-(gh-6)*af, gw-6, (gh-6)*af);   // fill grows upward with altitude
  ctx.strokeStyle='rgba(36,71,214,0.22)'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){ const ty=gBot-gh*i/4; ctx.beginPath(); ctx.moveTo(gx,ty); ctx.lineTo(gx+gw,ty); ctx.stroke(); }
  const my=gBot-3-(gh-6)*af;                               // moving marker at the current altitude
  ctx.fillStyle=RED; ctx.beginPath(); ctx.moveTo(gx+gw+1,my); ctx.lineTo(gx+gw+9,my-5); ctx.lineTo(gx+gw+9,my+5); ctx.closePath(); ctx.fill();
  ctx.restore();
  txt('alt', gx+gw/2, gTop-12, 13, INK, 'center', 0.9);
  txt(Math.round(alt)+'m', gx+gw+13, Math.max(gTop+4,Math.min(gBot-4,my)), 15, INK, 'left', 1);
}

  // tally (counts up with chings)

  let total=0;

    const maxed=tier>=MAXTIER, price=maxed?0:it.prices[tier];
    const afford=!maxed && save.st>=price;
    const shk = (cardShake>0&&cardShakeI===i)? jit(boil*7+i)*5 : 0;
    ctx.save(); ctx.translate(r.x+shk, r.y);
    ctx.fillStyle= afford? 'rgba(217,72,43,0.06)' : 'rgba(36,71,214,0.03)';
    ctx.strokeStyle= sel===i? RED : INK; ctx.lineWidth= sel===i?3.4:2;
    ctx.beginPath(); wrect(0,0,r.w,r.h,1.8,5200+i*17); ctx.fill(); ctx.stroke();
    txt(it.name, r.w/2, 17, 16.5, INK, 'center');
    txt(it.blurb, r.w/2, 35, 11.5, INK, 'center', 0.85);      // plain what-it-does line (self-explaining shop)
    drawShopIcon(i, r.w/2, 60);
    txt(cardBlurb(it,tier), r.w/2, 90, 11, INK_SOFT, 'center'); // aspirational: the next tier you unlock
    // tier pips (7 tiers)
    for(let p=0;p<MAXTIER;p++){
      const pipx=r.w/2-42+p*14;
      ctx.beginPath();
      if(p<tier){ ctx.fillStyle=INK; ctx.arc(pipx, 104, 3.6,0,7); ctx.fill(); }
      else { ctx.strokeStyle=INK_SOFT; ctx.lineWidth=1.5; ctx.arc(pipx, 104, 3.6,0,7); ctx.stroke(); }
    }
    // price
    if(maxed) txt('MAXED!', r.w/2, 122, 15, RED, 'center');
    else{
      txt(price+'', r.w/2-6, 122, 17, afford?RED:PENCIL, 'center');
      ctx.save(); ctx.globalAlpha=afford?1:0.45; drawSticker(r.w/2+16,122,8); ctx.restore();
    }
    if(afford && !maxed){
      ctx.save(); ctx.strokeStyle=RED; ctx.lineWidth=2; ctx.setLineDash([5,4]); ctx.lineDashOffset=-T*14;
      ctx.beginPath(); wrect(-4,-4,r.w+8,r.h+8,1.5,5300+i); ctx.stroke(); ctx.restore();
    }
    ctx.restore();
  }
  // throw button
  const bp=1+Math.sin(T*3.2)*0.02;
  ctx.save(); ctx.translate(W/2, CARD.y+CARD.h-33); ctx.scale(bp,bp);
  ctx.fillStyle=INK; ctx.strokeStyle=INK; ctx.lineWidth=2.6;
  ctx.beginPath(); wrect(-110,-25,220,50,2,5400); ctx.fillStyle='rgba(36,71,214,0.1)'; ctx.fill(); ctx.stroke();
  txt('AIM NEXT THROW ✈', 0, 1, 20, INK, 'center');
  ctx.restore();
  txt('tap here then pull back to throw  •  tap card / ←→ + enter or 1-5 to buy', W/2, CARD.y+CARD.h+18, 13.5, 'rgba(36,71,214,0.6)', 'center');
  ctx.restore();
}
// escalating "number-go-up" names on every card (shows the NEXT tier you unlock)
function cardBlurb(it,tier){
  const max=tier>=MAXTIER;
  if(it.key==='thr')   return max? DEVICE[MAXTIER]          : 'next: '+DEVICE[tier+1];
  if(it.key==='folds') return max? FOLD_MAT[MAXTIER].name   : '→ '+FOLD_MAT[tier+1].name;
  if(it.key==='band')  return max? LAUNCH_N[MAXTIER]        : '→ '+LAUNCH_N[tier+1];
  if(it.key==='fuel')  return max? FUEL_N[MAXTIER]          : '→ '+FUEL_N[tier+1];
  if(it.key==='clip')  return max? NOSE_N[MAXTIER]+' ⚡'     : '→ '+NOSE_N[tier+1]+(tier+1>=LASER_TIER?' ⚡':'');
  return it.blurb;
}
function drawShopIcon(i,x,y){
  ctx.save(); ctx.translate(x,y); ctx.strokeStyle=INK; ctx.lineWidth=2.2;
  if(i===0){ // sharper folds — crisp dart
    ctx.fillStyle=WHITE; ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-14,-9); ctx.lineTo(-8,0); ctx.lineTo(-14,9); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-8,0); ctx.stroke();
  } else if(i===1){ // rubber band
    ctx.strokeStyle=RED; ctx.beginPath(); ctx.ellipse(0,0,16,9,0.5,0,7); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(2,1,14,7,0.9,0,7); ctx.stroke();
  } else if(i===2){ // nose gun — paperclip smasher, or a laser emitter once unlocked
    if(save.up.clip>=LASER_TIER){
      const col=laserColor();
      ctx.fillStyle='#2A3142'; ctx.strokeStyle=INK; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.rect(-12,-3,10,6); ctx.fill(); ctx.stroke();     // emitter body
      ctx.strokeStyle=col; ctx.lineWidth=3; ctx.globalAlpha=0.85;
      ctx.beginPath(); ctx.moveTo(-2,0); ctx.lineTo(16,0); ctx.stroke();     // beam
      ctx.globalAlpha=1; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(-2,0,2.4,0,7); ctx.fill();
    } else {
      ctx.strokeStyle=PENCIL; ctx.lineWidth=2.6;
      ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(8,-8); ctx.arc(8,-2,6,-Math.PI/2,Math.PI/2);
      ctx.lineTo(-6,4); ctx.arc(-6,0,4,Math.PI/2,-Math.PI/2,true); ctx.lineTo(4,-4); ctx.stroke();
    }
  } else if(i===3){ // thruster — rocket body + flame + spinning fan hint
    ctx.fillStyle=PENCIL; ctx.beginPath(); ctx.moveTo(6,-6); ctx.lineTo(-6,-3.5); ctx.lineTo(-6,3.5); ctx.lineTo(6,6); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=RED; ctx.beginPath(); ctx.moveTo(-6,-3); ctx.lineTo(-14,0); ctx.lineTo(-6,3); ctx.closePath(); ctx.fill();
    for(let b=0;b<3;b++){ const a=T*10+b*2.09; ctx.strokeStyle=INK; ctx.beginPath(); ctx.moveTo(9,-9); ctx.lineTo(9+Math.cos(a)*4.5,-9+Math.sin(a)*4.5); ctx.stroke(); }
  } else { // fuel tank — jerry can with gas level
    ctx.fillStyle='rgba(36,71,214,0.08)';
    ctx.beginPath(); ctx.moveTo(-8,-9); ctx.lineTo(8,-9); ctx.lineTo(8,9); ctx.lineTo(-8,9); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle=INK; ctx.beginPath(); ctx.moveTo(-4,-9); ctx.lineTo(-4,-12); ctx.lineTo(3,-12); ctx.lineTo(3,-9); ctx.stroke(); // cap
    ctx.fillStyle=RED; ctx.fillRect(-7,2,14,6);                                        // gas level
    ctx.strokeStyle='rgba(36,71,214,0.5)'; ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.stroke();
  }
  ctx.restore();
}
