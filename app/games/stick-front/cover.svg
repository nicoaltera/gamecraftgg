<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="char" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1914" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2a1914" stop-opacity="0"/>
    </linearGradient>
    <style>
      .ink{fill:none;stroke:#2A2320;stroke-linecap:round;stroke-linejoin:round}
      .blue{fill:none;stroke:#1F4E8C;stroke-linecap:round;stroke-linejoin:round;stroke-width:4}
      .red{fill:none;stroke:#B23A2C;stroke-linecap:round;stroke-linejoin:round;stroke-width:4}
      .bf{fill:#1F4E8C}.rf{fill:#B23A2C}
      .title{font-family:"Comic Neue","Chalkboard SE","Segoe Print",cursive;font-weight:800}
    </style>
  </defs>

  <!-- paper -->
  <rect width="640" height="400" fill="#F4ECD8"/>
  <g stroke="#5A7896" stroke-opacity="0.09" stroke-width="1">
    <line x1="0" y1="120" x2="640" y2="120"/><line x1="0" y1="146" x2="640" y2="146"/>
    <line x1="0" y1="172" x2="640" y2="172"/><line x1="0" y1="198" x2="640" y2="198"/>
    <line x1="0" y1="224" x2="640" y2="224"/><line x1="0" y1="250" x2="640" y2="250"/>
    <line x1="0" y1="276" x2="640" y2="276"/><line x1="0" y1="302" x2="640" y2="302"/>
  </g>
  <!-- distant hills -->
  <path d="M0 250 Q160 214 320 246 Q480 216 640 248" class="ink" stroke-opacity="0.12" stroke-width="2"/>
  <!-- char edges (sudden death vibe) -->
  <rect x="0" y="0" width="640" height="40" fill="url(#char)"/>

  <!-- ground -->
  <rect x="0" y="316" width="640" height="30" fill="#EAE0C6"/>
  <path d="M0 316 Q160 313 320 317 Q480 313 640 316" class="ink" stroke-width="3"/>
  <g stroke="#2A2320" stroke-opacity="0.16" stroke-width="1">
    <line x1="30" y1="322" x2="24" y2="336"/><line x1="90" y1="322" x2="84" y2="336"/>
    <line x1="150" y1="322" x2="144" y2="336"/><line x1="500" y1="322" x2="494" y2="336"/>
    <line x1="560" y1="322" x2="554" y2="336"/><line x1="610" y1="322" x2="604" y2="336"/>
  </g>

  <!-- ============ YOUR FORT (left, blue) ============ -->
  <g>
    <rect x="20" y="196" width="70" height="124" fill="#1F4E8C" fill-opacity="0.10" class="ink" stroke-width="3.5"/>
    <rect x="24" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="40" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="56" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="72" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <line x1="26" y1="222" x2="84" y2="222" class="ink" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="26" y1="246" x2="84" y2="246" class="ink" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="26" y1="270" x2="84" y2="270" class="ink" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="45" y="286" width="20" height="34" class="ink" stroke-width="2.6"/>
    <!-- flag -->
    <line x1="20" y1="184" x2="20" y2="150" class="ink" stroke-width="3"/>
    <path d="M20 150 L44 156 L20 162 Z" class="bf"/>
    <!-- YOU banner -->
    <rect x="28" y="120" width="54" height="24" rx="5" class="bf" stroke="#2A2320" stroke-width="2"/>
    <text x="55" y="137" class="title" font-size="15" fill="#F4ECD8" text-anchor="middle">YOU</text>
    <!-- turret archer on top -->
    <g class="blue" stroke-width="3">
      <line x1="60" y1="184" x2="57" y2="172"/><line x1="60" y1="184" x2="63" y2="172"/>
      <line x1="60" y1="172" x2="61" y2="162"/>
      <circle cx="61" cy="156" r="5" fill="none"/>
      <line x1="61" y1="164" x2="72" y2="160"/>
    </g>
    <path d="M72 149 A11 11 0 0 1 72 171" class="blue" stroke-width="2.4"/>
  </g>

  <!-- ============ ENEMY FORT (right, red) ============ -->
  <g>
    <rect x="550" y="196" width="70" height="124" fill="#B23A2C" fill-opacity="0.10" class="ink" stroke-width="3.5"/>
    <rect x="558" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="574" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="590" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="606" y="184" width="10" height="14" class="ink" stroke-width="3"/>
    <rect x="575" y="286" width="20" height="34" class="ink" stroke-width="2.6"/>
    <line x1="620" y1="184" x2="620" y2="150" class="ink" stroke-width="3"/>
    <path d="M620 150 L596 156 L620 162 Z" class="rf"/>
    <rect x="558" y="120" width="54" height="24" rx="5" class="rf" stroke="#2A2320" stroke-width="2"/>
    <text x="585" y="137" class="title" font-size="15" fill="#F4ECD8" text-anchor="middle">FOE</text>
  </g>

  <!-- ============ ARMIES CLASHING IN THE LANE ============ -->
  <!-- your knight (heavy, blue) -->
  <g class="blue">
    <line x1="250" y1="296" x2="245" y2="316"/><line x1="250" y1="296" x2="257" y2="316"/>
    <line x1="250" y1="296" x2="255" y2="272"/>
    <circle cx="257" cy="262" r="7" fill="none"/>
    <path d="M250 262 A7 7 0 0 1 264 262" stroke-width="3"/>
    <line x1="255" y1="276" x2="272" y2="270"/>
    <line x1="272" y1="270" x2="288" y2="256"/>
    <line x1="255" y1="278" x2="243" y2="288"/>
  </g>
  <path d="M257 255 L252 246" stroke="#5B9BD5" stroke-width="3" stroke-linecap="round"/>
  <!-- your runner (light, blue) -->
  <g class="blue" stroke-width="3.5">
    <line x1="196" y1="298" x2="190" y2="316"/><line x1="196" y1="298" x2="203" y2="316"/>
    <line x1="196" y1="298" x2="200" y2="278"/>
    <circle cx="201" cy="269" r="6" fill="none"/>
    <line x1="200" y1="281" x2="214" y2="276"/>
  </g>

  <!-- enemy brute (heavy, red) -->
  <g class="red">
    <line x1="392" y1="296" x2="397" y2="316"/><line x1="392" y1="296" x2="385" y2="316"/>
    <line x1="392" y1="296" x2="387" y2="272"/>
    <circle cx="385" cy="262" r="7" fill="none"/>
    <path d="M378 262 A7 7 0 0 1 392 262" stroke-width="3"/>
    <line x1="387" y1="276" x2="370" y2="270"/>
    <line x1="370" y1="270" x2="354" y2="256"/>
  </g>
  <path d="M354 256 L346 248 L360 250 Z" class="rf"/>
  <!-- enemy archer (ranged, red) -->
  <g class="red" stroke-width="3.5">
    <line x1="452" y1="298" x2="446" y2="316"/><line x1="452" y1="298" x2="458" y2="316"/>
    <line x1="452" y1="298" x2="452" y2="278"/>
    <circle cx="452" cy="269" r="6" fill="none"/>
    <line x1="452" y1="281" x2="438" y2="276"/>
    <path d="M432 262 A13 13 0 0 0 432 292" stroke-width="2.6"/>
    <line x1="432" y1="262" x2="443" y2="277"/><line x1="443" y1="277" x2="432" y2="292"/>
  </g>

  <!-- clash pop + ink splatter at the frontline -->
  <g stroke="#2A2320" stroke-width="2.4" fill="none" opacity="0.85">
    <circle cx="322" cy="270" r="14"/>
    <circle cx="322" cy="270" r="22" opacity="0.4"/>
  </g>
  <g fill="#2A2320">
    <circle cx="304" cy="256" r="3"/><circle cx="340" cy="258" r="2.4"/>
    <circle cx="312" cy="286" r="2.6"/><circle cx="336" cy="288" r="3"/>
    <circle cx="322" cy="244" r="2.2"/>
  </g>
  <!-- flying arrow -->
  <g stroke="#B23A2C" stroke-width="2.4" fill="#B23A2C">
    <line x1="300" y1="238" x2="284" y2="234"/>
    <path d="M284 234 L290 231 L290 237 Z"/>
  </g>

  <!-- ============ TITLE ============ -->
  <text x="320" y="66" class="title" font-size="60" fill="#2A2320" text-anchor="middle">STICK FRONT</text>
  <line x1="150" y1="82" x2="312" y2="82" stroke="#1F4E8C" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="328" y1="82" x2="490" y2="82" stroke="#B23A2C" stroke-width="3.5" stroke-linecap="round"/>
  <text x="320" y="104" class="title" font-size="17" fill="#2A2320" fill-opacity="0.72" text-anchor="middle">spawn armies · climb 5 ages · smash the fort</text>

  <!-- age tick marks (tech-tree vibe) bottom -->
  <g transform="translate(0,364)">
    <line x1="150" y1="8" x2="490" y2="8" stroke="#2A2320" stroke-width="2" stroke-opacity="0.5"/>
    <g fill="#E0A32E" stroke="#2A2320" stroke-width="1.5">
      <circle cx="170" cy="8" r="6"/><circle cx="250" cy="8" r="6"/><circle cx="320" cy="8" r="6"/>
      <circle cx="390" cy="8" r="6"/><circle cx="470" cy="8" r="7" fill="#3AA6A0"/>
    </g>
    <text x="170" y="30" class="title" font-size="11" fill="#2A2320" text-anchor="middle">Stone</text>
    <text x="250" y="30" class="title" font-size="11" fill="#2A2320" text-anchor="middle">Sword</text>
    <text x="320" y="30" class="title" font-size="11" fill="#2A2320" text-anchor="middle">Knight</text>
    <text x="390" y="30" class="title" font-size="11" fill="#2A2320" text-anchor="middle">Musket</text>
    <text x="470" y="30" class="title" font-size="11" fill="#3AA6A0" text-anchor="middle">Future</text>
  </g>
</svg>
