<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Stick Front</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #241d17; overflow: hidden; }
  canvas { display: block; touch-action: none; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
/* ============================================================
   STICK FRONT — Age of War in one ink lane.
   Earn gold, spawn featureless stick warriors, smash the enemy
   fort, advance through 5 ages. Win battles vs an escalating AI.
   Pure Canvas2D + WebAudio. 960x540 virtual, letterboxed, dpr-crisp.
   ============================================================ */
const W = 960, H = 540;
const SLUG = 'stick-front';
const HANDFONT = '"Comic Neue","Chalkboard SE","Segoe Print","Bradley Hand",cursive';

// ---------- geometry / world ----------
// The battlefield is far WIDER than the 960 viewport (~2.7x): the two forts are
// far apart, so you cannot see both at once. The camera is PLAYER-DRIVEN ONLY —
// it never scrolls on its own; you drag / arrow / A-D / minimap / Q-E to look.
const GY = 410;                 // ground line (feet)
const YOU = 0, FOE = 1;
const WORLD_W = 2560;           // full battlefield width in world px
const YOU_CTR = 150, YOU_WALL = 202;    // your fort (far left)
const FOE_CTR = 2410, FOE_WALL = 2358;  // enemy fort (far right)
const YOU_SPAWN = 214, FOE_SPAWN = 2346;
const TURRET_Y = 302;
const SPACING = 27;             // marching column gap
const POP_YOU = 16;             // your population cap
const SIEGE_START = 70;         // seconds until war-exhaustion (wider map => longer)
const SIEGE_WARN = 57;

// ---------- palette ----------
const PAPER = '#F4ECD8', PAPER2 = '#EAE0C6', INK = '#2A2320';
const COL = ['#1F4E8C', '#B23A2C'];        // YOU ink / FOE ink
const ACC = ['#5B9BD5', '#E0913C'];        // accents (plume/glow)
const GOLDC = '#E0A32E', XPC = '#3AA6A0';

// ---------- canvas / letterbox ----------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr = 1, scale = 1, ox = 0, oy = 0, cw = 0, chh = 0;
function resize() {
  dpr = Math.min(2.5, window.devicePixelRatio || 1);
  cw = window.innerWidth; chh = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(chh * dpr);
  canvas.style.width = cw + 'px'; canvas.style.height = chh + 'px';
  scale = Math.min(cw / W, chh / H);
  ox = (cw - W * scale) / 2; oy = (chh - H * scale) / 2;
}
window.addEventListener('resize', resize); resize();
const toV = (cx, cy) => ({ x: (cx - ox) / scale, y: (cy - oy) / scale });

// ---------- camera (player-driven only; NEVER auto-scrolls) ----------
// camX = world x drawn at the left edge of the 960-wide viewport.
let camX = 0;                             // moved ONLY by player input (drag / keys / minimap)
let camDragging = false, camDragLast = 0, camDragMoved = 0;
const CAM_MAX = () => WORLD_W - W;
function panCam(nx) { camX = clamp(nx, 0, CAM_MAX()); }
// minimap (screen space, under the HUD)
const MM_W = 300, MM_X = (W - MM_W) / 2, MM_Y = 92, MM_H = 12;
const inMinimap = (vx, vy) => vx >= MM_X - 6 && vx <= MM_X + MM_W + 6 && vy >= MM_Y - 8 && vy <= MM_Y + MM_H + 8;
const w2mini = (wx) => MM_X + clamp(wx / WORLD_W, 0, 1) * MM_W;

// ---------- RNG ----------
function mulberry32(a) { return function () {
  a |= 0; a = (a + 0x6D2B79F5) | 0;
  let t = Math.imul(a ^ (a >>> 15), 1 | a);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}; }
let rng = mulberry32(9182);
const rand = (a, b) => a + (b - a) * rng();
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

// ============================================================
//  AUDIO (WebAudio synth)
// ============================================================
let ac = null, master = null, noiseBuf = null;
function initAudio() {
  if (ac) return;
  try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  master = ac.createGain(); master.gain.value = 0.55; master.connect(ac.destination);
  noiseBuf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}
function env(g, t0, a, peak, d) {
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d);
}
function tone(freq, type, t0, a, peak, d, dest) {
  const o = ac.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = ac.createGain(); env(g, t0, a, peak, d);
  o.connect(g); g.connect(dest || master); o.start(t0); o.stop(t0 + a + d + 0.02);
  return o;
}
function noise(t0, a, peak, d, filt, freq, q) {
  const n = ac.createBufferSource(); n.buffer = noiseBuf;
  const f = ac.createBiquadFilter(); f.type = filt; f.frequency.value = freq; f.Q.value = q || 1;
  const g = ac.createGain(); env(g, t0, a, peak, d);
  n.connect(f); f.connect(g); g.connect(master); n.start(t0); n.stop(t0 + a + d + 0.05);
}
function sClink() { if (!ac) return; const t = ac.currentTime, pv = 0.85 + Math.random() * 0.3;
  tone(1400 * pv, 'square', t, 0.002, 0.05, 0.06); tone(2100 * pv, 'triangle', t, 0.002, 0.035, 0.05);
  noise(t, 0.001, 0.04, 0.04, 'highpass', 2600, 1); }
function sTwang() { if (!ac) return; const t = ac.currentTime, pv = 0.9 + Math.random() * 0.25;
  const o = ac.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(520 * pv, t); o.frequency.exponentialRampToValueAtTime(180 * pv, t + 0.12);
  const g = ac.createGain(); env(g, t, 0.002, 0.06, 0.12); o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.16); }
function sLaser() { if (!ac) return; const t = ac.currentTime, pv = 0.9 + Math.random() * 0.3;
  const o = ac.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(1200 * pv, t); o.frequency.exponentialRampToValueAtTime(420, t + 0.1);
  const g = ac.createGain(); env(g, t, 0.002, 0.05, 0.1); o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.14); }
function sCoin() { if (!ac) return; const t = ac.currentTime, pv = 0.96 + Math.random() * 0.08;
  tone(1180 * pv, 'square', t, 0.002, 0.05, 0.06); tone(1760 * pv, 'square', t + 0.05, 0.002, 0.045, 0.08); }
function sSpawn(side) { if (!ac) return; const t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'triangle';
  o.frequency.setValueAtTime(side === YOU ? 300 : 220, t); o.frequency.exponentialRampToValueAtTime(side === YOU ? 460 : 330, t + 0.09);
  const g = ac.createGain(); env(g, t, 0.004, 0.05, 0.09); o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.14); }
function sFortHit() { if (!ac) return; const t = ac.currentTime;
  noise(t, 0.003, 0.12, 0.16, 'lowpass', 240, 0.7);
  const o = ac.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.15);
  const g = ac.createGain(); env(g, t, 0.003, 0.14, 0.16); o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.22); }
function sFanfare() { if (!ac) return; const t = ac.currentTime;
  [523, 659, 784, 1046].forEach((f, i) => { tone(f, 'triangle', t + i * 0.09, 0.01, 0.09, 0.24); tone(f * 2, 'sine', t + i * 0.09, 0.01, 0.03, 0.2); }); }
function sCrumble(win) { if (!ac) return; const t = ac.currentTime;
  noise(t, 0.02, 0.4, 1.0, 'lowpass', 600, 0.6);
  const o = ac.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(win ? 200 : 260, t); o.frequency.exponentialRampToValueAtTime(win ? 480 : 60, t + 0.7);
  const g = ac.createGain(); env(g, t, 0.02, 0.22, 0.9); o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.0);
  if (win) [523, 784, 1046].forEach((f, i) => tone(f, 'triangle', t + 0.2 + i * 0.12, 0.01, 0.1, 0.3)); }
let drumT = 0;
function sDrum(vol) { if (!ac) return; const t = ac.currentTime;
  const o = ac.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(96, t); o.frequency.exponentialRampToValueAtTime(48, t + 0.12);
  const g = ac.createGain(); env(g, t, 0.004, vol, 0.14); o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.2); }

// ============================================================
//  DATA — ages, unit classes, turret
// ============================================================
// 5 ages. Each visibly re-skins units + boosts stats, fort HP, income.
const AGES = [
  { name: 'Stone Age',  hp: 1.00, dmg: 1.00, cost: 1.00, fort: 720,  inc: 9,  band: 0 },
  { name: 'Sword Age',  hp: 1.55, dmg: 1.45, cost: 1.40, fort: 940,  inc: 13, band: 1 },
  { name: 'Knight Age', hp: 2.35, dmg: 2.05, cost: 1.90, fort: 1200, inc: 18, band: 2 },
  { name: 'Musket Age', hp: 3.40, dmg: 3.10, cost: 2.55, fort: 1520, inc: 25, band: 3 },
  { name: 'Future Age', hp: 5.00, dmg: 4.60, cost: 3.40, fort: 1950, inc: 34, band: 4 },
];
// xp to reach age idx 1..4. Steep + progressively steeper so each age is a
// real, earned milestone (rubric P7): the first age-up takes meaningful play,
// later ages take substantially more.
const AGE_XP = [220, 520, 1000, 1750];
// Per-age STYLE — a visible fidelity LEAP each age (rubric P7 / "make advancement
// unmistakable"). rough=hand-scribble jitter+passes, lw=stroke weight mult,
// fill=torso fill alpha, shade=inner shading, torso=body silhouette, glow=energy.
const AGE_STYLE = [
  { name: 'stone',  rough: 2.3, passes: 3, lw: 0.92, fill: 0.00, shade: 0.00, torso: 'none',  glow: 0.0 },
  { name: 'sword',  rough: 1.05, passes: 2, lw: 1.12, fill: 0.13, shade: 0.10, torso: 'tunic', glow: 0.0 },
  { name: 'knight', rough: 0.45, passes: 1, lw: 1.34, fill: 0.20, shade: 0.30, torso: 'plate', glow: 0.12 },
  { name: 'musket', rough: 0.18, passes: 1, lw: 1.52, fill: 0.26, shade: 0.44, torso: 'coat',  glow: 0.18 },
  { name: 'future', rough: 0.0,  passes: 1, lw: 1.72, fill: 0.34, shade: 0.58, torso: 'suit',  glow: 1.0 },
];
// 3 classes: light (cheap swarm) / heavy (tanky, cleaves) / ranged (poke, fragile)
// Speeds are tuned up for the wider battlefield so fronts still meet at a good clip.
const CLS = [
  { key: 'light',  name: 'Runner',  hp: 34,  dmg: 9,  spd: 82, atkCd: 0.66, range: 20,  cost: 20, gold: 8,  xp: 7,  sc: 0.92, ranged: false, pspd: 0 },
  { key: 'heavy',  name: 'Brute',   hp: 155, dmg: 27, spd: 38, atkCd: 1.05, range: 22,  cost: 78, gold: 27, xp: 24, sc: 1.20, ranged: false, pspd: 0 },
  { key: 'ranged', name: 'Shooter', hp: 42,  dmg: 15, spd: 58, atkCd: 1.25, range: 178, cost: 50, gold: 15, xp: 14, sc: 1.00, ranged: true,  pspd: 460 },
];
const TURRET = { // tiers: 0 = none. cost to reach tier i (buy=1).
  cost: [0, 120, 240, 430, 700],  // gold to reach tier index
  dmg:  [0, 16, 30, 52, 90],
  cd:   [0, 1.4, 1.15, 0.92, 0.72],
  range:[0, 360, 400, 450, 520],
  max: 4,
};
// ---------- MINER ECONOMY ----------
// Gold income = a small flat trickle + a per-miner rate. Miners work BEHIND your
// fort; buying one costs gold now and pays back over time by raising your coin
// rate (a compounding economy). Warriors, by contrast, spend gold on immediate
// military. THE core allocation tradeoff: miners (bigger army later) vs warriors
// (pressure now, flat income). One clean track, escalating cost, sensible cap.
const MINER_MAX = 8;
const MINER_INC = 3.6;                                    // gold/s added per miner
const MINER_COST = [45, 65, 90, 120, 155, 195, 245, 310]; // cost of the (count+1)th miner
function goldBase() { return 5 + age * 1.3; }             // flat trickle (small age bump)
function goldRate() { return goldBase() + miners * MINER_INC; }
function minerCost(count) { return count >= MINER_MAX ? -1 : MINER_COST[count]; }

// ============================================================
//  STATE
// ============================================================
const ST = { SPLASH: 0, BATTLE: 1, INTERLUDE: 2, OVER: 3 };
let state = ST.SPLASH;

let best = 0;
try { best = parseInt(localStorage.getItem('gs_best:' + SLUG) || '0', 10) || 0; } catch (e) {}
let challengeN = 0;
try { const c = parseInt(new URLSearchParams(location.search).get('c') || '', 10); if (Number.isFinite(c) && c > 0) challengeN = c; } catch (e) {}
let challengePosted = false;
// read-only verification telemetry (opt-in via ?v=1) — emits console lines only,
// never mutates state. Used by the scripted drive; harmless when absent.
let VLOG = false; try { VLOG = new URLSearchParams(location.search).get('v') === '1'; } catch (e) {}
let vAcc = 0;

function post(m) { try { parent.postMessage(m, '*'); } catch (e) {} }
function saveRun() { try { localStorage.setItem('gs_save:' + SLUG, JSON.stringify({ battle, age, turretTier, miners, gold: Math.round(gold), xp: Math.round(xp), won: battlesWon })); } catch (e) {} }
function clearSave() { try { localStorage.removeItem('gs_save:' + SLUG); } catch (e) {} }

// run/campaign state
let battle = 1, battlesWon = 0;
let gold = 160, xp = 0, age = 0, turretTier = 0, miners = 0;
// enemy state
let eGold = 0, eXp = 0, eAge = 0, eTurret = 0, eAgeCap = 0, ePopCap = 6, eInc = 7, eDecT = 0, eMiners = 0, eMinerTarget = 0;
// forts
const fort = [{ hp: 720, max: 720, shake: 0 }, { hp: 380, max: 380, shake: 0 }];
// timers / juice
let battleTime = 0, shake = 0, siege = 0, drumInt = 1.4, drumClock = 0, minerFxT = 0;
let ageFlash = [0, 0], flashCol = null, flashPop = 0;
let ageWaveT = 0, ageWaveSide = YOU;   // expanding shockwave for the age-up moment
let banner = null, bannerT = 0;      // {txt, sub, col}
let explainerT = 0, sideCalloutT = 0, firstBattleEver = true;
let turretMuzzle = [0, 0];
let goT = 0;                          // gameover ease
let pendingResume = null;
try { const s = JSON.parse(localStorage.getItem('gs_save:' + SLUG) || 'null'); if (s && s.battle) pendingResume = s; } catch (e) {}

// ============================================================
//  POOLS
// ============================================================
const MAXU = 44, MAXP = 140, MAXPT = 300, MAXF = 44;
function mkUnit() { return { active: false, side: 0, ci: 0, tier: 0, x: 0, hp: 0, maxHp: 0, dmg: 0, spd: 0, atkCd: 0, atkT: 0, range: 0, ranged: false, pspd: 0, gold: 0, xp: 0, walk: 0, atkAnim: 0, moving: false, dying: false, deathT: 0, k: 0, fall: 0, hpFlash: 0 }; }
function mkProj() { return { active: false, side: 0, x: 0, y: 0, vx: 0, vy: 0, dmg: 0, type: 0, life: 0, g: 0 }; }
function mkPart() { return { active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, max: 0, r: 0, col: '#000', g: 0, kind: 0, rot: 0, vr: 0 }; }
function mkFloat() { return { active: false, x: 0, y: 0, vy: 0, life: 0, txt: '', col: '#000', sz: 0 }; }
const units = []; for (let i = 0; i < MAXU; i++) units.push(mkUnit());
const projs = []; for (let i = 0; i < MAXP; i++) projs.push(mkProj());
const parts = []; for (let i = 0; i < MAXPT; i++) parts.push(mkPart());
const floats = []; for (let i = 0; i < MAXF; i++) floats.push(mkFloat());
function getU() { for (let i = 0; i < MAXU; i++) if (!units[i].active) return units[i]; return null; }
function getP() { for (let i = 0; i < MAXP; i++) if (!projs[i].active) return projs[i]; return null; }
function getPt() { for (let i = 0; i < MAXPT; i++) if (!parts[i].active) return parts[i]; return null; }
function getF() { for (let i = 0; i < MAXF; i++) if (!floats[i].active) return floats[i]; return null; }
function countUnits(side) { let n = 0; for (let i = 0; i < MAXU; i++) if (units[i].active && !units[i].dying && units[i].side === side) n++; return n; }

// ============================================================
//  PARTICLES / FLOATERS
// ============================================================
function inkSplat(x, y, col, n) {
  for (let i = 0; i < n; i++) { const p = getPt(); if (!p) break;
    const a = rand(0, 6.28), sp = rand(30, 150);
    p.active = true; p.x = x; p.y = y; p.vx = Math.cos(a) * sp; p.vy = Math.sin(a) * sp - rand(10, 70);
    p.life = p.max = rand(0.35, 0.7); p.r = rand(1.6, 4.2); p.col = col; p.g = 460; p.kind = 0; }
}
function pop(x, y, col) {
  const p = getPt(); if (!p) return; p.active = true; p.x = x; p.y = y; p.vx = 0; p.vy = 0;
  p.life = p.max = 0.24; p.r = 6; p.col = col; p.g = 0; p.kind = 1;
}
function ember(x, y) {
  const p = getPt(); if (!p) return; p.active = true; p.x = x; p.y = y;
  p.vx = rand(-20, 20); p.vy = rand(-70, -20); p.life = p.max = rand(0.6, 1.2); p.r = rand(1, 2.6);
  p.col = rng() < 0.5 ? '#E0913C' : '#B23A2C'; p.g = -30; p.kind = 2;
}
function floater(x, y, txt, col, sz) {
  const f = getF(); if (!f) return; f.active = true; f.x = x; f.y = y; f.vy = -34; f.life = 0.85; f.txt = txt; f.col = col; f.sz = sz || 15;
}
function updateParts(dt) {
  for (let i = 0; i < MAXPT; i++) { const p = parts[i]; if (!p.active) continue;
    p.life -= dt; if (p.life <= 0) { p.active = false; continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.g * dt;
    if (p.kind === 0 && p.y > GY + 6) { p.y = GY + 6; p.vy = 0; p.vx *= 0.6; }
  }
  for (let i = 0; i < MAXF; i++) { const f = floats[i]; if (!f.active) continue;
    f.life -= dt; if (f.life <= 0) { f.active = false; continue; } f.y += f.vy * dt; f.vy *= 0.94; }
}

// ============================================================
//  UNITS
// ============================================================
function spawnUnit(side, ci) {
  const c = CLS[ci]; const u = getU(); if (!u) return null;
  const tier = side === YOU ? age : eAge;
  const a = AGES[tier];
  u.active = true; u.side = side; u.ci = ci; u.tier = tier;
  u.x = side === YOU ? YOU_SPAWN : FOE_SPAWN;
  u.maxHp = u.hp = Math.round(c.hp * a.hp);
  u.dmg = c.dmg * a.dmg; u.spd = c.spd; u.atkCd = c.atkCd; u.atkT = 0; u.range = c.range;
  u.ranged = c.ranged; u.pspd = c.pspd; u.gold = Math.round(c.gold * a.cost * 0.6); u.xp = c.xp;
  u.walk = rand(0, 6.28); u.atkAnim = 0; u.moving = true; u.dying = false; u.deathT = 0; u.fall = 0;
  u.k = rand(-0.7, 0.7); u.hpFlash = 0;
  sSpawn(side);
  return u;
}
function hurt(u, dmg, bySide, hx) {
  if (u.dying) return; u.hp -= dmg; u.hpFlash = 1;
  inkSplat(hx != null ? hx : u.x, GY - 26, COL[u.side], 3);
  if (u.hp <= 0) {
    u.dying = true; u.deathT = 0.45; u.hp = 0;
    inkSplat(u.x, GY - 24, COL[u.side], 7); pop(u.x, GY - 26, ACC[bySide]);
    // reward killer
    if (bySide === YOU) { gold += u.gold; xp += u.xp; floater(u.x, GY - 46, '+' + u.gold, GOLDC, 15); sCoin(); }
    else { eGold += u.gold; eXp += u.xp; }
  }
}
function updateUnits(dt) {
  for (let i = 0; i < MAXU; i++) { const u = units[i]; if (!u.active) continue;
    if (u.atkAnim > 0) u.atkAnim = Math.max(0, u.atkAnim - dt * 4);
    if (u.hpFlash > 0) u.hpFlash = Math.max(0, u.hpFlash - dt * 1.4);
    if (u.dying) { u.deathT -= dt; u.fall = Math.min(1, u.fall + dt * 4); if (u.deathT <= 0) u.active = false; continue; }
    const d = u.side === YOU ? 1 : -1;
    // scan
    let nEnemy = null, nDist = 1e9, blockGap = 1e9;
    for (let j = 0; j < MAXU; j++) { const v = units[j]; if (!v.active || v === u || v.dying) continue;
      const rel = (v.x - u.x) * d;
      if (v.side !== u.side) { const dist = Math.abs(v.x - u.x); if (rel > -8 && dist < nDist) { nDist = dist; nEnemy = v; } }
      else { if (rel > 0 && rel < blockGap) blockGap = rel; }
    }
    const fortWall = u.side === YOU ? FOE_WALL : YOU_WALL;
    const fortDist = (fortWall - u.x) * d;
    const fortAhead = fortDist > 0 && (!nEnemy || fortDist < (nEnemy.x - u.x) * d);
    u.moving = false;
    if (u.ranged && nEnemy && nDist <= u.range) {
      // stop & shoot
      u.atkT -= dt; if (u.atkT <= 0) { fireArrow(u, nEnemy); u.atkT = u.atkCd; u.atkAnim = 1; }
    } else if (!u.ranged && nEnemy && nDist <= u.range) {
      // melee clash
      u.atkT -= dt; if (u.atkT <= 0) { hurt(nEnemy, u.dmg, u.side, (u.x + nEnemy.x) / 2); u.atkT = u.atkCd; u.atkAnim = 1; sClink(); pop((u.x + nEnemy.x) / 2, GY - 26, INK); }

function counterPick() {

    if (v.ci === 0) pl++; else if (v.ci === 1) ph++; else pr++; }
  const r = rng();
  if (ph >= 2 && r < 0.55) return 2;        // player has heavies -> ranged
  if (pr >= 2 && r < 0.55) return 0;        // player has ranged -> light swarm
  if (pl >= 4 && r < 0.5) return 1;         // swarm -> heavy to cleave

}

}

  // two mini armies clashing
  const dm = { ci: 1, tier: 2, walk: 0, moving: false, atkAnim: 0.5, side: YOU, ranged: false, hp: 1, maxHp: 1, dying: false, x: W / 2 - 60, k: 0.2 };
  drawStick(Object.assign(mkUnit(), dm, { x: W / 2 - 120 })); drawStick(Object.assign(mkUnit(), dm, { x: W / 2 - 60, ci: 0, tier: 1 }));
  drawStick(Object.assign(mkUnit(), { ci: 1, tier: 2, walk: 0, moving: false, atkAnim: 0.5, side: FOE, ranged: false, hp: 1, maxHp: 1, dying: false, x: W / 2 + 60, k: 0.2 }));
  drawStick(Object.assign(mkUnit(), { ci: 2, tier: 3, walk: 0, moving: false, atkAnim: 0, side: FOE, ranged: true, hp: 1, maxHp: 1, dying: false, x: W / 2 + 120, k: 0.2 }));
  const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006);
  ctx.globalAlpha = pulse; textSh(pendingResume ? 'tap / space to RESUME battle ' + pendingResume.battle : 'tap · click · press any key to begin', W / 2, 470, 24, COL[YOU], 'center', '800'); ctx.globalAlpha = 1;
  if (challengeN) textSh('challenge: win ' + challengeN + ' battles', W / 2, 500, 15, COL[FOE], 'center', '800');
}
function drawGameOver() {
  goT = Math.min(1, goT + 0.03);
  ctx.fillStyle = 'rgba(42,35,32,' + (0.55 * goT) + ')'; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = goT;
  const yc = lerp(120, 150, goT);
  textSh('DEFEAT', W / 2, yc, 60, COL[FOE], 'center', '800');
  textSh('your fort crumbled at battle ' + battle, W / 2, yc + 44, 18, '#F4ECD8', 'center', '700');
  textSh(battlesWon + '', W / 2, yc + 116, 82, '#F4ECD8', 'center', '800');
  textSh('battles won', W / 2, yc + 150, 18, '#D8CBAE', 'center', '700');
  if (battlesWon >= best && battlesWon > 0) { const p = 0.7 + 0.3 * Math.sin(performance.now() * 0.008); ctx.globalAlpha = goT * p; textSh('★ NEW BEST ★', W / 2, yc + 186, 26, GOLDC, 'center', '800'); ctx.globalAlpha = goT; }
  else textSh('best ' + best, W / 2, yc + 186, 18, '#D8CBAE', 'center', '700');
  if (challengeN) { const won = battlesWon >= challengeN; textSh(won ? '✓ beat the target of ' + challengeN : 'target was ' + challengeN + ' wins', W / 2, yc + 214, 16, won ? '#7FB86A' : '#E0913C', 'center', '800'); }
  const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006);
  ctx.globalAlpha = goT * pulse; textSh('FIGHT AGAIN — fresh battle 1', W / 2, yc + 258, 26, '#F4ECD8', 'center', '800'); ctx.globalAlpha = goT;
  textSh('tap · space · enter', W / 2, yc + 288, 14, 'rgba(244,236,216,0.7)', 'center', '700');
  ctx.globalAlpha = 1;
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#241d17'; ctx.fillRect(0, 0, cw, chh);
  const sx = ox + (Math.random() - 0.5) * shake * scale, sy = oy + (Math.random() - 0.5) * shake * scale;
  ctx.setTransform(scale * dpr, 0, 0, scale * dpr, sx * dpr, sy * dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();

  // ---- WORLD LAYER (scrolls with the camera) ----
  ctx.save(); ctx.translate(-camX, 0);
  drawPaper();
  drawFort(YOU); drawFort(FOE);
  if (state === ST.BATTLE || state === ST.INTERLUDE) { drawMiners(YOU); drawMiners(FOE); }
  const order = [];
  for (let i = 0; i < MAXU; i++) if (units[i].active) order.push(units[i]);
  order.sort((a, b) => a.x - b.x);
  for (const u of order) drawStick(u);
  for (let i = 0; i < MAXP; i++) { const p = projs[i]; if (p.active && p.x - camX > -30 && p.x - camX < W + 30) drawProj(p); }
  for (let i = 0; i < MAXPT; i++) { const p = parts[i]; if (!p.active) continue; if (p.x - camX < -20 || p.x - camX > W + 20) continue; const a = clamp(p.life / p.max, 0, 1);
    if (p.kind === 1) { ctx.globalAlpha = a * 0.8; ctx.strokeStyle = p.col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1.4 - a) * 3 + 3, 0, 6.28); ctx.stroke(); }
    else { ctx.globalAlpha = a; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill(); }
    ctx.globalAlpha = 1; }
  for (let i = 0; i < MAXF; i++) { const f = floats[i]; if (!f.active) continue; if (f.x - camX < -40 || f.x - camX > W + 40) continue; ctx.globalAlpha = clamp(f.life / 0.85, 0, 1); textSh(f.txt, f.x, f.y, f.sz, f.col, 'center', '800'); ctx.globalAlpha = 1; }
  ctx.restore();

  // ---- SCREEN LAYER (fixed UI) ----
  // age-up shockwave ring + flash
  if (ageWaveT > 0) { const p = 1 - ageWaveT; ctx.save(); ctx.globalAlpha = ageWaveT * 0.5; ctx.strokeStyle = ACC[ageWaveSide]; ctx.lineWidth = 6 * (1 - p * 0.6);
    ctx.beginPath(); ctx.arc(W / 2, 300, 40 + p * 620, 0, 6.28); ctx.stroke(); ctx.restore(); }
  if (flashPop > 0 && flashCol) { ctx.globalAlpha = clamp(flashPop, 0, 1) * 0.26; ctx.fillStyle = flashCol; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }

  if (state === ST.BATTLE) drawSiegeFX();
  drawHUD();
  if (state === ST.BATTLE || state === ST.INTERLUDE) { drawMinimap(); drawEdgeIndicators(); drawButtons(); }
  if (state === ST.BATTLE) { drawNavHint(); drawExplainer(); }
  drawBanner();
  if (state === ST.SPLASH) drawSplash();
  if (state === ST.OVER) drawGameOver();

  ctx.restore();
}

// ============================================================
//  LOOP
// ============================================================
let last = performance.now(), postedReady = false;
function frame(now) {
  let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05;
  sketchPhase = Math.floor(now / 90) % 100000;   // hand-drawn "boil" for the crude ages
  update(dt); render();
  if (!postedReady) { postedReady = true; post({ gs: 'ready' }); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
