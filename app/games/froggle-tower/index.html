<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Froggle Tower</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0C0A22;overflow:hidden}
  canvas{touch-action:none;outline:none}
</style>
<script src="/vendor/phaser.min.js"></script>
</head>
<body>
<script>
'use strict';
/* FROGGLE TOWER — a tiny wizard stacking runaway frogs into a tower before the moon sets */
const W=720,H=1280,SLUG='froggle-tower',BESTKEY='gs_best:'+SLUG;
const FONT='"Fredoka","Baloo 2","Comic Sans MS","Chalkboard SE","Segoe Print",sans-serif';
const CH=parseInt(new URLSearchParams(location.search).get('c'))||0;
let BEST=+localStorage.getItem(BESTKEY)||0;
let RUN=0;
const MOON_MS=150000;           // one moon ~2m30s
const FROG_UNIT=58;             // px per frog for ghost/target altitude lines
const post=m=>{try{parent.postMessage(m,'*')}catch(e){}};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

/* ---------- WebAudio synth (no assets) ---------- */
let AC=null,muffle=null,master=null;
function audio(){
  if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain();master.gain.value=.5;
    muffle=AC.createBiquadFilter();muffle.type='lowpass';muffle.frequency.value=18000;
    muffle.connect(master);master.connect(AC.destination);}
  if(AC.state==='suspended')AC.resume();
}
function tone(f,d,type,v,glide,delay){
  if(!AC)return;type=type||'sine';v=v||.3;delay=delay||0;
  const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t);
  if(glide)o.frequency.exponentialRampToValueAtTime(Math.max(30,glide),t+d);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.012);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g);g.connect(muffle);o.start(t);o.stop(t+d+.05);
}
function noise(d,v,f,delay){
  if(!AC)return;d=d||.2;v=v||.25;f=f||800;delay=delay||0;
  const t=AC.currentTime+delay,n=Math.floor(AC.sampleRate*d),b=AC.createBuffer(1,n,AC.sampleRate),c=b.getChannelData(0);
  for(let i=0;i<n;i++)c[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource();s.buffer=b;
  const fl=AC.createBiquadFilter();fl.type='lowpass';fl.frequency.value=f;
  const g=AC.createGain();g.gain.value=v;s.connect(fl);fl.connect(g);g.connect(muffle);s.start(t);
}
const PV=()=>.9+Math.random()*.2;  // ±10% pitch variation
function croak(p,v,delay){p=p||1;v=v||.35;delay=delay||0;p*=PV();
  tone(92*p,.09,'sawtooth',v,62*p,delay);tone(72*p,.14,'square',v*.55,115*p,delay+.07);}
function duckAudio(){if(!AC)return;const t=AC.currentTime;
  muffle.frequency.cancelScheduledValues(t);muffle.frequency.setValueAtTime(520,t);
  muffle.frequency.linearRampToValueAtTime(18000,t+1.3);}

/* ---------- species table (constants from brief §6) ---------- */
const SPECIES=[
 {key:'pond',  w:118,h:62,c:0x7BC950,o:0x4E8F31,pat:5000,wig:.016,fr:.9, pitch:1,  unlock:0},
 {key:'tree',  w:74, h:44,c:0xA8E063,o:0x74A83E,pat:2500,wig:.028,fr:.9, pitch:1.6,unlock:4, leap:true},
 {key:'bull',  w:180,h:88,c:0x4E9F3D,o:0x2F6B24,pat:6000,wig:.012,fr:.9, pitch:.55,unlock:8, thump:true},
 {key:'grease',w:110,h:58,c:0x8FD6A8,o:0x5CA97E,pat:4000,wig:.02, fr:.15,pitch:1.2,unlock:12,sheen:true}
];

class Game extends Phaser.Scene{
 constructor(){super('g')}

 create(){
  const M=Phaser.Physics.Matter.Matter;
  this.M=M;
  this.matter.world.engine.timing.timeScale=1;
  this.rng=mulberry32(20260718+RUN*9973);
  this.state=RUN===0?'splash':'play';
  this.frogs=[];this.height=0;this.hMax=0;this.lostT=[];
  this.mana=1;this.moonT=0;this.chBeaten=false;this.bestBroken=false;
  this.held=null;this.heldX=360;this.hoverY=780;this.lastPX=360;
  this.suppressDrop=false;this.hushArmed=false;this.ignoreDown=false;
  this.lastScorePost=0;this.nextSleep=0;this.mothAt=15000+this.rng()*15000+this.time.now;this.moth=null;
  this.isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  this.makeTextures();

  /* sky */
  this.add.image(360,640,'sky').setScrollFactor(0).setDepth(-10);
  this.dim=this.add.rectangle(360,640,W,H,0x3A1A4E,0).setScrollFactor(0).setDepth(-9);
  /* moon */
  this.moonC=this.add.container(0,0).setScrollFactor(0).setDepth(-8);
  const mg1=this.add.circle(0,0,92,0xFFF7DC,.10),mg2=this.add.circle(0,0,64,0xFFF7DC,.16),
        md=this.add.circle(0,0,44,0xF7E8B5);
  this.moonC.add([mg1,mg2,md]);
  /* hills (parallax) */
  const hg=this.add.graphics().setScrollFactor(.25).setDepth(-4);
  hg.fillStyle(0x0C0A22);hg.fillCircle(70,1190,170);hg.fillCircle(330,1225,210);
  hg.fillCircle(600,1180,190);hg.fillRect(0,1170,W,200);
  /* stone plinth (world) */
  const pg=this.add.graphics().setDepth(-3);
  pg.fillStyle(0x1B1440);pg.fillRoundedRect(170,1084,380,120,18);
  pg.lineStyle(4,0x6C4AB6,.5);pg.strokeRoundedRect(170,1084,380,120,18);
  pg.fillStyle(0x35652B);pg.fillEllipse(360,1088,368,26);
  this.matter.add.rectangle(360,1132,380,92,{isStatic:true,friction:1});

  /* particles */
  this.starEm=this.add.particles(0,0,'spark',{speed:{min:70,max:230},lifespan:650,scale:{start:1.1,end:0},gravityY:260,emitting:false}).setDepth(20);
  this.hushEm=this.add.particles(0,0,'hushp',{speed:{min:20,max:80},lifespan:900,scale:{start:1,end:0},gravityY:-40,emitting:false}).setDepth(20);

  /* ghost + target altitude lines */
  const dash=(g,y,color,alpha)=>{g.fillStyle(color,alpha);for(let x=130;x<590;x+=34)g.fillRect(x,y-2,18,4)};
  if(BEST>0){
    this.ghostG=this.add.graphics().setDepth(-2);
    this.ghostY=1084-BEST*FROG_UNIT-24;dash(this.ghostG,this.ghostY,0xB7A6FF,.55);
    this.ghostTx=this.add.text(586,this.ghostY,'YOUR BEST — '+BEST,{fontFamily:FONT,fontSize:'24px',color:'#B7A6FF'}).setOrigin(1,1.2).setResolution(2).setDepth(-2);
  }
  if(CH>0){
    const tg=this.add.graphics().setDepth(-2);this.targetY=1084-CH*FROG_UNIT-24;
    dash(tg,this.targetY,0xFFD447,.8);this.targetG=tg;
    this.targetTx=this.add.text(586,this.targetY,'TARGET — '+CH+' FROGS',{fontFamily:FONT,fontSize:'24px',color:'#FFD447'}).setOrigin(1,1.2).setResolution(2).setDepth(-2);
  }

  /* wizard (screen-space, base of screen) */
  this.wiz=this.add.image(86,1168,'wiz').setScrollFactor(0).setDepth(30);
  this.hat=this.add.image(86,1128,'hat').setScrollFactor(0).setDepth(31);
  this.beamG=this.add.graphics().setScrollFactor(0).setDepth(4);

  /* UI */
  this.counter=this.add.text(360,74,'0',{fontFamily:FONT,fontSize:'96px',color:'#F9F5E3',stroke:'#4B2E9E',strokeThickness:10}).setOrigin(.5).setScrollFactor(0).setDepth(50).setResolution(2);
  this.add.text(360,142,'FROGS',{fontFamily:FONT,fontSize:'26px',color:'#B7A6FF'}).setOrigin(.5).setScrollFactor(0).setDepth(50).setResolution(2);
  const hintStr=this.isTouch?'slide to steer · release to drop':'move mouse · click to drop · E = hush';
  this.hint=this.add.text(360,208,hintStr,{fontFamily:FONT,fontSize:'28px',color:'#F9F5E3'}).setOrigin(.5).setScrollFactor(0).setDepth(50).setAlpha(.85).setResolution(2);
  this.time.delayedCall(6000,()=>this.tweens.add({targets:this.hint,alpha:0,duration:600}));
  /* hush button + mana ring (thumb zone) */
  this.hushBtnC=this.add.container(628,1176).setScrollFactor(0).setDepth(51);
  const hb=this.add.circle(0,0,46,0x4B2E9E,.85).setStrokeStyle(3,0xB7A6FF,.7);
  const mIc=this.add.circle(0,0,20,0xF7E8B5),mCut=this.add.circle(9,-5,17,0x4B2E9E);
  this.hushBtnC.add([hb,mIc,mCut]);
  hb.setInteractive({useHandCursor:true}).on('pointerdown',()=>{
    this.ignoreDown=true;
    if(this.state!=='play')return;
    if(this.mana>=1){this.hushArmed=true;this.tweens.add({targets:this.hushBtnC,scale:{from:1.2,to:1},duration:200});}
    else tone(200,.08,'square',.12);
  });
  this.ringG=this.add.graphics().setScrollFactor(0).setDepth(52);
  this.cursorMoon=this.add.circle(0,0,10,0xCDE8FF,.9).setScrollFactor(0).setDepth(60).setVisible(false);

  /* input */
  this.input.mouse&&this.input.mouse.disableContextMenu();
  this.input.on('pointermove',p=>{
    if(this.state!=='play'||!this.held){this.lastPX=p.x;return}
    if(p.isDown&&p.wasTouch)this.heldX+=(p.x-this.lastPX)*1.15;   // indirect drag — finger never occludes tower
    else if(!p.wasTouch)this.heldX=p.x;
    this.heldX=Phaser.Math.Clamp(this.heldX,120,600);this.lastPX=p.x;
  });
  this.input.on('pointerdown',p=>{
    this.lastPX=p.x;
    if(this.ignoreDown){this.ignoreDown=false;this.suppressDrop=true;return}
    if(this.state==='splash'){this.startPlay();return}
    if(this.state==='over'){if(this.time.now-this.overAt>350)this.restartRun();return}
    if(this.state!=='play')return;
    if(p.rightButtonDown()){this.tryHushAt(p);this.suppressDrop=true;return}
    if(this.hushArmed){this.hushArmed=false;if(this.tryHushAt(p))this.suppressDrop=true;return}
  });
  this.input.on('pointerup',()=>{
    if(this.suppressDrop){this.suppressDrop=false;return}
    if(this.state==='play')this.dropHeld();
  });
  this.keys=this.input.keyboard.addKeys('LEFT,RIGHT');
  this.input.keyboard.on('keydown',e=>{
    if(this.state==='splash'){this.startPlay();return}
    if(this.state==='over'&&(e.code==='Enter'||e.code==='Space')){if(this.time.now-this.overAt>350)this.restartRun();return}
    if(this.state!=='play')return;
    if(e.code==='Space')this.dropHeld();
    if(e.code==='KeyE')this.tryHushAt(this.input.activePointer);
  });

  /* crickets — volume ducks as the moon lowers */
  this.time.addEvent({delay:1600,loop:true,callback:()=>{
    if(this.state!=='play'||!AC)return;
    const v=.04*Math.max(.08,Math.sin(Math.min(1,this.moonT)*Math.PI));
    tone(4300*PV(),.05,'sine',v);tone(4300*PV(),.05,'sine',v,0,.09);
  }});

  if(RUN===0){this.makeSplash();post({gs:'ready'});}
  else{this.spawnHeld();}
 }

 makeSplash(){
  const c=this.add.container(0,0).setScrollFactor(0).setDepth(90);
  c.add(this.add.rectangle(360,640,W,H,0x141034,.45));
  c.add(this.add.circle(520,300,54,0xF7E8B5));
  c.add(this.add.text(360,430,'FROGGLE\nTOWER',{fontFamily:FONT,fontSize:'110px',color:'#F9F5E3',stroke:'#4B2E9E',strokeThickness:14,align:'center'}).setOrigin(.5).setResolution(2));
  c.add(this.add.text(360,600,'stack squirming frogs\nbefore the moon sets',{fontFamily:FONT,fontSize:'34px',color:'#B7A6FF',align:'center'}).setOrigin(.5).setResolution(2));
  const go=this.add.text(360,760,this.isTouch?'TAP TO STACK':'CLICK OR PRESS ANY KEY',{fontFamily:FONT,fontSize:'40px',color:'#FFD447'}).setOrigin(.5).setResolution(2);
  c.add(go);this.tweens.add({targets:go,alpha:.3,duration:600,yoyo:true,repeat:-1});
  c.add(this.add.image(300,900,'frog_pond'));c.add(this.add.image(310,845,'frog_tree'));
  this.splashC=c;
 }
 startPlay(){audio();this.splashC&&this.splashC.destroy();this.state='play';this.spawnHeld();}

 /* ---------- procedural textures ---------- */
 makeTextures(){
  if(this.textures.exists('frog_pond'))return;
  const skyC=this.textures.createCanvas('sky',W,H),x=skyC.context;
  const gr=x.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#141034');gr.addColorStop(1,'#2B1E5C');
  x.fillStyle=gr;x.fillRect(0,0,W,H);
  const r=mulberry32(7);x.fillStyle='#F9F5E3';
  for(let i=0;i<80;i++){x.globalAlpha=.15+r()*.5;const s=r()<.85?2:3;x.fillRect(r()*W,r()*H*.92,s,s)}
  x.globalAlpha=1;skyC.refresh();
  for(const sp of SPECIES){
    const g=this.make.graphics({add:false}),w=sp.w,h=sp.h,rad=h*.42;
    g.fillStyle(sp.c);g.fillRoundedRect(0,0,w,h,rad);
    g.lineStyle(5,sp.o);g.strokeRoundedRect(2,2,w-4,h-4,rad-2);
    g.fillStyle(0xF9F5E3,.95);g.fillEllipse(w/2,h*.74,w*.58,h*.4);
    const er=Math.max(6,h*.15);
    for(const ex of [w*.3,w*.7]){
      g.fillStyle(sp.c);g.fillCircle(ex,er*.9,er);g.lineStyle(3,sp.o);g.strokeCircle(ex,er*.9,er);
      g.fillStyle(0xF9F5E3);g.fillCircle(ex,er*.9,er*.6);g.fillStyle(0x141034);g.fillCircle(ex,er*.95,er*.28);
    }
    if(sp.sheen){g.fillStyle(0xFFFFFF,.4);g.fillRoundedRect(w*.12,h*.2,w*.3,h*.16,h*.08)}
    g.generateTexture('frog_'+sp.key,w,h);g.destroy();
  }
  let g=this.make.graphics({add:false});
  g.fillStyle(0x6C4AB6);g.fillRoundedRect(6,26,34,36,{tl:17,tr:17,bl:9,br:9});
  g.fillStyle(0xF9F5E3);g.fillCircle(23,20,11);
  g.fillStyle(0x141034);g.fillCircle(19,19,1.8);g.fillCircle(27,19,1.8);
  g.generateTexture('wiz',46,64);g.destroy();
  g=this.make.graphics({add:false});
  g.fillStyle(0x4B2E9E);g.fillTriangle(28,0,50,30,6,30);g.fillRoundedRect(0,28,56,9,4);
  g.fillStyle(0xFFD447);g.fillTriangle(33,8,29,16,37,16);g.fillTriangle(33,20,29,12,37,12);
  g.generateTexture('hat',56,40);g.destroy();
  g=this.make.graphics({add:false});
  g.fillStyle(0x4B2E9E);g.fillTriangle(4,20,24,20,20,2);g.fillStyle(0xCDE8FF);
  g.fillRect(2,18,24,5);g.fillCircle(20,3,4);g.generateTexture('cap',28,26);g.destroy();
  g=this.make.graphics({add:false});g.fillStyle(0xFFD447);g.fillCircle(4,4,3.4);g.generateTexture('spark',8,8);g.destroy();
  g=this.make.graphics({add:false});g.fillStyle(0xCDE8FF);g.fillCircle(4,4,3.4);g.generateTexture('hushp',8,8);g.destroy();
  g=this.make.graphics({add:false});
  g.fillStyle(0xF7E8B5,.9);g.fillEllipse(10,12,18,14);g.fillEllipse(26,12,18,14);
  g.fillStyle(0xF9F5E3);g.fillRoundedRect(15,8,6,14,3);g.generateTexture('moth',36,26);g.destroy();
 }

 /* ---------- frogs ---------- */
 pickSpecies(){
  const cands=SPECIES.filter(s=>this.height>=s.unlock);
  const ws=cands.map(s=>s.key==='pond'?3:2),tot=ws.reduce((a,b)=>a+b,0);
  let r=this.rng()*tot;for(let i=0;i<cands.length;i++){r-=ws[i];if(r<=0)return cands[i]}
  return cands[0];
 }
 spawnHeld(){
  if(this.state!=='play')return;
  const sp=this.pickSpecies(),side=this.rng()<.5?-1:1;
  const img=this.add.image(side<0?-90:810,this.hoverY-70,'frog_'+sp.key).setDepth(5);
  this.held={img,sp,ready:false,presleep:false};
  tone(660*PV(),.14,'triangle',.16);  // soft harp pluck — grabbed by beam
  this.tweens.add({targets:img,x:this.heldX,duration:380,ease:'Sine.Out',onComplete:()=>{if(this.held&&this.held.img===img)this.held.ready=true}});
  this.tweens.add({targets:img,angle:{from:-7,to:7},duration:260,yoyo:true,repeat:-1,ease:'Sine.InOut'}); // dangles & kicks
 }
 dropHeld(){
  const hd=this.held;if(!hd||!hd.ready||this.state!=='play')return;
  this.held=null;this.tweens.killTweensOf(hd.img);
  const x=hd.img.x,y=hd.img.y;hd.img.destroy();
  const sp=hd.sp;
  const body=this.matter.add.rectangle(x,y,sp.w,sp.h,{
    chamfer:{radius:sp.h*.2},          // 40% of half-height — wobbles charmingly, then stops
    restitution:.08,friction:sp.fr,frictionAir:.02,density:.001});
  const img=this.add.image(x,y,'frog_'+sp.key).setDepth(6);
  this.frogs.push({body,img,sp,counted:false,sf:0,wAt:0,ticked:true,hushUntil:0,sleep:false,dead:false,cap:null,zAt:0,preslept:hd.presleep});
  tone(1150*PV(),.28,'sine',.13,260);  // whistle-down
  this.starEm.explode(4,x,y);
  this.time.delayedCall(430,()=>this.spawnHeld());
 }
 settleFrog(f){
  const now=this.time.now,M=this.M;
  f.counted=true;f.wAt=now+f.sp.pat*(.9+this.rng()*.4);f.ticked=true;
  if(f.preslept){f.hushUntil=now+8000;this.addCap(f)}
  this.height++;this.hMax=Math.max(this.hMax,this.height);
  this.counter.setText(this.height);
  this.tweens.add({targets:this.counter,scale:{from:1.35,to:1},duration:220,ease:'Back.Out'});
  const pitch=f.sp.pitch*(1+this.height*.04);   // croak pitch rises — the tower becomes a chord
  tone(180*PV(),.12,'sine',.32,70);croak(pitch,.3,.05);
  this.tweens.add({targets:f.img,scaleY:{from:.7,to:1.08},scaleX:{from:1.18,to:.97},duration:130,ease:'Sine.Out',
    onComplete:()=>this.tweens.add({targets:f.img,scaleY:1,scaleX:1,duration:70})});
  this.starEm.explode(8,f.body.position.x,f.body.position.y+f.sp.h/2);
  this.tweens.add({targets:this.wiz,y:{from:1156,to:1168},duration:220,ease:'Bounce.Out'}); // wizard cheers
  this.starEm.explode(3,86,1120-this.cameras.main.scrollY*0); // ✨ by the hat (screen-space emitter reuse in world: near base only pre-scroll)
  if(f.sp.thump){ // bullfrog: the only screen shake in the game — reserved for weight
    this.cameras.main.shake(90,.0042);tone(58,.3,'sine',.5,38);noise(.12,.3,180);
    for(const o of this.frogs){ if(o!==f&&!o.dead&&o.counted&&o.body.position.y>f.body.position.y){
      M.Body.setAngularVelocity(o.body,o.body.angularVelocity*.2);
      M.Body.setVelocity(o.body,{x:o.body.velocity.x*.3,y:o.body.velocity.y});
      o.wAt+=1800; } } // crushes the wobble out of the frogs below
  }
  const now2=this.time.now;
  if(now2-this.lastScorePost>250){post({gs:'score',score:this.hMax});this.lastScorePost=now2}
  if(CH&&!this.chBeaten&&this.height>=CH){
    this.chBeaten=true;post({gs:'challenge_beaten',score:this.hMax});
    tone(660,.12,'triangle',.3);tone(830,.12,'triangle',.3,0,.1);tone(1050,.2,'triangle',.3,0,.2);
    const t=this.add.text(360,300,'TARGET SMASHED!',{fontFamily:FONT,fontSize:'54px',color:'#FFD447',stroke:'#4B2E9E',strokeThickness:8}).setOrigin(.5).setScrollFactor(0).setDepth(60).setResolution(2);
    this.tweens.add({targets:t,scale:{from:.4,to:1},duration:300,ease:'Back.Out'});
    this.tweens.add({targets:t,alpha:0,delay:1500,duration:500,onComplete:()=>t.destroy()});
    this.targetG&&this.tweens.add({targets:[this.targetG,this.targetTx],alpha:.25,duration:300,yoyo:true,repeat:3});
  }
  if(BEST&&!this.bestBroken&&this.height>BEST){ // ghost line shatters into fireflies
    this.bestBroken=true;croak(1.5,.5);
    for(let i=0;i<5;i++)this.starEm.explode(8,170+i*90,this.ghostY);
    this.ghostG&&this.ghostG.destroy();this.ghostTx&&this.ghostTx.destroy();
  }
 }
 wriggle(f,isTop){
  const M=this.M,b=f.body,now=this.time.now;
  if(isTop&&f.sp.leap&&this.rng()<.3){ // leap — always telegraphed by a 0.5s crouch
    this.tweens.add({targets:f.img,scaleY:.78,duration:420,ease:'Sine.In'});
    this.time.delayedCall(500,()=>{
      if(f.dead||this.state!=='play')return;
      const a=Phaser.Math.DegToRad(60+this.rng()*15),d=this.rng()<.5?-1:1,F=.08*b.mass;
      M.Body.applyForce(b,b.position,{x:d*Math.cos(a)*F,y:-Math.sin(a)*F});
      croak(f.sp.pitch*1.6,.4);
      this.tweens.add({targets:f.img,scaleY:{from:1.15,to:1},duration:200});
    });
  }else{
    const k=Phaser.Math.Clamp(f.sp.wig*(.8+this.rng()*.6),.012,.03); // 0.012–0.03 × mass
    const a=Phaser.Math.DegToRad(this.rng()*60-30),d=this.rng()<.5?-1:1,F=k*b.mass;
    M.Body.applyForce(b,b.position,{x:d*Math.cos(a)*F,y:-Math.abs(Math.sin(a))*F});
    croak(f.sp.pitch,.18);
    this.tweens.add({targets:f.img,scaleX:{from:1.08,to:1},duration:160});
  }
  f.wAt=now+f.sp.pat*(.75+this.rng()*.5);f.ticked=true;
  this.time.delayedCall(0,()=>f.ticked=false); // re-arm warning for next expiry
 }
 addCap(f){if(f.cap)return;f.cap=this.add.image(f.img.x,f.img.y,'cap').setDepth(7)}
 zzz(x,y){const z=this.add.text(x,y,'z',{fontFamily:FONT,fontSize:'30px',color:'#CDE8FF'}).setOrigin(.5).setDepth(9).setResolution(2);
  this.tweens.add({targets:z,y:y-60,x:x+14,alpha:0,duration:1200,onComplete:()=>z.destroy()});}
 tryHushAt(p){
  if(this.mana<1){tone(200,.08,'square',.12);return false}
  const wy=p.y+this.cameras.main.scrollY;let best=null,bd=200;
  for(const f of this.frogs){if(f.dead||!f.counted)continue;
    const d=Phaser.Math.Distance.Between(p.x,wy,f.body.position.x,f.body.position.y);
    if(d<bd){bd=d;best=f}}
  if(!best)return false;
  this.mana=0;best.hushUntil=this.time.now+8000;best.ticked=true;best.img.clearTint();
  this.addCap(best);
  tone(500,.45,'sine',.25,1500); // glissando chime
  this.hushEm.explode(16,best.body.position.x,best.body.position.y);
  this.zzz(best.body.position.x+20,best.body.position.y-30);
  return true;
 }
 loseFrog(f){
  if(f.dead)return;f.dead=true;
  const now=this.time.now;
  if(f.sleep){this.M.Body.setStatic(f.body,false);f.sleep=false}
  this.matter.world.remove(f.body);
  this.tweens.add({targets:f.img,alpha:0,angle:f.img.angle+120,duration:350,onComplete:()=>f.img.destroy()});
  f.cap&&f.cap.destroy();
  if(f.counted&&this.state==='play'){
    this.height=Math.max(0,this.height-1);this.counter.setText(this.height);
    croak(f.sp.pitch*1.3,.3);
    this.tweens.add({targets:this.hat,angle:{from:-18,to:0},duration:500,ease:'Bounce.Out'}); // hat droops
    this.lostT.push(now);this.lostT=this.lostT.filter(t=>now-t<1200);
    if(this.lostT.length>=2)this.topple();
  }
 }

 /* ---------- endings ---------- */
 topple(){
  if(this.state!=='play')return;this.state='topple';
  const M=this.M;
  for(const f of this.frogs)if(!f.dead&&f.sleep){M.Body.setStatic(f.body,false);f.sleep=false}
  this.matter.world.engine.timing.timeScale=.25; // lean in — 0.4s slow-mo at the tipping point
  duckAudio();
  for(let i=0;i<6;i++)croak(1.9-i*.26,.3,.12*i); // croak-chorus glissando down
  noise(.45,.35,420,.55);
  this.tweens.add({targets:this.hat,y:this.hat.y-280,x:this.hat.x+150,angle:720,duration:900,ease:'Sine.Out'}); // hat blown off
  const cam=this.cameras.main;
  this.starEm.explode(46,360,cam.scrollY+420);this.starEm.explode(24,360,cam.scrollY+700);
  if(this.held){this.tweens.killTweensOf(this.held.img);this.tweens.add({targets:this.held.img,alpha:0,duration:400});this.held=null}
  this.time.delayedCall(400,()=>{this.matter.world.engine.timing.timeScale=1});
  this.time.delayedCall(1600,()=>this.endCard('THE TOWER TOPPLED AT','topple'));
 }
 moonset(){
  if(this.state!=='play')return;this.state='moonset';
  tone(520,.5,'sine',.2,390);tone(430,.7,'sine',.18,340,.55); // hush + owl note
  this.tweens.add({targets:this.dim,fillAlpha:.55,duration:900});
  for(const f of this.frogs){ if(f.dead)continue;
    this.M.Body.setStatic(f.body,true);f.sleep=true;
    this.tweens.add({targets:f.img,scaleY:{from:1.12,to:1},duration:500,ease:'Sine.Out'}); // yawn
    if(this.rng()<.5)this.zzz(f.body.position.x,f.body.position.y-30);
  }
  if(this.held){this.tweens.killTweensOf(this.held.img);this.tweens.add({targets:this.held.img,y:'+=40',alpha:0,duration:600});this.held=null}
  this.time.delayedCall(1200,()=>this.endCard('THE FROGS SLEEP AT','moonset'));
 }
 endCard(title,kind){
  if(this.state==='over')return;
  const score=this.hMax,newBest=score>BEST;
  if(newBest){BEST=score;localStorage.setItem(BESTKEY,BEST);croak(1.5,.55);} // triumphant RIBBIT!
  post({gs:'gameover',score});
  const c=this.add.container(360,720).setScrollFactor(0).setDepth(100).setAlpha(0);
  const panel=this.add.graphics();
  panel.fillStyle(0x141034,.93);panel.fillRoundedRect(-280,-280,560,560,34);
  panel.lineStyle(5,0x6C4AB6);panel.strokeRoundedRect(-280,-280,560,560,34);
  c.add(panel);
  c.add(this.add.text(0,-216,title,{fontFamily:FONT,fontSize:'34px',color:'#B7A6FF'}).setOrigin(.5).setResolution(2));
  c.add(this.add.text(0,-90,''+score,{fontFamily:FONT,fontSize:'150px',color:'#F9F5E3',stroke:'#4B2E9E',strokeThickness:12}).setOrigin(.5).setResolution(2));
  c.add(this.add.text(0,22,newBest?'★ NEW BEST! ★':'BEST — '+BEST,{fontFamily:FONT,fontSize:'38px',color:newBest?'#FFD447':'#CDE8FF'}).setOrigin(.5).setResolution(2));
  const flavors=['the frogs regret nothing','structural integrity: croaked','gravity 1 · wizard 0'];
  const flavor=kind==='moonset'?('tallest frog obelisk this moon: '+score):flavors[Math.floor(this.rng()*flavors.length)];
  c.add(this.add.text(0,78,flavor,{fontFamily:FONT,fontSize:'26px',color:'#B7A6FF'}).setOrigin(.5).setResolution(2));
  const bg=this.add.graphics();bg.fillStyle(0xFFD447);bg.fillRoundedRect(-150,140,300,86,26);c.add(bg);
  const bt=this.add.text(0,183,'RE-STACK',{fontFamily:FONT,fontSize:'44px',color:'#141034'}).setOrigin(.5).setResolution(2);c.add(bt);
  c.add(this.add.text(0,252,this.isTouch?'tap anywhere':'tap · Enter · Space',{fontFamily:FONT,fontSize:'22px',color:'#F9F5E3'}).setOrigin(.5).setAlpha(.7).setResolution(2));
  this.tweens.add({targets:c,alpha:1,y:640,duration:350,ease:'Back.Out'});
  this.tweens.add({targets:bt,scale:{from:1,to:1.07},duration:500,yoyo:true,repeat:-1});
  this.state='over';this.overAt=this.time.now;
 }
 restartRun(){RUN++;this.scene.restart()}

 /* ---------- main loop ---------- */
 update(time,dt){
  const now=time,cam=this.cameras.main,M=this.M;
  /* moon clock, mana, sky */
  if(this.state==='play'){
    this.moonT+=dt/MOON_MS;
    if(this.moonT>=1){this.moonT=1;this.moonset();}
    const mf=Math.sin(Math.min(1,this.moonT)*Math.PI);
    this.mana=Math.min(1,this.mana+dt/1000*(.02+.10*mf)); // moonlight recharges Hush; slows as the moon sinks
    this.dim.fillAlpha=.5*Math.pow(this.moonT,1.5);
  }
  const mt=Math.min(1,this.moonT),mf2=Math.sin(mt*Math.PI);
  this.moonC.setPosition(-90+mt*900,430-mf2*290);

  /* frogs: sync, settle, telegraph, wriggle, lose */
  let top=1084,topF=null;
  for(const f of this.frogs){
    if(f.dead)continue;
    const b=f.body;
    f.img.x=b.position.x;f.img.y=b.position.y;f.img.rotation=b.angle;
    if(f.cap){const d=f.sp.h*.55;f.cap.x=f.img.x+d*Math.sin(b.angle);f.cap.y=f.img.y-d*Math.cos(b.angle);f.cap.rotation=b.angle;
      if(f.hushUntil<now&&!f.sleep){f.cap.destroy();f.cap=null}}
    if(f.counted&&b.position.y-f.sp.h/2<top){top=b.position.y-f.sp.h/2;topF=f}
    if(b.position.y>1350||Math.abs(b.position.x-360)>400){this.loseFrog(f);continue}
    if(f.sleep)continue;
    if(!f.counted){
      if(b.speed<0.15){f.sf++;if(f.sf>=20&&this.state==='play')this.settleFrog(f)}else f.sf=0; // settle: speed<0.15 for 20 frames
      continue;
    }
    if(b.speed<0.3)M.Body.setAngularVelocity(b,b.angularVelocity*0.9); // post-settle angular damping
    if(this.state!=='play')continue;
    if(f.hushUntil>now){
      if(now>f.zAt){this.zzz(b.position.x+16,b.position.y-f.sp.h*.7);f.zAt=now+900}
      f.wAt=Math.max(f.wAt,f.hushUntil+800);f.img.clearTint();continue;
    }
    if(now>f.wAt-500){ // every threat is telegraphed
      if(!f.ticked===false&&!f.ticked){}
      if(!f.ticked){f.ticked=true;tone(1250,.03,'square',.13);tone(1250,.03,'square',.13,0,.14);tone(1400,.03,'square',.15,0,.26);croak(f.sp.pitch,.12,.3)}
      if(Math.floor(now/90)%2)f.img.setTintFill(0xFFD447);else f.img.clearTint();
      if(now>f.wAt){f.img.clearTint();this.wriggle(f,f===topF)}
    }else{f.img.clearTint();f.ticked=false}
  }
  /* sleep scheme — only the top ~3 frogs are live */
  if(now>this.nextSleep&&this.state==='play'){
    this.nextSleep=now+600;
    const stack=this.frogs.filter(f=>!f.dead&&f.counted).sort((a,b)=>a.body.position.y-b.body.position.y);
    for(let i=0;i<stack.length;i++){
      const f=stack[i],should=i>=3;
      if(should&&!f.sleep&&f.body.speed<0.3){M.Body.setStatic(f.body,true);f.sleep=true}
      else if(!should&&f.sleep){M.Body.setStatic(f.body,false);f.sleep=false}
    }
  }
  /* camera follows tower top — height is felt */
  const targetScroll=Phaser.Math.Clamp(top-640,-30000,0);
  cam.scrollY+=(targetScroll-cam.scrollY)*.06;

  /* held frog + beam */
  this.beamG.clear();
  if(this.held){
    const hd=this.held,tgtY=top-300;
    this.hoverY+=(tgtY-this.hoverY)*.06;
    if(hd.ready){
      if(this.keys.LEFT.isDown)this.heldX-=9;if(this.keys.RIGHT.isDown)this.heldX+=9;
      this.heldX=Phaser.Math.Clamp(this.heldX,120,600);
      hd.img.x+=(this.heldX-hd.img.x)*.35;
    }
    hd.img.y=this.hoverY+Math.sin(now/280)*6;
    const sx=hd.img.x,sy=hd.img.y-cam.scrollY;
    this.beamG.lineStyle(hd.ready?11:6,0xB7A6FF,.35);
    this.beamG.lineBetween(96,1122,sx,sy);
    this.beamG.fillStyle(0xB7A6FF,.13);this.beamG.fillCircle(sx,sy,hd.sp.w*.72);
    if(hd.presleep){this.beamG.fillStyle(0xCDE8FF,.25);this.beamG.fillCircle(sx,sy,hd.sp.w*.45)}
  }
  /* wizard hat tilts with tower lean */
  if(this.state==='play'||this.state==='splash'){
    const lean=topF?Phaser.Math.Clamp(topF.body.angle,-.5,.5)*.7:0;
    this.hat.rotation+=(lean-this.hat.rotation)*.08;
  }
  /* moon moth — risk it for a full recharge */
  if(this.state==='play'&&!this.moth&&now>this.mothAt&&this.moonT<.9){
    const side=this.rng()<.5?-1:1;
    const img=this.add.image(side<0?-40:760,top-150,'moth').setDepth(8);
    this.moth={img,vx:side<0?2.4:-2.4};
    this.tweens.add({targets:img,scaleY:.55,duration:120,yoyo:true,repeat:-1});
  }
  if(this.moth){
    const m=this.moth;m.img.x+=m.vx;m.img.y+=Math.sin(now/230)*1.6;
    if(this.held&&this.held.ready&&Phaser.Math.Distance.Between(m.img.x,m.img.y,this.held.img.x,this.held.img.y)<74){
      this.mana=1;this.held.presleep=true; // frog lands pre-slept
      tone(700,.12,'triangle',.3);tone(880,.12,'triangle',.3,0,.09);tone(1050,.24,'triangle',.32,0,.18);
      this.hushEm.explode(20,m.img.x,m.img.y);
      this.tweens.add({targets:this.hushBtnC,scale:{from:1.5,to:1},duration:350,ease:'Back.Out'}); // mana ring flares
      m.img.destroy();this.moth=null;this.mothAt=now+18000+this.rng()*15000;
    }else if(m.img.x<-60||m.img.x>780){m.img.destroy();this.moth=null;this.mothAt=now+12000+this.rng()*12000;}
  }
  /* mana ring + ready cursor */
  this.ringG.clear();
  this.ringG.lineStyle(6,0xCDE8FF,this.mana>=1?1:.6);
  this.ringG.beginPath();this.ringG.arc(628,1176,42,-Math.PI/2,-Math.PI/2+this.mana*Math.PI*2);this.ringG.strokePath();
  if(this.hushArmed){this.ringG.lineStyle(3,0xFFD447,.5+.5*Math.sin(now/90));this.ringG.strokeCircle(628,1176,54)}
  const p=this.input.activePointer;
  this.cursorMoon.setVisible(!this.isTouch&&this.mana>=1&&this.state==='play');
  this.cursorMoon.setPosition(p.x+24,p.y+24);
 }
}

new Phaser.Game({
  type:Phaser.AUTO,width:W,height:H,backgroundColor:'#0C0A22',
  physics:{default:'matter',matter:{gravity:{y:1.1},enableSleeping:false}}, // drops feel weighty, not floaty
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  render:{antialias:true},
  scene:[Game]
});
</script>
