<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9B8E8"/>
      <stop offset="0.45" stop-color="#E8C8CE"/>
      <stop offset="0.8" stop-color="#FFD9B8"/>
      <stop offset="1" stop-color="#FFE4C4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF3DC" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#FFDCB4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFDCB4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="400" fill="url(#sky)"/>
  <circle cx="452" cy="196" r="150" fill="url(#sun)"/>
  <circle cx="452" cy="196" r="34" fill="#FFF3DC"/>
  <ellipse cx="150" cy="80" rx="110" ry="9" fill="#FFF6E8" opacity="0.35"/>
  <ellipse cx="520" cy="120" rx="90" ry="7" fill="#FFF6E8" opacity="0.28"/>
  <ellipse cx="330" cy="58" rx="70" ry="6" fill="#FFF6E8" opacity="0.25"/>

  <!-- far skyline -->
  <g fill="#B9A8DC">
    <rect x="-10" y="210" width="70" height="190"/>
    <rect x="70" y="238" width="52" height="162"/>
    <rect x="132" y="196" width="64" height="204"/>
    <rect x="208" y="230" width="46" height="170"/>
    <rect x="380" y="224" width="58" height="176"/>
    <rect x="446" y="248" width="44" height="152"/>
    <rect x="498" y="206" width="66" height="194"/>
    <rect x="574" y="236" width="76" height="164"/>
    <rect x="152" y="176" width="20" height="22"/>
  </g>
  <!-- mid skyline -->
  <g fill="#8E7BC0">
    <rect x="-10" y="266" width="96" height="134"/>
    <rect x="96" y="288" width="70" height="112"/>
    <rect x="240" y="280" width="60" height="120"/>
    <rect x="430" y="284" width="72" height="116"/>
    <rect x="512" y="262" width="60" height="138"/>
    <rect x="582" y="290" width="68" height="110"/>
    <rect x="18" y="240" width="26" height="28"/>
    <rect x="14" y="232" width="34" height="10"/>
    <rect x="540" y="232" width="3" height="30"/>
  </g>
  <g fill="#FFCF8E" opacity="0.8">
    <rect x="8" y="284" width="6" height="8"/><rect x="34" y="306" width="6" height="8"/>
    <rect x="62" y="292" width="6" height="8"/><rect x="112" y="312" width="6" height="8"/>
    <rect x="258" y="300" width="6" height="8"/><rect x="452" y="304" width="6" height="8"/>
    <rect x="530" y="282" width="6" height="8"/><rect x="606" y="310" width="6" height="8"/>
  </g>

  <!-- foreground rooftops with a gap -->
  <g fill="#241E38">
    <path d="M-10 322 h218 v-8 h10 v8 h4 V400 H-10 Z"/>
    <path d="M418 306 h4 v-8 h10 v8 h218 V400 H418 Z"/>
    <rect x="64" y="284" width="22" height="38"/>
    <rect x="60" y="279" width="30" height="7"/>
    <rect x="500" y="266" width="20" height="40"/>
    <rect x="560" y="272" width="3" height="34"/>
    <circle cx="561.5" cy="270" r="4"/>
  </g>
  <rect x="-10" y="322" width="232" height="3" fill="#FFB37E" opacity="0.45"/>
  <rect x="418" y="306" width="232" height="3" fill="#FFB37E" opacity="0.45"/>
  <!-- long soft shadows -->
  <path d="M64 322 h22 l-60 5 h-24 Z" fill="#1E1432" opacity="0.16"/>
  <path d="M500 306 h20 l-56 5 h-22 Z" fill="#1E1432" opacity="0.16"/>

  <!-- striped awning in the gap -->
  <g>
    <path d="M330 352 l86 -6 v14 l-86 6 Z" fill="#FF8A5C"/>
    <path d="M344 351 l14 -1 v14 l-14 1 Z" fill="#FFF1DE"/>
    <path d="M372 349 l14 -1 v14 l-14 1 Z" fill="#FFF1DE"/>
    <path d="M400 347 l14 -1 v14 l-14 1 Z" fill="#FFF1DE"/>
  </g>

  <!-- the cat, mid-leap, ink brush -->
  <g transform="translate(300 236) rotate(-8)">
    <path d="M-38 -20 Q-58 -24 -64 -46 Q-66 -54 -60 -56 Q-58 -46 -50 -40 Q-40 -32 -34 -28 Z" fill="#1C1730"/>
    <ellipse cx="0" cy="-14" rx="34" ry="16" fill="#1C1730"/>
    <ellipse cx="-16" cy="-13" rx="16" ry="15" fill="#1C1730"/>
    <circle cx="26" cy="-32" r="14" fill="#1C1730"/>
    <path d="M15 -40 Q12 -56 22 -46 Z" fill="#1C1730"/>
    <path d="M31 -45 Q37 -58 40 -41 Z" fill="#1C1730"/>
    <path d="M28 -6 Q44 0 54 12" stroke="#1C1730" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M20 -4 Q34 4 42 16" stroke="#1C1730" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M-20 -4 Q-32 2 -42 -2" stroke="#1C1730" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M-14 -2 Q-26 6 -36 4" stroke="#1C1730" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="32" cy="-30" rx="2.2" ry="3" fill="#FFE9C9"/>
    <!-- bottle -->
    <g transform="translate(26 -46) rotate(6)">
      <path d="M-10 0 L-10 -16 Q-10 -22 -5 -23 L-5 -28 L5 -28 L5 -23 Q10 -22 10 -16 L10 0 Z"
            fill="#FFF6E8" stroke="#FFFFFF" stroke-width="2"/>
      <path d="M-8.5 -13 Q0 -10 8.5 -15 L8.5 -1.5 L-8.5 -1.5 Z" fill="#FFF0DC"/>
      <rect x="-6" y="-31.5" width="12" height="4" fill="#FF8A5C"/>
    </g>
  </g>
  <!-- milk drops -->
  <circle cx="268" cy="212" r="3" fill="#FFF6E8"/>
  <circle cx="258" cy="224" r="2.2" fill="#FFF6E8"/>
  <circle cx="276" cy="228" r="1.8" fill="#FFF6E8"/>
  <!-- scattered birds -->
  <g stroke="#241E38" stroke-width="2.6" stroke-linecap="round" fill="none">
    <path d="M92 176 q8 -8 16 0 M108 176 q8 -8 16 0" transform="translate(-16 0)"/>
    <path d="M148 152 q7 -7 14 0"/>
    <path d="M60 200 q7 -7 14 0"/>
  </g>

  <!-- hand-drawn title -->
  <g transform="translate(320 84) rotate(-2)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-style="italic" font-weight="700" font-size="64" fill="#241E38">Milk Run</text>
    <path d="M-138 16 Q0 30 142 12" stroke="#241E38" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M104 20 Q138 24 156 14" stroke="#241E38" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  <text x="320" y="386" text-anchor="middle" font-family="Georgia, serif" font-style="italic"
        font-size="17" fill="#241E38" opacity="0.75">land soft. keep the milk.</text>
</svg>
